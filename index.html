  // Returns true if item matches the search query (checked in name + description)
  _rulesMatch(item, q) {
    if (!q) return true;
    return (item.name || '').toLowerCase().includes(q) || (item.description || '').toLowerCase().includes(q);
  },

  renderRules() {
    const data = this.getData();
    const builtin = this.getBuiltinRules();
    const search = (this.state.rulesSearch || '').toLowerCase().trim();
    const hasSearch = search.length > 0;

    let html = '<div class="rules-view view-padding-bottom">';
    html += `<input class="rules-search" type="search" placeholder="Search rules..." value="${this.esc(this.state.rulesSearch)}" oninput="app.state.rulesSearch=this.value; app.render()">`;

    // Helper: render one collapsible section
    // Open by default when there's a search match, closed otherwise
    const renderSection = (icon, title, items, itemRenderer) => {
      const filtered = items.filter(it => this._rulesMatch(it, search));
      if (filtered.length === 0) return '';
      const open = hasSearch; // auto-expand on search
      return `
        <div class="rules-section">
          <div class="rules-collapsible-header ${open ? 'open' : ''}" onclick="app.toggleCollapsible(this)">
            <h4>${icon} ${title} <span class="rules-count">(${filtered.length})</span></h4>
            <span class="collapsible-arrow">&#9660;</span>
          </div>
          <div class="rules-collapsible-body ${open ? 'open' : ''}">
            ${filtered.map(itemRenderer).join('')}
          </div>
        </div>`;
    };

    const ruleItem = (it) => `<div class="rule-item"><h4>${this.esc(it.name)}${it.cost ? ` <span style="font-size:0.7rem;color:var(--ink-light)">(${this.esc(it.cost)})</span>` : ''}</h4><p>${this.esc(it.description || '')}</p></div>`;

    // Section rendering order: most useful during play at the top
    html += renderSection('&#9888;', 'Conditions', data.conditions || [], ruleItem);
    html += renderSection('&#9876;', 'Combat Actions', builtin.combatActions, ruleItem);
    html += renderSection('&#9889;', 'Reactions', builtin.reactions, ruleItem);
    html += renderSection('&#127769;', 'Resting', builtin.resting, ruleItem);
    html += renderSection('&#10024;', 'Spellcasting', builtin.spellcasting, ruleItem);
    html += renderSection('&#128200;', 'Leveling Up', builtin.leveling, ruleItem);
    html += renderSection('&#128101;', 'Character Creation Guide', builtin.creation, ruleItem);
    html += renderSection('&#128221;', 'Stats & Skills', builtin.stats, ruleItem);

    // Empty-state (only when searching)
    if (hasSearch) {
      const totalMatches = [
        ...(data.conditions || []), ...builtin.combatActions, ...builtin.reactions,
        ...builtin.resting, ...builtin.spellcasting, ...builtin.leveling,
        ...builtin.creation, ...builtin.stats
      ].filter(it => this._rulesMatch(it, search)).length;
      if (totalMatches === 0) {
        html += '<div class="empty-state"><p>No rules match "' + this.esc(this.state.rulesSearch) + '".</p></div>';
      }
    }

    html += '</div>';
    return html;
  },

  // ===== CHARACTER CREATION =====
  startCreation() {
    this.state.creation = {
      step: 0,
      className: null,
      ancestry: null,
      background: null,
      statArray: 'standard',
      statAssignment: { STR: null, DEX: null, INT: null, WIL: null },
      skillPoints: {},
      skillPointsRemaining: 4,
      utilitySpell: null,
      bonusLanguages: [],
      equipment: [],
      useDefaultEquip: true,
      gold: 50,
      name: '',
      height: '',
      weight: '',
      image: null,
      motivation: '',
      songweaverSchool: null,
      customGear: { weapon: null, armor: null, shield: null },
    };
    this.navigate('creation');
  },

  renderCreation() {
    const cr = this.state.creation;
    if (!cr) return '<div class="empty-state"><p>No creation in progress.</p></div>';

    const data = this.getData();
    const steps = ['Class', 'Ancestry', 'Background', 'Stats', 'Skills', 'Equipment', 'Details', 'Review'];
    const totalSteps = steps.length;

    let html = '<div class="creation-view view-padding-bottom">';

    // Step indicator
    html += '<div class="step-indicator">';
    for (let i = 0; i < totalSteps; i++) {
      const cls = i === cr.step ? 'active' : (i < cr.step ? 'done' : '');
      html += `<div class="step-dot ${cls}"></div>`;
    }
    html += '</div>';

    html += `<div class="step-title">${steps[cr.step]}</div>`;

    switch (cr.step) {
      case 0: html += this.renderStepClass(cr, data); break;
      case 1: html += this.renderStepAncestry(cr, data); break;
      case 2: html += this.renderStepBackground(cr, data); break;
      case 3: html += this.renderStepStats(cr, data); break;
      case 4: html += this.renderStepSkills(cr, data); break;
      case 5: html += this.renderStepEquipment(cr, data); break;
      case 6: html += this.renderStepDetails(cr, data); break;
      case 7: html += this.renderStepReview(cr, data); break;
    }

    // Navigation
    html += '<div class="creation-nav">';
    if (cr.step > 0) {
      html += `<button class="btn btn-secondary" style="flex:1" onclick="app.creationPrev()">Back</button>`;
    }
    if (cr.step < totalSteps - 1) {
      html += `<button class="btn btn-primary" style="flex:1" onclick="app.creationNext()">Next</button>`;
    } else {
      html += `<button class="btn btn-gold" style="flex:1" onclick="app.saveCharacter()">Save Character</button>`;
    }
    html += '</div>';

    html += '</div>';
    return html;
  },

  renderStepClass(cr, data) {
    const classes = data.classes || [
      { name: 'Fighter', description: 'Masters of martial combat', complexity: 'Simple' },
      { name: 'Rogue', description: 'Stealthy and cunning operatives', complexity: 'Moderate' },
      { name: 'Wizard', description: 'Arcane spellcasters of great power', complexity: 'Complex', usesMana: true, mana: 4, spellcasting: true },
      { name: 'Cleric', description: 'Divine servants and healers', complexity: 'Moderate', usesMana: true, mana: 3, spellcasting: true },
      { name: 'Ranger', description: 'Skilled hunters and trackers', complexity: 'Moderate' },
      { name: 'Bard', description: 'Versatile performers and magic users', complexity: 'Complex', usesMana: true, mana: 3, spellcasting: true },
    ];
    // Hide expansion-book classes from character creation (kept in data for future use)
    const HIDDEN_CLASSES = ['Hexbinder', 'Artificer'];
    const visibleClasses = classes.filter(c => !HIDDEN_CLASSES.includes(c.name));
    let html = '<div class="option-grid">';
    visibleClasses.forEach(c => {
      const sel = cr.className === c.name ? 'selected' : '';
      html += `
        <div class="option-card ${sel}" onclick="app.state.creation.className='${c.name}'; app.render()">
          <h4>${c.name}</h4>
          <p>${c.description || ''}</p>
          ${c.complexity ? '<div class="complexity">Complexity: ' + c.complexity + '</div>' : ''}
        </div>`;
    });
    html += '</div>';
    return html;
  },

  renderStepAncestry(cr, data) {
    const ancestries = data.ancestries || [
      { name: 'Human', description: 'Versatile and ambitious', category: 'Common' },
      { name: 'Elf', description: 'Graceful and long-lived', category: 'Common' },
      { name: 'Dwarf', description: 'Hardy and stalwart', category: 'Common' },
      { name: 'Halfling', description: 'Small but brave', category: 'Common' },
      { name: 'Orc', description: 'Strong and fierce', category: 'Common' },
      { name: 'Dragonborn', description: 'Draconic heritage', category: 'Exotic' },
      { name: 'Tiefling', description: 'Infernal bloodline', category: 'Exotic' },
      { name: 'Gnome', description: 'Clever and curious', category: 'Exotic' },
    ];

    const common = ancestries.filter(a => (a.category || 'Common') === 'Common');
    const exotic = ancestries.filter(a => (a.category || 'Common') === 'Exotic');

    let html = '';
    if (common.length) {
      html += '<h3 style="margin-bottom:8px;font-size:0.9rem;color:var(--ink-light)">Common</h3>';
      html += '<div class="option-grid" style="margin-bottom:12px">';
      common.forEach(a => {
        const sel = cr.ancestry === a.name ? 'selected' : '';
        html += `<div class="option-card ${sel}" onclick="app.state.creation.ancestry='${a.name}'; app.render()"><h4>${a.name}</h4><p>${a.description || ''}</p></div>`;
      });
      html += '</div>';
    }
    if (exotic.length) {
      html += '<h3 style="margin-bottom:8px;font-size:0.9rem;color:var(--ink-light)">Exotic</h3>';
      html += '<div class="option-grid">';
      exotic.forEach(a => {
        const sel = cr.ancestry === a.name ? 'selected' : '';
        html += `<div class="option-card ${sel}" onclick="app.state.creation.ancestry='${a.name}'; app.render()"><h4>${a.name}</h4><p>${a.description || ''}</p></div>`;
      });
      html += '</div>';
    }
    return html;
  },

  renderStepBackground(cr, data) {
    const bgs = data.backgrounds || [
      { name: 'Soldier', description: 'Trained in the arts of war', mechanics: '+1 Athletics, proficiency with martial weapons' },
      { name: 'Scholar', description: 'Dedicated to learning and knowledge', mechanics: '+1 Arcana, extra language' },
      { name: 'Criminal', description: 'A life outside the law', mechanics: '+1 Stealth, thieves\' tools proficiency' },
      { name: 'Noble', description: 'Born into privilege', mechanics: '+1 Persuasion, extra starting gold' },
      { name: 'Artisan', description: 'Skilled craftsperson', mechanics: '+1 Investigation, artisan tools' },
      { name: 'Outlander', description: 'Raised in the wilderness', mechanics: '+1 Nature, survival expertise' },
      { name: 'Acolyte', description: 'Servant of a higher power', mechanics: '+1 Insight, religious knowledge' },
      { name: 'Entertainer', description: 'Performer and showperson', mechanics: '+1 Persuasion, performance tools' },
    ];
    let html = '<div class="option-grid single-col">';
    bgs.forEach(b => {
      const sel = cr.background === b.name ? 'selected' : '';
      html += `
        <div class="option-card ${sel}" onclick="app.state.creation.background='${this.esc(b.name)}';${b.name !== 'Academy Dropout' ? " app.state.creation.utilitySpell=null;" : ''} app.render()">
          <h4>${b.name}</h4>
          <p>${b.description || ''}</p>
          ${b.mechanics ? '<div class="complexity" style="color:var(--burgundy)">' + b.mechanics + '</div>' : ''}
        </div>`;
    });
    html += '</div>';

    // Academy Dropout: show utility spell picker
    if (cr.background === 'Academy Dropout') {
      const spellData = data.spells || {};
      const utilityData = spellData.utility || (window.GAME_DATA?.SPELLS?.utility) || {};
      const schools = ['fire', 'ice', 'lightning', 'wind', 'radiant', 'necrotic'];
      // Build flat list for easy indexing
      this._utilitySpellList = [];
      schools.forEach(school => {
        (utilityData[school] || []).forEach(sp => {
          this._utilitySpellList.push({ name: sp.name, school, tier: 0, actions: sp.actions || 0, range: sp.range || '', damage: 'None', description: sp.description || '' });
        });
      });
      html += `<div style="margin-top:16px;padding:12px;background:var(--parchment-dark);border-radius:8px;border:2px solid var(--gold)">
        <div style="font-weight:bold;color:var(--burgundy);margin-bottom:8px;font-size:0.95rem">Choose Your Utility Spell</div>
        <div style="font-size:0.75rem;color:var(--ink-light);margin-bottom:10px">Academy Dropout grants you 1 Utility Spell from any school.</div>`;
      let idx = 0;
      schools.forEach(school => {
        const spells = utilityData[school] || [];
        if (spells.length === 0) return;
        const schoolLabel = school.charAt(0).toUpperCase() + school.slice(1);
        html += `<div style="font-weight:bold;font-size:0.8rem;color:var(--leather);margin:8px 0 4px;text-transform:uppercase">${schoolLabel}</div>`;
        spells.forEach(sp => {
          const selected = cr.utilitySpell?.name === sp.name;
          html += `<div onclick="app.pickUtilitySpell(${idx})"
            style="background:${selected ? 'var(--gold)' : 'var(--parchment)'};
            color:${selected ? '#fff' : 'var(--ink)'};
            padding:6px 8px;border-radius:6px;margin-bottom:4px;cursor:pointer;
            border:2px solid ${selected ? 'var(--burgundy)' : 'transparent'}">
            <div style="font-weight:bold;font-size:0.75rem">${this.esc(sp.name)}</div>
            <div style="font-size:0.65rem;color:${selected ? '#ffe' : 'var(--ink-light)'}">${this.esc(sp.description || '')}</div>
          </div>`;
          idx++;
        });
      });
      html += `</div>`;
    }
    return html;
  },

  pickUtilitySpell(index) {
    const sp = this._utilitySpellList?.[index];
    if (!sp) return;
    const cr = this.state.creation;
    if (!cr) return;
    cr.utilitySpell = cr.utilitySpell?.name === sp.name ? null : sp;
    this.render();
  },

  renderStepStats(cr, data) {
    const arrays = data.statArrays || { standard: [3, 2, 1, 0], balanced: [2, 2, 1, 1], minmax: [4, 1, 1, 0] };
    const currentArray = arrays[cr.statArray] || arrays.standard;
    const skills = data.skills || this.getData().skills;

    let html = '<p style="font-size:0.8rem;color:var(--ink-light);margin-bottom:12px">Choose an array and assign values to your stats.</p>';

    // Array selector
    html += '<div class="array-selector">';
    Object.keys(arrays).forEach(key => {
      const label = key.charAt(0).toUpperCase() + key.slice(1);
      const sel = cr.statArray === key ? 'selected' : '';
      html += `<button class="btn btn-small ${sel ? 'btn-primary' : 'btn-secondary'}" onclick="app.state.creation.statArray='${key}'; app.state.creation.statAssignment={STR:null,DEX:null,INT:null,WIL:null}; app.render()">${label} [${arrays[key].join(', ')}]</button>`;
    });
    html += '</div>';

    // Stat assignment (track by index so duplicate values like two +2s work correctly)
    // cr.statAssignment stores {STR: index, DEX: index, ...} where index refers to currentArray position
    html += '<div class="stat-assign-grid">';
    ['STR', 'DEX', 'INT', 'WIL'].forEach(stat => {
      const assignedIdx = cr.statAssignment[stat];
      const usedIndices = Object.entries(cr.statAssignment).filter(([k, v]) => k !== stat && v !== null).map(([k, v]) => v);

      html += `<div class="stat-assign-box"><div class="label">${stat}</div>`;
      html += `<select onchange="app.assignStat('${stat}', this.value)">`;
      html += `<option value="">--</option>`;
      currentArray.forEach((val, idx) => {
        const isUsed = usedIndices.includes(idx);
        const selected = assignedIdx === idx ? 'selected' : '';
        const disabled = isUsed && assignedIdx !== idx ? 'disabled' : '';
        html += `<option value="${idx}" ${selected} ${disabled}>${val >= 0 ? '+' : ''}${val}</option>`;
      });
      html += '</select></div>';
    });
    html += '</div>';

    // Show skill preview
    const sa = this.resolveStats(cr, data);
    if (Object.values(sa).every(v => v !== null)) {
      html += '<div style="margin-top:12px"><h3 style="font-size:0.85rem;margin-bottom:6px">Skill Preview</h3>';
      html += '<div class="skills-grid">';
      skills.forEach(sk => {
        const val = sa[sk.stat] || 0;
        html += `<div class="skill-item" style="cursor:default"><div><div class="skill-name">${sk.name}</div><div class="skill-stat">${sk.stat}</div></div><div class="skill-bonus">${val >= 0 ? '+' : ''}${val}</div></div>`;
      });
      html += '</div></div>';
    }

    return html;
  },

  assignStat(stat, val) {
    this.state.creation.statAssignment[stat] = val === '' ? null : parseInt(val);
    this.render();
  },

  // Helper: resolve stat assignment indices to actual values using current array
  resolveStats(cr, data) {
    const arrays = data.statArrays || { standard: [3, 2, 1, 0], balanced: [2, 2, 1, 1], minmax: [4, 1, 1, 0] };
    const currentArray = arrays[cr.statArray] || arrays.standard;
    const resolved = {};
    ['STR', 'DEX', 'INT', 'WIL'].forEach(stat => {
      const idx = cr.statAssignment[stat];
      resolved[stat] = idx !== null ? currentArray[idx] : null;
    });
    return resolved;
  },

  renderStepSkills(cr, data) {
    const skills = data.skills || this.getData().skills;
    const sa = this.resolveStats(cr, data);
    const remaining = cr.skillPointsRemaining;

    let html = `<p style="font-size:0.8rem;color:var(--ink-light);margin-bottom:12px">Distribute 4 bonus skill points. Remaining: <strong style="color:var(--gold)">${remaining}</strong></p>`;

    skills.forEach(sk => {
      const base = sa[sk.stat] ?? 0;
      const bonus = cr.skillPoints[sk.name] || 0;
      const total = base + bonus;
      html += `
        <div class="skill-point-row">
          <div>
            <span class="sp-name">${sk.name}</span>
            <span class="sp-base">(${sk.stat} ${base >= 0 ? '+' : ''}${base})</span>
          </div>
          <div class="sp-controls">
            <button class="tracker-btn minus" style="width:30px;height:30px;font-size:0.9rem" onclick="app.adjustSkillPoint('${sk.name}', -1)">-</button>
            <span class="sp-val">${total >= 0 ? '+' : ''}${total}</span>
            <button class="tracker-btn plus" style="width:30px;height:30px;font-size:0.9rem" onclick="app.adjustSkillPoint('${sk.name}', 1)">+</button>
          </div>
        </div>`;
    });

    return html;
  },

  adjustSkillPoint(skill, delta) {
    const cr = this.state.creation;
    const current = cr.skillPoints[skill] || 0;
    const newVal = current + delta;
    if (newVal < 0) return;
    if (delta > 0 && cr.skillPointsRemaining <= 0) return;
    cr.skillPoints[skill] = newVal;
    cr.skillPointsRemaining = 4 - Object.values(cr.skillPoints).reduce((a, b) => a + b, 0);
    if (cr.skillPointsRemaining < 0) {
      cr.skillPoints[skill] = current;
      cr.skillPointsRemaining = 4 - Object.values(cr.skillPoints).reduce((a, b) => a + b, 0);
      return;
    }
    this.render();
  },

  renderStepEquipment(cr, data) {
    const classData = (data.classes || []).find(c => c.name === cr.className);
    const startingGear = classData?.startingGear || [];
    const eq = data.equipment || {};

    let html = '';
    html += `
      <div style="margin-bottom:12px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px;min-height:44px">
          <input type="radio" name="equipMode" ${cr.useDefaultEquip ? 'checked' : ''} onchange="app.state.creation.useDefaultEquip=true; app.render()">
          <span>Use class defaults</span>
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px;min-height:44px">
          <input type="radio" name="equipMode" ${!cr.useDefaultEquip ? 'checked' : ''} onchange="app.state.creation.useDefaultEquip=false; app.render()">
          <span>Start with 50gp to buy</span>
        </label>
      </div>`;

    if (cr.useDefaultEquip) {
      // Show what the class starts with (already equipped as applicable)
      html += '<h3 style="font-size:0.9rem;margin-bottom:8px">Class Starting Gear</h3>';
      html += '<div style="font-size:0.75rem;color:var(--ink-light);margin-bottom:8px">Weapons, armor, and shields will be auto-equipped.</div>';
      startingGear.forEach(raw => {
        const name = typeof raw === 'string' ? raw : raw.name;
        const enriched = this.enrichInventoryItem(name, eq);
        const badge = enriched.category !== 'other'
          ? `<span style="font-size:0.55rem;color:var(--burgundy);text-transform:uppercase;letter-spacing:0.05em;margin-right:6px">${enriched.category}</span>`
          : '';
        const details = (() => {
          if (enriched.category === 'weapon' && enriched.damage) return ` <span style="font-size:0.65rem;color:var(--ink-light)">${this.esc(enriched.damage)}${enriched.damageType ? ' · ' + this.esc(enriched.damageType) : ''}</span>`;
          if (enriched.category === 'armor' && enriched.formula) {
            const f = enriched.formula;
            const s = f.statMod ? `${f.base}+${f.statMod}${f.statMax !== undefined ? ` (max ${f.statMax})` : ''}` : `${f.base}`;
            return ` <span style="font-size:0.65rem;color:var(--ink-light)">${s}</span>`;
          }
          if (enriched.category === 'shield' && enriched.shieldArmor) return ` <span style="font-size:0.65rem;color:var(--ink-light)">+${enriched.shieldArmor} armor</span>`;
          return '';
        })();
        html += `<div class="inventory-item">${badge}<span class="item-name">${this.esc(name)}</span>${details}</div>`;
      });
    } else {
      html += `<p style="font-size:0.85rem;margin-bottom:8px">Starting Gold: <strong style="color:var(--gold)">${cr.gold}gp</strong></p>`;
      html += '<p style="font-size:0.8rem;color:var(--ink-light);margin-bottom:12px">Pick your starting weapon, armor, and shield from the presets below (or leave blank). You can buy more items after creation.</p>';

      // Initialize custom gear picker state if needed
      if (!cr.customGear) cr.customGear = { weapon: null, armor: null, shield: null };

      const renderPresetSelector = (label, category, presets) => {
        const currentVal = cr.customGear[category] || '';
        let out = `<label style="display:block;font-weight:bold;font-size:0.8rem;margin:8px 0 4px;color:var(--burgundy)">${label}</label>`;
        out += `<select style="width:100%;padding:6px" onchange="app.state.creation.customGear.${category}=this.value; app.render()">`;
        out += `<option value="">— None —</option>`;
        presets.forEach(p => {
          const isGroup = p.items;
          if (isGroup) {
            out += `<optgroup label="${this.esc(p.label)}">`;
            p.items.forEach(it => { out += `<option value="${this.esc(it.name)}" ${currentVal === it.name ? 'selected' : ''}>${this.esc(it.name)}</option>`; });
            out += `</optgroup>`;
          } else {
            out += `<option value="${this.esc(p.name)}" ${currentVal === p.name ? 'selected' : ''}>${this.esc(p.name)}</option>`;
          }
        });
        out += `</select>`;
        return out;
      };

      const weaponPresets = [
        { label: 'Melee', items: eq.weapons?.melee || [] },
        { label: 'Ranged', items: eq.weapons?.ranged || [] }
      ];
      const armorPresets = [
        { label: 'Cloth', items: eq.armor?.cloth || [] },
        { label: 'Leather', items: eq.armor?.leather || [] },
        { label: 'Mail', items: eq.armor?.mail || [] },
        { label: 'Plate', items: eq.armor?.plate || [] }
      ];
      const shieldPresets = eq.shields || [];

      html += renderPresetSelector('🗡 Starting Weapon', 'weapon', weaponPresets);
      html += renderPresetSelector('🛡 Starting Armor', 'armor', armorPresets);
      html += renderPresetSelector('🏵 Starting Shield', 'shield', shieldPresets);

      html += `<h4 style="font-size:0.85rem;margin-top:16px;margin-bottom:4px">Other Items</h4>`;
      html += `<div style="font-size:0.75rem;color:var(--ink-light);margin-bottom:6px">Add any other starting items (rations, rope, etc.).</div>`;
      cr.equipment.forEach((item, i) => {
        html += `<div class="inventory-item"><span class="item-name">${this.esc(item)}</span><button class="btn btn-small btn-danger" style="padding:4px 8px;min-height:30px" onclick="app.state.creation.equipment.splice(${i},1); app.render()">&#10006;</button></div>`;
      });
      html += `
        <div class="inventory-add">
          <input type="text" id="newCreationItem" placeholder="Item name...">
          <button class="btn btn-gold btn-small" onclick="const inp=document.getElementById('newCreationItem'); if(inp.value.trim()){app.state.creation.equipment.push(inp.value.trim()); app.render();}">+</button>
        </div>`;
    }
    return html;
  },

  renderStepDetails(cr, data) {
    let html = '';
    html += `<label class="creation-label">Name</label>`;
    html += `<input class="creation-input" value="${this.esc(cr.name)}" oninput="app.state.creation.name=this.value" placeholder="Character name">`;
    html += `<label class="creation-label">Height</label>`;
    html += `<input class="creation-input" value="${this.esc(cr.height)}" oninput="app.state.creation.height=this.value" placeholder="e.g. 5'10&quot;">`;
    html += `<label class="creation-label">Weight</label>`;
    html += `<input class="creation-input" value="${this.esc(cr.weight)}" oninput="app.state.creation.weight=this.value" placeholder="e.g. 170 lbs">`;
    html += `<label class="creation-label">Adventuring Motivation</label>`;
    html += `<textarea class="notes-area" style="min-height:60px" oninput="app.state.creation.motivation=this.value" placeholder="Why does your character adventure?">${this.esc(cr.motivation)}</textarea>`;
    // INT-based bonus languages
    const sa = this.resolveStats(cr, data);
    const intVal = sa.INT || 0;
    const bonusLangCount = Math.max(0, intVal);
    if (bonusLangCount > 0) {
      const allLangs = data.languages || ['Common','Dwarvish','Elvish','Goblin','Infernal',"Thieves' Cant",'Celestial','Draconic','Primordial','Deep Speak'];
      const ancestryData = (data.ancestries || []).find(a => a.name === cr.ancestry);
      const autoLangs = ['Common'];
      if (ancestryData?.languages) {
        ancestryData.languages.forEach(l => {
          if (l !== 'Common') {
            if (ancestryData.name === 'Dryad/Shroomling' && l === 'Elvish' && intVal < 0) return;
            if (!autoLangs.includes(l)) autoLangs.push(l);
          }
        });
      }
      const availableLangs = allLangs.filter(l => !autoLangs.includes(l));
      // Ensure bonusLanguages array is the right size
      while (cr.bonusLanguages.length < bonusLangCount) cr.bonusLanguages.push('');
      while (cr.bonusLanguages.length > bonusLangCount) cr.bonusLanguages.pop();

      html += `<label class="creation-label" style="margin-top:12px">Bonus Languages (INT ${intVal >= 0 ? '+' : ''}${intVal})</label>`;
      html += `<div style="font-size:0.75rem;color:var(--ink-light);margin-bottom:6px">You already know: ${autoLangs.join(', ')}. Choose ${bonusLangCount} additional.</div>`;
      for (let i = 0; i < bonusLangCount; i++) {
        const alreadyPicked = cr.bonusLanguages.filter((l, j) => j !== i && l);
        html += `<select class="creation-input" style="margin-bottom:4px" onchange="app.state.creation.bonusLanguages[${i}]=this.value; app.render()">
          <option value="">-- Choose language --</option>`;
        availableLangs.forEach(l => {
          const picked = alreadyPicked.includes(l);
          const selected = cr.bonusLanguages[i] === l ? 'selected' : '';
          html += `<option value="${this.esc(l)}" ${selected} ${picked ? 'disabled' : ''}>${l}</option>`;
        });
        html += `</select>`;
      }
    }

    // Songweaver: pick 1 additional school (wind is automatic)
    if (cr.className === 'Songweaver') {
      const schoolOpts = [
        { key: 'fire', label: '🔥 Fire' },
        { key: 'ice', label: '❄ Ice' },
        { key: 'lightning', label: '⚡ Lightning' },
        { key: 'radiant', label: '☀ Radiant' },
        { key: 'necrotic', label: '☠ Necrotic' }
      ];
      html += `<label class="creation-label" style="margin-top:12px">Songweaver Spell School</label>`;
      html += `<div style="font-size:0.75rem;color:var(--ink-light);margin-bottom:6px">You automatically know Wind. Choose 1 additional spell school.</div>`;
      html += `<div style="display:flex;flex-wrap:wrap;gap:6px">`;
      schoolOpts.forEach(s => {
        const sel = cr.songweaverSchool === s.key;
        html += `<button class="btn btn-small ${sel ? 'btn-gold' : 'btn-secondary'}" onclick="app.state.creation.songweaverSchool='${s.key}'; app.render()">${s.label}</button>`;
      });
      html += `</div>`;
    }

    html += `<label class="creation-label" style="margin-top:12px">Character Image</label>`;
    html += `<button class="btn btn-secondary btn-block" onclick="app.uploadCreationImage()">Upload Image</button>`;
    if (cr.image) {
      html += `<div style="text-align:center;margin-top:8px"><img src="${cr.image}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--gold)"></div>`;
    }
    return html;
  },

  uploadCreationImage() {
    const inp = document.getElementById('imageUpload');
    inp.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const size = 200;
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext('2d');
          const min = Math.min(img.width, img.height);
          ctx.drawImage(img, (img.width - min) / 2, (img.height - min) / 2, min, min, 0, 0, size, size);
          app.state.creation.image = canvas.toDataURL('image/jpeg', 0.7);
          app.render();
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
      inp.value = '';
    };
    inp.click();
  },

  renderStepReview(cr, data) {
    const classData = (data.classes || []).find(c => c.name === cr.className);

    let html = '<div class="card">';
    html += `<div class="review-section"><h4>Name</h4><p>${this.esc(cr.name || 'Unnamed')}</p></div>`;
    html += `<div class="review-section"><h4>Class</h4><p>${cr.className || 'None'}</p></div>`;
    html += `<div class="review-section"><h4>Ancestry</h4><p>${cr.ancestry || 'None'}</p></div>`;
    html += `<div class="review-section"><h4>Background</h4><p>${cr.background || 'None'}</p></div>`;

    const sa = this.resolveStats(cr, data);
    html += `<div class="review-section"><h4>Stats</h4><p>STR: ${sa.STR ?? '?'} | DEX: ${sa.DEX ?? '?'} | INT: ${sa.INT ?? '?'} | WIL: ${sa.WIL ?? '?'}</p></div>`;

    const skillStr = Object.entries(cr.skillPoints).filter(([k, v]) => v > 0).map(([k, v]) => `${k} +${v}`).join(', ');
    html += `<div class="review-section"><h4>Bonus Skill Points</h4><p>${skillStr || 'None'}</p></div>`;

    if (cr.useDefaultEquip) {
      const defaultEquip = classData?.startingEquipment || ['Default class gear'];
      html += `<div class="review-section"><h4>Equipment</h4><p>${defaultEquip.map(e => typeof e === 'string' ? e : e.name).join(', ')}</p></div>`;
    } else {
      html += `<div class="review-section"><h4>Equipment</h4><p>${cr.equipment.join(', ') || 'None'} (${cr.gold}gp)</p></div>`;
    }

    html += `<div class="review-section"><h4>Details</h4><p>Height: ${cr.height || '?'} | Weight: ${cr.weight || '?'}</p></div>`;
    if (cr.motivation) {
      html += `<div class="review-section"><h4>Motivation</h4><p>${this.esc(cr.motivation)}</p></div>`;
    }
    if (cr.image) {
      html += `<div style="text-align:center;padding:8px"><img src="${cr.image}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)"></div>`;
    }
    html += '</div>';
    return html;
  },

  creationNext() {
    const cr = this.state.creation;
    // Validation
    switch (cr.step) {
      case 0: if (!cr.className) { this.toast('Please choose a class'); return; } break;
      case 1: if (!cr.ancestry) { this.toast('Please choose an ancestry'); return; } break;
      case 2:
        if (!cr.background) { this.toast('Please choose a background'); return; }
        if (cr.background === 'Academy Dropout' && !cr.utilitySpell) { this.toast('Please choose a Utility Spell'); return; }
        break;
      case 3:
        const vals = Object.values(cr.statAssignment);
        if (vals.some(v => v === null)) { this.toast('Assign all stat values'); return; }
        break;
      case 6:
        if (cr.className === 'Songweaver' && !cr.songweaverSchool) { this.toast('Choose your Songweaver spell school'); return; }
        break;
    }
    cr.step++;
    this.render();
  },

  creationPrev() {
    this.state.creation.step--;
    this.render();
  },

  saveCharacter() {
    const cr = this.state.creation;
    if (!cr.name.trim()) { this.toast('Please enter a name'); return; }

    const data = this.getData();
    const classData = (data.classes || []).find(c => c.name === cr.className);
    const ancestryData = (data.ancestries || []).find(a => a.name === cr.ancestry);
    const bgData = (data.backgrounds || []).find(b => b.name === cr.background);

    const sa = this.resolveStats(cr, data);
    const skills = data.skills || this.getData().skills;
    const skillBonuses = {};
    skills.forEach(sk => {
      skillBonuses[sk.name] = cr.skillPoints[sk.name] || 0;
    });

    // Build abilities from class, ancestry, background
    const abilities = [];
    // Auto-populate level 1 class features
    if (classData?.levels?.[1]) {
      classData.levels[1].forEach(f => abilities.push({ name: f.name, description: f.description || '' }));
    }
    // Ancestry trait
    if (ancestryData?.abilityName) {
      abilities.push({ name: ancestryData.abilityName, description: ancestryData.description || '' });
    }
    // Background mechanic
    if (bgData?.mechanics) {
      abilities.push({ name: bgData.name, description: bgData.mechanics });
    }

    // Build equipment — enrich items by matching against EQUIPMENT presets (category, damage, armor formula, etc.)
    const eq = data.equipment || {};
    const enrichItem = (itemName) => this.enrichInventoryItem(itemName, eq);
    let inventory = [];
    if (cr.useDefaultEquip) {
      const defaultEquip = classData?.startingGear || ['Simple weapon', 'Explorer\'s pack'];
      inventory = defaultEquip.map(e => enrichItem(typeof e === 'string' ? e : e.name));
    } else {
      // Custom: use weapon/armor/shield picks from creation UI + other items
      const cg = cr.customGear || {};
      if (cg.weapon) inventory.push(enrichItem(cg.weapon));
      if (cg.armor) inventory.push(enrichItem(cg.armor));
      if (cg.shield) inventory.push(enrichItem(cg.shield));
      inventory = inventory.concat(cr.equipment.map(e => enrichItem(e)));
    }
    // Auto-equip: first weapon, first armor, first shield
    const firstOfCategory = {};
    inventory.forEach((it, idx) => {
      if ((it.category === 'weapon' || it.category === 'armor' || it.category === 'shield') && !firstOfCategory[it.category]) {
        firstOfCategory[it.category] = idx;
      }
    });
    Object.values(firstOfCategory).forEach(idx => { inventory[idx].equipped = true; });

    // Determine HP, mana, etc from class
    const maxHp = classData?.startingHP || 10;
    const hitDice = classData?.hitDie || 'd8';
    const speed = 6 + (ancestryData?.statMods?.speedMod || 0);
    const saves = classData?.saves || {};

    // Calculate mana from level 1 features (parse "Mana pool equals STAT x 3 + Level" etc.)
    let maxMana = 0;
    const level = 1;
    if (classData?.levels?.[1]) {
      const manaFeature = classData.levels[1].find(f => f.name === 'Mana');
      if (manaFeature) {
        const desc = manaFeature.description;
        if (desc.includes('INT x 3')) maxMana = (sa.INT || 0) * 3 + level;
        else if (desc.includes('WIL x 3')) maxMana = (sa.WIL || 0) * 3 + level;
        else if (desc.includes('WIL +')) maxMana = (sa.WIL || 0) + level;
        if (maxMana < 0) maxMana = 0;
      }
    }

    // Languages: Common + ancestry languages (conditional on INT for some) + INT bonus languages
    const languages = ['Common'];
    if (ancestryData?.languages) {
      ancestryData.languages.forEach(l => {
        if (l === 'Common') return;
        // Dryad/Shroomling: Elvish only if INT >= 0
        if (ancestryData.name === 'Dryad/Shroomling' && l === 'Elvish' && (sa.INT || 0) < 0) return;
        if (!languages.includes(l)) languages.push(l);
      });
    }
    // Add INT-based bonus languages chosen during creation
    if (cr.bonusLanguages) {
      cr.bonusLanguages.forEach(l => { if (l && !languages.includes(l)) languages.push(l); });
    }
    // Background-granted languages (e.g., Raised by Goblins)
    if (bgData?.bonuses?.languages) {
      bgData.bonuses.languages.forEach(l => { if (l && !languages.includes(l)) languages.push(l); });
    }

    // Apply background skill bonuses (e.g., Wild One +1 Naturecraft)
    if (bgData?.bonuses?.skillBonus) {
      for (const [sk, delta] of Object.entries(bgData.bonuses.skillBonus)) {
        skillBonuses[sk] = (skillBonuses[sk] || 0) + delta;
      }
    }

    // Auto-load spells using SPELL_PROGRESSION (handles all caster classes correctly)
    const tempCharForSpells = { className: cr.className, level: 1, subclass: null, stats: sa, songweaverSchool: cr.songweaverSchool };
    const spells = this.autoLoadSpells(tempCharForSpells);

    // Add utility spell from Academy Dropout background
    if (cr.utilitySpell && cr.background === 'Academy Dropout') {
      if (!spells.find(s => s.name === cr.utilitySpell.name)) {
        spells.push({ name: cr.utilitySpell.name, tier: 0, school: cr.utilitySpell.school, actions: cr.utilitySpell.actions, range: cr.utilitySpell.range, damage: 'None', description: cr.utilitySpell.description || '', isUtility: true });
      }
    }

    // Apply background bonuses to initiative, armor mod, hit dice
    const bgBonuses = bgData?.bonuses || {};
    // Base armor for legacy fallback (unarmored = DEX). Background armor bonus goes to armorMod so it survives when auto-calc kicks in.
    const charArmor = (classData?.baseArmor || 0) + (sa.DEX || 0);
    const charArmorMod = bgBonuses.armor || 0;
    const charInitiative = (sa.DEX || 0) + (bgBonuses.initiative || 0);
    const hitDiceMaxMod = bgBonuses.hitDiceMaxMod || 0;

    const character = {
      id: Date.now().toString(36) + Math.random().toString(36).substr(2, 5),
      name: cr.name.trim(),
      className: cr.className,
      ancestry: cr.ancestry,
      background: cr.background,
      level: 1,
      stats: { STR: sa.STR || 0, DEX: sa.DEX || 0, INT: sa.INT || 0, WIL: sa.WIL || 0 },
      saves,
      skillBonuses,
      hp: maxHp,
      maxHp,
      tempHp: 0,
      armor: charArmor,
      armorMod: charArmorMod,
      initiative: charInitiative,
      hitDiceMaxMod,
      wounds: 0,
      mana: maxMana,
      maxMana,
      hitDice,
      speed,
      height: cr.height,
      weight: cr.weight,
      image: cr.image,
      motivation: cr.motivation,
      songweaverSchool: cr.songweaverSchool || null,
      inventory,
      gold: cr.useDefaultEquip ? (classData?.startingGold || 10) : cr.gold,
      abilities,
      spells,
      homebrew: [],
      notes: '',
      languages,
    };

    this.state.characters.push(character);
    this.save();
    this.state.creation = null;
    this.state.selectedCharacterId = character.id;
    this.toast('Character created!');
    this.navigate('sheet', { charId: character.id });
  },

  // ---- UTILITIES ----
  esc(str) {
    if (str === null || str === undefined) return '';
    const div = document.createElement('div');
    div.textContent = String(str);
    return div.innerHTML;
  },

  // ---- INIT ----
  init() {
    this.load();
    this.navigate('characters');

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {
        // SW not available, app still works
      });
    }
  },
};

// Start
document.addEventListener('DOMContentLoaded', () => app.init());
</script>
