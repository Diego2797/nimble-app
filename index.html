    this._mapPrep.selectedTokenId = null;
    this.render();
  },
  mapPrepCellClick(x, y) {
    if (!this._mapPrep) return;
    const mode = this._mapPrep.paintMode || 'select';
    if (mode === 'select' && this._mapPrep.selectedTokenId) return this.mapPrepMoveCell(x, y);
    if (mode === 'fog') {
      const k = x + ',' + y;
      if (this._mapPrep.map.fog[k]) delete this._mapPrep.map.fog[k];
      else this._mapPrep.map.fog[k] = true;
      this.render();
    } else if (mode === 'wall') {
      const k = x + ',' + y;
      if (this._mapPrep.map.walls[k]) delete this._mapPrep.map.walls[k];
      else this._mapPrep.map.walls[k] = true;
      this.render();
    }
  },
  mapPrepSetMode(mode) {
    if (!this._mapPrep) return;
    this._mapPrep.paintMode = mode;
    if (mode !== 'select') this._mapPrep.selectedTokenId = null;
    this.render();
  },
  mapPrepCoverAllFog() {
    if (!this._mapPrep) return;
    const { width, height } = this._mapPrep.map;
    for (let y = 0; y < height; y++) for (let x = 0; x < width; x++) this._mapPrep.map.fog[x+','+y] = true;
    this.render();
  },
  mapPrepClearFog() {
    if (!this._mapPrep) return;
    this._mapPrep.map.fog = {};
    this.render();
  },
  mapPrepClearWalls() {
    if (!this._mapPrep) return;
    this._mapPrep.map.walls = {};
    this.render();
  },
  mapPrepToggleGridType() {
    if (!this._mapPrep) return;
    this._mapPrep.map.gridType = this._mapPrep.map.gridType === 'hex' ? 'square' : 'hex';
    this.render();
  },

  // Flip grid type on an active combat (GM only)
  mapToggleGridType() {
    const combat = this.state.activeCombat;
    if (!combat || !combat.map) return;
    combat.map.gridType = combat.map.gridType === 'hex' ? 'square' : 'hex';
    this.save();
    this.render();
  },

  _initCombatMap(participants) {
    const width = 20, height = 20;
    const tokens = {};
    let heroX = 2, monsterX = 2;
    for (const p of participants) {
      // Heroes (PCs + ally NPCs) line up at the top; everything else at the bottom.
      const isHero = p.kind === 'pc' || (p.kind === 'npc' && p.role === 'ally');
      if (isHero) {
        tokens[p.id] = { x: Math.min(heroX, width - 1), y: 1 };
        heroX += 2;
      } else {
        tokens[p.id] = { x: Math.min(monsterX, width - 1), y: height - 2 };
        monsterX += 2;
      }
    }
    return { width, height, tokens, fog: {}, walls: {} };
  },

  _tokenColor(p) {
    if (p.kind === 'pc') return '#4a7cc1';
    if (p.kind === 'legendary') return '#c9a84c';
    if (p.kind === 'npc') return p.role === 'ally' ? '#4a7c3e' : '#8b1a1a';  // ally green, enemy burgundy
    if (p.kind === 'minion') return '#666';
    return '#8b1a1a'; // monster default
  },

  _tokenLabel(p) {
    // "Bugbear #2" → "B2"; "Aelindra" → "A"; "Grimbeak, the Unyielding" → "G"
    const seqMatch = p.name.match(/\s+#?(\d+)\s*$/);
    const seq = seqMatch ? seqMatch[1] : '';
    const first = (p.name.charAt(0) || '?').toUpperCase();
    return first + seq;
  },

  mapSelectToken(pid) {
    if (this._readOnlyMap) return;                    // players can't select
    // Selection only makes sense in select paint mode. If GM taps a token while
    // painting, switch back to select for them automatically.
    this._mapPaintMode = 'select';
    if (this._mapSelectedTokenId === pid) {
      this._mapSelectedTokenId = null;                // tap same token to deselect
    } else {
      this._mapSelectedTokenId = pid;
    }
    this.render();
  },

  mapMoveToCell(x, y) {
    if (this._readOnlyMap) return;
    const combat = this.state.activeCombat;
    if (!combat || !this._mapSelectedTokenId) return;
    combat.map = combat.map || this._initCombatMap(combat.participants || []);
    combat.map.tokens = combat.map.tokens || {};
    combat.map.tokens[this._mapSelectedTokenId] = { x, y };
    this._mapSelectedTokenId = null;
    // Auto-reveal fog around heroes based on the GM-set illumination radius
    this._revealFogAroundHeroes(combat);
    this.save();
    this.render();
  },

  // Grid distance: Chebyshev for square, hex-axial for hex.
  // Returns the minimum number of cells a creature would traverse to reach (x2,y2) from (x1,y1).
  _gridDistance(x1, y1, x2, y2, isHex) {
    if (!isHex) return Math.max(Math.abs(x1 - x2), Math.abs(y1 - y2));
    // Offset (odd-r, pointy-top) → axial conversion
    const toAxial = (col, row) => ({ q: col - ((row - (row & 1)) >> 1), r: row });
    const a = toAxial(x1, y1), b = toAxial(x2, y2);
    return (Math.abs(a.q - b.q) + Math.abs(a.q + a.r - b.q - b.r) + Math.abs(a.r - b.r)) / 2;
  },

  // Clears fog within `map.lightRadius` spaces of every hero (PC + ally NPC) token.
  // Called after any token move (GM or player). No-op if lightRadius <= 0 (fog stays manual).
  _revealFogAroundHeroes(combat) {
    if (!combat?.map) return;
    const R = combat.map.lightRadius || 0;
    if (R <= 0) return;
    const isHex = combat.map.gridType === 'hex';
    const w = combat.map.width || 20, h = combat.map.height || 20;
    const fog = combat.map.fog || {};

    for (const p of (combat.participants || [])) {
      if (!this._isHeroSide(p)) continue;
      if (p.dead || p.hp <= 0) continue;
      const tok = combat.map.tokens?.[p.id];
      if (!tok) continue;
      // Bounding box for efficiency
      for (let y = Math.max(0, tok.y - R); y <= Math.min(h - 1, tok.y + R); y++) {
        for (let x = Math.max(0, tok.x - R); x <= Math.min(w - 1, tok.x + R); x++) {
          if (this._gridDistance(tok.x, tok.y, x, y, isHex) <= R) {
            delete fog[x + ',' + y];
          }
        }
      }
    }
    combat.map.fog = fog;
  },

  setLightRadius(val) {
    const combat = this.state.activeCombat;
    if (!combat || !combat.map) return;
    const n = parseInt(val, 10);
    combat.map.lightRadius = isNaN(n) ? 0 : Math.max(0, Math.min(20, n));
    this._revealFogAroundHeroes(combat);
    this.save();
    this.render();
  },

  setCombatViewMode(mode) {
    this.state.combatViewMode = mode;
    this.render(true);
  },

  // Fase 4.5 — Paint mode + fog / walls
  setMapPaintMode(mode) {
    if (this._readOnlyMap) return;
    this._mapPaintMode = mode;
    // Leaving select mode clears any token selection
    if (mode !== 'select') this._mapSelectedTokenId = null;
    this.render();
  },

  // Central click handler for grid cells — routes to the right action for the current paint mode
  mapCellClick(x, y) {
    if (this._readOnlyMap) return;
    const mode = this._mapPaintMode || 'select';
    if (mode === 'select' && this._mapSelectedTokenId) return this.mapMoveToCell(x, y);
    if (mode === 'fog') return this.mapToggleFog(x, y);
    if (mode === 'wall') return this.mapToggleWall(x, y);
  },

  _ensureMap() {
    const combat = this.state.activeCombat;
    if (!combat) return null;
    combat.map = combat.map || this._initCombatMap(combat.participants || []);
    combat.map.fog = combat.map.fog || {};
    combat.map.walls = combat.map.walls || {};
    combat.map.tokens = combat.map.tokens || {};
    return combat.map;
  },

  mapToggleFog(x, y) {
    const m = this._ensureMap();
    if (!m) return;
    const k = x + ',' + y;
    if (m.fog[k]) delete m.fog[k];
    else m.fog[k] = true;
    this.save();
    this.render();
  },

  mapToggleWall(x, y) {
    const m = this._ensureMap();
    if (!m) return;
    const k = x + ',' + y;
    if (m.walls[k]) delete m.walls[k];
    else m.walls[k] = true;
    this.save();
    this.render();
  },

  mapClearFog() {
    const m = this._ensureMap();
    if (!m) return;
    if (!confirm('Clear all fog? Players will see the whole map.')) return;
    m.fog = {};
    this.save();
    this.render();
  },

  mapCoverAllFog() {
    const m = this._ensureMap();
    if (!m) return;
    m.fog = {};
    for (let y = 0; y < m.height; y++) {
      for (let x = 0; x < m.width; x++) m.fog[x + ',' + y] = true;
    }
    this.save();
    this.render();
  },

  mapClearWalls() {
    const m = this._ensureMap();
    if (!m) return;
    if (!confirm('Remove all walls?')) return;
    m.walls = {};
    this.save();
    this.render();
  },

  // Render the SVG grid + tokens. `readOnly` flag suppresses interactivity (used by player remote viewer).
  // Fase 4.5: draws walls, fog (translucent for GM, opaque for players) and hides tokens under fog for players.
  renderCombatMap(combat, readOnly) {
    this._readOnlyMap = !!readOnly;
    if (!combat) return '';
    const prep = this._inPrepMode;   // routes clicks through mapPrep* when true
    const map = combat.map || this._initCombatMap(combat.participants || []);
    const w = map.width || 20, h = map.height || 20;
    const isHex = map.gridType === 'hex';
    const cell = 20; // px per square cell

    // Hex geometry (pointy-top, odd-row horizontal offset)
    const hexSize = 11;
    const hexW = Math.sqrt(3) * hexSize;   // flat-side width
    const hexH = 2 * hexSize;               // point-to-point height
    const rowSp = hexH * 0.75;              // vertical row spacing

    // Cell → pixel center
    const cellCenter = (x, y) => {
      if (!isHex) return { cx: x * cell + cell/2, cy: y * cell + cell/2 };
      return {
        cx: x * hexW + (y % 2 ? hexW/2 : 0) + hexW/2,
        cy: y * rowSp + hexH/2
      };
    };
    // Cell polygon path (for walls / fog / click targets)
    const cellPath = (x, y) => {
      if (!isHex) return `M${x*cell} ${y*cell}h${cell}v${cell}h-${cell}z`;
      const { cx, cy } = cellCenter(x, y);
      const pts = [];
      for (let i = 0; i < 6; i++) {
        const a = Math.PI / 180 * (60 * i - 30);
        pts.push([cx + hexSize * Math.cos(a), cy + hexSize * Math.sin(a)]);
      }
      return `M${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)}` + pts.slice(1).map(p => `L${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join('') + 'Z';
    };

    const viewW = isHex ? (w * hexW + hexW/2 + 2) : w * cell;
    const viewH = isHex ? (h * rowSp + hexH/4 + 2) : h * cell;

    const fog = map.fog || {};
    const walls = map.walls || {};

    const paintMode = readOnly ? 'select' : (prep ? (this._mapPrep?.paintMode || 'select') : (this._mapPaintMode || 'select'));
    // In readOnly mode, players can move their own PC token.
    const playerOwnTokenId = readOnly ? this._getPlayerOwnTokenId(combat) : null;
    const selectedId = prep
      ? (this._mapPrep?.selectedTokenId || null)
      : (readOnly ? (this._remotePlayerSelectedPid || null) : (this._mapSelectedTokenId || null));
    const selectedP = selectedId ? (combat.participants || []).find(p => p.id === selectedId) : null;
    const cellHandler = prep ? 'app.mapPrepCellClick' : (readOnly ? 'app.playerRemoteCellClick' : 'app.mapCellClick');
    const tokenHandler = prep ? 'app.mapPrepSelectToken' : (readOnly ? 'app.playerRemoteSelectToken' : 'app.mapSelectToken');

    // --- Walls layer (visible to everyone) ---
    let wallsHtml = '';
    for (const k of Object.keys(walls)) {
      const [x, y] = k.split(',').map(Number);
      wallsHtml += `<path d="${cellPath(x, y)}" fill="#3d2b1f" stroke="#5c3d2e" stroke-width="0.5" style="pointer-events:none"/>`;
    }

    // --- Grid cells (clickable when paint mode active OR token selected OR player has own token selected) ---
    let cellsHtml = '';
    const cellsClickable = (!readOnly && (
      paintMode === 'fog' || paintMode === 'wall' ||
      (paintMode === 'select' && selectedP)
    )) || (readOnly && selectedP);
    if (cellsClickable) {
      const cursor = (!readOnly && (paintMode === 'fog' || paintMode === 'wall')) ? 'pointer' : 'crosshair';
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          cellsHtml += `<path d="${cellPath(x, y)}" fill="transparent" style="cursor:${cursor}" onclick="${cellHandler}(${x}, ${y})"/>`;
        }
      }
    }

    // --- Tokens (hidden for players if on a fogged cell) ---
    let tokensHtml = '';
    const turnParticipantId = combat.participants?.[combat.turnIndex]?.id;
    for (const p of (combat.participants || [])) {
      const tok = (map.tokens || {})[p.id];
      if (!tok) continue;
      const tokCellKey = tok.x + ',' + tok.y;
      const onFog = !!fog[tokCellKey];
      // Players: don't render tokens hidden under fog at all
      if (readOnly && onFog) continue;
      const { cx, cy } = cellCenter(tok.x, tok.y);
      const r = isHex ? hexSize * 0.72 : cell * 0.42;
      const dead = p.dead || (p.kind === 'legendary' ? p.phase === 'dead' : (!p.isMinion && p.hp <= 0));
      const color = this._tokenColor(p);
      const isSelected = p.id === selectedId;
      const isTurn = p.id === turnParticipantId;
      const label = this._tokenLabel(p);

      // Token ring: don't leak enemy HP %. PCs & ally NPCs show red/amber/green (hero info).
      // Enemies show bloodied (orange) or last-stand/dead (dark/red). Everyone else is neutral.
      const hpPct = p.maxHp > 0 ? p.hp / p.maxHp : 1;
      const heroSide = p.kind === 'pc' || (p.kind === 'npc' && p.role === 'ally');
      const regularEnemy = p.kind === 'monster' || (p.kind === 'npc' && p.role !== 'ally');
      let ringColor;
      if (dead) ringColor = '#444';
      else if (heroSide) {
        ringColor = hpPct < 0.33 ? '#8b1a1a' : (hpPct < 0.66 ? '#c9a84c' : '#4a7c3e');
      } else if (p.kind === 'legendary' && p.phase === 'lastStand') ringColor = '#8b1a1a';
      else if ((p.kind === 'legendary' && p.bloodied) || (regularEnemy && !p.isMinion && p.hp > 0 && p.hp <= p.maxHp / 2)) {
        ringColor = '#b8621b';
      } else ringColor = '#3d2b1f';

      // Click routing:
      //   - GM select mode: any token clickable
      //   - GM fog/wall mode: tokens non-interactive, cells intercept
      //   - Player (readOnly): ONLY the player's own PC token is clickable (so they can move themselves)
      const canClickToken = (!readOnly && paintMode === 'select') || (readOnly && p.id === playerOwnTokenId);
      const click = canClickToken ? ` style="cursor:pointer" onclick="event.stopPropagation();${tokenHandler}('${p.id}')"` : ' style="pointer-events:none"';

      // Use the character image if available (PC or ally NPC linked to a local character).
      // Falls back to letter. Image clipped to a circle via inline SVG <clipPath>.
      let charImg = null;
      if (p.kind === 'pc') {
        const ch = (this.state.characters || []).find(c => c.id === p.sourceId);
        charImg = ch?.image || null;
      }

      let tokenInner;
      if (charImg) {
        const clipId = 'tokclip_' + p.id;
        tokenInner = `
          <defs><clipPath id="${clipId}"><circle cx="${cx}" cy="${cy}" r="${r}"/></clipPath></defs>
          <image href="${charImg}" x="${cx - r}" y="${cy - r}" width="${r * 2}" height="${r * 2}" preserveAspectRatio="xMidYMid slice" clip-path="url(#${clipId})"/>
          <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${ringColor}" stroke-width="1.5"/>`;
      } else {
        tokenInner = `
          <circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}" stroke="${ringColor}" stroke-width="1.5"/>
          <text x="${cx}" y="${cy + 3}" text-anchor="middle" font-size="8" fill="white" font-weight="bold" style="pointer-events:none;font-family:Georgia,serif">${this.esc(label)}</text>`;
      }

      tokensHtml += `
        <g${click}${dead ? ' opacity="0.35"' : ''}>
          ${isTurn ? `<circle cx="${cx}" cy="${cy}" r="${r + 3}" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="2 2"/>` : ''}
          ${isSelected ? `<circle cx="${cx}" cy="${cy}" r="${r + 2}" fill="none" stroke="#fff" stroke-width="2"/>` : ''}
          ${tokenInner}
        </g>`;
    }

    // --- Fog layer (on top of tokens for players; translucent for GM so they see what's underneath) ---
    const fogOpacity = readOnly ? 0.98 : 0.45;
    let fogHtml = '';
    for (const k of Object.keys(fog)) {
      const [x, y] = k.split(',').map(Number);
      fogHtml += `<path d="${cellPath(x, y)}" fill="#1a1a1a" opacity="${fogOpacity}" style="pointer-events:none"/>`;
    }

    // --- Paint toolbar (GM only; suppressed in prep mode — prep renders its own) ---
    let toolbarHtml = '';
    if (!readOnly && !prep) {
      const toolBtn = (id, icon, label) =>
        `<button onclick="app.setMapPaintMode('${id}')" style="flex:1;padding:5px 6px;font-size:0.7rem;background:${paintMode === id ? 'var(--gold)' : 'var(--parchment-dark)'};color:${paintMode === id ? 'var(--leather-dark)' : 'var(--ink)'};border:1px solid var(--parchment-edge);border-radius:4px;cursor:pointer;font-family:inherit">${icon} ${label}</button>`;
      const fogCount = Object.keys(fog).length;
      const wallCount = Object.keys(walls).length;
      const lightR = (map.lightRadius || 0);
      const lightLabel = lightR === 0
        ? 'Off'
        : (lightR <= 2 ? 'Dark' : lightR <= 5 ? 'Dim' : lightR <= 10 ? 'Bright' : 'Daylight');
      toolbarHtml = `
        <div style="display:flex;gap:4px;margin-bottom:6px;align-items:center">
          ${toolBtn('select', '&#128273;', 'Select')}
          ${toolBtn('fog',    '&#127787;&#65039;', 'Fog')}
          ${toolBtn('wall',   '&#129521;', 'Wall')}
          <button onclick="app.mapToggleGridType()" class="btn btn-secondary btn-small" style="font-size:0.65rem;padding:4px 6px" title="Toggle grid type">${isHex ? '&#11042;' : '&#9633;'}</button>
        </div>
        <div style="display:flex;gap:4px;margin-bottom:6px;align-items:center;padding:4px 6px;background:var(--parchment-dark);border:1px solid var(--parchment-edge);border-radius:4px">
          <span style="font-size:0.7rem">&#128161; Illumination:</span>
          <button onclick="app.setLightRadius(${lightR - 1})" class="btn btn-secondary btn-small" style="font-size:0.7rem;padding:2px 8px;min-width:26px" title="Decrease radius">&minus;</button>
          <span style="font-size:0.75rem;font-weight:bold;color:var(--gold);min-width:60px;text-align:center">${lightR} sp &middot; ${lightLabel}</span>
          <button onclick="app.setLightRadius(${lightR + 1})" class="btn btn-secondary btn-small" style="font-size:0.7rem;padding:2px 8px;min-width:26px" title="Increase radius">&plus;</button>
        </div>
        ${(paintMode === 'fog' || paintMode === 'wall')
          ? `<div style="display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap">
              ${paintMode === 'fog'
                ? `<button onclick="app.mapCoverAllFog()" class="btn btn-secondary btn-small" style="font-size:0.65rem;padding:4px 8px">Cover all</button>
                   <button onclick="app.mapClearFog()" class="btn btn-secondary btn-small" style="font-size:0.65rem;padding:4px 8px">Clear fog (${fogCount})</button>`
                : `<button onclick="app.mapClearWalls()" class="btn btn-secondary btn-small" style="font-size:0.65rem;padding:4px 8px">Clear walls (${wallCount})</button>`}
            </div>`
          : ''}
      `;
    }

    // --- Legend + selected-token info ---
    const legend = `
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;font-size:0.65rem;color:var(--ink-light);margin-top:6px">
        <span><span style="color:#4a7cc1">&#9679;</span> PC</span>
        <span><span style="color:#8b1a1a">&#9679;</span> Monster</span>
        <span><span style="color:#c9a84c">&#9679;</span> Legendary</span>
        <span><span style="color:#4a7c3e">&#9679;</span> NPC</span>
        <span><span style="color:#666">&#9679;</span> Minion</span>
      </div>`;

    // Mode hint changes with paint mode
    let hint = '';
    if (readOnly) {
      hint = '';
    } else if (paintMode === 'fog') {
      hint = `<div style="padding:6px 10px;background:#1a1a1a;color:#f4e4c1;font-size:0.72rem;border-radius:4px;margin-bottom:6px;text-align:center">&#127787;&#65039; Fog mode — tap cells to hide them from players.</div>`;
    } else if (paintMode === 'wall') {
      hint = `<div style="padding:6px 10px;background:#3d2b1f;color:#f4e4c1;font-size:0.72rem;border-radius:4px;margin-bottom:6px;text-align:center">&#129521; Wall mode — tap cells to mark obstacles.</div>`;
    } else if (selectedP) {
      hint = `<div style="padding:6px 10px;background:var(--gold);color:var(--leather-dark);font-size:0.75rem;border-radius:4px;margin-bottom:6px;text-align:center">
                Selected: <strong>${this.esc(selectedP.name)}</strong> — tap a cell to move, or tap the token again to deselect.
              </div>`;
    } else {
      hint = `<div style="padding:6px 10px;background:var(--parchment-dark);font-size:0.7rem;color:var(--ink-light);border-radius:4px;margin-bottom:6px;text-align:center">Tap a token to select, then tap a cell to move.</div>`;
    }

    // Grid outline: render hex outlines as non-clickable paths (pretty but not interactive)
    let gridOutline = '';
    if (isHex) {
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          gridOutline += `<path d="${cellPath(x, y)}" fill="none" stroke="#5c3d2e" stroke-width="0.5" opacity="0.35" style="pointer-events:none"/>`;
        }
      }
    }

    return `
      ${toolbarHtml}
      ${hint}
      <div style="border:1px solid var(--parchment-edge);background:var(--parchment-dark);border-radius:6px;overflow:hidden">
        <svg viewBox="0 0 ${viewW} ${viewH}" preserveAspectRatio="xMidYMid meet" style="display:block;width:100%;max-height:65vh">
          <defs>
            <pattern id="nimbleGrid" width="${cell}" height="${cell}" patternUnits="userSpaceOnUse">
              <path d="M ${cell} 0 L 0 0 0 ${cell}" fill="none" stroke="#5c3d2e" stroke-width="0.5" opacity="0.35"/>
            </pattern>
          </defs>
          <rect width="${viewW}" height="${viewH}" fill="#f4e4c1"/>
          ${isHex ? gridOutline : `<rect width="${viewW}" height="${viewH}" fill="url(#nimbleGrid)"/>`}
          ${wallsHtml}
          ${cellsHtml}
          ${tokensHtml}
          ${fogHtml}
        </svg>
      </div>
      ${legend}
    `;
  },

  // Initiative entry screen — shown when combat.phase === 'initiative'
  _renderInitiativeEntry(combat) {
    const campaign = (this.state.campaigns || []).find(c => c.id === combat.campaignId);
    const heroes = combat.participants.filter(p => this._isHeroSide(p));
    const legendaries = combat.participants.filter(p => p.kind === 'legendary');
    const regulars = combat.participants.filter(p => this._isRegularEnemy(p));

    const heroRows = heroes.length
      ? heroes.map((h, i) => {
          const isAlly = h.kind === 'npc';
          const dex = isAlly ? null : ((this.state.characters.find(c => c.id === h.sourceId)?.stats?.DEX) ?? 0);
          const dexHint = dex == null ? null : (dex >= 0 ? `+${dex}` : `${dex}`);
          const init = h.initiative;
          const startActs = this._startingActionsFor(init);
          const actsHint = (init != null && !isNaN(init) && !isAlly)
            ? `<span style="font-size:0.65rem;background:var(--gold);color:var(--leather-dark);padding:2px 6px;border-radius:3px;margin-left:6px;font-weight:bold">${startActs} action${startActs===1?'':'s'}</span>`
            : '';
          const upDisabled = i === 0 ? 'disabled' : '';
          const downDisabled = i === heroes.length - 1 ? 'disabled' : '';
          const icon = isAlly ? '&#129309;' : '&#128100;';
          const subtitle = isAlly
            ? `<span style="color:#4a7c3e;font-weight:bold">Ally NPC</span> &middot; GM decides starting actions`
            : `DEX ${dexHint} &middot; roll d20 + DEX`;
          const initInput = isAlly
            ? `<span style="width:64px;text-align:center;font-size:0.65rem;color:var(--ink-light);font-style:italic">ally</span>`
            : `<input id="init_${h.id}" type="number" inputmode="numeric" placeholder="init"
                     value="${init != null ? init : ''}"
                     oninput="app._onInitInput && app._onInitInput('${h.id}', this.value)"
                     style="width:64px;padding:6px;font-size:0.95rem;border:1px solid var(--gold);border-radius:4px;background:var(--parchment);color:var(--ink);text-align:center;font-weight:bold">`;
          return `
            <div style="display:flex;gap:6px;align-items:center;padding:8px;background:var(--parchment);border:1px solid var(--parchment-edge);border-radius:5px;margin-bottom:6px">
              <div style="display:flex;flex-direction:column;gap:2px">
                <button onclick="app.movePcInitiative('${h.id}','up')" ${upDisabled} title="Move up"
                  style="padding:2px 8px;font-size:0.7rem;border:1px solid var(--parchment-edge);background:var(--parchment-dark);color:var(--ink);border-radius:3px;cursor:pointer;${upDisabled?'opacity:0.3;cursor:default':''}">&#9650;</button>
                <button onclick="app.movePcInitiative('${h.id}','down')" ${downDisabled} title="Move down"
                  style="padding:2px 8px;font-size:0.7rem;border:1px solid var(--parchment-edge);background:var(--parchment-dark);color:var(--ink);border-radius:3px;cursor:pointer;${downDisabled?'opacity:0.3;cursor:default':''}">&#9660;</button>
              </div>
              <span style="font-size:0.7rem;color:var(--ink-light);min-width:18px;text-align:center;font-weight:bold">${i+1}.</span>
              <div style="flex:1;min-width:0">
                <div style="font-weight:bold;font-size:0.88rem">${icon} ${this.esc(h.name)}${actsHint}</div>
                <div style="font-size:0.65rem;color:var(--ink-light)">${subtitle}</div>
              </div>
              ${initInput}
            </div>`;
        }).join('')
      : `<div style="padding:10px;background:var(--parchment);border-radius:5px;font-size:0.75rem;color:var(--ink-light);font-style:italic">No heroes (players or ally NPCs) in this combat.</div>`;

    const enemySummary = [];
    if (legendaries.length) enemySummary.push(`${legendaries.length} legendary`);
    if (regulars.length) enemySummary.push(`${regulars.length} regular enemy/enemies`);

    return `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <div style="flex:1;min-width:0">
          <h2 style="margin:0;font-size:1.05rem;line-height:1.2">&#9876; ${this.esc(combat.encounterName)}</h2>
          <div style="font-size:0.7rem;color:var(--ink-light)">${this.esc(campaign?.name || '—')} &middot; Initiative</div>
        </div>
        <button class="btn btn-secondary btn-small" style="color:var(--burgundy)" onclick="app.endCombatConfirm()" title="Cancel combat">Cancel</button>
      </div>

      <div style="padding:10px;background:var(--parchment-dark);border:1px solid var(--gold);border-radius:6px;margin-bottom:12px;font-size:0.78rem;line-height:1.4">
        <strong style="color:var(--burgundy)">How initiative works in Nimble:</strong>
        <ul style="margin:6px 0 0;padding-left:18px">
          <li>Each player rolls <strong>d20 + DEX</strong>. The result decides <strong>starting actions</strong> (not turn order): 1&ndash;9 = 1 action, 10&ndash;19 = 2, 20+ = 3.</li>
          <li><strong>Players choose the turn order</strong> themselves &mdash; use &#9650;/&#9660; to set it.</li>
          <li>Regular monsters don't roll &mdash; they act as a group after all heroes.</li>
          <li>Legendary bosses act between every hero's turn (multiple times per round).</li>
        </ul>
      </div>

      <div style="margin-bottom:12px">
        <div style="font-size:0.78rem;font-weight:bold;color:var(--burgundy);margin-bottom:6px">Turn Order &middot; Initiative</div>
        ${heroRows}
      </div>

      ${enemySummary.length ? `
        <div style="margin-bottom:12px;padding:8px 10px;background:var(--parchment);border:1px dashed var(--parchment-edge);border-radius:5px;font-size:0.72rem;color:var(--ink-light)">
          <strong>Enemies:</strong> ${enemySummary.join(', ')} (no initiative roll needed)
        </div>` : ''}

      <button class="btn btn-primary btn-block" style="background:var(--gold);color:var(--leather-dark);font-weight:bold" onclick="app.submitInitiatives()">&#9876; Start Combat</button>
    `;
  },

  // Updates the "N action(s)" badge live as the GM types an init value — no full re-render.
  _onInitInput(pid, val) {
    const combat = this.state.activeCombat;
    if (!combat) return;
    const p = combat.participants.find(x => x.id === pid);
    if (!p) return;
    const n = parseInt(val, 10);
    p.initiative = isNaN(n) ? null : n;
    // Don't re-render every keystroke (would steal focus). Users can reorder or submit when ready.
  },

  // ---- Combat tracker render ----
  renderCombatTracker() {
    const combat = this.state.activeCombat;
    if (!combat) {
      return `
        <div class="empty-state" style="padding:30px 16px">
          <div class="icon">&#128293;</div>
          <p>No active combat.<br>Open an encounter and tap &#9654; Start Combat to begin.</p>
          <button class="btn btn-primary" onclick="app.setGMView('campaigns')">Go to Campaigns</button>
        </div>`;
    }

    // Initiative phase — players roll, GM enters each result
    if (combat.phase === 'initiative') return this._renderInitiativeEntry(combat);

    const campaign = (this.state.campaigns || []).find(c => c.id === combat.campaignId);
    const viewMode = this.state.combatViewMode || 'list';

    const modeBtn = (id, icon, label) =>
      `<button onclick="app.setCombatViewMode('${id}')"
        style="flex:1;padding:6px 8px;font-size:0.78rem;background:${viewMode === id ? 'var(--gold)' : 'var(--parchment-dark)'};color:${viewMode === id ? 'var(--leather-dark)' : 'var(--ink)'};border:1px solid var(--parchment-edge);border-radius:4px;cursor:pointer;font-family:inherit">${icon} ${label}</button>`;

    let html = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <div style="flex:1;min-width:0">
          <h2 style="margin:0;font-size:1.05rem;line-height:1.2">&#9876; ${this.esc(combat.encounterName)}</h2>
          <div style="font-size:0.7rem;color:var(--ink-light)">${this.esc(campaign?.name || '—')} &middot; Round ${combat.round}</div>
        </div>
        <button class="btn btn-secondary btn-small" style="color:var(--burgundy)" onclick="app.endCombatConfirm()" title="End combat">End</button>
      </div>

      <div style="display:flex;gap:6px;margin-bottom:8px">
        ${modeBtn('list', '&#128203;', 'List')}
        ${modeBtn('map',  '&#128506;&#65039;', 'Map')}
      </div>

      <div style="display:flex;gap:6px;margin-bottom:12px">
        <button class="btn btn-primary" style="flex:1" onclick="app.combatNextTurn()">&#10140; Next Turn</button>
        <button class="btn btn-secondary" style="flex:1" onclick="app.combatNewRound()">&#8635; New Round</button>
      </div>
    `;

    // Resolve the current turn slot from turnOrder
    const slot = (combat.turnOrder || [])[combat.turnIndex] || null;
    let turnLabel = '';
    if (slot) {
      if (slot.type === 'monsters') {
        turnLabel = "Monsters' Turn — all regular enemies act now";
      } else {
        const cur = combat.participants.find(p => p.id === slot.pid);
        if (cur) {
          const prefix = slot.type === 'legendary' ? '👑 Legendary: ' : (slot.type === 'ally' ? '🤝 Ally: ' : '');
          turnLabel = `${prefix}${cur.name}`;
        }
      }
    }

    if (viewMode === 'map') {
      if (turnLabel) {
        html += `
          <div style="padding:8px 10px;background:var(--parchment);border:1px solid var(--gold);border-radius:5px;margin-bottom:8px;font-size:0.78rem">
            <strong>Turn:</strong> ${this.esc(turnLabel)}
          </div>`;
      }
      html += this.renderCombatMap(combat, false);
    } else {
      if (turnLabel) {
        html += `
          <div style="padding:8px 10px;background:var(--gold);color:var(--leather-dark);border-radius:5px;margin-bottom:8px;font-size:0.78rem;font-weight:bold;text-align:center">
            ${this.esc(turnLabel)}
          </div>`;
      }
      html += '<div style="display:flex;flex-direction:column;gap:6px">';
      for (let i = 0; i < combat.participants.length; i++) {
        const p = combat.participants[i];
        // A participant is "current" when the slot is 'monsters' and p is a regular enemy,
        // or the slot pid matches this participant.
        let isCurrent = false;
        if (slot) {
          if (slot.type === 'monsters') {
            isCurrent = this._isRegularEnemy(p);
          } else {
            isCurrent = slot.pid === p.id;
          }
        }
        html += this._renderCombatParticipant(p, i, isCurrent);
      }
      html += '</div>';
    }

    return html;
  },

  _renderCombatParticipant(p, idx, isCurrent) {
    const isDead = p.dead || (p.hp <= 0 && !p.isMinion && p.phase !== 'lastStand' && p.kind !== 'legendary');
    const legDead = p.kind === 'legendary' && p.phase === 'dead';
    const effectivelyDead = isDead || legDead;

    const hpPct = p.maxHp > 0 ? Math.max(0, Math.min(100, (p.hp / p.maxHp) * 100)) : 0;
    const hpColor = hpPct < 33 ? 'var(--burgundy)' : (hpPct < 66 ? '#c9a84c' : '#4a7c3e');

    const isAllyNPC = p.kind === 'npc' && p.role === 'ally';
    const isEnemyNPC = p.kind === 'npc' && p.role !== 'ally';
    const kindIcon = isAllyNPC
      ? '&#129309;' // handshake for ally NPC
      : { pc: '&#128100;', monster: '&#128029;', legendary: '&#128081;', npc: '&#128128;', minion: '&#128049;' }[p.kind] || '';
    const armorBadge = p.armor ? `<span style="background:var(--leather);color:var(--parchment);font-size:0.6rem;padding:2px 5px;border-radius:3px;margin-left:4px">${this.esc(p.armor)}</span>` : '';

    // Nimble GM UX: don't reveal enemy HP numbers. Only a Bloodied badge once below half HP.
    // Regular monsters + enemy NPCs both hide HP. Ally NPCs show HP like PCs.
    const isRegularEnemy = p.kind === 'monster' || isEnemyNPC;
    const isBloodiedRegular = isRegularEnemy && !p.isMinion && p.maxHp > 0 && p.hp > 0 && p.hp <= p.maxHp / 2;

    // Phase banners — legendaries track Bloodied/Last Stand explicitly; regular enemies get a derived badge
    let phaseBanner = '';
    if (p.kind === 'legendary') {
      if (p.phase === 'lastStand') phaseBanner = '<span style="background:var(--burgundy);color:#fff;font-size:0.6rem;padding:2px 6px;border-radius:3px;margin-left:4px">LAST STAND</span>';
      else if (p.bloodied) phaseBanner = '<span style="background:#b8621b;color:#fff;font-size:0.6rem;padding:2px 6px;border-radius:3px;margin-left:4px">BLOODIED</span>';
    } else if (isBloodiedRegular) {
      phaseBanner = '<span style="background:#b8621b;color:#fff;font-size:0.6rem;padding:2px 6px;border-radius:3px;margin-left:4px">BLOODIED</span>';
    }

    // HP / damage controls
    //  - Minion: Kill-minion button (unchanged).
    //  - PC: full HP bar + numbers (party tracks own HP).
    //  - Enemy: hide numbers; show a subtle status label (Healthy/Bloodied/Dead) plus damage controls.
    const dmgControls = `
      <div style="display:flex;gap:4px;margin-top:6px;align-items:center">
        <input type="number" id="dmg_${p.id}" placeholder="dmg" inputmode="numeric" min="0"
               style="width:56px;padding:4px 6px;font-size:0.75rem;border:1px solid var(--parchment-edge);border-radius:4px;background:var(--parchment);color:var(--ink);text-align:center">
        <button class="btn btn-secondary btn-small" style="padding:3px 10px;font-size:0.75rem;color:var(--burgundy)" onclick="app.combatApplyHP('${p.id}', -1)">− Dmg</button>
        <button class="btn btn-secondary btn-small" style="padding:3px 10px;font-size:0.75rem;color:#4a7c3e" onclick="app.combatApplyHP('${p.id}', 1)">+ Heal</button>
      </div>`;

    let hpRow = '';
    if (p.isMinion) {
      hpRow = p.dead
        ? '<span style="color:var(--burgundy);font-size:0.75rem;font-weight:bold">DEAD</span>'
        : `<button class="btn btn-secondary btn-small" style="font-size:0.7rem;padding:3px 10px" onclick="app.combatKillMinion('${p.id}')">Kill minion</button>`;
    } else if (p.kind === 'pc' || isAllyNPC) {
      hpRow = `
        <div style="display:flex;align-items:center;gap:6px;margin-top:4px">
          <div style="flex:1;height:7px;background:var(--parchment-edge);border-radius:3px;overflow:hidden">
            <div style="width:${hpPct}%;height:100%;background:${hpColor};transition:width 0.3s"></div>
          </div>
          <span style="font-size:0.75rem;font-weight:bold;white-space:nowrap;min-width:60px;text-align:right">${p.hp} / ${p.maxHp}</span>
        </div>
        ${dmgControls}`;
    } else {
      // Enemy (regular monster / legendary / npc): status label only, no numbers
      const statusText = effectivelyDead
        ? 'DEAD'
        : (p.kind === 'legendary' && p.phase === 'lastStand')
          ? 'LAST STAND'
          : (p.kind === 'legendary' && p.bloodied) || isBloodiedRegular
            ? 'BLOODIED'
            : 'Healthy';
      const statusColor = effectivelyDead
        ? 'var(--burgundy)'
        : statusText === 'LAST STAND' ? 'var(--burgundy)' : statusText === 'BLOODIED' ? '#b8621b' : 'var(--ink-light)';
      hpRow = `
        <div style="margin-top:6px;padding:5px 8px;background:var(--parchment-dark);border-radius:4px;text-align:center;font-size:0.72rem;font-weight:bold;color:${statusColor};letter-spacing:0.5px">
          ${statusText}
        </div>
        ${dmgControls}`;
    }

    // Conditions
    const condsList = Object.keys(p.conditions || {}).filter(k => p.conditions[k]);
    const condsRow = condsList.length
      ? `<div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap">${condsList.map(c => `<span style="background:var(--burgundy);color:#fff;font-size:0.6rem;padding:2px 6px;border-radius:8px">${this.esc(c)} <span onclick="event.stopPropagation();app.combatToggleCondition('${p.id}','${c.replace(/'/g, "\\'")}')" style="cursor:pointer;margin-left:3px">&times;</span></span>`).join('')}</div>`
      : '';

    // Info row (init shown only for PCs — enemies don't roll in Nimble)
    const infoRow = `
      <div style="display:flex;gap:6px;align-items:baseline;font-size:0.65rem;color:var(--ink-light);flex-wrap:wrap">
        ${p.kind === 'pc' && p.initiative != null ? `<span>Init <strong style="color:var(--gold)">${p.initiative}</strong></span>` : ''}
        ${p.level != null ? `<span>Lvl ${p.level}</span>` : ''}
        ${p.size ? `<span>${this.esc(p.size)}</span>` : ''}
        ${p.speed ? `<span>Spd ${p.speed}</span>` : ''}
      </div>`;

    const armorHint = (p.armor === 'M')
      ? '<div style="font-size:0.6rem;color:var(--ink-light);margin-top:3px;font-style:italic">M armor: ignore damage mods, just the dice.</div>'
      : (p.armor === 'H')
      ? '<div style="font-size:0.6rem;color:var(--ink-light);margin-top:3px;font-style:italic">H armor: half the dice (round up).</div>'
      : '';

    const expanded = this._combatExpanded && this._combatExpanded[p.id];

    return `
      <div class="combat-participant${isCurrent ? ' current' : ''}${effectivelyDead ? ' dead' : ''}">
        <div onclick="app.combatToggleExpanded('${p.id}')" style="cursor:pointer">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:6px">
            <div style="flex:1;min-width:0">
              <strong style="font-size:0.9rem">${kindIcon} ${this.esc(p.name)}${armorBadge}${phaseBanner}</strong>
            </div>
            ${isCurrent ? '<span style="background:var(--gold);color:var(--leather-dark);font-size:0.62rem;padding:2px 8px;border-radius:10px;font-weight:bold">TURN</span>' : ''}
          </div>
          ${infoRow}
        </div>
        ${hpRow}
        ${armorHint}
        ${condsRow}
        ${expanded ? this._renderCombatExpanded(p) : `
          <div style="margin-top:6px;text-align:center">
            <span onclick="app.combatToggleExpanded('${p.id}')" style="font-size:0.65rem;color:var(--ink-light);cursor:pointer">Tap for details &#9662;</span>
          </div>`}
      </div>
    `;
  },

  _renderCombatExpanded(p) {
    const gmConds = window.GM_DATA?.CONDITIONS || {};
    const condKeys = Object.keys(gmConds);

    let html = '<div style="margin-top:10px;padding:10px;background:var(--parchment);border-radius:5px;border:1px solid var(--parchment-edge)">';

    // Stat block
    if (p.trait) html += `<div style="font-size:0.72rem;font-style:italic;color:var(--ink-light);margin-bottom:6px">${this.esc(p.trait)}</div>`;
    if (p.actions) html += `<div style="font-size:0.75rem;margin-bottom:8px">${this.esc(p.actions)}</div>`;

    // Legendary actions
    if (p.actionsList && p.actionsList.length) {
      html += '<div style="margin-bottom:8px">';
      html += '<div style="font-size:0.7rem;font-weight:bold;color:var(--burgundy);margin-bottom:4px">Actions</div>';
      for (const a of p.actionsList) {
        const usage = a.usage ? ` <span style="font-size:0.6rem;color:var(--ink-light);font-weight:normal">(${this.esc(a.usage)})</span>` : '';
        html += `<div style="font-size:0.72rem;margin-bottom:4px"><strong>${this.esc(a.name)}.</strong>${usage} ${this.esc(a.description)}</div>`;
      }
      html += '</div>';
    }

    // Legendary phase info
    if (p.kind === 'legendary') {
      if (p.bloodiedDesc) html += `<div style="font-size:0.7rem;margin-bottom:6px"><span style="color:#b8621b;font-weight:bold">BLOODIED:</span> ${this.esc(p.bloodiedDesc)}</div>`;
      if (p.lastStandDesc) html += `<div style="font-size:0.7rem;margin-bottom:6px"><span style="color:var(--burgundy);font-weight:bold">LAST STAND:</span> ${this.esc(p.lastStandDesc)}</div>`;
      html += `<div style="font-size:0.65rem;color:var(--ink-light);margin-bottom:8px;font-style:italic">Acts after each hero's turn. Advance "Next Turn" after every hero action.</div>`;
    }

    // Conditions picker
    html += '<div style="border-top:1px dashed var(--parchment-edge);padding-top:8px;margin-top:8px">';
    html += '<div style="font-size:0.7rem;font-weight:bold;color:var(--burgundy);margin-bottom:4px">Conditions</div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:4px">';
    for (const name of condKeys) {
      const active = !!(p.conditions && p.conditions[name]);
      html += `<button onclick="app.combatToggleCondition('${p.id}','${name.replace(/'/g, "\\'")}')" class="btn btn-secondary btn-small" style="padding:3px 8px;font-size:0.65rem;${active ? 'background:var(--burgundy);color:#fff;border-color:var(--burgundy)' : ''}" title="${this.esc(gmConds[name].description)}">${this.esc(name)}</button>`;
    }
    html += '</div></div>';

    // Notes
    html += `<div style="margin-top:10px">
      <div style="font-size:0.7rem;font-weight:bold;color:var(--burgundy);margin-bottom:4px">Notes</div>
      <textarea id="note_${p.id}" rows="2" oninput="app.combatUpdateNotes('${p.id}', this.value)"
        style="width:100%;padding:6px;font-size:0.75rem;border:1px solid var(--parchment-edge);border-radius:4px;background:var(--parchment);color:var(--ink);resize:vertical;font-family:inherit">${this.esc(p.notes || '')}</textarea>
    </div>`;

    html += '</div>';
    return html;
  },

  combatToggleExpanded(pid) {
    if (!this._combatExpanded) this._combatExpanded = {};
    this._combatExpanded[pid] = !this._combatExpanded[pid];
    this.render();
  },

  combatApplyHP(pid, sign) {
    const combat = this.state.activeCombat;
    if (!combat) return;
    const p = combat.participants.find(x => x.id === pid);
    if (!p) return;
    const inp = document.getElementById('dmg_' + pid);
    const val = Math.abs(parseInt(inp?.value, 10) || 0);
    if (!val) return;

    // Apply the change
    p.hp = Math.max(0, p.hp + (sign * val));
    if (sign > 0) p.hp = Math.min(p.maxHp, p.hp);   // heal cap at max

    // Legendary phase transitions on damage
    if (p.kind === 'legendary' && sign < 0) {
      if (!p.bloodied && p.hp <= p.maxHp / 2 && p.phase !== 'lastStand') {
        p.bloodied = true;
        p.phase = 'bloodied';
        this.toast(`${p.name} is BLOODIED`);
      }
      if (p.hp === 0 && p.phase !== 'lastStand' && !p.inLastStand) {
        // Enter Last Stand: reset HP to lastStandHp
        p.inLastStand = true;
        p.phase = 'lastStand';
        p.hp = p.lastStandHp || 30;
        p.maxHp = p.hp;
        this.toast(`${p.name} enters LAST STAND!`);
      } else if (p.hp === 0 && p.phase === 'lastStand') {
        p.phase = 'dead';
      }
    }

    // Mirror PC HP back to their sheet (keeps character sheet live)
    if (p.kind === 'pc') {
      const ch = this.state.characters.find(x => x.id === p.sourceId);
      if (ch) { ch.hp = p.hp; ch.maxHp = p.maxHp; }
    }

    if (inp) inp.value = '';
    this.save();
    this.render();
  },

  combatKillMinion(pid) {
    const combat = this.state.activeCombat;
    if (!combat) return;
    const p = combat.participants.find(x => x.id === pid);
    if (!p) return;
    p.dead = true;
    p.hp = 0;
    this.save();
    this.render();
  },

  combatToggleCondition(pid, name) {
    const combat = this.state.activeCombat;
    if (!combat) return;
    const p = combat.participants.find(x => x.id === pid);
    if (!p) return;
    p.conditions = p.conditions || {};
    if (p.conditions[name]) delete p.conditions[name];
    else p.conditions[name] = true;
    this.save();
    this.render();
  },

  combatUpdateNotes(pid, val) {
    const combat = this.state.activeCombat;
    if (!combat) return;
    const p = combat.participants.find(x => x.id === pid);
    if (!p) return;
    p.notes = val;
    if (this._combatNotesTimer) clearTimeout(this._combatNotesTimer);
    this._combatNotesTimer = setTimeout(() => this.save(), 400);
  },

  combatNextTurn() {
    const combat = this.state.activeCombat;
    if (!combat || combat.phase !== 'active') return;
    const order = combat.turnOrder || [];
    const n = order.length;
    if (!n) return;

    const slotIsSkippable = (slot) => {
      if (slot.type === 'monsters') {
        // Skip the monster phase only if every regular enemy is already dead
        return !combat.participants.some(p =>
          this._isRegularEnemy(p) && !p.dead && p.hp > 0
        );
      }
      const p = combat.participants.find(x => x.id === slot.pid);
      if (!p) return true;
      if (p.kind === 'legendary') return p.phase === 'dead';
      return p.dead || p.hp <= 0;
    };

    for (let i = 1; i <= n; i++) {
      const next = (combat.turnIndex + i) % n;
      if (!slotIsSkippable(order[next])) {
        // Wrap-around increments the round counter
        if (next <= combat.turnIndex) combat.round++;
        combat.turnIndex = next;
        this.save();
        this.render();
        return;
      }
    }
    // Everything is skippable — just advance the round counter and stay put
    combat.round++;
    this.save();
    this.render();
  },

  combatNewRound() {
    const combat = this.state.activeCombat;
    if (!combat || combat.phase !== 'active') return;
    combat.round++;
    combat.turnIndex = 0;
    this.save();
    this.render();
  },

  endCombatConfirm() {
    if (!this.state.activeCombat) return;
    if (!confirm('End this combat? Turn tracking will be cleared. Character HP changes stay.')) return;
    this.state.activeCombat = null;
    this._combatExpanded = {};
    this.unsubscribeFromPlayerMoves();
    this.save();
    this.toast('Combat ended');
    this.render();
  },

  renderCreation() {
    const cr = this.state.creation;
    if (!cr) return '<div class="empty-state"><p>No creation in progress.</p></div>';

    let html = '<div class="creation-view view-padding-bottom">';

    // Step indicator

    for (let i = 0; i < totalSteps; i++) {

      case 4: html += this.renderStepSkills(cr, data); break;

  renderStepBackground(cr, data) {
    const bgs = data.backgrounds || [
      { name: 'Soldier', description: 'Trained in the arts of war', mechanics: '+1 Athletics, proficiency with martial weapons' },
      { name: 'Scholar', description: 'Dedicated to learning and knowledge', mechanics: '+1 Arcana, extra language' },
      { name: 'Criminal', description: 'A life outside the law', mechanics: '+1 Stealth, thieves\' tools proficiency' },
      { name: 'Noble', description: 'Born into privilege', mechanics: '+1 Persuasion, extra starting gold' },
      { name: 'Artisan', description: 'Skilled craftsperson', mechanics: '+1 Investigation, artisan tools' },
      { name: 'Outlander', description: 'Raised in the wilderness', mechanics: '+1 Nature, survival expertise' },
      { name: 'Acolyte', description: 'Servant of a higher power', mechanics: '+1 Insight, religious knowledge' },
      { name: 'Entertainer', description: 'Performer and showperson', mechanics: '+1 Persuasion, performance tools' },
    ];
    // Helper: format a background's stat requirements as a readable badge
    const reqBadge = (b) => {
      if (!b.statRequirements) return '';

        if (r.max !== undefined) return `${stat} ≤ ${r.max}`;
        if (r.min !== undefined) return `${stat} ≥ ${r.min}`;
        return stat;
      });
      return `<div style="display:inline-block;margin-top:4px;padding:2px 8px;font-size:0.65rem;font-weight:bold;background:var(--burgundy);color:#fff;border-radius:10px">Req: ${parts.join(', ')}</div>`;
    };

    let html = '<div class="option-grid single-col">';
    bgs.forEach(b => {
      const sel = cr.background === b.name ? 'selected' : '';
      html += `
        <div class="option-card ${sel}" onclick="app.state.creation.background='${this.esc(b.name)}';${b.name !== 'Academy Dropout' ? " app.state.creation.utilitySpell=null;" : ''} app.render()">

          <p>${b.description || ''}</p>
          ${b.mechanics ? '<div class="complexity" style="color:var(--burgundy)">' + b.mechanics + '</div>' : ''}

    if (cr.background === 'Academy Dropout') {

      const schools = ['fire', 'ice', 'lightning', 'wind', 'radiant', 'necrotic'];
      // Build flat list for easy indexing
      this._utilitySpellList = [];
      schools.forEach(school => {
        (utilityData[school] || []).forEach(sp => {
          this._utilitySpellList.push({ name: sp.name, school, tier: 0, actions: sp.actions || 0, range: sp.range || '', damage: 'None', description: sp.description || '' });

      });

    return html;

    const sp = this._utilitySpellList?.[index];

    const cr = this.state.creation;
    if (!cr) return;
    cr.utilitySpell = cr.utilitySpell?.name === sp.name ? null : sp;

  renderStepStats(cr, data) {
    const arrays = data.statArrays || { standard: [3, 2, 1, 0], balanced: [2, 2, 1, 1], minmax: [4, 1, 1, 0] };
    const currentArray = arrays[cr.statArray] || arrays.standard;
    const skills = data.skills || this.getData().skills;

    let html = '<p style="font-size:0.8rem;color:var(--ink-light);margin-bottom:12px">Choose an array and assign values to your stats.</p>';

    // Background stat requirement banner — e.g., "So Dumb I'm Smart Sometimes" requires INT ≤ 0
    const bgData = (data.backgrounds || []).find(b => b.name === cr.background);
    const reqs = bgData?.statRequirements;
    if (reqs) {
      const sa = this.resolveStats(cr, data);
      const allAssigned = Object.values(sa).every(v => v !== null);
      const unmet = Object.entries(reqs).filter(([stat, r]) => {
        if (sa[stat] == null) return false;
        if (r.max !== undefined && sa[stat] > r.max) return true;
        if (r.min !== undefined && sa[stat] < r.min) return true;
        return false;
      });
      const reqText = Object.entries(reqs).map(([s, r]) =>
        r.max !== undefined ? `${s} ≤ ${r.max}` : `${s} ≥ ${r.min}`
      ).join(', ');
      const ok = allAssigned && unmet.length === 0;
      const color = ok ? '#4a7c3e' : 'var(--burgundy)';
      const icon = ok ? '✓' : '⚠';
      html += `<div style="padding:8px 12px;margin-bottom:12px;background:var(--parchment-dark);border:2px solid ${color};border-radius:6px;font-size:0.78rem">
        <strong style="color:${color}">${icon} ${this.esc(cr.background)}</strong> requires <strong>${reqText}</strong> at creation.
        ${!ok ? '<div style="margin-top:4px;font-size:0.7rem;color:var(--ink-light)">Assign your stats so the requirement is met to continue.</div>' : ''}
      </div>`;
    }

    // Array selector
    html += '<div class="array-selector">';
    Object.keys(arrays).forEach(key => {
      const label = key.charAt(0).toUpperCase() + key.slice(1);
      const sel = cr.statArray === key ? 'selected' : '';
      html += `<button class="btn btn-small ${sel ? 'btn-primary' : 'btn-secondary'}" onclick="app.state.creation.statArray='${key}'; app.state.creation.statAssignment={STR:null,DEX:null,INT:null,WIL:null}; app.render()">${label} [${arrays[key].join(', ')}]</button>`;
    });
    html += '</div>';

    // Stat assignment (track by index so duplicate values like two +2s work correctly)
    // cr.statAssignment stores {STR: index, DEX: index, ...} where index refers to currentArray position
    html += '<div class="stat-assign-grid">';
    ['STR', 'DEX', 'INT', 'WIL'].forEach(stat => {
      const assignedIdx = cr.statAssignment[stat];
      const usedIndices = Object.entries(cr.statAssignment).filter(([k, v]) => k !== stat && v !== null).map(([k, v]) => v);

      html += `<div class="stat-assign-box"><div class="label">${stat}</div>`;
      html += `<select onchange="app.assignStat('${stat}', this.value)">`;
      html += `<option value="">--</option>`;
      currentArray.forEach((val, idx) => {
        const isUsed = usedIndices.includes(idx);
        const selected = assignedIdx === idx ? 'selected' : '';
        const disabled = isUsed && assignedIdx !== idx ? 'disabled' : '';
        html += `<option value="${idx}" ${selected} ${disabled}>${val >= 0 ? '+' : ''}${val}</option>`;
      });
      html += '</select></div>';
    });
    html += '</div>';

    // Show skill preview
    const sa = this.resolveStats(cr, data);
    if (Object.values(sa).every(v => v !== null)) {
      html += '<div style="margin-top:12px"><h3 style="font-size:0.85rem;margin-bottom:6px">Skill Preview</h3>';
      html += '<div class="skills-grid">';
      skills.forEach(sk => {
        const val = sa[sk.stat] || 0;
        html += `<div class="skill-item" style="cursor:default"><div><div class="skill-name">${sk.name}</div><div class="skill-stat">${sk.stat}</div></div><div class="skill-bonus">${val >= 0 ? '+' : ''}${val}</div></div>`;
      });
      html += '</div></div>';
    }

    return html;
  },

  assignStat(stat, val) {
    this.state.creation.statAssignment[stat] = val === '' ? null : parseInt(val);
    this.render();
  },

  // Helper: resolve stat assignment indices to actual values using current array
  resolveStats(cr, data) {
    const arrays = data.statArrays || { standard: [3, 2, 1, 0], balanced: [2, 2, 1, 1], minmax: [4, 1, 1, 0] };
    const currentArray = arrays[cr.statArray] || arrays.standard;
    const resolved = {};
    ['STR', 'DEX', 'INT', 'WIL'].forEach(stat => {
      const idx = cr.statAssignment[stat];
      resolved[stat] = idx !== null ? currentArray[idx] : null;
    });
    return resolved;
  },

  renderStepSkills(cr, data) {
    const skills = data.skills || this.getData().skills;
    const sa = this.resolveStats(cr, data);
    const remaining = cr.skillPointsRemaining;

    let html = `<p style="font-size:0.8rem;color:var(--ink-light);margin-bottom:12px">Distribute 4 bonus skill points. Remaining: <strong style="color:var(--gold)">${remaining}</strong></p>`;

    skills.forEach(sk => {
      const base = sa[sk.stat] ?? 0;
      const bonus = cr.skillPoints[sk.name] || 0;
      const total = base + bonus;
      html += `
        <div class="skill-point-row">
          <div>
            <span class="sp-name">${sk.name}</span>
            <span class="sp-base">(${sk.stat} ${base >= 0 ? '+' : ''}${base})</span>
          </div>
          <div class="sp-controls">
            <button class="tracker-btn minus" style="width:30px;height:30px;font-size:0.9rem" onclick="app.adjustSkillPoint('${sk.name}', -1)">-</button>
            <span class="sp-val">${total >= 0 ? '+' : ''}${total}</span>
            <button class="tracker-btn plus" style="width:30px;height:30px;font-size:0.9rem" onclick="app.adjustSkillPoint('${sk.name}', 1)">+</button>
          </div>
        </div>`;
    });

    return html;
  },

  adjustSkillPoint(skill, delta) {
    const cr = this.state.creation;
    const current = cr.skillPoints[skill] || 0;
    const newVal = current + delta;
    if (newVal < 0) return;
    if (delta > 0 && cr.skillPointsRemaining <= 0) return;
    cr.skillPoints[skill] = newVal;
    cr.skillPointsRemaining = 4 - Object.values(cr.skillPoints).reduce((a, b) => a + b, 0);
    if (cr.skillPointsRemaining < 0) {
      cr.skillPoints[skill] = current;
      cr.skillPointsRemaining = 4 - Object.values(cr.skillPoints).reduce((a, b) => a + b, 0);
      return;
    }
    this.render();
  },

  renderStepEquipment(cr, data) {
    const classData = (data.classes || []).find(c => c.name === cr.className);
    const startingGear = classData?.startingGear || [];
    const eq = data.equipment || {};

    let html = '';
    html += `
      <div style="margin-bottom:12px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px;min-height:44px">
          <input type="radio" name="equipMode" ${cr.useDefaultEquip ? 'checked' : ''} onchange="app.state.creation.useDefaultEquip=true; app.render()">
          <span>Use class defaults</span>
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px;min-height:44px">
          <input type="radio" name="equipMode" ${!cr.useDefaultEquip ? 'checked' : ''} onchange="app.state.creation.useDefaultEquip=false; app.render()">
          <span>Start with 50gp to buy</span>
        </label>

    if (cr.useDefaultEquip) {

      html += '<h3 style="font-size:0.9rem;margin-bottom:8px">Class Starting Gear</h3>';

      startingGear.forEach(raw => {
        const name = typeof raw === 'string' ? raw : raw.name;
        const enriched = this.enrichInventoryItem(name, eq);
        const badge = enriched.category !== 'other'
          ? `<span style="font-size:0.55rem;color:var(--burgundy);text-transform:uppercase;letter-spacing:0.05em;margin-right:6px">${enriched.category}</span>`
          : '';
        const details = (() => {
          if (enriched.category === 'weapon' && enriched.damage) return ` <span style="font-size:0.65rem;color:var(--ink-light)">${this.esc(enriched.damage)}${enriched.damageType ? ' · ' + this.esc(enriched.damageType) : ''}</span>`;
          if (enriched.category === 'armor' && enriched.formula) {
            const f = enriched.formula;
            const s = f.statMod ? `${f.base}+${f.statMod}${f.statMax !== undefined ? ` (max ${f.statMax})` : ''}` : `${f.base}`;
            return ` <span style="font-size:0.65rem;color:var(--ink-light)">${s}</span>`;
          }
          if (enriched.category === 'shield' && enriched.shieldArmor) return ` <span style="font-size:0.65rem;color:var(--ink-light)">+${enriched.shieldArmor} armor</span>`;
          return '';
        })();
        html += `<div class="inventory-item">${badge}<span class="item-name">${this.esc(name)}</span>${details}</div>`;
      });
    } else {
      html += `<p style="font-size:0.85rem;margin-bottom:8px">Starting Gold: <strong style="color:var(--gold)">${cr.gold}gp</strong></p>`;
      html += '<p style="font-size:0.8rem;color:var(--ink-light);margin-bottom:12px">Pick your starting weapon, armor, and shield from the presets below (or leave blank). You can buy more items after creation.</p>';

      // Initialize custom gear picker state if needed
      if (!cr.customGear) cr.customGear = { weapon: null, armor: null, shield: null };

      const renderPresetSelector = (label, category, presets) => {
        const currentVal = cr.customGear[category] || '';
        let out = `<label style="display:block;font-weight:bold;font-size:0.8rem;margin:8px 0 4px;color:var(--burgundy)">${label}</label>`;
        out += `<select style="width:100%;padding:6px" onchange="app.state.creation.customGear.${category}=this.value; app.render()">`;
        out += `<option value="">— None —</option>`;
        presets.forEach(p => {
          const isGroup = p.items;
          if (isGroup) {
            out += `<optgroup label="${this.esc(p.label)}">`;
            p.items.forEach(it => { out += `<option value="${this.esc(it.name)}" ${currentVal === it.name ? 'selected' : ''}>${this.esc(it.name)}</option>`; });
            out += `</optgroup>`;
          } else {
            out += `<option value="${this.esc(p.name)}" ${currentVal === p.name ? 'selected' : ''}>${this.esc(p.name)}</option>`;
          }
        });
        out += `</select>`;
        return out;
      };

      const weaponPresets = [
        { label: 'Melee', items: eq.weapons?.melee || [] },
        { label: 'Ranged', items: eq.weapons?.ranged || [] }
      ];
      const armorPresets = [
        { label: 'Cloth', items: eq.armor?.cloth || [] },
        { label: 'Leather', items: eq.armor?.leather || [] },
        { label: 'Mail', items: eq.armor?.mail || [] },
        { label: 'Plate', items: eq.armor?.plate || [] }
      ];
      const shieldPresets = eq.shields || [];

      html += renderPresetSelector('🗡 Starting Weapon', 'weapon', weaponPresets);
      html += renderPresetSelector('🛡 Starting Armor', 'armor', armorPresets);
      html += renderPresetSelector('🏵 Starting Shield', 'shield', shieldPresets);

      html += `<h4 style="font-size:0.85rem;margin-top:16px;margin-bottom:4px">Other Items</h4>`;
      html += `<div style="font-size:0.75rem;color:var(--ink-light);margin-bottom:6px">Add any other starting items (rations, rope, etc.).</div>`;
      cr.equipment.forEach((item, i) => {
        html += `<div class="inventory-item"><span class="item-name">${this.esc(item)}</span><button class="btn btn-small btn-danger" style="padding:4px 8px;min-height:30px" onclick="app.state.creation.equipment.splice(${i},1); app.render()">&#10006;</button></div>`;
      });
      html += `
        <div class="inventory-add">
          <input type="text" id="newCreationItem" placeholder="Item name...">
          <button class="btn btn-gold btn-small" onclick="const inp=document.getElementById('newCreationItem'); if(inp.value.trim()){app.state.creation.equipment.push(inp.value.trim()); app.render();}">+</button>
        </div>`;
    }
    return html;
  },

  renderStepDetails(cr, data) {
    let html = '';
    html += `<label class="creation-label">Name</label>`;
    html += `<input class="creation-input" value="${this.esc(cr.name)}" oninput="app.state.creation.name=this.value" placeholder="Character name">`;
    html += `<label class="creation-label">Height</label>`;
    html += `<input class="creation-input" value="${this.esc(cr.height)}" oninput="app.state.creation.height=this.value" placeholder="e.g. 5'10&quot;">`;
    html += `<label class="creation-label">Weight</label>`;
    html += `<input class="creation-input" value="${this.esc(cr.weight)}" oninput="app.state.creation.weight=this.value" placeholder="e.g. 170 lbs">`;
    html += `<label class="creation-label">Adventuring Motivation</label>`;
    html += `<textarea class="notes-area" style="min-height:60px" oninput="app.state.creation.motivation=this.value" placeholder="Why does your character adventure?">${this.esc(cr.motivation)}</textarea>`;
    // INT-based bonus languages
    const sa = this.resolveStats(cr, data);
    const intVal = sa.INT || 0;
    const bonusLangCount = Math.max(0, intVal);
    if (bonusLangCount > 0) {
      const allLangs = data.languages || ['Common','Dwarvish','Elvish','Goblin','Infernal',"Thieves' Cant",'Celestial','Draconic','Primordial','Deep Speak'];
      const ancestryData = (data.ancestries || []).find(a => a.name === cr.ancestry);
      const autoLangs = ['Common'];
      if (ancestryData?.languages) {
        ancestryData.languages.forEach(l => {
          if (l !== 'Common') {
            if (ancestryData.name === 'Dryad/Shroomling' && l === 'Elvish' && intVal < 0) return;
            if (!autoLangs.includes(l)) autoLangs.push(l);
          }
        });
      }
      const availableLangs = allLangs.filter(l => !autoLangs.includes(l));
      // Ensure bonusLanguages array is the right size
      while (cr.bonusLanguages.length < bonusLangCount) cr.bonusLanguages.push('');
      while (cr.bonusLanguages.length > bonusLangCount) cr.bonusLanguages.pop();

      html += `<label class="creation-label" style="margin-top:12px">Bonus Languages (INT ${intVal >= 0 ? '+' : ''}${intVal})</label>`;
      html += `<div style="font-size:0.75rem;color:var(--ink-light);margin-bottom:6px">You already know: ${autoLangs.join(', ')}. Choose ${bonusLangCount} additional.</div>`;
      for (let i = 0; i < bonusLangCount; i++) {
        const alreadyPicked = cr.bonusLanguages.filter((l, j) => j !== i && l);
        html += `<select class="creation-input" style="margin-bottom:4px" onchange="app.state.creation.bonusLanguages[${i}]=this.value; app.render()">
          <option value="">-- Choose language --</option>`;
        availableLangs.forEach(l => {
          const picked = alreadyPicked.includes(l);
          const selected = cr.bonusLanguages[i] === l ? 'selected' : '';
          html += `<option value="${this.esc(l)}" ${selected} ${picked ? 'disabled' : ''}>${l}</option>`;
        });
        html += `</select>`;
      }
    }

    // Songweaver: pick 1 additional school (wind is automatic)
    if (cr.className === 'Songweaver') {
      const schoolOpts = [
        { key: 'fire', label: '🔥 Fire' },
        { key: 'ice', label: '❄ Ice' },
        { key: 'lightning', label: '⚡ Lightning' },
        { key: 'radiant', label: '☀ Radiant' },
        { key: 'necrotic', label: '☠ Necrotic' }
      ];
      html += `<label class="creation-label" style="margin-top:12px">Songweaver Spell School</label>`;
      html += `<div style="font-size:0.75rem;color:var(--ink-light);margin-bottom:6px">You automatically know Wind. Choose 1 additional spell school.</div>`;
      html += `<div style="display:flex;flex-wrap:wrap;gap:6px">`;
      schoolOpts.forEach(s => {
        const sel = cr.songweaverSchool === s.key;
        html += `<button class="btn btn-small ${sel ? 'btn-gold' : 'btn-secondary'}" onclick="app.state.creation.songweaverSchool='${s.key}'; app.render()">${s.label}</button>`;
      });
      html += `</div>`;
    }

    html += `<label class="creation-label" style="margin-top:12px">Character Image</label>`;
    html += `<button class="btn btn-secondary btn-block" onclick="app.uploadCreationImage()">Upload Image</button>`;
    if (cr.image) {
      html += `<div style="text-align:center;margin-top:8px"><img src="${cr.image}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--gold)"></div>`;
    }
    return html;
  },

  uploadCreationImage() {
    const inp = document.getElementById('imageUpload');
    inp.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const size = 200;
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext('2d');
          const min = Math.min(img.width, img.height);
          ctx.drawImage(img, (img.width - min) / 2, (img.height - min) / 2, min, min, 0, 0, size, size);
          app.state.creation.image = canvas.toDataURL('image/jpeg', 0.7);
          app.render();
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
      inp.value = '';
    };
    inp.click();
  },

  renderStepReview(cr, data) {
    const classData = (data.classes || []).find(c => c.name === cr.className);

    let html = '<div class="card">';
    html += `<div class="review-section"><h4>Name</h4><p>${this.esc(cr.name || 'Unnamed')}</p></div>`;
    html += `<div class="review-section"><h4>Class</h4><p>${cr.className || 'None'}</p></div>`;
    html += `<div class="review-section"><h4>Ancestry</h4><p>${cr.ancestry || 'None'}</p></div>`;
    html += `<div class="review-section"><h4>Background</h4><p>${cr.background || 'None'}</p></div>`;

    const sa = this.resolveStats(cr, data);
    html += `<div class="review-section"><h4>Stats</h4><p>STR: ${sa.STR ?? '?'} | DEX: ${sa.DEX ?? '?'} | INT: ${sa.INT ?? '?'} | WIL: ${sa.WIL ?? '?'}</p></div>`;

    const skillStr = Object.entries(cr.skillPoints).filter(([k, v]) => v > 0).map(([k, v]) => `${k} +${v}`).join(', ');
