          if (opts.droppedIndex !== undefined && i === opts.droppedIndex) d.classList.add('dropped');
          if (dieSize === 20 && val === 20) d.classList.add('crit');
          if (dieSize === 20 && val === 1) d.classList.add('fumble');

          // After last die settles, show total
          if (i === rolls.length - 1) {
            setTimeout(() => {
              overlay.classList.add('settling');
              const kept = rolls.filter((_, j) => opts.droppedIndex === undefined || j !== opts.droppedIndex);
              const total = kept.reduce((a, b) => a + b, 0) + (opts.bonus || 0);
              totalEl.textContent = total + (opts.bonus ? ` (${kept.reduce((a,b)=>a+b,0)}${opts.bonus >= 0 ? '+' : ''}${opts.bonus})` : '');
              totalEl.classList.add('visible');

              // Auto-dismiss
              setTimeout(() => {
                overlay.style.animation = 'fadeOut 0.3s ease forwards';
                setTimeout(() => {
                  overlay.remove();
                  if (opts.onDone) opts.onDone();
                }, 300);
              }, 1200);
            }, 200);
          }
        }, i * settleDelay);
      });
    }, 600);

    // Tap to skip animation
    overlay.onclick = () => {
      clearInterval(tumbleInterval);
      dieEls.forEach((d, i) => {
        dieNumEls[i].textContent = rolls[i];
        d.classList.add('settled');
        if (opts.droppedIndex !== undefined && i === opts.droppedIndex) d.classList.add('dropped');
        if (dieSize === 20 && rolls[i] === 20) d.classList.add('crit');
        if (dieSize === 20 && rolls[i] === 1) d.classList.add('fumble');
      });
      overlay.classList.add('settling');
      const kept = rolls.filter((_, j) => opts.droppedIndex === undefined || j !== opts.droppedIndex);
      const total = kept.reduce((a, b) => a + b, 0) + (opts.bonus || 0);
      totalEl.textContent = total + (opts.bonus ? ` (${kept.reduce((a,b)=>a+b,0)}${opts.bonus >= 0 ? '+' : ''}${opts.bonus})` : '');
      totalEl.classList.add('visible');
      setTimeout(() => {
        overlay.style.animation = 'fadeOut 0.3s ease forwards';
        setTimeout(() => { overlay.remove(); if (opts.onDone) opts.onDone(); }, 300);
      }, 800);
    };
  },

  rollDice() {
    const ds = this.state.dice;
    const net = (ds.advantages || 0) - (ds.disadvantages || 0);
    const extraDice = Math.abs(net);
    const totalToRoll = ds.numDice + extraDice;

    // Roll all dice
    const rolls = [];
    for (let i = 0; i < totalToRoll; i++) {
      rolls.push(Math.floor(Math.random() * ds.selectedDie) + 1);
    }

    // Determine which dice to drop
    // If net > 0 (advantage): drop the `net` lowest rolls
    // If net < 0 (disadvantage): drop the `|net|` highest rolls
    // If net === 0: no drops
    const droppedIndices = new Set();
    if (extraDice > 0) {
      const indexed = rolls.map((v, i) => ({ v, i }));
      indexed.sort((a, b) => a.v - b.v);
      if (net > 0) {
        // Advantage: drop the lowest `extraDice`
        for (let k = 0; k < extraDice; k++) droppedIndices.add(indexed[k].i);
      } else {
        // Disadvantage: drop the highest `extraDice`
        for (let k = indexed.length - extraDice; k < indexed.length; k++) droppedIndices.add(indexed[k].i);
      }
    }

    const kept = rolls.filter((_, i) => !droppedIndices.has(i));
    const droppedValues = rolls.filter((_, i) => droppedIndices.has(i));
    const total = kept.reduce((a, b) => a + b, 0);

    // Label
    let advLabel = '';
    if (net > 0) advLabel = ` (${net > 1 ? net + 'x ' : ''}ADV)`;
    else if (net < 0) advLabel = ` (${extraDice > 1 ? extraDice + 'x ' : ''}DIS)`;
    const label = `${ds.numDice}d${ds.selectedDie}${advLabel}`;

    ds.history.unshift({
      label, results: rolls, total,
      dropped: droppedValues.length > 0 ? droppedValues.join(', ') : null
    });
    if (ds.history.length > 10) ds.history.pop();

    this.animateDice(rolls, ds.selectedDie, {
      label,
      droppedIndex: droppedIndices.size === 1 ? [...droppedIndices][0] : undefined,
      onDone: () => { this.render(); }
    });
  },

  // Returns true if item matches the search query (checked in name + description)
  _rulesMatch(item, q) {
    if (!q) return true;
    return (item.name || '').toLowerCase().includes(q) || (item.description || '').toLowerCase().includes(q);
  },

  renderRules() {
    const data = this.getData();
    const builtin = this.getBuiltinRules();
    const search = (this.state.rulesSearch || '').toLowerCase().trim();
    const hasSearch = search.length > 0;

    let html = '<div class="rules-view view-padding-bottom">';
    html += `<input class="rules-search" type="search" placeholder="Search rules..." value="${this.esc(this.state.rulesSearch)}" oninput="app.state.rulesSearch=this.value; app.render()">`;

    // Helper: render one collapsible section
    // Open by default when there's a search match, closed otherwise
    const renderSection = (icon, title, items, itemRenderer) => {
      const filtered = items.filter(it => this._rulesMatch(it, search));
      if (filtered.length === 0) return '';
      const open = hasSearch; // auto-expand on search
      return `
        <div class="rules-section">
          <div class="rules-collapsible-header ${open ? 'open' : ''}" onclick="app.toggleCollapsible(this)">
            <h4>${icon} ${title} <span class="rules-count">(${filtered.length})</span></h4>
            <span class="collapsible-arrow">&#9660;</span>
          </div>
          <div class="rules-collapsible-body ${open ? 'open' : ''}">
            ${filtered.map(itemRenderer).join('')}
          </div>
        </div>`;
    };

    const ruleItem = (it) => `<div class="rule-item"><h4>${this.esc(it.name)}${it.cost ? ` <span style="font-size:0.7rem;color:var(--ink-light)">(${this.esc(it.cost)})</span>` : ''}</h4><p>${this.esc(it.description || '')}</p></div>`;

    // Section rendering order: most useful during play at the top
    html += renderSection('&#9888;', 'Conditions', data.conditions || [], ruleItem);
    html += renderSection('&#9876;', 'Combat Actions', builtin.combatActions, ruleItem);
    html += renderSection('&#9889;', 'Reactions', builtin.reactions, ruleItem);
    html += renderSection('&#127769;', 'Resting', builtin.resting, ruleItem);
    html += renderSection('&#10024;', 'Spellcasting', builtin.spellcasting, ruleItem);
    html += renderSection('&#128200;', 'Leveling Up', builtin.leveling, ruleItem);
    html += renderSection('&#128101;', 'Character Creation Guide', builtin.creation, ruleItem);
    html += renderSection('&#128221;', 'Stats & Skills', builtin.stats, ruleItem);

    // Empty-state (only when searching)
    if (hasSearch) {
      const totalMatches = [
        ...(data.conditions || []), ...builtin.combatActions, ...builtin.reactions,
        ...builtin.resting, ...builtin.spellcasting, ...builtin.leveling,
        ...builtin.creation, ...builtin.stats
      ].filter(it => this._rulesMatch(it, search)).length;
      if (totalMatches === 0) {
        html += '<div class="empty-state"><p>No rules match "' + this.esc(this.state.rulesSearch) + '".</p></div>';
      }
    }

    html += '</div>';
    return html;
  },

  // ===== GM TOOLS (Fase 0 scaffolding) =====
  // Sub-nav: Campaigns | Bestiary | Encounters | Combat
  // Only Campaigns + Bestiary are functional in Fase 0. The other tabs show
  // roadmap placeholders so the user can preview what's coming.
  renderGM() {
    // Map prep overrides everything else (full-screen prep view)
    if (this._mapPrep) {
      return `<div class="gm-view view-padding-bottom">${this._renderMapPrep()}</div>`;
    }

    const sub = this.state.gmView || 'campaigns';
    const tab = (id, label, icon) =>
      `<button class="gm-subnav-btn ${sub === id ? 'active' : ''}" onclick="app.setGMView('${id}')">
         <span class="gm-subnav-icon">${icon}</span><span>${label}</span>
       </button>`;

    let body = '';
    switch (sub) {
      case 'campaigns':  body = this.renderGMCampaigns();  break;
      case 'bestiary':   body = this.renderGMBestiary();   break;
      case 'encounters': body = this.renderGMEncountersTopLevel(); break;
      case 'combat':     body = this.renderCombatTracker(); break;
      default: body = this.renderGMCampaigns();
    }

    return `
      <div class="gm-view view-padding-bottom">
        <nav class="gm-subnav">
          ${tab('campaigns',  'Campaigns',  '&#128218;')}
          ${tab('bestiary',   'Bestiary',   '&#128029;')}
          ${tab('encounters', 'Encounters', '&#9876;')}
          ${tab('combat',     'Combat',     '&#128293;')}
        </nav>
        <div class="gm-subview">${body}</div>
      </div>`;
  },

  // Full-screen map prep view. Reuses renderCombatMap by constructing a combat-like shim.
  _renderMapPrep() {
    const mp = this._mapPrep;
    if (!mp) return '';
    const c = (this.state.campaigns || []).find(x => x.id === mp.campaignId);
    const e = c?.encounters?.find(x => x.id === mp.encounterId);
    const title = e?.name || 'Encounter';

    // Render map via renderCombatMap, but set flags so token clicks use mapPrep* handlers
    this._inPrepMode = true;
    const mapHtml = this.renderCombatMap({ map: mp.map, participants: mp.participants, turnOrder: [], turnIndex: 0 }, false);
    this._inPrepMode = false;

    const mode = mp.paintMode || 'select';
    const modeBtn = (id, icon, label) =>
      `<button onclick="app.mapPrepSetMode('${id}')" style="flex:1;padding:6px 8px;font-size:0.75rem;background:${mode === id ? 'var(--gold)' : 'var(--parchment-dark)'};color:${mode === id ? 'var(--leather-dark)' : 'var(--ink)'};border:1px solid var(--parchment-edge);border-radius:4px;cursor:pointer;font-family:inherit">${icon} ${label}</button>`;

    const fogCount = Object.keys(mp.map.fog || {}).length;
    const wallCount = Object.keys(mp.map.walls || {}).length;
    const gridType = mp.map.gridType || 'square';

    const paintExtras = mode === 'fog'
      ? `<div style="display:flex;gap:6px;margin-top:6px">
           <button class="btn btn-secondary btn-small" style="flex:1;font-size:0.7rem" onclick="app.mapPrepCoverAllFog()">Cover all</button>
           <button class="btn btn-secondary btn-small" style="flex:1;font-size:0.7rem" onclick="app.mapPrepClearFog()">Clear fog (${fogCount})</button>
         </div>`
      : mode === 'wall'
        ? `<div style="display:flex;gap:6px;margin-top:6px">
             <button class="btn btn-secondary btn-small" style="flex:1;font-size:0.7rem" onclick="app.mapPrepClearWalls()">Clear walls (${wallCount})</button>
           </div>`
        : '';

    return `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <button class="btn btn-secondary btn-small" onclick="app.cancelMapPrep()">&larr;</button>
        <div style="flex:1;min-width:0">
          <h2 style="margin:0;font-size:1rem">&#128506;&#65039; Prepare Map</h2>
          <div style="font-size:0.7rem;color:var(--ink-light)">${this.esc(title)}</div>
        </div>
        <button class="btn btn-primary btn-small" style="background:var(--gold);color:var(--leather-dark)" onclick="app.saveMapPrep()">Save</button>
      </div>

      <div style="padding:8px 10px;background:var(--parchment-dark);border:1px solid var(--parchment-edge);border-radius:5px;margin-bottom:10px;font-size:0.72rem;color:var(--ink-light);display:flex;gap:8px;align-items:center">
        <div style="flex:1">Position tokens + paint fog / walls. This carries over to combat.</div>
        <button onclick="app.mapPrepToggleGridType()" class="btn btn-secondary btn-small" style="font-size:0.68rem;padding:4px 8px" title="Toggle square/hex grid">${gridType === 'hex' ? '&#11042; Hex' : '&#9633; Square'}</button>
      </div>

      <div style="display:flex;gap:6px;margin-bottom:6px">
        ${modeBtn('select', '&#128273;', 'Select')}
        ${modeBtn('fog', '&#127787;&#65039;', 'Fog')}
        ${modeBtn('wall', '&#129721;', 'Wall')}
      </div>
      ${paintExtras}

      <div style="margin-top:10px">${mapHtml}</div>
    `;
  },

  setGMView(sub) {
    this.state.gmView = sub;
    // Changing top-level GM tab exits any open campaign
    if (sub !== 'campaigns') this.state.selectedCampaignId = null;
    this.render(true);
  },

  // ---- GM > Campaigns ----
  renderGMCampaigns() {
    // If a campaign is selected, render its detail view instead of the list
    const selected = this.getCampaign();
    if (selected) return this.renderGMCampaignDetail(selected);

    const campaigns = this.state.campaigns || [];
    const hasGM = !!window.GM_DATA;
    const dataStatus = hasGM
      ? `<div style="font-size:0.7rem;color:var(--ink-light);margin-bottom:10px;">
           &#10003; Bestiary loaded — ${window.GM_DATA.MONSTERS.length} monsters, ${window.GM_DATA.LEGENDARY_MONSTERS.length} legendary, ${Object.keys(window.GM_DATA.CONDITIONS).length} conditions.
         </div>`
      : `<div style="padding:10px;background:var(--parchment-dark);border-radius:8px;margin-bottom:10px;color:var(--burgundy);font-size:0.75rem;">
           &#9888; GM data failed to load. Check that <code>gmdata.js</code> is present.
         </div>`;

    if (campaigns.length === 0) {
      return `
        ${dataStatus}
        <div class="empty-state">
          <div class="icon">&#128218;</div>
          <p>No campaigns yet.<br>Start your first adventure as GM.</p>
          <button class="btn btn-primary btn-block" onclick="app.createCampaignModal()">+ Create Campaign</button>
        </div>
        <p style="font-size:0.7rem;color:var(--ink-light);margin-top:16px;line-height:1.4">
          A campaign holds your party, NPCs, encounters, and session notes.
          Cloud sync keeps it synced across your devices when signed in.
        </p>`;
    }

    let html = dataStatus;
    html += '<div style="display:flex;flex-direction:column;gap:10px">';
    for (const c of campaigns) {
      const charCount = (c.playerCharIds || []).length;
      html += `
        <div class="char-card" onclick="app.openCampaign('${c.id}')" style="cursor:pointer">
          <div style="display:flex;justify-content:space-between;align-items:start;gap:10px">
            <div style="flex:1;min-width:0">
              <h3 style="margin:0 0 4px 0">${this.esc(c.name)}</h3>
              <div style="font-size:0.7rem;color:var(--ink-light)">
                Party Level ${c.partyLevel || 1} &middot; ${charCount} ${charCount === 1 ? 'player' : 'players'}
              </div>
              ${c.description ? `<p style="margin:6px 0 0;font-size:0.75rem;color:var(--ink);">${this.esc(c.description)}</p>` : ''}
            </div>
          </div>
        </div>`;
    }
    html += '</div>';
    html += `<button class="btn btn-primary btn-block" style="margin-top:16px" onclick="app.createCampaignModal()">+ Create Campaign</button>`;
    return html;
  },

  createCampaignModal() {
    const inputStyle = 'width:100%;margin-top:4px;padding:8px 10px;font-size:0.9rem;border:1px solid var(--parchment-edge,#c9a84c);border-radius:4px;background:var(--parchment,#f4e4c1);color:var(--ink,#3d2b1f)';
    this.showModal(`
      <div class="modal-header"><h2>New Campaign</h2></div>
      <div class="modal-body">
        <label style="display:block;margin-bottom:12px">
          <span style="font-size:0.8rem;color:var(--ink-light)">Name</span>
          <input id="campaignName" type="text" placeholder="Shadows over Merivale" style="${inputStyle}">
        </label>
        <label style="display:block;margin-bottom:12px">
          <span style="font-size:0.8rem;color:var(--ink-light)">Party Level</span>
          <input id="campaignLevel" type="number" min="1" max="20" value="1" style="${inputStyle}">
        </label>
        <label style="display:block;margin-bottom:12px">
          <span style="font-size:0.8rem;color:var(--ink-light)">Description (optional)</span>
          <textarea id="campaignDesc" rows="3" placeholder="A ranger is missing. Something whispers in the woods..." style="${inputStyle};resize:vertical"></textarea>
        </label>
      </div>
      <div class="modal-footer" style="display:flex;gap:8px">
        <button class="btn btn-secondary" style="flex:1" onclick="app.closeModal()">Cancel</button>
        <button class="btn btn-primary" style="flex:1" onclick="app.saveNewCampaign()">Create</button>
      </div>
    `);
  },

  saveNewCampaign() {
    const name  = (document.getElementById('campaignName')?.value || '').trim();
    const level = parseInt(document.getElementById('campaignLevel')?.value, 10) || 1;
    const desc  = (document.getElementById('campaignDesc')?.value || '').trim();
    if (!name) { this.toast('Campaign needs a name'); return; }

    const campaign = {
      id: 'camp_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
      name,
      partyLevel: Math.max(1, Math.min(20, level)),
      description: desc,
      createdAt: Date.now(),
      updatedAt: Date.now(),
      playerCharIds: [],   // references to this.state.characters (player sheets you own)
      npcs: [],            // Fase 1
      encounters: [],      // Fase 2
      notes: ''            // Fase 1: session notes
    };
    this.state.campaigns.push(campaign);
    this.save();
    this.closeModal();
    this.toast('Campaign created');
    this.render();
  },

  // =========================================================
  //   CAMPAIGN DETAIL VIEW (Fase 1)
  //   Shows when state.selectedCampaignId is set.
  //   Sub-views: Party / NPCs / Notes.
  // =========================================================
  renderGMCampaignDetail(c) {
    const cview = this.state.campaignView || 'party';
    const chars = this.state.characters || [];
    const linkedCount = (c.playerCharIds || []).filter(id => chars.some(ch => ch.id === id)).length;
    const npcCount = (c.npcs || []).length;

    const subTab = (id, icon, label, count) => `
      <button class="gm-subnav-btn ${cview === id ? 'active' : ''}" onclick="app.setCampaignView('${id}')">
        <span class="gm-subnav-icon">${icon}</span>
        <span>${label}${count != null ? ` (${count})` : ''}</span>
      </button>`;

    let body = '';
    switch (cview) {
      case 'party':      body = this.renderCampaignParty(c); break;
      case 'npcs':       body = this.renderCampaignNPCs(c);  break;
      case 'encounters': body = this.renderCampaignEncounters(c); break;
      case 'notes':      body = this.renderCampaignNotes(c); break;
      default:           body = this.renderCampaignParty(c);
    }

    return `
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">
        <button class="btn btn-secondary btn-small" onclick="app.backToCampaignList()">&larr;</button>
        <div style="flex:1;min-width:0">
          <h2 style="margin:0;font-size:1.05rem;line-height:1.2">${this.esc(c.name)}</h2>
          <div style="font-size:0.7rem;color:var(--ink-light)">Party Level ${c.partyLevel || 1}</div>
        </div>
        <button class="btn btn-secondary btn-small" onclick="app.shareCampaignModal()" title="Share session code">&#128279;</button>
        <button class="btn btn-secondary btn-small" onclick="app.editCampaignModal()" title="Edit campaign">&#9998;</button>
      </div>
      ${c.description ? `<p style="margin:0 0 12px;font-size:0.75rem;color:var(--ink);font-style:italic">${this.esc(c.description)}</p>` : ''}

      <nav class="gm-subnav" style="margin-top:4px">
        ${subTab('party',      '&#128107;', 'Party',      linkedCount)}
        ${subTab('npcs',       '&#127917;', 'NPCs',       npcCount)}
        ${subTab('encounters', '&#9876;',   'Encounters', (c.encounters || []).length)}
        ${subTab('notes',      '&#128221;', 'Notes',      null)}
      </nav>

      <div class="gm-subview">${body}</div>

      <div style="margin-top:28px;padding-top:16px;border-top:1px solid var(--parchment-edge)">
        <button class="btn btn-secondary btn-small" style="color:var(--burgundy)" onclick="app.deleteCampaignConfirm()">&#128465; Delete Campaign</button>
      </div>
    `;
  },

  editCampaignModal() {
    const c = this.getCampaign();
    if (!c) return;
    const inputStyle = 'width:100%;margin-top:4px;padding:8px 10px;font-size:0.9rem;border:1px solid var(--parchment-edge,#c9a84c);border-radius:4px;background:var(--parchment,#f4e4c1);color:var(--ink,#3d2b1f)';
    this.showModal(`
      <div class="modal-header"><h2>Edit Campaign</h2></div>
      <div class="modal-body">
        <label style="display:block;margin-bottom:12px">
          <span style="font-size:0.8rem;color:var(--ink-light)">Name</span>
          <input id="editCampName" type="text" value="${this.esc(c.name)}" style="${inputStyle}">
        </label>
        <label style="display:block;margin-bottom:12px">
          <span style="font-size:0.8rem;color:var(--ink-light)">Party Level</span>
          <input id="editCampLevel" type="number" min="1" max="20" value="${c.partyLevel || 1}" style="${inputStyle}">
        </label>
        <label style="display:block;margin-bottom:12px">
          <span style="font-size:0.8rem;color:var(--ink-light)">Description</span>
          <textarea id="editCampDesc" rows="3" style="${inputStyle};resize:vertical">${this.esc(c.description || '')}</textarea>
        </label>
      </div>
      <div class="modal-footer" style="display:flex;gap:8px">
        <button class="btn btn-secondary" style="flex:1" onclick="app.closeModal()">Cancel</button>
        <button class="btn btn-primary" style="flex:1" onclick="app.saveCampaignEdit()">Save</button>
      </div>
    `);
  },

  saveCampaignEdit() {
    const name  = (document.getElementById('editCampName')?.value || '').trim();
    const level = parseInt(document.getElementById('editCampLevel')?.value, 10) || 1;
    const desc  = (document.getElementById('editCampDesc')?.value || '').trim();
    if (!name) { this.toast('Name required'); return; }
    this.updateCampaign({
      name,
      partyLevel: Math.max(1, Math.min(20, level)),
      description: desc
    });
    this.closeModal();
    this.toast('Saved');
    this.render();
  },

  // Fase 3.5 — Share the campaign as a session code so players can subscribe
  shareCampaignModal() {
    const c = this.getCampaign();
    if (!c) return;
    // We use the campaign id as the sessionId — globally unique already
    const code = c.id;
    const signedIn = !!this.user;
    const hasCombat = !!(this.state.activeCombat && this.state.activeCombat.campaignId === c.id);

    this.showModal(`
      <div class="modal-header"><h2>Share Session</h2></div>
      <div class="modal-body">
        <p style="font-size:0.78rem;color:var(--ink);margin:0 0 10px;line-height:1.4">
          Give this code to your players. When they paste it into their app (Characters tab → Join GM Session) they'll see the combat in real-time.
        </p>
        <div style="padding:12px;background:var(--parchment-dark);border:1px solid var(--parchment-edge);border-radius:6px;margin-bottom:12px">
          <div style="font-size:0.65rem;color:var(--ink-light);margin-bottom:4px">Session code</div>
          <div style="font-family:monospace;font-size:0.85rem;word-break:break-all;user-select:all">${this.esc(code)}</div>
        </div>
        <button class="btn btn-secondary btn-block" onclick="app.copySessionCode('${this.esc(code)}')">&#128203; Copy Code</button>
        ${!signedIn
          ? '<div style="margin-top:12px;padding:8px;background:var(--parchment-dark);border-radius:6px;font-size:0.72rem;color:var(--burgundy)">&#9888; Sign in first so players can actually read the session doc from Firestore.</div>'
          : `<div style="margin-top:12px;font-size:0.7rem;color:var(--ink-light);line-height:1.4">
               Status: ${hasCombat ? '<strong style="color:var(--burgundy)">&#9876; Combat in progress — players will see it live</strong>' : 'No active combat yet — start one from the Encounters tab.'}
             </div>`}
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary btn-block" onclick="app.closeModal()">Done</button>
      </div>
    `);
  },

  copySessionCode(code) {
    if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(code).then(() => this.toast('Code copied')).catch(() => this.toast('Copy failed'));
    } else {
      this.toast('Clipboard unavailable');
    }
  },

  deleteCampaignConfirm() {
    const c = this.getCampaign();
    if (!c) return;
    if (!confirm(`Delete "${c.name}"? This cannot be undone.\n\nLinked player characters and their data stay on your device — only the campaign (NPCs, notes, encounters) is removed.`)) return;
    this.state.campaigns = this.state.campaigns.filter(x => x.id !== c.id);
    this.state.selectedCampaignId = null;
    this.save();
    this.toast('Campaign deleted');
    this.render();
  },

  // ---- CAMPAIGN > Party (linked player characters) ----
  renderCampaignParty(c) {
    const chars = this.state.characters || [];
    const linked = (c.playerCharIds || [])
      .map(id => chars.find(ch => ch.id === id))
      .filter(Boolean);

    let html = '';
    if (linked.length === 0) {
      html += `
        <div class="empty-state" style="padding:24px 16px">
          <div class="icon">&#128107;</div>
          <p>No player characters linked.<br>Add the adventurers to track them here.</p>
        </div>`;
    } else {
      html += '<div style="display:flex;flex-direction:column;gap:8px">';
      for (const ch of linked) {
        const ancestry = ch.ancestry || '—';
        const cls = ch.className || '—';
        const lvl = ch.level || 1;
        const hp = ch.hp ?? '?';
        const maxHp = ch.maxHp ?? '?';
        const hpPct = (ch.maxHp > 0) ? Math.max(0, Math.min(100, (ch.hp / ch.maxHp) * 100)) : 0;
        const hpColor = hpPct < 33 ? 'var(--burgundy)' : (hpPct < 66 ? '#c9a84c' : '#4a7c3e');
        html += `
          <div class="char-card" style="position:relative">
            <div style="display:flex;justify-content:space-between;align-items:start;gap:8px">
              <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:center;gap:8px">
                  <h3 style="margin:0;font-size:0.95rem">${this.esc(ch.name)}</h3>
                  <span style="font-size:0.65rem;color:var(--ink-light)">Lvl ${lvl}</span>
                </div>
                <div style="font-size:0.7rem;color:var(--ink-light);margin-top:2px">${this.esc(ancestry)} ${this.esc(cls)}</div>
                <div style="margin-top:6px;display:flex;align-items:center;gap:6px">
                  <div style="flex:1;height:6px;background:var(--parchment-edge);border-radius:3px;overflow:hidden">
                    <div style="width:${hpPct}%;height:100%;background:${hpColor};transition:width 0.3s"></div>
                  </div>
                  <span style="font-size:0.7rem;color:var(--ink-light);white-space:nowrap">${hp} / ${maxHp} HP</span>
                </div>
              </div>
              <button class="btn btn-secondary btn-small" style="padding:4px 8px;font-size:0.7rem" onclick="event.stopPropagation();app.unlinkCharacter('${ch.id}')" title="Remove from campaign">&times;</button>
            </div>
          </div>`;
      }
      html += '</div>';
    }

    // Add button always
    html += `<button class="btn btn-primary btn-block" style="margin-top:12px" onclick="app.linkCharactersModal()">+ Add Player Character</button>`;

    // Share-code hint (roadmap)
    html += `<p style="font-size:0.68rem;color:var(--ink-light);margin-top:14px;line-height:1.4">
      &#128260; Linking players from their own device (share codes) arrives with live combat push in Fase 3.
      For now, link characters you have on this device.
    </p>`;

    return html;
  },

  linkCharactersModal() {
    const c = this.getCampaign();
    if (!c) return;
    const chars = this.state.characters || [];
    const alreadyLinked = new Set(c.playerCharIds || []);
    const available = chars.filter(ch => !alreadyLinked.has(ch.id));

    if (chars.length === 0) {
      this.showModal(`
        <div class="modal-header"><h2>No characters on this device</h2></div>
        <div class="modal-body">
          <p style="font-size:0.85rem">Create a character first, then add it to the campaign.</p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-primary btn-block" onclick="app.closeModal()">OK</button>
        </div>
      `);
      return;
    }
    if (available.length === 0) {
      this.showModal(`
        <div class="modal-header"><h2>All characters are already linked</h2></div>
        <div class="modal-body">
          <p style="font-size:0.85rem">Every character on this device is already part of this campaign.</p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-primary btn-block" onclick="app.closeModal()">OK</button>
        </div>
      `);
      return;
    }

    this._linkSelection = new Set();

    const rows = available.map(ch => `
      <label style="display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--parchment-edge);border-radius:6px;margin-bottom:6px;cursor:pointer;background:var(--parchment)">
        <input type="checkbox" value="${ch.id}" onchange="app.toggleLinkSelection('${ch.id}', this.checked)" style="width:18px;height:18px">
        <div style="flex:1;min-width:0">
          <div style="font-weight:bold;font-size:0.85rem">${this.esc(ch.name)}</div>
          <div style="font-size:0.7rem;color:var(--ink-light)">${this.esc(ch.ancestry || '—')} ${this.esc(ch.className || '—')} &middot; Lvl ${ch.level || 1}</div>
        </div>
      </label>`).join('');

    this.showModal(`
      <div class="modal-header"><h2>Add Player Characters</h2></div>
      <div class="modal-body">
        <p style="font-size:0.75rem;color:var(--ink-light);margin:0 0 10px">Pick characters from this device to link to the campaign.</p>
        ${rows}
      </div>
      <div class="modal-footer" style="display:flex;gap:8px">
        <button class="btn btn-secondary" style="flex:1" onclick="app._linkSelection=null;app.closeModal()">Cancel</button>
        <button class="btn btn-primary" style="flex:1" onclick="app.confirmLinkCharacters()">Add Selected</button>
      </div>
    `);
  },

  toggleLinkSelection(charId, checked) {
    if (!this._linkSelection) this._linkSelection = new Set();
    if (checked) this._linkSelection.add(charId);
    else this._linkSelection.delete(charId);
  },

  confirmLinkCharacters() {
    const c = this.getCampaign();
    if (!c) return;
    const ids = Array.from(this._linkSelection || []);
    if (ids.length === 0) { this.toast('Pick at least one character'); return; }
    c.playerCharIds = [...(c.playerCharIds || []), ...ids];
    c.updatedAt = Date.now();
    this._linkSelection = null;
    this.save();
    this.closeModal();
    this.toast(`Added ${ids.length} ${ids.length === 1 ? 'character' : 'characters'}`);
    this.render();
  },

  unlinkCharacter(charId) {
    const c = this.getCampaign();
    if (!c) return;
    if (!confirm('Remove this character from the campaign? (Character data stays intact.)')) return;
    c.playerCharIds = (c.playerCharIds || []).filter(id => id !== charId);
    c.updatedAt = Date.now();
    this.save();
    this.render();
  },

  // ---- CAMPAIGN > NPCs (custom stat blocks) ----
  renderCampaignNPCs(c) {
    const npcs = c.npcs || [];
    let html = '';

    if (npcs.length === 0) {
      html += `
        <div class="empty-state" style="padding:24px 16px">
          <div class="icon">&#127917;</div>
          <p>No NPCs yet.<br>Add a named ally, villain, or quest-giver.</p>
        </div>`;
    } else {
      html += '<div style="display:flex;flex-direction:column;gap:6px">';
      for (let i = 0; i < npcs.length; i++) {
        const n = npcs[i];
        const armor = n.armor ? ` &middot; ${this.esc(n.armor)}` : '';
        const size = n.size ? ` (${this.esc(n.size)})` : '';
        html += `
          <div class="monster-row">
            <div style="display:flex;justify-content:space-between;gap:8px;align-items:start">
              <div style="flex:1;min-width:0">
                <strong style="font-size:0.9rem">${this.esc(n.name)}</strong>
                <span style="font-size:0.7rem;color:var(--ink-light);margin-left:6px">Lvl ${n.level || '—'} &middot; HP ${n.hp || '?'}/${n.maxHp || '?'}${armor}${size}</span>
              </div>
              <div style="display:flex;gap:4px">
                <button class="btn btn-secondary btn-small" style="padding:4px 8px;font-size:0.7rem" onclick="app.npcModal(${i})">&#9998;</button>
                <button class="btn btn-secondary btn-small" style="padding:4px 8px;font-size:0.7rem;color:var(--burgundy)" onclick="app.deleteNPC(${i})">&times;</button>
              </div>
            </div>
            ${n.trait ? `<div style="font-size:0.72rem;color:var(--ink-light);font-style:italic;margin-top:4px">${this.esc(n.trait)}</div>` : ''}
            ${n.actions ? `<div style="font-size:0.75rem;margin-top:4px">${this.esc(n.actions)}</div>` : ''}
            ${n.notes ? `<div style="font-size:0.7rem;color:var(--ink-light);margin-top:6px;padding-top:6px;border-top:1px dashed var(--parchment-edge)"><strong>Notes:</strong> ${this.esc(n.notes)}</div>` : ''}
          </div>`;
      }
      html += '</div>';
    }

    html += `<button class="btn btn-primary btn-block" style="margin-top:12px" onclick="app.npcModal(null)">+ Add NPC</button>`;
    return html;
  },

  npcModal(editIndex) {
    const c = this.getCampaign();
    if (!c) return;
    const existing = (editIndex != null && editIndex >= 0) ? c.npcs[editIndex] : null;
    this._npcDraft = {
      editIndex: editIndex == null ? null : editIndex,
      name:    existing?.name    || '',
      role:    existing?.role    || 'enemy',
      level:   existing?.level   || '',
      size:    existing?.size    || '',
      hp:      existing?.hp      ?? '',
      maxHp:   existing?.maxHp   ?? '',
      armor:   existing?.armor   || '',
      speed:   existing?.speed   ?? 6,
      trait:   existing?.trait   || '',
      actions: existing?.actions || '',
      notes:   existing?.notes   || ''
    };

    const inputStyle = 'width:100%;margin-top:4px;padding:7px 9px;font-size:0.85rem;border:1px solid var(--parchment-edge,#c9a84c);border-radius:4px;background:var(--parchment,#f4e4c1);color:var(--ink,#3d2b1f)';
    const d = this._npcDraft;
    const lbl = (txt) => `<span style="font-size:0.72rem;color:var(--ink-light)">${txt}</span>`;

    this.showModal(`
      <div class="modal-header"><h2>${existing ? 'Edit NPC' : 'New NPC'}</h2></div>
      <div class="modal-body">
        <label style="display:block;margin-bottom:10px">
          ${lbl('Name')}
          <input id="npcName" type="text" value="${this.esc(d.name)}" placeholder="Thorn Quickblade" style="${inputStyle}">
        </label>
        <div style="margin-bottom:10px">
          ${lbl('Role')}
          <div style="display:flex;gap:8px;margin-top:4px">
            <label style="flex:1;display:flex;align-items:center;gap:6px;padding:8px;background:var(--parchment);border:2px solid ${d.role === 'ally' ? '#4a7c3e' : 'var(--parchment-edge)'};border-radius:5px;cursor:pointer">
              <input type="radio" name="npcRole" value="ally" ${d.role === 'ally' ? 'checked' : ''}>
              <span style="font-size:0.8rem;font-weight:bold;color:#4a7c3e">&#128100; Ally</span>
            </label>
            <label style="flex:1;display:flex;align-items:center;gap:6px;padding:8px;background:var(--parchment);border:2px solid ${d.role === 'enemy' ? 'var(--burgundy)' : 'var(--parchment-edge)'};border-radius:5px;cursor:pointer">
              <input type="radio" name="npcRole" value="enemy" ${d.role === 'enemy' ? 'checked' : ''}>
              <span style="font-size:0.8rem;font-weight:bold;color:var(--burgundy)">&#128128; Enemy</span>
            </label>
          </div>
          <div style="font-size:0.65rem;color:var(--ink-light);margin-top:4px;font-style:italic">Allies act with the heroes (individual turn, HP visible). Enemies act with the monster group (HP hidden).</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
          <label>${lbl('Level')}<input id="npcLevel" type="text" value="${this.esc(d.level)}" placeholder="e.g. 3 or 1/4" style="${inputStyle}"></label>
          <label>${lbl('Size')}<input id="npcSize" type="text" value="${this.esc(d.size)}" placeholder="small, large…" style="${inputStyle}"></label>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px">
          <label>${lbl('HP')}<input id="npcHP" type="number" value="${d.hp}" style="${inputStyle}"></label>
          <label>${lbl('Max HP')}<input id="npcMaxHP" type="number" value="${d.maxHp}" style="${inputStyle}"></label>
          <label>${lbl('Speed')}<input id="npcSpeed" type="text" value="${this.esc(String(d.speed))}" placeholder="6 or Fly 10" style="${inputStyle}"></label>
        </div>
        <label style="display:block;margin-bottom:10px">
          ${lbl('Armor (None / M / H)')}
          <input id="npcArmor" type="text" value="${this.esc(d.armor)}" placeholder="M" style="${inputStyle}">
        </label>
        <label style="display:block;margin-bottom:10px">
          ${lbl('Trait (passive / flavor line)')}
          <textarea id="npcTrait" rows="2" style="${inputStyle};resize:vertical" placeholder="*Pack Tactics.* Advantage when an ally is adjacent…">${this.esc(d.trait)}</textarea>
        </label>
        <label style="display:block;margin-bottom:10px">
          ${lbl('Actions')}
          <textarea id="npcActions" rows="3" style="${inputStyle};resize:vertical" placeholder="**Slash.** 1d8+2. OR: **Shoot.** (Range 8) 1d8+2.">${this.esc(d.actions)}</textarea>
        </label>
        <label style="display:block;margin-bottom:10px">
          ${lbl('GM notes (optional)')}
          <textarea id="npcNotes" rows="2" style="${inputStyle};resize:vertical" placeholder="Personality, secrets, hooks…">${this.esc(d.notes)}</textarea>
        </label>
      </div>
      <div class="modal-footer" style="display:flex;gap:8px">
        <button class="btn btn-secondary" style="flex:1" onclick="app._npcDraft=null;app.closeModal()">Cancel</button>
        <button class="btn btn-primary" style="flex:1" onclick="app.saveNPC()">${existing ? 'Save' : 'Create'}</button>
      </div>
    `);
  },

  saveNPC() {
    const c = this.getCampaign();
    const d = this._npcDraft;
    if (!c || !d) return;
    const name = (document.getElementById('npcName')?.value || '').trim();
    if (!name) { this.toast('NPC needs a name'); return; }

    const hpIn    = parseInt(document.getElementById('npcHP')?.value, 10);
    const maxHpIn = parseInt(document.getElementById('npcMaxHP')?.value, 10);
    const maxHp   = Math.max(0, isNaN(maxHpIn) ? (isNaN(hpIn) ? 0 : hpIn) : maxHpIn);
    let hp        = isNaN(hpIn) ? maxHp : hpIn;
    // Clamp: HP can never exceed maxHp and can't go below 0
    const rawHp   = hp;
    hp            = Math.max(0, Math.min(hp, maxHp));
    if (rawHp !== hp) this.toast(`HP capped to 0–${maxHp}`);
    // Parse level flexibly: "3" → 3, "1/4" → stays as string
    const rawLvl  = (document.getElementById('npcLevel')?.value || '').trim();
    const level   = rawLvl.includes('/') ? rawLvl : (parseInt(rawLvl, 10) || rawLvl || '');
    // Parse speed: numeric if just a number, else string
    const rawSpd  = (document.getElementById('npcSpeed')?.value || '').trim();
    const speed   = /^\d+$/.test(rawSpd) ? parseInt(rawSpd, 10) : (rawSpd || 6);

    const role = document.querySelector('input[name="npcRole"]:checked')?.value || 'enemy';

    const npc = {
      id: d.editIndex != null ? c.npcs[d.editIndex].id : ('npc_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6)),
      name,
      role,
      level,
      size:    (document.getElementById('npcSize')?.value || '').trim(),
      hp, maxHp,
      armor:   (document.getElementById('npcArmor')?.value || '').trim().toUpperCase().replace('NONE', ''),
      speed,
      trait:   (document.getElementById('npcTrait')?.value || '').trim(),
      actions: (document.getElementById('npcActions')?.value || '').trim(),
      notes:   (document.getElementById('npcNotes')?.value || '').trim()
    };

    if (d.editIndex != null) c.npcs[d.editIndex] = npc;
    else (c.npcs ||= []).push(npc);
    c.updatedAt = Date.now();
    this._npcDraft = null;
    this.save();
    this.closeModal();
    this.toast(d.editIndex != null ? 'NPC updated' : 'NPC added');
    this.render();
  },

  deleteNPC(idx) {
    const c = this.getCampaign();
    if (!c) return;
    if (!confirm('Delete this NPC?')) return;
    c.npcs.splice(idx, 1);
    c.updatedAt = Date.now();
    this.save();
    this.render();
  },

  // ---- CAMPAIGN > Encounters (Fase 2) ----
  // Encounter data model:
  //   { id, name, description, monsters: [{kind,id,count,name,level,hp}], createdAt, updatedAt }
  //   kind: 'bestiary' | 'legendary' | 'npc' — id points to GM_DATA.MONSTERS / LEGENDARY_MONSTERS / campaign.npcs
  //   `name/level/hp` snapshotted on entry for quick render (monster source still looked up live for current data)
  renderCampaignEncounters(c) {
    // If editing, show the editor instead
    if (this.state.editingEncounterId != null) {
      return this.renderEncounterEditor(c);
    }

    const encounters = c.encounters || [];
    let html = '';

    if (encounters.length === 0) {
      html += `
        <div class="empty-state" style="padding:24px 16px">
          <div class="icon">&#9876;</div>
          <p>No encounters yet.<br>Build your first fight for this party.</p>
        </div>`;
    } else {
      html += '<div style="display:flex;flex-direction:column;gap:6px">';
      for (const e of encounters) {
        const totals = this._encounterTotals(e, c);
        const diff = this._encounterDifficulty(e, c);
        const color = this._difficultyColor(diff?.tier);
        const monsterCount = (e.monsters || []).reduce((s, m) => s + (m.count || 1), 0);
        html += `
          <div class="monster-row" style="position:relative">
            <div onclick="app.editEncounter('${e.id}')" style="cursor:pointer">
              <div style="display:flex;justify-content:space-between;gap:8px;align-items:start">
                <div style="flex:1;min-width:0">
                  <strong style="font-size:0.9rem">${this.esc(e.name)}</strong>
                  <div style="font-size:0.7rem;color:var(--ink-light);margin-top:2px">
                    ${monsterCount} ${monsterCount === 1 ? 'monster' : 'monsters'} &middot; Total level ${totals.monsters}
                  </div>
                  ${e.description ? `<div style="font-size:0.7rem;color:var(--ink);margin-top:4px;font-style:italic">${this.esc(e.description)}</div>` : ''}
                </div>
                ${diff ? `<span style="background:${color};color:#fff;font-size:0.65rem;padding:3px 8px;border-radius:10px;white-space:nowrap">${diff.tier}</span>` : ''}
              </div>
            </div>
            <button class="btn btn-primary btn-small" style="margin-top:8px;width:100%;padding:6px;font-size:0.8rem" onclick="event.stopPropagation();app.startCombatFromEncounter('${e.id}')">&#9654; Start Combat</button>
          </div>`;
      }
      html += '</div>';
    }

    html += `<button class="btn btn-primary btn-block" style="margin-top:12px" onclick="app.createEncounter()">+ Create Encounter</button>`;
    return html;
  },

  // -------- difficulty / level helpers --------
  _partyLevelTotal(c) {
    const chars = this.state.characters || [];
    const linked = (c.playerCharIds || []).map(id => chars.find(ch => ch.id === id)).filter(Boolean);
    if (linked.length === 0) {
      // Fall back to partyLevel × 4 heroes as a heuristic when no characters linked
      return (c.partyLevel || 1) * 4;
    }
    return linked.reduce((sum, ch) => sum + (ch.level || 1), 0);
  },

  _partyInfo(c) {
    const chars = this.state.characters || [];
    const linked = (c.playerCharIds || []).map(id => chars.find(ch => ch.id === id)).filter(Boolean);
    const total = this._partyLevelTotal(c);
    return {
      size: linked.length || 4,
      total,
      fallback: linked.length === 0
    };
  },

  _entryLevel(entry, c) {
    if (!entry) return 0;
    if (entry.kind === 'bestiary') {
      const m = (window.GM_DATA?.MONSTERS || []).find(x => x.id === entry.id);
      return m ? (window.GM_DATA.parseMonsterLevel(m.level) || 0) : 0;
    }
    if (entry.kind === 'legendary') {
      const m = (window.GM_DATA?.LEGENDARY_MONSTERS || []).find(x => x.id === entry.id);
      return m ? (Number(m.level) || 0) : 0;
    }
    if (entry.kind === 'npc') {
      const n = (c?.npcs || []).find(x => x.id === entry.id);
      if (!n) return 0;
      return window.GM_DATA.parseMonsterLevel(n.level) || 0;
    }
    return 0;
  },

  _encounterTotals(encounter, c) {
    let monsterLevel = 0;
    let count = 0;
    for (const entry of (encounter.monsters || [])) {
      monsterLevel += this._entryLevel(entry, c) * (entry.count || 1);
      count += (entry.count || 1);
    }
    return { monsters: Math.round(monsterLevel * 100) / 100, count, party: this._partyLevelTotal(c) };
  },

  _encounterDifficulty(encounter, c) {
    if (!window.GM_DATA?.calcEncounterDifficulty) return null;
    const { monsters, party } = this._encounterTotals(encounter, c);
    if (!party) return null;
    return window.GM_DATA.calcEncounterDifficulty(party, monsters);
  },

  _difficultyColor(tier) {
    switch (tier) {
      case 'Easy':        return '#4a7c3e';
      case 'Medium':      return '#6b8e23';
      case 'Hard':        return '#c9a84c';
      case 'Deadly':      return '#b8621b';
      case 'Very Deadly': return '#8b1a1a';
      default:            return 'var(--ink-light)';
    }
  },

  // -------- editor state / flow --------
  createEncounter() {
    this._encounterDraft = {
      id: null,
      name: '',
      description: '',
      monsters: []
    };
    this._monsterFilter = { search: '', group: '', type: 'bestiary', minLevel: '', maxLevel: '' };
    this.state.editingEncounterId = '__new__';
    this.render(true);
  },

  editEncounter(id) {
    const c = this.getCampaign();
    if (!c) return;
    const e = (c.encounters || []).find(x => x.id === id);
    if (!e) return;
    this._encounterDraft = {
      id: e.id,
      name: e.name,
      description: e.description || '',
      monsters: JSON.parse(JSON.stringify(e.monsters || []))
    };
    this._monsterFilter = { search: '', group: '', type: 'bestiary', minLevel: '', maxLevel: '' };
    this.state.editingEncounterId = id;
    this.render(true);
  },

  cancelEncounterEdit() {
    this._encounterDraft = null;
    this._monsterFilter = null;
    this.state.editingEncounterId = null;
    this.render(true);
  },

  saveEncounter() {
    const c = this.getCampaign();
    const d = this._encounterDraft;
    if (!c || !d) return;
    const name = (d.name || '').trim();
    if (!name) { this.toast('Encounter needs a name'); return; }
    if (!(d.monsters || []).length) { this.toast('Add at least one monster'); return; }

    const now = Date.now();
    if (d.id) {
      // Update in place
      const e = c.encounters.find(x => x.id === d.id);
      if (e) {
        e.name = name;
        e.description = (d.description || '').trim();
        e.monsters = d.monsters;
        e.updatedAt = now;
      }
    } else {
      (c.encounters ||= []).push({
        id: 'enc_' + now.toString(36) + Math.random().toString(36).slice(2, 6),
        name,
        description: (d.description || '').trim(),
        monsters: d.monsters,
        createdAt: now,
        updatedAt: now
      });
    }
    c.updatedAt = now;
    this._encounterDraft = null;
    this._monsterFilter = null;
    this.state.editingEncounterId = null;
    this.save();
    this.toast(d.id ? 'Encounter updated' : 'Encounter created');
    this.render();
  },

  deleteEncounter() {
    const c = this.getCampaign();
    const id = this.state.editingEncounterId;
    if (!c || !id || id === '__new__') return;
    if (!confirm('Delete this encounter?')) return;
    c.encounters = (c.encounters || []).filter(x => x.id !== id);
    c.updatedAt = Date.now();
    this._encounterDraft = null;
    this._monsterFilter = null;
    this.state.editingEncounterId = null;
    this.save();
    this.toast('Encounter deleted');
    this.render();
  },

  // -------- editor render --------
  renderEncounterEditor(c) {
    const d = this._encounterDraft || { name: '', description: '', monsters: [] };
    const isNew = !d.id;
    const totals = this._encounterTotals(d, c);
    const diff = this._encounterDifficulty(d, c);
    const diffColor = this._difficultyColor(diff?.tier);
    const partyInfo = this._partyInfo(c);

    const inputStyle = 'width:100%;padding:7px 9px;font-size:0.85rem;border:1px solid var(--parchment-edge,#c9a84c);border-radius:4px;background:var(--parchment,#f4e4c1);color:var(--ink,#3d2b1f)';

    // Header
    let html = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <button class="btn btn-secondary btn-small" onclick="app.cancelEncounterEdit()">&larr;</button>
        <h3 style="margin:0;flex:1;font-size:1rem">${isNew ? 'New Encounter' : 'Edit Encounter'}</h3>
        ${!isNew ? `<button class="btn btn-secondary btn-small" style="color:var(--burgundy)" onclick="app.deleteEncounter()" title="Delete">&#128465;</button>` : ''}
      </div>

      <label style="display:block;margin-bottom:10px">
        <span style="font-size:0.72rem;color:var(--ink-light)">Name</span>
        <input id="encName" type="text" value="${this.esc(d.name)}" placeholder="Goblin Ambush"
               oninput="app._encounterDraft.name=this.value" style="${inputStyle};margin-top:4px">
      </label>
      <label style="display:block;margin-bottom:12px">
        <span style="font-size:0.72rem;color:var(--ink-light)">Description (optional)</span>
        <textarea rows="2" placeholder="The party rounds a bend in the forest path…"
                  oninput="app._encounterDraft.description=this.value" style="${inputStyle};margin-top:4px;resize:vertical">${this.esc(d.description)}</textarea>
      </label>
    `;

    // Difficulty banner
    html += `
      <div style="padding:10px 12px;border-radius:6px;background:var(--parchment-dark);border:1px solid var(--parchment-edge);margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
          <div>
            <div style="font-size:0.7rem;color:var(--ink-light)">Difficulty</div>
            <div style="font-size:1.1rem;font-weight:bold;color:${diffColor}">
              ${diff ? `${diff.tier} (${diff.pct}%)` : '—'}
            </div>
          </div>
          <div style="text-align:right;font-size:0.7rem;color:var(--ink-light);line-height:1.5">
            Party total: <strong>${totals.party}</strong>${partyInfo.fallback ? ' <span style="color:var(--burgundy)">(est.)</span>' : ''}<br>
            Monster total: <strong>${totals.monsters}</strong><br>
            ${totals.count} ${totals.count === 1 ? 'creature' : 'creatures'}
          </div>
        </div>
        ${partyInfo.fallback ? '<div style="font-size:0.65rem;color:var(--burgundy);margin-top:6px">No player characters linked. Using Party Level × 4 as estimate.</div>' : ''}
      </div>
    `;

    // Selected monsters list
    html += '<h4 style="font-size:0.85rem;color:var(--burgundy);margin:0 0 8px">Monsters in this encounter</h4>';
    if ((d.monsters || []).length === 0) {
      html += `<div style="padding:14px;text-align:center;background:var(--parchment);border:1px dashed var(--parchment-edge);border-radius:6px;margin-bottom:14px;font-size:0.75rem;color:var(--ink-light)">
        Use the picker below to add monsters.
      </div>`;
    } else {
      html += '<div style="display:flex;flex-direction:column;gap:4px;margin-bottom:14px">';
      for (let i = 0; i < d.monsters.length; i++) {
        const entry = d.monsters[i];
        const lvl = this._entryLevel(entry, c);
        const kindLabel = entry.kind === 'legendary' ? '👑 ' : (entry.kind === 'npc' ? '🎭 ' : '');
        html += `
          <div class="monster-row" style="display:flex;justify-content:space-between;align-items:center;gap:8px">
            <div style="flex:1;min-width:0">
              <strong style="font-size:0.85rem">${kindLabel}${this.esc(entry.name)}</strong>
              <span style="font-size:0.7rem;color:var(--ink-light);margin-left:4px">Lvl ${lvl}</span>
            </div>
            <div style="display:flex;align-items:center;gap:4px">
              <button class="btn btn-secondary btn-small" style="padding:2px 8px;font-size:0.8rem;min-width:26px" onclick="app.adjustEntryCount(${i}, -1)">−</button>
              <span style="min-width:28px;text-align:center;font-weight:bold;font-size:0.9rem">${entry.count || 1}</span>
              <button class="btn btn-secondary btn-small" style="padding:2px 8px;font-size:0.8rem;min-width:26px" onclick="app.adjustEntryCount(${i}, 1)">+</button>
              <button class="btn btn-secondary btn-small" style="padding:2px 8px;font-size:0.7rem;color:var(--burgundy);margin-left:6px" onclick="app.removeEntry(${i})">&times;</button>
            </div>
          </div>`;
      }
      html += '</div>';
    }

    // Monster picker
    html += this._renderMonsterPicker(c);

    // Save button
    html += `
      <div style="display:flex;gap:8px;margin-top:16px">
        <button class="btn btn-secondary" style="flex:1" onclick="app.cancelEncounterEdit()">Cancel</button>
        <button class="btn btn-primary" style="flex:1" onclick="app.saveEncounter()">${isNew ? 'Create' : 'Save'}</button>
      </div>
      ${!isNew ? `
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn btn-secondary" style="flex:1" onclick="app.openMapPrep('${d.id}')">&#128506;&#65039; Prepare Map${c.encounters.find(x=>x.id===d.id)?.map ? ' &#10003;' : ''}</button>
          <button class="btn btn-primary" style="flex:1;background:var(--gold);color:var(--leather-dark)" onclick="app.startCombatFromEncounter('${d.id}')">&#9654; Start Combat</button>
        </div>` : ''}`;

    return html;
  },

  adjustEntryCount(i, delta) {
    const d = this._encounterDraft;
    if (!d || !d.monsters[i]) return;
    d.monsters[i].count = Math.max(1, (d.monsters[i].count || 1) + delta);
    this.render();
  },

  removeEntry(i) {
    const d = this._encounterDraft;
    if (!d) return;
    d.monsters.splice(i, 1);
    this.render();
  },

  addMonsterToEncounter(kind, id) {
    const d = this._encounterDraft;
    const c = this.getCampaign();
    if (!d || !c) return;
    // If already present, increment count
    const existing = d.monsters.find(m => m.kind === kind && m.id === id);
    if (existing) { existing.count = (existing.count || 1) + 1; this.render(); return; }
    // Snapshot name for display
    let name = '';
    if (kind === 'bestiary') name = (window.GM_DATA.MONSTERS.find(m => m.id === id) || {}).name || '';
    else if (kind === 'legendary') name = (window.GM_DATA.LEGENDARY_MONSTERS.find(m => m.id === id) || {}).name || '';
    else if (kind === 'npc') name = (c.npcs.find(n => n.id === id) || {}).name || '';
    d.monsters.push({ kind, id, count: 1, name });
    this.render();
  },

  setMonsterFilter(key, value) {
    if (!this._monsterFilter) this._monsterFilter = { search: '', group: '', type: 'bestiary', minLevel: '', maxLevel: '' };
    this._monsterFilter[key] = value;
    this.render();
    // Re-focus the search input so typing doesn't lose focus on every keystroke
    if (key === 'search') {
      const el = document.getElementById('monsterSearchInput');
      if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
    }
  },

  _renderMonsterPicker(c) {
    const f = this._monsterFilter || { search: '', group: '', type: 'bestiary', minLevel: '', maxLevel: '' };
    const inputStyle = 'padding:6px 8px;font-size:0.8rem;border:1px solid var(--parchment-edge,#c9a84c);border-radius:4px;background:var(--parchment,#f4e4c1);color:var(--ink,#3d2b1f)';
    const parseLvl = window.GM_DATA?.parseMonsterLevel || (x => +x || 0);

    let results = [];
    if (f.type === 'bestiary') {
      results = (window.GM_DATA?.MONSTERS || []).map(m => ({ kind: 'bestiary', id: m.id, name: m.name, level: m.level, group: m.group, hp: m.hp, armor: m.armor, isMinion: m.isMinion }));
    } else if (f.type === 'legendary') {
      results = (window.GM_DATA?.LEGENDARY_MONSTERS || []).map(m => ({ kind: 'legendary', id: m.id, name: m.name, level: m.level, group: 'legendary', hp: m.hp, armor: m.armor }));
    } else if (f.type === 'npc') {
      results = (c.npcs || []).map(n => ({ kind: 'npc', id: n.id, name: n.name, level: n.level, group: 'npc', hp: n.hp, armor: n.armor }));
    }

    // Apply filters
    const search = (f.search || '').toLowerCase().trim();
    if (search) results = results.filter(r => r.name.toLowerCase().includes(search));
    if (f.group) results = results.filter(r => r.group === f.group);
    const minL = f.minLevel !== '' ? parseLvl(f.minLevel) : null;
    const maxL = f.maxLevel !== '' ? parseLvl(f.maxLevel) : null;
    if (minL != null) results = results.filter(r => parseLvl(r.level) >= minL);
    if (maxL != null) results = results.filter(r => parseLvl(r.level) <= maxL);

    const groupOpts = Object.entries(window.GM_DATA?.MONSTER_GROUPS || {}).map(([gid, g]) => `<option value="${gid}" ${f.group === gid ? 'selected' : ''}>${this.esc(g.name)}</option>`).join('');

    let html = `
      <h4 style="font-size:0.85rem;color:var(--burgundy);margin:18px 0 6px">Add Monsters</h4>
      <div style="display:flex;gap:4px;margin-bottom:8px">
        <button class="btn btn-secondary btn-small ${f.type === 'bestiary' ? 'active-tab' : ''}" style="flex:1;font-size:0.7rem;padding:5px;${f.type === 'bestiary' ? 'background:var(--gold);color:var(--ink)' : ''}" onclick="app.setMonsterFilter('type','bestiary')">Bestiary</button>
        <button class="btn btn-secondary btn-small" style="flex:1;font-size:0.7rem;padding:5px;${f.type === 'legendary' ? 'background:var(--gold);color:var(--ink)' : ''}" onclick="app.setMonsterFilter('type','legendary')">Legendary</button>
        <button class="btn btn-secondary btn-small" style="flex:1;font-size:0.7rem;padding:5px;${f.type === 'npc' ? 'background:var(--gold);color:var(--ink)' : ''}" onclick="app.setMonsterFilter('type','npc')">NPCs</button>
      </div>
      <input id="monsterSearchInput" type="search" placeholder="Search…" value="${this.esc(f.search)}"
             oninput="app.setMonsterFilter('search', this.value)" style="${inputStyle};width:100%;margin-bottom:6px">
      <div style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:4px;margin-bottom:8px">
        ${f.type === 'bestiary' ? `<select onchange="app.setMonsterFilter('group', this.value)" style="${inputStyle}">
          <option value="">All groups</option>${groupOpts}
        </select>` : '<span></span>'}
        <input type="text" placeholder="Min lvl" value="${this.esc(f.minLevel)}"
               oninput="app.setMonsterFilter('minLevel', this.value)" style="${inputStyle}">
        <input type="text" placeholder="Max lvl" value="${this.esc(f.maxLevel)}"
               oninput="app.setMonsterFilter('maxLevel', this.value)" style="${inputStyle}">
      </div>
    `;

    if (results.length === 0) {
      html += `<div style="padding:14px;text-align:center;font-size:0.75rem;color:var(--ink-light)">No matches.</div>`;
    } else {
      html += '<div style="max-height:300px;overflow-y:auto;border:1px solid var(--parchment-edge);border-radius:4px;padding:4px">';
      // Show max 50 rows for performance
      const shown = results.slice(0, 50);
      for (const r of shown) {
        const lvl = r.level == null ? '—' : r.level;
        const armorBit = r.armor ? ` &middot; ${this.esc(r.armor)}` : '';
        const hpBit = r.isMinion ? 'minion' : (r.hp || '?');
        html += `
          <div onclick="app.addMonsterToEncounter('${r.kind}','${r.id}')"
               style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:6px 8px;border-bottom:1px solid var(--parchment-edge);cursor:pointer">
            <div style="flex:1;min-width:0">
              <strong style="font-size:0.8rem">${this.esc(r.name)}</strong>
              <span style="font-size:0.65rem;color:var(--ink-light);margin-left:6px">Lvl ${lvl} &middot; HP ${hpBit}${armorBit}</span>
            </div>
            <span style="color:var(--gold);font-weight:bold;font-size:1.1rem">+</span>
          </div>`;
      }
      html += '</div>';
      if (results.length > shown.length) {
        html += `<div style="font-size:0.65rem;color:var(--ink-light);text-align:center;margin-top:4px">Showing ${shown.length} of ${results.length}. Refine filters to see more.</div>`;
      }
    }

    return html;
  },

  // =========================================================
  //   LIVE COMBAT TRACKER (Fase 3)
  //   state.activeCombat = {
  //     id, campaignId, encounterId, encounterName,
  //     round, turnIndex,
  //     startedAt,
  //     participants: [
  //       { id, kind: 'pc'|'monster'|'legendary'|'npc',
  //         sourceKind: 'bestiary'|'legendary'|'npc'|'pc',
  //         sourceId, name, initiative,
  //         hp, maxHp, armor, speed, size, level,
  //         conditions: { name: true },
  //         notes,
  //         // snapshot of template for quick render during combat:
  //         trait, actions,
  //         // minion:
  //         isMinion, dead,
  //         // legendary:
  //         lastStandHp, phase: 'normal'|'bloodied'|'lastStand'|'dead',
  //         bloodied, inLastStand
  //       }
  //     ]
  //   }
  // =========================================================
  startCombatFromEncounter(encounterId) {
    // Locate encounter across all campaigns so this works from anywhere
    let c = null, e = null;
    for (const camp of (this.state.campaigns || [])) {
      const enc = (camp.encounters || []).find(x => x.id === encounterId);
      if (enc) { c = camp; e = enc; break; }
    }
    if (!c || !e) { this.toast('Encounter not found'); return; }

    if (this.state.activeCombat) {
      if (!confirm(`A combat is already running (${this.esc(this.state.activeCombat.encounterName || 'Encounter')}). End it and start a new one?`)) return;
    }

    const chars = this.state.characters || [];
    const linkedPCs = (c.playerCharIds || []).map(id => chars.find(ch => ch.id === id)).filter(Boolean);

    const participants = [];
    // Player characters go in first — live HP linked to their sheet.
    // Nimble rule: PCs roll initiative and tell the GM; we don't auto-roll. Entered in the initiative phase.
    for (const ch of linkedPCs) {
      participants.push({
        id: 'p_' + Math.random().toString(36).slice(2, 9),
        kind: 'pc',
        sourceKind: 'pc',
        sourceId: ch.id,
        name: ch.name,
        initiative: null,   // entered by GM after each player rolls
        hp: ch.hp ?? ch.maxHp ?? 0,
        maxHp: ch.maxHp ?? 0,
        armor: null, // handled by PC sheet; display-only
        level: ch.level || 1,
        conditions: {},
        notes: ''
      });
    }

    // Then monsters from the encounter.monsters array
    for (const entry of (e.monsters || [])) {
      const count = Math.max(1, entry.count || 1);
      if (entry.kind === 'bestiary') {
        const tpl = (window.GM_DATA?.MONSTERS || []).find(m => m.id === entry.id);
        if (!tpl) continue;
        for (let i = 0; i < count; i++) {
          const inst = this._mkMonsterParticipant(tpl, count > 1 ? (i + 1) : null);
          participants.push(inst);
        }
      } else if (entry.kind === 'legendary') {
        const tpl = (window.GM_DATA?.LEGENDARY_MONSTERS || []).find(m => m.id === entry.id);
        if (!tpl) continue;
        for (let i = 0; i < count; i++) {
          participants.push(this._mkLegendaryParticipant(tpl, count > 1 ? (i + 1) : null));
        }
      } else if (entry.kind === 'npc') {
        const tpl = (c.npcs || []).find(n => n.id === entry.id);
        if (!tpl) continue;
        for (let i = 0; i < count; i++) {
          participants.push(this._mkNPCParticipant(tpl, count > 1 ? (i + 1) : null));
        }
      }
    }

    // Nimble rule: enemies don't roll initiative. Regular monsters act as a group after all heroes;
    // legendary bosses act between each hero's turn. Display order: heroes (PCs + ally NPCs),
    // then legendaries, then enemy NPCs, monsters, minions. Hero order is chosen manually via ▲/▼.
    const sideOrder = (p) => {
      if (p.kind === 'pc') return 0;
      if (p.kind === 'npc' && p.role === 'ally') return 1;
      if (p.kind === 'legendary') return 2;
      if (p.kind === 'npc') return 3;
      if (p.kind === 'monster') return 4;
      return 5;
    };
    participants.sort((a, b) => sideOrder(a) - sideOrder(b));

    // Build initial combat map. If the encounter has a prepared map, copy token positions from it
    // via slot keys (stable across participant ID changes).
    const initialMap = this._initCombatMap(participants);
    if (e.map && e.map.tokens) {
      // Assign instance indices per (kind,sourceId) in order to match prep slot keys
      const groupCounters = {};
      for (const p of participants) {
        const baseKey = `${p.sourceKind || p.kind}:${p.sourceId}`;
        const isMulti = participants.filter(q =>
          (q.sourceKind || q.kind) === (p.sourceKind || p.kind) && q.sourceId === p.sourceId
        ).length > 1;
        if (isMulti) {
          groupCounters[baseKey] = (groupCounters[baseKey] || 0) + 1;
          p._slotKey = `${baseKey}:${groupCounters[baseKey]}`;
        } else {
          p._slotKey = `${baseKey}:0`;
        }
        // Match against prepared map
        const prepared = e.map.tokens[p._slotKey];
        if (prepared) initialMap.tokens[p.id] = { x: prepared.x, y: prepared.y };
      }
      initialMap.fog = { ...(e.map.fog || {}) };
      initialMap.walls = { ...(e.map.walls || {}) };
      if (e.map.width) initialMap.width = e.map.width;
      if (e.map.height) initialMap.height = e.map.height;
      if (e.map.gridType) initialMap.gridType = e.map.gridType;
      if (e.map.lightRadius !== undefined) initialMap.lightRadius = e.map.lightRadius;
    }

    this.state.activeCombat = {
      id: 'combat_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
      campaignId: c.id,
      encounterId: e.id,
      encounterName: e.name,
      round: 1,
      turnIndex: 0,
      phase: 'initiative',   // 'initiative' | 'active' — combat starts in initiative entry
      turnOrder: [],         // built on submitInitiatives; array of { type, pid? }
      startedAt: Date.now(),
      participants,
      // Fase 4 — Combat Map. 20×20 grid default (Nimble uses "spaces" = 1 square = 5 ft).
      // Tokens keyed by participant id with {x, y} in grid coords.
      map: initialMap
    };

    // Navigate to Combat tab
    this.state.gmView = 'combat';
    this.state.selectedCampaignId = null;   // exit the campaign (the combat is self-contained)
    this.state.editingEncounterId = null;
    this._encounterDraft = null;
    this.save();
    // GM subscribes to player-initiated moves so the map updates live when a player taps
    this.subscribeToPlayerMoves();
    this.render(true);
    this.toast('Combat started');
  },

  _rollD20() {
    return Math.floor(Math.random() * 20) + 1;
  },

  // True when the participant acts on the heroes' side (own turn slot, visible HP).
  _isHeroSide(p) {
    return p.kind === 'pc' || (p.kind === 'npc' && p.role === 'ally');
  },
  _isRegularEnemy(p) {
    if (p.kind === 'monster' || p.kind === 'minion') return true;
    if (p.kind === 'npc' && p.role !== 'ally') return true;
    return false;
  },

  // Build the round's turn order from participants.
  // Nimble (core-rules §Turn Order): players decide the turn order among themselves at combat start
  // and it stays fixed for the rest of combat. Initiative only determines STARTING ACTIONS, not order.
  // After each hero (PC or ally NPC) turn, every legendary boss acts. At the end of the round, all
  // regular monsters/minions + enemy NPCs act as a single "monsters" phase.
  _buildTurnOrder(participants) {
    const heroes = (participants || []).filter(p => this._isHeroSide(p));
    const legendaries = (participants || []).filter(p => p.kind === 'legendary');
    const hasRegularEnemies = (participants || []).some(p => this._isRegularEnemy(p));

    const order = [];
    for (const h of heroes) {
      order.push({ type: h.kind === 'npc' ? 'ally' : 'pc', pid: h.id });
      for (const leg of legendaries) {
        order.push({ type: 'legendary', pid: leg.id });
      }
    }
    if (hasRegularEnemies) order.push({ type: 'monsters' });
    // Edge case: no heroes but enemies exist — still give monsters a turn so combat can advance
    if (!heroes.length && !legendaries.length && hasRegularEnemies && order.length === 0) {
      order.push({ type: 'monsters' });
    }
    // Edge case: only legendaries, no heroes — give each legendary its own slot
    if (!heroes.length && legendaries.length) {
      for (const leg of legendaries) order.push({ type: 'legendary', pid: leg.id });
    }
    return order;
  },

  // Initiative roll → starting actions (core-rules §Starting Combat):
  // 1-9 = 1 action, 10-19 = 2 actions, 20+ = 3 actions. Back to 3 every subsequent turn.
  _startingActionsFor(init) {
    if (init == null || isNaN(init)) return 3;
    if (init >= 20) return 3;
    if (init >= 10) return 2;
    return 1;
  },

  _capturePendingInitiatives() {
    const combat = this.state.activeCombat;
    if (!combat) return;
    for (const p of combat.participants) {
      if (p.kind !== 'pc') continue;
      const inp = document.getElementById('init_' + p.id);
      if (!inp) continue;
      const raw = inp.value?.trim();
      if (!raw) continue;
      const n = parseInt(raw, 10);
      if (!isNaN(n)) p.initiative = n;
    }
  },

  // ▲/▼ to reorder heroes (PCs + ally NPCs). Turn order is manually set at combat start, then locked.
  movePcInitiative(pid, direction) {
    const combat = this.state.activeCombat;
    if (!combat || combat.phase !== 'initiative') return;
    // Save any typed init values before re-rendering so users don't lose their entries
    this._capturePendingInitiatives();

    const heroIds = combat.participants.filter(p => this._isHeroSide(p)).map(p => p.id);
    const pos = heroIds.indexOf(pid);
    if (pos < 0) return;
    const targetPos = pos + (direction === 'up' ? -1 : 1);
    if (targetPos < 0 || targetPos >= heroIds.length) return;

    // Swap the two participants in the full array so kind grouping is preserved
    const fromId = heroIds[pos], toId = heroIds[targetPos];
    const fromIdx = combat.participants.findIndex(p => p.id === fromId);
    const toIdx = combat.participants.findIndex(p => p.id === toId);
    [combat.participants[fromIdx], combat.participants[toIdx]] =
      [combat.participants[toIdx], combat.participants[fromIdx]];

    this.save();
    this.render();
  },

  submitInitiatives() {
    const combat = this.state.activeCombat;
    if (!combat || combat.phase !== 'initiative') return;

    // Read PC initiative inputs — required (used for starting action count).
    // Ally NPCs don't roll; GM controls them so they get full 3 actions.
    const pcs = combat.participants.filter(p => p.kind === 'pc');
    const updates = [];
    for (const pc of pcs) {
      const inp = document.getElementById('init_' + pc.id);
      const raw = inp?.value?.trim();
      if (!raw) { this.toast(`Enter initiative for ${pc.name}`); return; }
      const val = parseInt(raw, 10);
      if (isNaN(val)) { this.toast(`Invalid initiative for ${pc.name}`); return; }
      updates.push({ pid: pc.id, init: val });
    }
    for (const u of updates) {
      const p = combat.participants.find(x => x.id === u.pid);
      if (p) {
        p.initiative = u.init;
        // Starting actions apply only on round 1 per Nimble rules
        p.startingActions = this._startingActionsFor(u.init);
      }
    }

    // Keep participants in their current manual order inside each side group.
    // Stable sort on side only preserves the user-chosen hero order.
    const sideOrder = (p) => {
      if (p.kind === 'pc') return 0;
      if (p.kind === 'npc' && p.role === 'ally') return 1;
      if (p.kind === 'legendary') return 2;
      if (p.kind === 'npc') return 3;
      if (p.kind === 'monster') return 4;
      return 5;
    };
    combat.participants.sort((a, b) => sideOrder(a) - sideOrder(b));

    combat.turnOrder = this._buildTurnOrder(combat.participants);
    combat.phase = 'active';
    combat.turnIndex = 0;
    combat.round = 1;
    this.save();
    this.render();
    this.toast('Combat begins!');
  },

  _mkMonsterParticipant(tpl, seq) {
    const baseName = tpl.name + (seq ? ' #' + seq : '');
    const parsedHp = typeof tpl.hp === 'number' ? tpl.hp : parseInt(tpl.hp, 10);
    const hp = tpl.isMinion ? 1 : (isNaN(parsedHp) ? 0 : parsedHp);
    return {
      id: 'p_' + Math.random().toString(36).slice(2, 9),
      kind: tpl.isMinion ? 'minion' : 'monster',
      sourceKind: 'bestiary',
      sourceId: tpl.id,
      name: baseName,
      initiative: 0,                     // Nimble: enemies don't roll; monsters act as a group at end of round
      hp, maxHp: hp,
      armor: tpl.armor || null,
      level: tpl.level,
      size: tpl.size,
      speed: tpl.speed,
      trait: tpl.trait,
      actions: tpl.actions,
      conditions: {},
      notes: '',
      isMinion: !!tpl.isMinion,
      dead: false
    };
  },

  _mkLegendaryParticipant(tpl, seq) {
    const baseName = tpl.name + (seq ? ' #' + seq : '');
    const hp = tpl.hp || 0;
    // Try to read lastStand HP from the trait text (pattern "X more damage and"), fallback to 20% of max
    let lastStandHp = Math.round(hp * 0.2);
    const ls = (tpl.lastStand || '').match(/(\d+)\s*more\s*damage/i);
    if (ls) lastStandHp = parseInt(ls[1], 10);
    return {
      id: 'p_' + Math.random().toString(36).slice(2, 9),
      kind: 'legendary',
      sourceKind: 'legendary',
      sourceId: tpl.id,
      name: baseName,
      initiative: 0,                     // legendaries act between each PC turn (boss pacing); no roll
      hp, maxHp: hp,
      armor: tpl.armor || null,
      level: tpl.level,
      size: tpl.size,
      saves: tpl.saves,
      trait: tpl.trait,
      actionsList: tpl.actions || [],
      bloodiedDesc: tpl.bloodied,
      lastStandDesc: tpl.lastStand,
      lastStandHp,
      phase: 'normal',       // 'normal' | 'bloodied' | 'lastStand' | 'dead'
      bloodied: false,
      inLastStand: false,
      conditions: {},
      notes: ''
    };
  },

  _mkNPCParticipant(npc, seq) {
    const baseName = npc.name + (seq ? ' #' + seq : '');
    const role = npc.role === 'ally' ? 'ally' : 'enemy';
    return {
      id: 'p_' + Math.random().toString(36).slice(2, 9),
      kind: 'npc',
      role,                             // 'ally' acts with heroes; 'enemy' acts with the monster group
      sourceKind: 'npc',
      sourceId: npc.id,
      name: baseName,
      initiative: 0,                    // Allies get their own slot; enemies act with the monster phase
      hp: npc.hp || 0, maxHp: npc.maxHp || npc.hp || 0,
      armor: npc.armor || null,
      level: npc.level,
      size: npc.size,
      speed: npc.speed,
      trait: npc.trait,
      actions: npc.actions,
      conditions: {},
      notes: npc.notes || ''
    };
  },

  // ---- Fase 4: Combat Map ----
  // Auto-distribute tokens. PCs line up at the top edge, monsters at the bottom.
  // Fase 4.5: fog/walls are sparse objects keyed by "x,y" so the Firestore doc stays small.
  // ---- Map prep (Fase 3 #10) ----
  // Lets a GM place tokens and paint fog/walls on an encounter's map BEFORE starting combat.
  // encounter.map = { width, height, tokens: { slotKey: {x,y} }, fog, walls }
  // slotKey is stable across combats: "pc:<charId>:0" / "bestiary:<id>:<instance>" / etc.
  _previewEncounterParticipants(c, e) {
    const out = [];
    const chars = this.state.characters || [];
    for (const charId of (c.playerCharIds || [])) {
      const ch = chars.find(x => x.id === charId);
      if (!ch) continue;
      out.push({ id: 'pc:' + ch.id + ':0', kind: 'pc', name: ch.name });
    }
    for (const entry of (e.monsters || [])) {
      const count = Math.max(1, entry.count || 1);
      for (let i = 1; i <= count; i++) {
        const suffix = count > 1 ? ' #' + i : '';
        const instanceLabel = count > 1 ? i : 0;
        const name = (entry.name || '(unnamed)') + suffix;
        const slotKey = `${entry.kind}:${entry.id}:${instanceLabel}`;
        if (entry.kind === 'bestiary') {
          out.push({ id: slotKey, kind: 'monster', name });
        } else if (entry.kind === 'legendary') {
          out.push({ id: slotKey, kind: 'legendary', name });
        } else if (entry.kind === 'npc') {
          const npc = (c.npcs || []).find(n => n.id === entry.id);
          out.push({ id: slotKey, kind: 'npc', role: npc?.role || 'enemy', name });
        }
      }
    }
    return out;
  },

  openMapPrep(encId) {
    const c = this.getCampaign();
    if (!c) return;
    const e = (c.encounters || []).find(x => x.id === encId);
    if (!e) { this.toast('Encounter not found'); return; }
    if (!(e.monsters || []).length) { this.toast('Add monsters before preparing the map'); return; }

    const participants = this._previewEncounterParticipants(c, e);
    // Use existing encounter.map or auto-place
    const base = this._initCombatMap(participants);  // will auto-place based on hero/non-hero
    const stored = e.map || {};
    const map = {
      width: stored.width || base.width,
      height: stored.height || base.height,
      tokens: { ...base.tokens, ...(stored.tokens || {}) },   // prefer stored positions
      fog: { ...(stored.fog || {}) },
      walls: { ...(stored.walls || {}) }
    };
    this._mapPrep = {
      encounterId: encId,
      campaignId: c.id,
      participants,
      map,
      selectedTokenId: null,
      paintMode: 'select'
    };
    this.render(true);
  },

  cancelMapPrep() {
    this._mapPrep = null;
    this.render(true);
  },

  saveMapPrep() {
    const mp = this._mapPrep;
    if (!mp) return;
    const c = (this.state.campaigns || []).find(x => x.id === mp.campaignId);
    if (!c) return;
    const e = (c.encounters || []).find(x => x.id === mp.encounterId);
    if (!e) return;
    e.map = {
      width: mp.map.width,
      height: mp.map.height,
      gridType: mp.map.gridType || 'square',
      lightRadius: mp.map.lightRadius || 0,
      tokens: { ...mp.map.tokens },
      fog: { ...mp.map.fog },
      walls: { ...mp.map.walls }
    };
    e.updatedAt = Date.now();
    c.updatedAt = Date.now();
    this._mapPrep = null;
    this.save();
    this.toast('Map prepared');
    this.render(true);
  },

  // Prep-mode versions of map interactions (route via this._mapPrep instead of state.activeCombat)
  mapPrepSelectToken(pid) {
    if (!this._mapPrep) return;
    this._mapPrep.selectedTokenId = this._mapPrep.selectedTokenId === pid ? null : pid;
    this._mapPrep.paintMode = 'select';
    this.render();
  },
  mapPrepMoveCell(x, y) {
    if (!this._mapPrep || !this._mapPrep.selectedTokenId) return;
    this._mapPrep.map.tokens[this._mapPrep.selectedTokenId] = { x, y };
