<!-- Firebase SDK (loaded as ES modules from Google CDN).
     Exposes a handful of helpers via window.firebaseSync so the main (non-module)
     <script> below can use them. Dispatches 'firebase-ready' when initialized so the
     app knows when it can wire up auth. If this script fails (offline, CDN blocked),
     the app falls back to local-only mode and still works. -->
<script type="module">
  try {
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js");
    const { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } =
      await import("https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js");
    const { getFirestore, doc, setDoc, getDoc, onSnapshot, serverTimestamp, collection } =
      await import("https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js");

    const firebaseConfig = {
      apiKey: "AIzaSyB509GZ41Ue7c0U0NXtzhSxUyDJpp7Rb04",
      authDomain: "nimble-companion.firebaseapp.com",
      projectId: "nimble-companion",
      storageBucket: "nimble-companion.firebasestorage.app",
      messagingSenderId: "1089252770378",
      appId: "1:1089252770378:web:fc9a820743a8e985229cb3"
    };

    const fbApp = initializeApp(firebaseConfig);
    const auth = getAuth(fbApp);
    const db = getFirestore(fbApp);
    const googleProvider = new GoogleAuthProvider();

    window.firebaseSync = {
      auth, db, googleProvider,
      signInWithPopup, signOut, onAuthStateChanged,
      doc, setDoc, getDoc, onSnapshot, serverTimestamp, collection
    };
    window.dispatchEvent(new Event('firebase-ready'));
  } catch (err) {
    console.warn('Firebase SDK failed to load — running in local-only mode.', err);
    window.firebaseSync = null;
    window.dispatchEvent(new Event('firebase-failed'));
  }
</script>
<style>
/* ============================================================
   CSS RESET & ROOT
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --parchment: #f4e4c1;
  --parchment-dark: #e8d5a8;
  --parchment-edge: #d4be8a;
  --ink: #3d2b1f;
  --ink-light: #5a4234;
  --burgundy: #8b1a1a;
  --burgundy-dark: #6e1515;
  --burgundy-light: #a52a2a;
  --gold: #c9a84c;
  --gold-light: #dfc06a;
  --leather: #5c3d2e;
  --leather-dark: #3d2b1f;
  --success: #2d5a27;
  --danger: #8b1a1a;
  --white: #faf6ee;
  --shadow: rgba(61, 43, 31, 0.3);
  --tab-height: 60px;
  --header-height: 50px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  color: var(--ink);
  background: var(--leather-dark);
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  touch-action: manipulation;
}

/* Parchment texture via CSS */
.parchment-bg {
  background:
    radial-gradient(ellipse at 20% 50%, rgba(139, 26, 26, 0.03) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(201, 168, 76, 0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(92, 61, 46, 0.04) 0%, transparent 50%),
    linear-gradient(180deg, #f4e4c1 0%, #eddbb2 40%, #e8d5a8 70%, #e0cda0 100%);
  background-color: var(--parchment);
}

/* ============================================================
   TYPOGRAPHY
   ============================================================ */
h1, h2, h3, h4 { font-family: Georgia, 'Times New Roman', serif; color: var(--ink); }
h1 { font-size: 1.6rem; }
h2 { font-size: 1.3rem; }
h3 { font-size: 1.1rem; }

/* ============================================================
   APP LAYOUT
   ============================================================ */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 500px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
}

.app-header {
  height: var(--header-height);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 16px;
  background: var(--leather-dark);
  color: var(--parchment);
  font-family: Georgia, serif;
  font-size: 1.1rem;
  position: relative;
  z-index: 10;
  flex-shrink: 0;
}

.app-header .back-btn {
  position: absolute;
  left: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--gold);
  font-size: 1.4rem;
  cursor: pointer;
  padding: 8px;
  min-width: 44px;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.app-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}

/* ============================================================
   BOTTOM TAB NAV
   ============================================================ */
.tab-nav {
  display: flex;
  height: var(--tab-height);
  background: var(--leather-dark);
  border-top: 2px solid var(--leather);
  padding-bottom: var(--safe-bottom);
  flex-shrink: 0;
  z-index: 10;
}

.tab-nav button {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  background: none;
  border: none;
  color: var(--parchment-edge);
  font-size: 0.65rem;
  cursor: pointer;
  padding: 4px 2px;
  transition: color 0.2s, transform 0.1s;
  min-height: 44px;
}
.tab-nav button .tab-icon { font-size: 1.3rem; line-height: 1; }
.tab-nav button.active { color: var(--gold); }
.tab-nav button:active { transform: scale(0.92); }

/* ============================================================
   VIEW TRANSITIONS
   ============================================================ */
.view { display: none; min-height: 100%; }
.view.active { display: block; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 12px 20px;
  border: 2px solid var(--leather);
  border-radius: 8px;
  font-size: 0.95rem;
  font-family: Georgia, serif;
  cursor: pointer;
  min-height: 44px;
  min-width: 44px;
  transition: transform 0.1s, box-shadow 0.15s;
  text-decoration: none;
}
.btn:active { transform: scale(0.95); }

.btn-primary {
  background: var(--burgundy);
  color: var(--parchment);
  border-color: var(--burgundy-dark);
  box-shadow: 0 2px 4px var(--shadow);
}
.btn-primary:active { background: var(--burgundy-dark); }

.btn-secondary {
  background: var(--parchment-dark);
  color: var(--ink);
  border-color: var(--leather);
}

.btn-small {
  padding: 6px 12px;
  font-size: 0.8rem;
  min-height: 36px;
}

.btn-icon {
  width: 44px;
  height: 44px;
  padding: 0;
  border-radius: 50%;
  font-size: 1.2rem;
}

.btn-gold {
  background: var(--gold);
  color: var(--ink);
  border-color: var(--leather);
}

.btn-block { width: 100%; }

.btn-danger {
  background: var(--danger);
  color: var(--parchment);
  border-color: #5a1010;
}

/* ============================================================
   CARDS
   ============================================================ */
.card {

  content: '';

}

/* ============================================================
   CHARACTERS VIEW
   ============================================================ */

.char-card {

  align-items: center;

}
.char-card:active { transform: scale(0.98); }

.char-avatar {

  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  color: var(--leather);

}
.char-avatar img { width: 100%; height: 100%; object-fit: cover; }

.char-info { flex: 1; min-width: 0; }
.char-info h3 { font-size: 1rem; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.char-info p { font-size: 0.8rem; color: var(--ink-light); margin: 0; }

.char-delete {
  position: absolute;
  right: -60px;
  top: 0;
  bottom: 0;

  background: var(--danger);

  border: none;

}
.char-card.swiped .char-delete { right: 0; }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--ink-light);
}
.empty-state .icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.5; }
.empty-state p { margin-bottom: 20px; font-style: italic; font-family: Georgia, serif; }

/* ============================================================
   CHARACTER SHEET
   ============================================================ */
.sheet-header {
  text-align: center;
  padding: 20px 16px;
  background: linear-gradient(180deg, var(--leather-dark) 0%, var(--leather) 100%);
  color: var(--parchment);
}

.sheet-avatar {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 4px solid var(--gold);
  margin: 0 auto 10px;
  background: var(--parchment-dark);
  display: flex;
  align-items: center;
  justify-content: center;

}
.sheet-avatar img { width: 100%; height: 100%; object-fit: cover; }
.sheet-avatar::after {

.sheet-name { font-size: 1.4rem; font-family: Georgia, serif; margin-bottom: 4px; }

.sheet-body { padding: 12px; }

.section-title {
  font-family: Georgia, serif;
  font-size: 1rem;

  border-bottom: 2px solid var(--parchment-edge);

.stat-box {

}

.stat-label {

}

.stat-value {

  font-family: Georgia, serif;
  font-weight: bold;

}

.stat-value .tracker-btn {

  height: 20px !important;

}

.stat-save {

  margin-top: 2px;
  color: var(--ink-light);
}
.stat-save .adv { color: var(--success); }
.stat-save .dis { color: var(--danger); }

/* HP & Resource Trackers */
.tracker-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.tracker-label {
  font-size: 0.8rem;
  font-weight: bold;
  min-width: 60px;
  color: var(--ink);
}

.tracker-controls {
  display: flex;
  align-items: center;
  gap: 4px;
}

.tracker-btn {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid var(--leather);
  background: var(--parchment-dark);
  color: var(--ink);

  justify-content: center;

.tracker-btn:active { transform: scale(0.9); }

.tracker-value {

.tracker-value.tappable { cursor: pointer; text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 3px; }
.adjust-row { display: flex; align-items: center; gap: 6px; }
.adjust-row input {

.adjust-row button {

.adjust-row .adj-apply { background: var(--success); color: var(--parchment); }
.adjust-row .adj-minus { background: var(--burgundy); color: var(--parchment); min-width: 36px; font-size: 1rem; }
.adjust-row .adj-plus { background: var(--success); color: var(--parchment); min-width: 36px; font-size: 1rem; }

/* Wounds */
.wounds-row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.wound-circle {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2px solid var(--leather);
  background: var(--parchment);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  transition: transform 0.1s, background 0.2s;
}
.wound-circle:active { transform: scale(0.9); }
.wound-circle.filled { background: var(--burgundy); color: var(--parchment); }

}
.wound-circle.bonus.filled { background: rgba(139, 26, 26, 0.55); opacity: 0.85; }
.wound-circle.bonus.death { border-color: var(--danger); border-style: dashed; }

.skills-grid {

  grid-template-columns: repeat(2, 1fr);

.skill-item {

.collapsible-header {

  padding: 10px 12px;
  background: var(--parchment);
  border: 1px solid var(--parchment-edge);
  border-radius: 6px;
  margin-bottom: 4px;
  min-height: 44px;
  transition: transform 0.1s;
}
.collapsible-header:active { transform: scale(0.98); }
.collapsible-header h4 { font-size: 0.9rem; }
.collapsible-arrow { transition: transform 0.2s; }
.collapsible-header.open .collapsible-arrow { transform: rotate(180deg); }

.collapsible-body {
  display: none;
  padding: 8px 12px;
  font-size: 0.85rem;
  line-height: 1.5;
  color: var(--ink-light);
  border-left: 3px solid var(--gold);
  margin: 0 0 8px 12px;
}
.collapsible-body.open { display: block; animation: fadeIn 0.2s; }

/* Ability group sub-headers (Active / Passive / Reference) */
.ability-group-header {
  display: flex;
  align-items: center;
  gap: 6px;

  font-family: Georgia, serif;
  color: var(--burgundy);
  font-weight: bold;
  margin: 14px 0 6px;
  padding: 4px 6px 4px 0;
  border-bottom: 1px dashed var(--parchment-edge);
}
.ability-group-header .ability-group-icon { font-size: 0.9rem; }
.ability-group-header .ability-group-count { font-size: 0.7rem; color: var(--ink-light); font-weight: normal; margin-left: 4px; }

.ability-group-header.ref-collapsible.open .collapsible-arrow { transform: rotate(180deg); }
.ability-group-header.ref-collapsible + .collapsible-body { display: none; margin: 0; padding: 0; border-left: none; }

/* Spell modifier sub-notes */
.spell-modifier-note {
  margin-top: 6px;
  padding: 6px 8px;
  background: rgba(201, 168, 76, 0.15);
  border-left: 3px solid var(--gold);
  border-radius: 4px;
  font-size: 0.7rem;
  color: var(--ink);
}
.spell-modifier-note .modifier-name {
  font-weight: bold;
  color: var(--burgundy);
  margin-bottom: 2px;
  display: block;
}

/* Spells */
.spell-tier-title {
  font-size: 0.85rem;
  color: var(--burgundy);
  font-family: Georgia, serif;
  margin: 12px 0 6px;
  padding-left: 4px;
}
.spell-school-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  padding: 8px 12px;
  background: var(--parchment);
  border: 1px solid var(--parchment-edge);
  border-radius: 6px;
  margin-bottom: 4px;
  min-height: 40px;
  transition: transform 0.1s;
}
.spell-school-header:active { transform: scale(0.98); }
.spell-school-header h4 { font-size: 0.85rem; margin: 0; }
.spell-school-header.open .collapsible-arrow { transform: rotate(180deg); }
.spell-school-header .spell-count { font-size: 0.7rem; color: var(--ink-light); margin-left: 6px; }
.spell-school-body {
  display: none;
  padding: 4px 0 4px 8px;
  margin: 0 0 8px 0;
  border-left: 3px solid var(--gold);
}
.spell-school-body.open { display: block; animation: fadeIn 0.2s; }

.spell-card {
  padding: 10px;
  background: var(--parchment);
  border: 1px solid var(--parchment-edge);
  border-radius: 6px;
  margin-bottom: 6px;
}
.spell-card h4 { font-size: 0.85rem; color: var(--burgundy); margin-bottom: 4px; }
.spell-meta { font-size: 0.7rem; color: var(--ink-light); margin-bottom: 4px; }
.spell-desc { font-size: 0.8rem; line-height: 1.4; }

.inventory-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  background: var(--parchment);
  border: 1px solid var(--parchment-edge);
  border-radius: 6px;
  margin-bottom: 4px;
  min-height: 40px;

.inventory-item .item-name { font-size: 0.85rem; flex: 1; }
.inventory-item .item-slots { font-size: 0.7rem; color: var(--ink-light); margin-right: 8px; }

.inventory-add {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}
.inventory-add input {
  flex: 1;
  padding: 8px 12px;
  border: 2px solid var(--parchment-edge);
  border-radius: 6px;
  font-size: 0.85rem;
  background: var(--parchment);
  color: var(--ink);
  min-height: 44px;
}
.inventory-add input::placeholder { color: var(--parchment-edge); }

/* Notes textarea */
.notes-area {
  width: 100%;
  min-height: 120px;
  padding: 12px;
  border: 2px solid var(--parchment-edge);
  border-radius: 8px;
  font-size: 0.85rem;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: var(--parchment);
  color: var(--ink);
  resize: vertical;
  line-height: 1.5;
}

/* ============================================================
   COMBAT TRACKER
   ============================================================ */
.combat-view { padding: 16px; }

.action-tokens {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin: 16px 0;
}

.action-token {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: 3px solid var(--gold);
  background: radial-gradient(circle, var(--parchment) 0%, var(--parchment-dark) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  font-family: Georgia, serif;
  font-weight: bold;
  color: var(--ink);
  cursor: pointer;
  transition: transform 0.15s, opacity 0.2s;
  box-shadow: 0 3px 8px var(--shadow);
  text-align: center;
  line-height: 1.1;
}
.action-token:active { transform: scale(0.92); }
.action-token.spent {
  opacity: 0.3;
  border-color: var(--leather);
  background: var(--parchment-edge);
  text-decoration: line-through;
}
.action-token.locked {
  background: repeating-linear-gradient(
    45deg,
    var(--parchment-edge),
    var(--parchment-edge) 4px,
    var(--parchment-dark) 4px,
    var(--parchment-dark) 8px
  );
  border-color: var(--ink-light);
  border-style: dashed;
  color: var(--ink-light);
  cursor: not-allowed;
  font-size: 0.7rem;
  opacity: 0.65;
}

.reaction-list { margin: 12px 0; }

.reaction-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  background: var(--parchment);
  border: 1px solid var(--parchment-edge);
  border-radius: 6px;
  margin-bottom: 4px;
  cursor: pointer;
  min-height: 44px;
  transition: transform 0.1s;
}
.reaction-item:active { transform: scale(0.98); }
.reaction-item.used { opacity: 0.4; text-decoration: line-through; }
.reaction-item .cost { font-size: 0.7rem; color: var(--ink-light); }

.combat-buttons {
  display: flex;
  gap: 8px;
  margin: 16px 0;
}

.initiative-result {
  text-align: center;
  padding: 12px;
  margin: 12px 0;
  font-family: Georgia, serif;
}
.initiative-result .roll-value {
  font-size: 2rem;
  color: var(--gold);
  font-weight: bold;
}
.initiative-result .actions-text {
  font-size: 0.85rem;
  color: var(--ink-light);
  margin-top: 4px;
}

.conditions-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}

.condition-tag {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 0.75rem;
  border: 1px solid var(--parchment-edge);
  background: var(--parchment);
  cursor: pointer;
  transition: transform 0.1s;
  min-height: 32px;
  display: flex;
  align-items: center;
}
.condition-tag:active { transform: scale(0.95); }
.condition-tag.active {
  background: var(--burgundy);
  color: var(--parchment);
  border-color: var(--burgundy-dark);
}

.active-conditions {
  margin-top: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.active-condition-item {
  padding: 8px 10px;
  background: rgba(139, 26, 26, 0.08);
  border-left: 3px solid var(--burgundy);
  border-radius: 4px;
}
.active-condition-name {
  font-weight: bold;
  color: var(--burgundy);
  font-size: 0.85rem;
  margin-bottom: 2px;
}
.active-condition-desc {
  font-size: 0.75rem;
  color: var(--ink);
  line-height: 1.35;
}

/* Combat quick-access abilities & spells */
.combat-ability-card, .combat-spell-card {
  padding: 6px 10px;
  background: var(--parchment);
  border: 1px solid var(--parchment-edge);
  border-radius: 6px;
  margin-bottom: 4px;
  font-size: 0.75rem;
  cursor: pointer;
}
.combat-ability-card:active, .combat-spell-card:active { transform: scale(0.98); }
.combat-ability-card.open, .combat-spell-card.open { background: var(--parchment-dark); }
.combat-ability-header, .combat-spell-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 6px;
}
.combat-ability-name, .combat-spell-name {
  font-weight: bold;
  color: var(--ink);
}
.combat-ability-meta, .combat-spell-meta {
  font-size: 0.65rem;
  color: var(--ink-light);
  white-space: nowrap;
}
.combat-ability-desc, .combat-spell-desc {
  margin-top: 4px;
  font-size: 0.7rem;
  color: var(--ink);
  line-height: 1.35;
  display: none;
}
.combat-ability-card.open .combat-ability-desc,
.combat-spell-card.open .combat-spell-desc { display: block; }

/* ============================================================
   DICE ROLLER
   ============================================================ */
.dice-view { padding: 16px; text-align: center; }

.dice-display {
  --outer-color: var(--leather);
  --inner-color: var(--parchment);
  --die-shape: polygon(5% 5%, 95% 5%, 95% 95%, 5% 95%);
  width: 120px;
  height: 120px;
  margin: 20px auto;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  font-family: Georgia, serif;
  font-weight: bold;
  color: var(--gold);
  background: transparent;
  border: none;
  filter: drop-shadow(0 4px 12px var(--shadow));
  position: relative;
}
.dice-display::before, .dice-display::after {
  content: '';
  position: absolute;
  clip-path: var(--die-shape);
}
.dice-display::before {
  inset: 0;
  background: var(--outer-color);
  z-index: 0;
}
.dice-display::after {
  inset: 4px;
  background: var(--inner-color);
  z-index: 1;
}
.dice-display > .dice-display-label {
  position: relative;
  z-index: 2;
}

.dice-display.rolling {
  animation: diceShake 0.4s ease;
}

@keyframes diceShake {
  0% { transform: rotate(0deg) scale(1); }
  15% { transform: rotate(-15deg) scale(1.05); }
  30% { transform: rotate(10deg) scale(0.95); }
  45% { transform: rotate(-10deg) scale(1.05); }
  60% { transform: rotate(8deg) scale(0.98); }
  75% { transform: rotate(-5deg) scale(1.02); }
  100% { transform: rotate(0deg) scale(1); }
}

/* Dice Roll Animation Overlay */
.dice-anim-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.6); z-index: 10000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  animation: fadeIn 0.15s ease;
  pointer-events: all;
}
.dice-anim-overlay.settling .dice-anim-die { animation: diceLand 0.3s ease forwards; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
@keyframes diceTumble {
  0% { transform: rotate(0deg) scale(0.8); }
  20% { transform: rotate(72deg) scale(1.1); }
  40% { transform: rotate(144deg) scale(0.9); }
  60% { transform: rotate(216deg) scale(1.05); }
  80% { transform: rotate(288deg) scale(0.95); }
  100% { transform: rotate(360deg) scale(0.8); }
}
@keyframes diceLand {
  0% { transform: rotate(10deg) scale(1.05); }
  50% { transform: rotate(-3deg) scale(1.15); }
  100% { transform: rotate(0deg) scale(1); }
}
.dice-anim-tray {
  display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
  max-width: 320px; margin-bottom: 16px;
}
.dice-anim-die {
  --outer-color: var(--gold);
  --inner-color: var(--parchment);
  --text-color: var(--ink);
  --die-shape: polygon(5% 5%, 95% 5%, 95% 95%, 5% 95%);  /* default = square */
  position: relative;
  width: 56px; height: 56px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; font-weight: bold; font-family: Georgia, serif;
  color: var(--text-color);
  background: transparent; border: none;
  filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.4));
  animation: diceTumble 0.3s linear infinite;
}
.dice-anim-die::before,
.dice-anim-die::after {
  content: '';
  position: absolute;
  clip-path: var(--die-shape);
}
.dice-anim-die::before {  /* outer gold silhouette */
  inset: 0;
  background: var(--outer-color);
  z-index: 0;
}
.dice-anim-die::after {   /* inner parchment fill (3px inset → acts like a border) */
  inset: 3px;
  background: var(--inner-color);
  z-index: 1;
}
.dice-anim-die .dice-num {
  position: relative;
  z-index: 2;
  pointer-events: none;
}
.dice-anim-die.settled {
  animation: none;
  filter: drop-shadow(0 0 8px rgba(201,168,76,0.6));
}
.dice-anim-die.crit   { --outer-color: #d4af37; --inner-color: #fff8dc; --text-color: var(--burgundy); }
.dice-anim-die.fumble { --outer-color: var(--burgundy); --inner-color: #3d2b1f; --text-color: var(--parchment); }
.dice-anim-die.dropped { opacity: 0.35; text-decoration: line-through; }

/* Polygon shapes per die type (for both animation + static display) */
.shape-d4   { --die-shape: polygon(50% 4%, 2% 96%, 98% 96%); }
.shape-d6   { --die-shape: polygon(5% 5%, 95% 5%, 95% 95%, 5% 95%); }
.shape-d8   { --die-shape: polygon(50% 2%, 98% 50%, 50% 98%, 2% 50%); }
.shape-d10  { --die-shape: polygon(50% 2%, 96% 38%, 80% 96%, 20% 96%, 4% 38%); }
.shape-d12  { --die-shape: polygon(50% 2%, 96% 27%, 96% 73%, 50% 98%, 4% 73%, 4% 27%); }
.shape-d20  { --die-shape: polygon(27% 3%, 73% 3%, 97% 50%, 73% 97%, 27% 97%, 3% 50%); }
.shape-d100 { --die-shape: polygon(32% 3%, 68% 3%, 97% 32%, 97% 68%, 68% 97%, 32% 97%, 3% 68%, 3% 32%); }
.dice-anim-label {
  font-size: 0.8rem; color: var(--parchment); font-family: Georgia, serif;
  margin-bottom: 8px; text-align: center;
}
.dice-anim-total {
  font-size: 2rem; font-weight: bold; color: var(--gold); font-family: Georgia, serif;
  text-shadow: 1px 2px 4px rgba(0,0,0,0.5);
  opacity: 0; transition: opacity 0.3s;
}
.dice-anim-total.visible { opacity: 1; }
.dice-anim-subtitle {
  font-size: 0.75rem; color: var(--parchment-dark); font-family: Georgia, serif;
  margin-top: 4px; text-align: center;
}

.dice-selector {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin: 16px 0;
}

.dice-btn {
  width: 52px;
  height: 52px;
  border-radius: 10px;
  border: 2px solid var(--leather);
  background: var(--parchment);
  font-family: Georgia, serif;
  font-size: 0.8rem;
  font-weight: bold;
  color: var(--ink);
  cursor: pointer;
  transition: transform 0.1s;
}
.dice-btn:active { transform: scale(0.92); }
.dice-btn.selected {
  background: var(--burgundy);
  color: var(--parchment);
  border-color: var(--burgundy-dark);
}

.dice-options {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 12px;
  margin: 12px 0;
  flex-wrap: wrap;
}
.dice-option-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.dice-option-label {
  font-size: 0.65rem;
  font-weight: bold;
  color: var(--ink-light);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.num-dice {
  display: flex;
  align-items: center;
  gap: 6px;
}
.num-dice span { font-size: 1.1rem; font-weight: bold; min-width: 24px; text-align: center; }

.adv-toggle {
  display: flex;
  gap: 4px;
}
.adv-toggle button {
  padding: 6px 10px;
  border: 2px solid var(--parchment-edge);
  border-radius: 6px;
  background: var(--parchment);
  font-size: 0.7rem;
  cursor: pointer;
  min-height: 36px;
  color: var(--ink);
}
.adv-toggle button.active-adv { background: var(--success); color: white; border-color: #1e4a1a; }
.adv-toggle button.active-dis { background: var(--danger); color: white; border-color: #5a1010; }

.roll-history {
  text-align: left;
  margin-top: 20px;
}
.roll-history-item {
  padding: 8px 10px;
  border-bottom: 1px solid var(--parchment-edge);
  font-size: 0.8rem;
}
.roll-history-item .roll-dice-type { font-weight: bold; color: var(--burgundy); }
.roll-history-item .roll-results { color: var(--ink-light); }
.roll-history-item .roll-total { font-weight: bold; color: var(--gold); font-family: Georgia, serif; float: right; }

/* ============================================================
   RULES REFERENCE
   ============================================================ */
.rules-view { padding: 16px; }

.rules-search {
  width: 100%;
  padding: 10px 14px;
  border: 2px solid var(--parchment-edge);
  border-radius: 8px;
  font-size: 0.9rem;
  background: var(--parchment);
  color: var(--ink);
  margin-bottom: 16px;
  min-height: 44px;
}

.rules-section { margin-bottom: 10px; }

.rules-collapsible-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  padding: 10px 12px;
  background: var(--parchment-dark);
  border: 1px solid var(--parchment-edge);
  border-radius: 6px;
  min-height: 44px;
  transition: transform 0.1s;
}
.rules-collapsible-header:active { transform: scale(0.98); }
.rules-collapsible-header h4 {
  font-size: 0.95rem;
  color: var(--burgundy);
  font-family: Georgia, serif;
  margin: 0;
}
.rules-collapsible-header .rules-count {
  font-size: 0.7rem;
  color: var(--ink-light);
  font-weight: normal;
  margin-left: 4px;
}
.rules-collapsible-header .collapsible-arrow { transition: transform 0.2s; }
.rules-collapsible-header.open .collapsible-arrow { transform: rotate(180deg); }
.rules-collapsible-body {
  display: none;
  padding: 10px 6px 6px;
}
.rules-collapsible-body.open { display: block; animation: fadeIn 0.2s; }

.rule-item {
  padding: 10px 12px;
  background: var(--parchment);
  border: 1px solid var(--parchment-edge);
  border-radius: 6px;
  margin-bottom: 4px;
}
.rule-item h4 { font-size: 0.85rem; color: var(--burgundy); margin-bottom: 4px; }
.rule-item p { font-size: 0.8rem; color: var(--ink-light); line-height: 1.4; }

/* ============================================================
   GM TOOLS (Fase 0 — sub-nav, monster rows)
   ============================================================ */
.gm-view { padding: 16px; }

.gm-subnav {
  display: flex;
  gap: 4px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-bottom: 8px;
  margin-bottom: 12px;
  border-bottom: 1px solid var(--parchment-edge);
}
.gm-subnav::-webkit-scrollbar { display: none; }
.gm-subnav-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: 8px 12px;
  min-width: 72px;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--ink-light);
  font-size: 0.7rem;
  font-family: inherit;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
  flex-shrink: 0;
}
.gm-subnav-btn .gm-subnav-icon { font-size: 1.15rem; line-height: 1; }
.gm-subnav-btn:hover { color: var(--ink); }
.gm-subnav-btn.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
}

.gm-subview { min-height: 200px; }

.monster-row {
  padding: 8px 10px;
  background: var(--parchment);
  border: 1px solid var(--parchment-edge);
  border-radius: 5px;
  margin-bottom: 4px;
}
.monster-row strong { color: var(--burgundy); font-family: Georgia, serif; }

/* Combat tracker participants (Fase 3) */
.combat-participant {
  padding: 10px 12px;
  background: var(--parchment);
  border: 1px solid var(--parchment-edge);
  border-radius: 6px;
  transition: border-color 0.15s, background 0.15s, opacity 0.15s;
}
.combat-participant.current {
  border-color: var(--gold);
  border-width: 2px;
  background: linear-gradient(to right, rgba(201, 168, 76, 0.15), var(--parchment));
  box-shadow: 0 2px 8px rgba(201, 168, 76, 0.25);
}
.combat-participant.dead {
  opacity: 0.4;
  text-decoration: line-through;
}
.combat-participant.dead.current { opacity: 0.55; text-decoration: none; }

/* ============================================================
   CHARACTER CREATION
   ============================================================ */
.creation-view { padding: 16px; }

.step-indicator {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 20px;
}
.step-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--parchment-edge);
  transition: background 0.2s;
}
.step-dot.active { background: var(--gold); }
.step-dot.done { background: var(--burgundy); }

.step-title {
  text-align: center;
  font-family: Georgia, serif;
  font-size: 1.2rem;
  color: var(--burgundy);
  margin-bottom: 16px;
}

.option-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.option-grid.single-col { grid-template-columns: 1fr; }

.option-card {
  padding: 12px;
  border: 2px solid var(--parchment-edge);
  border-radius: 8px;
  background: var(--parchment);
  cursor: pointer;
  transition: transform 0.1s, border-color 0.2s;
  min-height: 44px;
}
.option-card:active { transform: scale(0.97); }
.option-card.selected {
  border-color: var(--gold);
  box-shadow: 0 0 8px rgba(201, 168, 76, 0.3);
}
.option-card h4 { font-size: 0.85rem; margin-bottom: 4px; }
.option-card p { font-size: 0.7rem; color: var(--ink-light); line-height: 1.3; }
.option-card .complexity { font-size: 0.65rem; color: var(--gold); margin-top: 4px; }

.stat-assign-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin: 16px 0;
}

.stat-assign-box {
  text-align: center;
  padding: 12px 4px;
  border: 2px solid var(--parchment-edge);
  border-radius: 8px;
  background: var(--parchment);
}
.stat-assign-box .label { font-size: 0.7rem; font-weight: bold; color: var(--burgundy); text-transform: uppercase; }
.stat-assign-box select {
  width: 100%;
  padding: 6px;
  border: 1px solid var(--parchment-edge);
  border-radius: 4px;
  background: var(--white);
  font-size: 1rem;
  margin-top: 4px;
  color: var(--ink);
  text-align: center;
}

.skill-point-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  background: var(--parchment);
  border: 1px solid var(--parchment-edge);
  border-radius: 6px;
  margin-bottom: 4px;
}
.skill-point-row .sp-name { font-size: 0.85rem; }
.skill-point-row .sp-base { font-size: 0.75rem; color: var(--ink-light); }
.skill-point-row .sp-controls { display: flex; align-items: center; gap: 6px; }
.skill-point-row .sp-val { font-weight: bold; font-size: 1rem; color: var(--gold); min-width: 20px; text-align: center; }

.creation-nav {
  display: flex;
  gap: 8px;
  margin-top: 24px;
  padding-bottom: 20px;
}

.creation-input {
  width: 100%;
  padding: 10px 14px;
  border: 2px solid var(--parchment-edge);
  border-radius: 8px;
  font-size: 0.9rem;
  background: var(--parchment);
  color: var(--ink);
  margin-bottom: 10px;
  min-height: 44px;
}

.creation-label {
  font-size: 0.85rem;
  font-weight: bold;
  margin-bottom: 4px;
  color: var(--ink);
  display: block;
}

.review-section {
  padding: 10px;
  border-bottom: 1px solid var(--parchment-edge);
}
.review-section h4 { font-size: 0.85rem; color: var(--burgundy); margin-bottom: 4px; }
.review-section p { font-size: 0.8rem; color: var(--ink-light); }

/* Gold display */
.gold-display {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: Georgia, serif;
  color: var(--gold);
}

/* Equipment/item slots */
.slot-counter {
  font-size: 0.75rem;
  color: var(--ink-light);
  margin-bottom: 8px;
}

/* Homebrew */
.homebrew-item {
  padding: 10px;
  background: var(--parchment);
  border: 1px solid var(--parchment-edge);
  border-left: 3px solid var(--gold);
  border-radius: 6px;
  margin-bottom: 6px;
  position: relative;
}
.homebrew-item h4 { font-size: 0.85rem; margin-bottom: 4px; }
.homebrew-item p { font-size: 0.8rem; color: var(--ink-light); line-height: 1.4; }
.homebrew-item .effect { font-size: 0.75rem; color: var(--burgundy); font-style: italic; margin-top: 4px; }
.homebrew-actions {
  position: absolute;
  top: 8px;
  right: 8px;
  display: flex;
  gap: 4px;
}
.homebrew-actions button {
  background: none;
  border: none;
  font-size: 0.9rem;
  cursor: pointer;
  padding: 4px;
  min-width: 30px;
  min-height: 30px;
}

/* Modal */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.2s;
  overflow: hidden;
}
.modal {
  width: 100%;
  max-width: 400px;
  max-height: 85vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  border-radius: 12px;
  padding: 16px;
}
.modal h3 { margin-bottom: 12px; text-align: center; color: var(--burgundy); }
.modal-buttons { display: flex; gap: 8px; margin-top: 16px; }

/* Toast */
.toast {
  position: fixed;
  bottom: calc(var(--tab-height) + 20px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%);
  background: var(--leather-dark);
  color: var(--parchment);
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 0.85rem;
  z-index: 200;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards;
  pointer-events: none;
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
@keyframes toastOut { to { opacity: 0; transform: translateX(-50%) translateY(20px); } }

/* Language tags */
.lang-tag {
  display: inline-block;
  padding: 4px 10px;
  border: 1px solid var(--parchment-edge);
  border-radius: 12px;
  font-size: 0.75rem;
  background: var(--parchment);
  margin: 2px;
}

/* Array selector */
.array-selector {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

/* Scrollbar styling */
.app-content::-webkit-scrollbar { width: 4px; }
.app-content::-webkit-scrollbar-track { background: transparent; }
.app-content::-webkit-scrollbar-thumb { background: var(--leather); border-radius: 2px; }

/* Hidden file input */
.hidden-input { display: none; }

/* ============================================================
   DICE ROLL RESULT MODAL
   ============================================================ */
.roll-result-display {
  text-align: center;
  padding: 20px;
}
.roll-result-display .result-big {
  font-size: 3rem;
  font-family: Georgia, serif;
  font-weight: bold;
  color: var(--gold);
}
.roll-result-display .result-detail {
  font-size: 0.85rem;
  color: var(--ink-light);
  margin-top: 8px;
}

/* Ensure content isn't hidden behind tabs */
.view-padding-bottom { padding-bottom: 20px; }

/* ============================================================
   DESKTOP / LANDSCAPE LAYOUT (>= 900px)
   - Replaces bottom tab bar with a left sidebar
   - Wider app container centered
   - Content area has a max-width so lines stay readable
   - Character list and option grids expand to multiple columns
   - Adds hover states (mouse-friendly)
   ============================================================ */
@media (min-width: 900px) {
  body { padding: 0; background: var(--leather-dark); }

  #app {
    max-width: 1100px;
    height: 100vh;
    display: grid;
    grid-template-columns: 220px 1fr;
    grid-template-rows: auto 1fr;
    grid-template-areas:
      "sidebar header"
      "sidebar content";
    overflow: hidden;
    border-left: 2px solid var(--leather);
    border-right: 2px solid var(--leather);
    box-shadow: 0 0 24px rgba(0, 0, 0, 0.5);
  }

  .app-header { grid-area: header; font-size: 1.25rem; }
  .app-content { grid-area: content; }

  /* Sidebar nav (used to be bottom tab bar) */
  .tab-nav {
    grid-area: sidebar;
    flex-direction: column;
    height: auto;
    width: 100%;
    border-top: none;
    border-right: 2px solid var(--leather);
    padding: 24px 0 var(--safe-bottom) 0;
    gap: 4px;
    background: var(--leather-dark);
  }
  .tab-nav button {
    flex: 0 0 auto;
    flex-direction: row;
    justify-content: flex-start;
    gap: 14px;
    padding: 14px 24px;
    font-size: 0.95rem;
    min-height: 52px;
    border-left: 3px solid transparent;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .tab-nav button .tab-icon { font-size: 1.4rem; }
  .tab-nav button:hover { background: var(--leather); color: var(--parchment); }
  .tab-nav button.active {
    background: var(--leather);
    color: var(--gold);
    border-left-color: var(--gold);
  }
  .tab-nav button:active { transform: none; }

  /* Content area: keep line length readable.
     Use :not(.characters-list) so the character grid can opt out and span wider. */
  .app-content > .view,
  .app-content > div:not(.characters-list) {
    max-width: 780px;
    margin: 0 auto;
  }

  /* Characters list as a grid on desktop — wider than the default content cap. */
  .app-content > .characters-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
    max-width: 960px;
    margin: 0 auto;
    padding: 16px;
  }
  .characters-list .char-card { margin-bottom: 0; }
  .characters-list .empty-state { grid-column: 1 / -1; }
  /* Create/Backup buttons span all columns at the bottom */
  .characters-list > button.btn-block,
  .characters-list > div[style*="display:flex"] { grid-column: 1 / -1; }

  /* Hover states for clickable cards */
  .char-card,
  .option-card,
  .collapsible-header,
  .spell-card,
  .combat-ability-card {
    transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
  }
  .char-card:hover,
  .option-card:hover,
  .collapsible-header:hover,
  .combat-ability-card:hover {
    background: var(--parchment-dark);
    transform: translateY(-1px);
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
  }

  /* Option grids (class/ancestry/background pickers) wider on desktop */
  .option-grid {
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  }

  /* Stats grid looks cleaner when slightly wider */
  .stats-grid { max-width: 560px; margin-left: auto; margin-right: auto; }

  /* Skills in 2-column grid already works; on desktop keep it */

  /* Modals: cap at a readable size and center */
  #modalOverlay > div,
  .modal,
  .modal-card {
    max-width: 560px !important;
    margin: 5vh auto !important;
  }

  /* Install banner: keep it tucked bottom-right rather than full-width */
  #installBanner {
    left: auto !important;
    right: 24px !important;
    bottom: 24px !important;
    max-width: 360px;
  }

  /* Buttons feel better with subtle hover on desktop */
  .btn:hover { filter: brightness(1.08); }
  .btn:active { filter: brightness(0.95); }
}
</style>
</head>
<body>

<div id="app">
  <div class="app-header" id="appHeader">
    <span id="headerTitle">Nimble Companion</span>
  </div>

  <div class="app-content parchment-bg" id="appContent">
    <!-- Views rendered dynamically -->
  </div>

  <nav class="tab-nav" id="tabNav">
    <button data-tab="characters" class="active" onclick="app.goToCharactersTab()">
      <span class="tab-icon">&#128214;</span>
      <span>Characters</span>
    </button>
    <button data-tab="combat" onclick="app.navigate('combat')">
      <span class="tab-icon">&#9876;</span>
      <span>Combat</span>
    </button>
    <button data-tab="dice" onclick="app.navigate('dice')">
      <span class="tab-icon">&#127922;</span>
      <span>Dice</span>
    </button>
    <button data-tab="rules" onclick="app.navigate('rules')">
      <span class="tab-icon">&#128220;</span>
      <span>Rules</span>
    </button>
    <button data-tab="gm" onclick="app.navigate('gm')">
      <span class="tab-icon">&#128081;</span>
      <span>GM</span>
    </button>
  </nav>
</div>

<input type="file" id="imageUpload" class="hidden-input" accept="image/*">

<script src="gamedata.js"></script>
<script src="gmdata.js"></script>
<script>
/* =============================================================
   NIMBLE TTRPG COMPANION APP
   ============================================================= */

const STORAGE_KEY = 'nimble_characters';
const CAMPAIGNS_KEY = 'nimble_campaigns';
const ACTIVE_COMBAT_KEY = 'nimble_active_combat';
const JOINED_SESSION_KEY = 'nimble_joined_session';   // Fase 3.5: player-side session subscription

const app = {
  state: {
    currentView: 'characters',
    selectedCharacterId: null,
    characters: [],
    creation: null,
    combat: {
      actions: [false, false, false],
      reactions: {},
      conditions: {},
      lastInitiative: null,
      firstRoundLockedActions: 0,  // How many actions are locked in round 1 (based on initiative)
      inFirstRound: false,          // True after rolling initiative, false after "New Round"
    },
    dice: {
      selectedDie: 20,
      numDice: 1,
      advantages: 0,        // cumulative advantage count
      disadvantages: 0,     // cumulative disadvantage count
      history: [],
    },
    rulesSearch: '',
    // ---- GM MODE (Fase 0 scaffolding) ----
    campaigns: [],            // array of campaign objects (see docs below)
    selectedCampaignId: null, // which campaign is open
    campaignView: 'party',    // inside a campaign: 'party' | 'npcs' | 'encounters' | 'notes'
    gmView: 'campaigns',      // sub-nav: 'campaigns' | 'bestiary' | 'encounters' | 'combat'
    editingEncounterId: null, // Fase 2: when set inside campaignView='encounters', renders editor
    // Fase 3 — Live Combat Tracker
    activeCombat: null,       // null OR a combat object (see docs)
    // Fase 3.5 — Remote Session (player-side, read-only view of GM's combat)
    joinedSessionId: null,    // sessionId the player has subscribed to (persists per-device)
    remoteSession: null,      // live snapshot from sessions/{joinedSessionId} — transient
  },

  // ---- DATA ACCESS (safe fallback if gamedata.js missing) ----
  getData() {
    const gd = window.GAME_DATA || {};
    // Normalize UPPERCASE keys from gamedata.js to lowercase used by render functions
    if (gd.CLASSES && !gd.classes) {
      gd.classes = gd.CLASSES;
      gd.backgrounds = gd.BACKGROUNDS;
      gd.skills = gd.SKILLS;
      gd.stats = gd.STATS;
      gd.conditions = gd.CONDITIONS;
      gd.spells = gd.SPELLS;
      gd.equipment = gd.EQUIPMENT;
      gd.languages = gd.LANGUAGES;
      gd.subclasses = gd.SUBCLASSES;
      gd.adventuringMotivations = gd.ADVENTURING_MOTIVATIONS;
      gd.combatActions = gd.COMBAT_ACTIONS;
      gd.reactions = gd.REACTIONS;
      // Flatten ancestries from {common:[...], exotic:[...]} to flat array with category field
      if (gd.ANCESTRIES && !Array.isArray(gd.ANCESTRIES)) {
        const flat = [];
        (gd.ANCESTRIES.common || []).forEach(a => { a.category = 'Common'; flat.push(a); });
        (gd.ANCESTRIES.exotic || []).forEach(a => { a.category = 'Exotic'; flat.push(a); });
        gd.ancestries = flat;
      } else {
        gd.ancestries = gd.ANCESTRIES || [];
      }
      // Convert stat arrays to {key: [values]} format expected by renderStepStats
      if (gd.STAT_ARRAYS) {
        const sa = {};
        Object.entries(gd.STAT_ARRAYS).forEach(([key, obj]) => {
          sa[key] = obj.values || obj;
        });
        gd.statArrays = sa;
      }
    }
    if (gd.classes) return gd;
    return {
      classes: [],
      ancestries: [],
      backgrounds: [],
      spells: [],
      conditions: [
        { name: 'Blinded', description: 'Cannot see. Automatically fail sight-based checks. Attacks against you have advantage.' },
        { name: 'Charmed', description: 'Cannot attack the charmer. The charmer has advantage on social checks against you.' },
        { name: 'Deafened', description: 'Cannot hear. Automatically fail hearing-based checks.' },
        { name: 'Frightened', description: 'Disadvantage on checks while source of fear is in sight. Cannot willingly move closer to the source.' },
        { name: 'Grappled', description: 'Speed becomes 0. Ends if grappler is incapacitated or you are moved out of reach.' },
        { name: 'Incapacitated', description: 'Cannot take actions or reactions.' },
        { name: 'Invisible', description: 'Cannot be seen. Attacks against you have disadvantage, your attacks have advantage.' },
        { name: 'Paralyzed', description: 'Incapacitated, cannot move or speak. Attacks against you have advantage. Melee hits are critical.' },
        { name: 'Poisoned', description: 'Disadvantage on attack rolls and ability checks.' },
        { name: 'Prone', description: 'Can only crawl. Disadvantage on attacks. Melee attacks against you have advantage, ranged have disadvantage.' },
        { name: 'Restrained', description: 'Speed 0. Attacks against you have advantage, your attacks have disadvantage.' },
        { name: 'Stunned', description: 'Incapacitated, cannot move, can only speak falteringly.' },
        { name: 'Unconscious', description: 'Incapacitated, cannot move or speak, unaware. Drop held items, fall prone. Attacks have advantage, melee hits are critical.' },
      ],
      combatActions: [
        { name: 'Attack', cost: '1 Action', description: 'Make a melee or ranged attack against a target.' },
        { name: 'Move', cost: '1 Action', description: 'Move up to your speed.' },
        { name: 'Cast a Spell', cost: '1-3 Actions', description: 'Cast a spell you know, spending the required actions and mana.' },
        { name: 'Assess', cost: '1 Action', description: 'Study a creature or situation. The GM reveals useful information.' },
        { name: 'Dash', cost: '1 Action', description: 'Gain additional movement equal to your speed.' },
        { name: 'Disengage', cost: '1 Action', description: 'Your movement does not provoke opportunity attacks this turn.' },
        { name: 'Dodge', cost: '1 Action', description: 'Attacks against you have disadvantage until your next turn.' },
        { name: 'Help', cost: '1 Action', description: 'Give an ally advantage on their next check or attack.' },
        { name: 'Hide', cost: '1 Action', description: 'Attempt to hide from enemies. Make a DEX (Stealth) check.' },
        { name: 'Use an Object', cost: '1 Action', description: 'Interact with an object like a potion, lever, or tool.' },
      ],
      reactions: [
        { name: 'Defend', cost: '1 Action', description: 'When attacked, use your reaction to add your armor to your defense.' },
        { name: 'Opportunity Attack', cost: '1 Action', description: 'When an enemy moves out of your reach, make a melee attack.' },
        { name: 'Interpose', cost: '1 Action', description: 'Move to intercept an attack aimed at an adjacent ally.' },
        { name: 'Help', cost: '1 Action', description: 'Use your reaction to assist an ally\'s check.' },
      ],
      restingRules: [
        { name: 'Short Rest', description: 'Takes 1 hour. Spend Hit Dice to recover HP. Roll each HD spent and add CON modifier.' },
        { name: 'Long Rest', description: 'Takes 8 hours. Recover all HP, half your max Hit Dice (minimum 1), and all mana. Reduces wounds by 1.' },
      ],
      statArrays: {
        standard: [3, 2, 1, 0],
        balanced: [2, 2, 1, 1],
        minmax: [4, 1, 1, 0],
      },
      skills: [
        { name: 'Athletics', stat: 'STR' },
        { name: 'Endurance', stat: 'STR' },
        { name: 'Acrobatics', stat: 'DEX' },
        { name: 'Stealth', stat: 'DEX' },
        { name: 'Sleight of Hand', stat: 'DEX' },
        { name: 'Arcana', stat: 'INT' },
        { name: 'Investigation', stat: 'INT' },
        { name: 'Nature', stat: 'INT' },
        { name: 'Insight', stat: 'WIL' },
        { name: 'Persuasion', stat: 'WIL' },
      ],
    };
  },

  // ---- PERSISTENCE ----
  save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(this.state.characters));
      localStorage.setItem(CAMPAIGNS_KEY, JSON.stringify(this.state.campaigns));
      if (this.state.activeCombat) {
        localStorage.setItem(ACTIVE_COMBAT_KEY, JSON.stringify(this.state.activeCombat));
      } else {
        localStorage.removeItem(ACTIVE_COMBAT_KEY);
      }
    } catch (e) {
      console.warn('Save failed:', e);
    }
    // Also schedule a push to the cloud if the user is logged in.
    // Debounced so rapid HP/mana/skill clicks don't spam Firestore.
    this.scheduleCloudPush();
  },

  load() {
    try {
      const data = localStorage.getItem(STORAGE_KEY);
      if (data) this.state.characters = JSON.parse(data);
    } catch (e) {
      console.warn('Load failed:', e);
      this.state.characters = [];
    }
    try {
      const data = localStorage.getItem(CAMPAIGNS_KEY);
      if (data) this.state.campaigns = JSON.parse(data);
    } catch (e) {
      console.warn('Campaigns load failed:', e);
      this.state.campaigns = [];
    }
    // Migrate older campaigns: ensure every campaign has all expected fields
    (this.state.campaigns || []).forEach(c => {
      if (!Array.isArray(c.playerCharIds)) c.playerCharIds = [];
      if (!Array.isArray(c.npcs)) c.npcs = [];
      if (!Array.isArray(c.encounters)) c.encounters = [];
      if (typeof c.notes !== 'string') c.notes = '';
    });
    // Fase 3: restore active combat if present
    try {
      const raw = localStorage.getItem(ACTIVE_COMBAT_KEY);
      if (raw) this.state.activeCombat = JSON.parse(raw);
    } catch (e) {
      console.warn('Active combat load failed:', e);
      this.state.activeCombat = null;
    }
    // Migrate legacy combats (pre-initiative-rework) to the new turnOrder model
    if (this.state.activeCombat && !this.state.activeCombat.phase) {
      const combat = this.state.activeCombat;
      combat.phase = 'active';
      combat.turnOrder = this._buildTurnOrder(combat.participants || []);
      combat.turnIndex = 0;
    }
    // Fase 3.5: restore player-side session subscription id (the live snapshot comes from Firestore once signed in)
    try {
      this.state.joinedSessionId = localStorage.getItem(JOINED_SESSION_KEY) || null;
    } catch (e) {
      this.state.joinedSessionId = null;
    }
  },

  getChar() {
    return this.state.characters.find(c => c.id === this.state.selectedCharacterId) || null;
  },

  updateChar(updates) {
    const ch = this.getChar();
    if (!ch) return;
    Object.assign(ch, updates);
    this.save();
  },

  // ---- NAVIGATION ----
  navigate(view, opts) {
    this.state.currentView = view;
    if (opts && opts.charId) this.state.selectedCharacterId = opts.charId;

    // "Characters" tab is active whenever we're on the sheet OR the list
    const charactersTabActive = view === 'sheet' || view === 'characters';

    // Update tabs
    document.querySelectorAll('.tab-nav button').forEach(b => {
      if (b.dataset.tab === 'characters') {
        b.classList.toggle('active', charactersTabActive);
      } else {
        b.classList.toggle('active', b.dataset.tab === view);
      }
    });

    // Header
    const header = document.getElementById('appHeader');
    const backViews = ['sheet', 'creation'];
    if (backViews.includes(view)) {
      const title = view === 'sheet' ? (this.getChar()?.name || 'Character') : 'Create Character';
      // Back button on sheet goes to the character LIST (clears selection)
      const backAction = view === 'sheet' ? `app.state.selectedCharacterId=null;app.navigate('characters')` : `app.navigate('characters')`;
      header.innerHTML = `<button class="back-btn" onclick="${backAction}">&larr;</button><span>${title}</span>`;
    } else if ((view === 'combat' || view === 'dice' || view === 'rules') && this.state.selectedCharacterId && this.getChar()) {
      // On combat/dice/rules WITH a selected character, show char name in header for context
      const titles = { combat: 'Combat', dice: 'Dice', rules: 'Rules' };
      header.innerHTML = `<span id="headerTitle">${titles[view]} &middot; ${this.esc(this.getChar().name)}</span>`;
    } else {
      const titles = { characters: 'Nimble Companion', combat: 'Combat Tracker', dice: 'Dice Roller', rules: 'Rules Reference', gm: 'GM Tools' };
      header.innerHTML = `<span id="headerTitle">${titles[view] || 'Nimble'}</span>`;
    }

    // Tab nav visibility: hide on creation, show on everything else (including sheet)
    document.getElementById('tabNav').style.display = view === 'creation' ? 'none' : 'flex';

    this.render(true);
  },

  // Smart Characters tab: if a character is selected and we're NOT on the sheet, go to the sheet.
  // Otherwise go to the character list (and clear selection if we were on the sheet).
  goToCharactersTab() {
    if (this.state.selectedCharacterId && this.state.currentView !== 'sheet' && this.state.currentView !== 'characters') {
      this.navigate('sheet');
    } else {
      // On sheet or already on list — go to list and clear selection
      this.state.selectedCharacterId = null;
      this.navigate('characters');
    }
  },

  // ---- RENDER ----
  render(scrollToTop) {
    const content = document.getElementById('appContent');
    if (scrollToTop) content.scrollTop = 0;

    switch (this.state.currentView) {
      case 'characters': content.innerHTML = this.renderCharacters(); break;
      case 'sheet': content.innerHTML = this.renderSheet(); break;
      case 'combat': content.innerHTML = this.renderCombat(); break;
      case 'dice': content.innerHTML = this.renderDice(); break;
      case 'rules': content.innerHTML = this.renderRules(); break;
      case 'creation': content.innerHTML = this.renderCreation(); break;
      case 'gm': content.innerHTML = this.renderGM(); break;
    }
  },

  // ---- TOAST ----
  toast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2200);
  },

  // ===== CHARACTERS LIST =====
  renderCharacters() {
    const chars = this.state.characters;

    // ---- Cloud sync header (login button or signed-in badge) ----
    // Includes the Fase 3.5 session banner (Join GM Session / connected / view combat)
    const syncHeader = this.renderSyncHeader() + this.renderSessionBanner();

    // Shared backup row: Import is always available; Export only when chars exist
    const backupRow = `
      <div style="display:flex;gap:8px;margin-top:16px">
        ${chars.length > 0 ? `<button class="btn btn-secondary btn-small" style="flex:1" onclick="app.exportCharacters()">&#128190; Export Backup</button>` : ''}
        <button class="btn btn-secondary btn-small" style="flex:1" onclick="app.importCharactersPrompt()">&#128194; Import Backup</button>
      </div>
      <input type="file" id="charImportInput" accept="application/json,.json" style="display:none" onchange="app.importCharactersFromFile(event)">`;

    if (chars.length === 0) {
      return `
        <div class="characters-list">
          ${syncHeader}
          <div class="empty-state">
            <div class="icon">&#128214;</div>
            <p>No adventurers yet.<br>Begin your journey!</p>
            <button class="btn btn-primary btn-block" onclick="app.startCreation()">Create New Character</button>
          </div>
          ${backupRow}
        </div>`;
    }

    let html = '<div class="characters-list">';
    html += syncHeader;
    chars.forEach(ch => {
      const avatar = ch.image
        ? `<div class="char-avatar"><img src="${ch.image}" alt="${ch.name}"></div>`
        : `<div class="char-avatar">&#9876;</div>`;
      html += `
        <div class="card char-card" onclick="app.navigate('sheet', {charId:'${ch.id}'})" ontouchstart="app.swipeStart(event,'${ch.id}')" ontouchmove="app.swipeMove(event,'${ch.id}')" ontouchend="app.swipeEnd(event,'${ch.id}')" id="char-${ch.id}">
          ${avatar}
          <div class="char-info">
            <h3>${this.esc(ch.name)}</h3>
            <p>${this.esc(ch.ancestry || '')} ${this.esc(ch.className || '')} - Lvl ${ch.level || 1}</p>
          </div>
          <button class="char-delete" onclick="event.stopPropagation(); app.deleteCharacter('${ch.id}')">&#128465;</button>
        </div>`;
    });
    html += `<button class="btn btn-primary btn-block" style="margin-top:16px" onclick="app.startCreation()">Create New Character</button>`;
    html += backupRow;
    html += '</div>';
    return html;
  },

  // Swipe to delete
  _swipeStartX: 0,
  swipeStart(e, id) { this._swipeStartX = e.touches[0].clientX; },
  swipeMove(e, id) {
    const dx = this._swipeStartX - e.touches[0].clientX;
    const el = document.getElementById('char-' + id);
    if (dx > 40) el.classList.add('swiped');
    else el.classList.remove('swiped');
  },
  swipeEnd(e, id) { /* stays swiped or not */ },

  deleteCharacter(id) {
    if (!confirm('Delete this character?')) return;
    this.state.characters = this.state.characters.filter(c => c.id !== id);
    this.save();
    if (this.state.selectedCharacterId === id) this.state.selectedCharacterId = null;
    this.render();
    this.toast('Character deleted');
  },

  // ===== CHARACTER BACKUP (Export / Import) =====
  // Exports all characters in the current state as a downloadable JSON file.
  // Filename includes ISO date for easy sorting; contains a small envelope with
  // `schemaVersion` and `exportedAt` so future imports can upgrade if needed.
  exportCharacters() {
    const chars = this.state.characters || [];
    if (chars.length === 0) { this.toast('No characters to export'); return; }
    const payload = {
      app: 'nimble-companion',
      schemaVersion: 1,
      exportedAt: new Date().toISOString(),
      characters: chars
    };
    const json = JSON.stringify(payload, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const date = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = `nimble-backup-${date}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    this.toast(`Exported ${chars.length} character${chars.length === 1 ? '' : 's'}`);
  },

  // Opens the native file picker (via the hidden #charImportInput)
  importCharactersPrompt() {
    const inp = document.getElementById('charImportInput');
    if (inp) { inp.value = ''; inp.click(); }
  },

  // Reads the selected file, parses JSON, and launches the merge/replace modal
  importCharactersFromFile(event) {
    const file = event.target.files && event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      let data;
      try {
        data = JSON.parse(e.target.result);
      } catch (err) {
        this.toast('Invalid JSON file');
        return;
      }
      // Accept either our envelope format or a bare characters array
      let imported = null;
      if (Array.isArray(data)) imported = data;
      else if (data && Array.isArray(data.characters)) imported = data.characters;
      if (!imported || imported.length === 0) {
        this.toast('No characters found in this file');
        return;
      }
      // Basic validation: each entry must have id + name + className
      const valid = imported.filter(c => c && c.id && c.name && c.className);
      if (valid.length === 0) {
        this.toast('No valid characters in this file');
        return;
      }
      this._pendingImport = valid;
      this.renderImportModal();
    };
    reader.onerror = () => this.toast('Could not read file');
    reader.readAsText(file);
  },

  // Modal shown after a valid import: lets the user choose merge/replace and
  // resolves conflicts when the same character id already exists locally.
  renderImportModal() {
    const incoming = this._pendingImport || [];
    const existing = this.state.characters || [];
    const existingIds = new Set(existing.map(c => c.id));
    const conflicts = incoming.filter(c => existingIds.has(c.id));
    const newOnes = incoming.filter(c => !existingIds.has(c.id));

    let html = `<h3>&#128194; Import Characters</h3>
      <div style="font-size:0.8rem;color:var(--ink-light);margin-bottom:10px">
        Found <strong>${incoming.length}</strong> character${incoming.length === 1 ? '' : 's'} in the backup.
      </div>`;

    if (newOnes.length > 0) {
      html += `<div style="margin-bottom:10px">
        <div style="font-size:0.75rem;font-weight:bold;color:var(--burgundy);margin-bottom:4px">${newOnes.length} new — will be added</div>
        <ul style="font-size:0.75rem;margin:0;padding-left:20px;color:var(--ink)">
          ${newOnes.map(c => `<li>${this.esc(c.name)} (${this.esc(c.className || '')} L${c.level || 1})</li>`).join('')}
        </ul>
      </div>`;
    }

    if (conflicts.length > 0) {
      html += `<div style="margin-bottom:10px;padding:8px;background:var(--parchment-dark);border-radius:6px">
        <div style="font-size:0.75rem;font-weight:bold;color:var(--burgundy);margin-bottom:6px">${conflicts.length} already exist${conflicts.length === 1 ? 's' : ''} — choose what to do:</div>
        <ul style="font-size:0.7rem;margin:0 0 8px 0;padding-left:20px;color:var(--ink)">
          ${conflicts.map(c => `<li>${this.esc(c.name)} (${this.esc(c.className || '')} L${c.level || 1})</li>`).join('')}
        </ul>
        <div style="font-size:0.7rem;color:var(--ink-light)">
          <strong>Replace:</strong> overwrite the local version with the one from the file.<br>
          <strong>Keep Both:</strong> import as a new copy (the file version gets a new id).<br>
          <strong>Skip:</strong> ignore conflicts, only add brand-new characters.
        </div>
      </div>`;
    }

    html += `<div class="modal-buttons" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:12px">
      <button class="btn btn-secondary" onclick="app._pendingImport=null; app.closeModal()">Cancel</button>`;
    if (conflicts.length > 0) {
      html += `<button class="btn btn-secondary" onclick="app.confirmImport('skip')">Skip conflicts</button>
        <button class="btn btn-secondary" onclick="app.confirmImport('keepBoth')">Keep Both</button>
        <button class="btn btn-primary" onclick="app.confirmImport('replace')">Replace</button>`;
    } else {
      html += `<button class="btn btn-primary" style="flex:1" onclick="app.confirmImport('skip')">Import ${newOnes.length}</button>`;
    }
    html += `</div>`;

    this.showModal(html);
  },

  confirmImport(conflictStrategy) {
    const incoming = this._pendingImport || [];
    if (incoming.length === 0) return;
    const existing = [...(this.state.characters || [])];
    const existingById = new Map(existing.map(c => [c.id, c]));
    let added = 0, replaced = 0, skipped = 0;

    incoming.forEach(ch => {
      const clash = existingById.get(ch.id);
      if (!clash) {
        existing.push(ch);
        added++;
      } else if (conflictStrategy === 'replace') {
        const idx = existing.findIndex(c => c.id === ch.id);
        if (idx >= 0) existing[idx] = ch;
        replaced++;
      } else if (conflictStrategy === 'keepBoth') {
        const copy = { ...ch, id: Date.now().toString(36) + Math.random().toString(36).substr(2, 5), name: ch.name + ' (imported)' };
        existing.push(copy);
        added++;
      } else {
        skipped++;
      }
    });

    this.state.characters = existing;
    this.save();
    this._pendingImport = null;
    this.closeModal();
    this.render();
    const parts = [];
    if (added) parts.push(`${added} added`);
    if (replaced) parts.push(`${replaced} replaced`);
    if (skipped) parts.push(`${skipped} skipped`);
    this.toast(`Import complete: ${parts.join(', ') || 'nothing to do'}`);
  },

  // ===== CHARACTER SHEET =====
  renderSheet() {
    const ch = this.getChar();
    if (!ch) return '<div class="empty-state"><p>Character not found</p></div>';

    const data = this.getData();
    const stats = ch.stats || { STR: 0, DEX: 0, INT: 0, WIL: 0 };
    const skills = data.skills || [];
    const classData = (data.classes || []).find(c => c.name === ch.className);
    const usesMana = ch.maxMana > 0;
    const hasSpells = usesMana;
    const rawSaves = ch.saves || classData?.saves || {};
    // Normalize saves: { advantaged: 'DEX', disadvantaged: 'INT' } → { DEX: 'advantage', INT: 'disadvantage' }
    const saves = {};
    if (rawSaves.advantaged) saves[rawSaves.advantaged] = 'advantage';
    if (rawSaves.disadvantaged) saves[rawSaves.disadvantaged] = 'disadvantage';
    // Also support already-normalized format
    ['STR','DEX','INT','WIL'].forEach(s => { if (rawSaves[s]) saves[s] = rawSaves[s]; });
    // Ancestry statMods that change save indicators on the sheet:
    //   - disadvantagedSaveNeutral (Celestial): remove the disadvantage entirely
    //   - neutralSaveAdvantaged (Tiefling): one neutral save (player-chosen, ch.neutralSaveAdv) becomes advantaged
    const ancestryForSaves = (data.ancestries || []).find(a => a.name === ch.ancestry);
    const aMods = ancestryForSaves?.statMods || {};
    if (aMods.disadvantagedSaveNeutral) {
      ['STR','DEX','INT','WIL'].forEach(s => { if (saves[s] === 'disadvantage') delete saves[s]; });
    }
    if (aMods.neutralSaveAdvantaged && ch.neutralSaveAdv && saves[ch.neutralSaveAdv] !== 'disadvantage') {
      saves[ch.neutralSaveAdv] = 'advantage';
    }
    const maxSlots = 10 + (stats.STR || 0);
    const editMode = this.state.editMode;

    let html = '';

    // Header
    const avatarContent = ch.image
      ? `<img src="${ch.image}" alt="${ch.name}">`

    html += `

        <div class="sheet-details">
          ${ch.height ? 'Height: ' + this.esc(ch.height) : ''} ${ch.weight ? '&middot; Weight: ' + this.esc(ch.weight) : ''}
          ${ch.speed !== undefined ? '&middot; Speed: ' + ch.speed + ' spaces' : ''}
          ${ch.hitDice ? '&middot; HD: ' + Math.max(0, (ch.level || 1) + (ch.hitDiceMaxMod || 0)) + this.esc(ch.hitDice) : ''}

        <button class="adj-plus" onclick="app.applyAdjust('hitDice',1)">&plus;</button>

          </div>

    // Abilities (filter out any that are also in the spells list), split by type

      const renderAbilityCard = (ab) => `
        <div class="collapsible-header" onclick="app.toggleCollapsible(this)">
          <h4>${this.esc(ab.name)}</h4>
          <span class="collapsible-arrow">&#9660;</span>
        </div>
        <div class="collapsible-body">${this.esc(ab.description || '')}</div>`;

      // --- Active ---
      if (buckets.active.length > 0) {
        html += `<div class="ability-group-header"><span class="ability-group-icon">&#9876;</span> Active <span class="ability-group-count">(${buckets.active.length})</span></div>`;
        buckets.active.forEach(ab => { html += renderAbilityCard(ab); });
      }

      // --- Passive ---
      if (buckets.passive.length > 0) {
        html += `<div class="ability-group-header"><span class="ability-group-icon">&#128274;</span> Passive <span class="ability-group-count">(${buckets.passive.length})</span></div>`;
        buckets.passive.forEach(ab => { html += renderAbilityCard(ab); });
      }

      // --- Reference (collapsed by default) ---
      if (buckets.reference.length > 0) {
        html += `<div class="ability-group-header ref-collapsible" onclick="app.toggleCollapsible(this)"><span class="ability-group-icon">&#128218;</span> Reference <span class="ability-group-count">(${buckets.reference.length})</span><span class="collapsible-arrow" style="margin-left:auto">&#9660;</span></div>`;
        html += `<div class="collapsible-body">`;
        buckets.reference.forEach(ab => { html += renderAbilityCard(ab); });
        html += `</div>`;
      }
    }

    // Add ability button (edit mode) + Retrain button (always visible — it's a gameplay feature)
    html += `<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">`;
    if (editMode) {
      html += `<button class="btn btn-secondary btn-small" onclick="app.addAbilityModal()">+ Add Ability</button>`;
    }
    const retrainFeat = classData?.retrainFeature;
    if (retrainFeat && abilities.find(a => a.name === retrainFeat.name)) {
      const icon = retrainFeat.icon || '⟳';
      html += `<button class="btn btn-small" style="background:var(--leather-dark);color:var(--parchment)" onclick="app.retrainModal()">${icon} ${this.esc(retrainFeat.name)}</button>`;
    }
    // Invoker of Chaos / Control: per-character spell picks are retrainable any time (e.g. during Study!).
    if (this.hasInvokerPicks(ch)) {
      const featureName = this._invokerFeatureName(ch);
      const hasPicks = ch.invokerPicks && ch.invokerPicks.cantrip && ch.invokerPicks.tiered;
      const label = hasPicks ? `Change ${featureName} Picks` : `Pick ${featureName} Spells`;
      const btnStyle = hasPicks
        ? 'background:var(--leather-dark);color:var(--parchment)'
        : 'background:var(--gold);color:var(--leather-dark);font-weight:bold';
      html += `<button class="btn btn-small" style="${btnStyle}" onclick="app.invokerPicksModal()">&#10024; ${this.esc(label)}</button>`;
    }
    html += `</div>`;

    // Spells (always shown — homebrew may grant spells to any class)
    html += '<div class="section-title">&#10024; Spells</div>';
    const charSpells = ch.spells || [];
    if (charSpells.length === 0) {
      html += '<p style="font-size:0.8rem;color:var(--ink-light);padding:8px 0">No spells known.</p>';
    } else {
      const tierLabels = { 0: 'Cantrip', 1: 'Tier 1', 2: 'Tier 2', 3: 'Tier 3', 4: 'Tier 4', 5: 'Tier 5', 6: 'Tier 6', 7: 'Tier 7', 8: 'Tier 8', 9: 'Tier 9' };
      const schoolLabels = { fire: 'Fire', ice: 'Ice', lightning: 'Lightning', wind: 'Wind', radiant: 'Radiant', necrotic: 'Necrotic' };
      // Group by: class-specific (no school), then each school, then utility
      const classSpells = [];
      const utilitySpells = [];
      const schoolGroups = {};
      charSpells.forEach(sp => {
        if (sp.isUtility) { utilitySpells.push(sp); }
        else if (!sp.school || sp.school === 'classSpecific') { classSpells.push(sp); }
        else {
          if (!schoolGroups[sp.school]) schoolGroups[sp.school] = [];
          schoolGroups[sp.school].push(sp);
        }
      });
      // Sort spells within each group by tier
      const sortByTier = (a, b) => (a.tier || 0) - (b.tier || 0);

      // Render a spell card (with any ability modifiers that mention this spell)
      const renderSpellCard = (sp) => {
        const tierLabel = tierLabels[sp.tier] || (sp.tier !== undefined ? 'Tier ' + sp.tier : '');
        const modifiers = this.getAbilitiesModifyingSpell(sp.name, ch.abilities || []);
        const modifierHtml = modifiers.map(m => `
          <div class="spell-modifier-note">
            <span class="modifier-name">&#9876; ${this.esc(m.name)}</span>
            ${this.esc(m.description || '')}
          </div>`).join('');
        return `<div class="spell-card">
          <h4>${this.esc(sp.name)}${editMode ? ` <button style="background:none;border:none;color:var(--burgundy);font-size:0.7rem;cursor:pointer" onclick="app.removeSpell(${charSpells.indexOf(sp)})">&#10006;</button>` : ''}</h4>
          <div class="spell-meta">${tierLabel}${sp.actions ? ' &middot; ' + sp.actions + ' actions' : ''}${sp.range ? ' &middot; ' + sp.range : ''}${sp.damage && sp.damage !== 'None' ? ' &middot; ' + sp.damage : ''}</div>
          <div class="spell-desc">${this.esc(sp.description || '')}</div>
          ${modifierHtml}
        </div>`;
      };

      // Class-specific spells (Shadow Blast, etc.)
      if (classSpells.length > 0) {
        classSpells.sort(sortByTier);
        html += `<div class="spell-school-header" onclick="app.toggleCollapsible(this)">
          <h4>&#9876; ${this.esc(ch.className)} Spells <span class="spell-count">(${classSpells.length})</span></h4>
          <span class="collapsible-arrow">&#9660;</span>
        </div><div class="spell-school-body">`;
        classSpells.forEach(sp => { html += renderSpellCard(sp); });
        html += '</div>';
      }

      // School groups — iterate through standard schools first, then any unknown schools as fallback
      const schoolOrder = ['fire', 'ice', 'lightning', 'wind', 'radiant', 'necrotic'];
      const schoolIcons = { fire: '&#128293;', ice: '&#10052;', lightning: '&#9889;', wind: '&#127744;', radiant: '&#9728;', necrotic: '&#9760;', hexbinder: '&#128520;' };
      const extraSchoolLabels = { hexbinder: 'Hexbinder' };
      const allSchoolsToRender = [
        ...schoolOrder,
        ...Object.keys(schoolGroups).filter(s => !schoolOrder.includes(s))
      ];
      allSchoolsToRender.forEach(school => {
        const spells = schoolGroups[school];
        if (!spells || spells.length === 0) return;
        spells.sort(sortByTier);
        const label = schoolLabels[school] || extraSchoolLabels[school] || (school.charAt(0).toUpperCase() + school.slice(1));
        const icon = schoolIcons[school] || '&#10024;';
        html += `<div class="spell-school-header" onclick="app.toggleCollapsible(this)">
          <h4>${icon} ${label} <span class="spell-count">(${spells.length})</span></h4>
          <span class="collapsible-arrow">&#9660;</span>
        </div><div class="spell-school-body">`;
        let lastTier = -1;
        spells.forEach(sp => {
          if (sp.tier !== lastTier) {
            html += `<div class="spell-tier-title">${tierLabels[sp.tier] || 'Tier ' + sp.tier}</div>`;
            lastTier = sp.tier;
          }
          html += renderSpellCard(sp);
        });
        html += '</div>';
      });

      // Utility spells
      if (utilitySpells.length > 0) {
        html += `<div class="spell-school-header" onclick="app.toggleCollapsible(this)">
          <h4>&#128218; Utility Spells <span class="spell-count">(${utilitySpells.length})</span></h4>
          <span class="collapsible-arrow">&#9660;</span>
        </div><div class="spell-school-body">`;
        utilitySpells.forEach(sp => { html += renderSpellCard(sp); });
        html += '</div>';
      }
    }
    if (editMode) {
      html += `<button class="btn btn-secondary btn-small" style="margin-top:8px" onclick="app.addSpellModal()">+ Add Spell</button>`;
    }

    // Equipment
    html += '<div class="section-title">&#127890; Equipment</div>';
    const items = ch.inventory || [];
    const usedSlots = items.reduce((s, it) => s + (it.slots || 1), 0);
    html += `<div class="slot-counter">Slots: ${usedSlots} / ${maxSlots}</div>`;
    html += `<div class="gold-display" style="margin-bottom:8px">&#9798; Gold: <span class="tappable" style="cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px;color:var(--gold);font-weight:bold" onclick="app.showAdjust('gold')">${ch.gold ?? 0}</span></div>
    <div class="adjust-row" id="adjust-gold" style="display:none;margin-bottom:8px">
      <input type="number" id="adj-gold-val" placeholder="0" inputmode="numeric" min="0" onkeydown="if(event.key==='Enter')app.applyAdjust('gold',1)">
      <button class="adj-minus" onclick="app.applyAdjust('gold',-1)">&minus;</button>
      <button class="adj-plus" onclick="app.applyAdjust('gold',1)">&plus;</button>
      <button class="adj-cancel" onclick="app.hideAdjust('gold')">&#10005;</button>
    </div>`;
    items.forEach((it, i) => {
      const cat = it.category;
      const canEquip = cat === 'weapon' || cat === 'armor' || cat === 'shield';
      const catBadge = cat ? `<span style="font-size:0.55rem;color:var(--burgundy);text-transform:uppercase;letter-spacing:0.05em;margin-right:6px">${cat}</span>` : '';
      const equippedBadge = it.equipped ? `<span style="font-size:0.55rem;color:var(--gold);font-weight:bold;margin-right:6px">&#9989; EQUIPPED</span>` : '';
      const detail = (() => {
        if (cat === 'weapon' && it.damage) return `<div style="font-size:0.65rem;color:var(--ink-light)">${this.esc(it.damage)}${it.damageType ? ' · ' + this.esc(it.damageType) : ''}${it.properties && it.properties.length ? ' · ' + it.properties.map(p => this.esc(p)).join(', ') : ''}</div>`;
        if (cat === 'armor' && it.formula) {
          const f = it.formula;
          const s = f.statMod ? `${f.base}+${f.statMod}${f.statMax !== undefined ? ` (max ${f.statMax})` : ''}` : `${f.base}`;
          return `<div style="font-size:0.65rem;color:var(--ink-light)">Armor: ${s}</div>`;
        }
        if (cat === 'shield' && it.shieldArmor) return `<div style="font-size:0.65rem;color:var(--ink-light)">Shield: +${it.shieldArmor} armor</div>`;
        return '';
      })();
      html += `
        <div class="inventory-item" style="flex-wrap:wrap">
          <div style="flex:1;min-width:0">
            <div>${equippedBadge}${catBadge}<span class="item-name">${this.esc(it.name)}</span></div>
            ${detail}
          </div>
          <span class="item-slots">${it.slots || 1} slot${(it.slots || 1) > 1 ? 's' : ''}</span>
          ${canEquip ? `<button class="btn btn-small" style="padding:4px 8px;min-height:30px;background:${it.equipped ? 'var(--gold)' : 'var(--leather-dark)'};color:${it.equipped ? 'var(--ink)' : 'var(--parchment)'}" onclick="app.toggleEquipped(${i})">${it.equipped ? 'Unequip' : 'Equip'}</button>` : ''}
          ${editMode ? `<button class="btn btn-small btn-danger" style="padding:4px 8px;min-height:30px" onclick="app.removeItem(${i})">&#10006;</button>` : ''}
        </div>`;
    });
