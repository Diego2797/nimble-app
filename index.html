    let val = (skillBonuses[skillName] || 0) + delta;
    val = Math.max(0, Math.min(12, val));
    skillBonuses[skillName] = val;
    this.updateChar({ skillBonuses });
    this.render();
  },

  showAdjust(field) {
    // Hide any other open adjust rows first
    document.querySelectorAll('.adjust-row').forEach(r => r.style.display = 'none');
    const row = document.getElementById('adjust-' + field);
    if (row) {
      row.style.display = 'flex';
      const input = document.getElementById('adj-' + field + '-val');
      if (input) { input.value = ''; input.focus(); }
    }
  },

  hideAdjust(field) {
    const row = document.getElementById('adjust-' + field);
    if (row) row.style.display = 'none';
  },

  applyAdjust(field, sign) {
    const input = document.getElementById('adj-' + field + '-val');
    if (!input) return;
    const raw = parseInt(input.value, 10);
    if (isNaN(raw) || raw === 0) { this.hideAdjust(field); return; }
    // sign is +1 (button "+") or -1 (button "−"). Use absolute value so typed "-5" still behaves.
    const direction = sign || 1;
    const delta = Math.abs(raw) * direction;
    const handlers = {
      hp: (d) => this.adjustHP(d),
      tempHp: (d) => this.adjustTempHP(d),
      mana: (d) => this.adjustMana(d),
      hitDice: (d) => this.adjustHitDice(d),
      gold: (d) => this.adjustGold(d),
      combatHp: (d) => this.adjustHP(d),
      combatTempHp: (d) => this.adjustTempHP(d),
    };
    if (handlers[field]) handlers[field](delta);
  },

  adjustStat(stat, delta) {
    const ch = this.getChar();
    if (!ch) return;
    const stats = ch.stats || { STR: 0, DEX: 0, INT: 0, WIL: 0 };
    stats[stat] = (stats[stat] || 0) + delta;
    this.updateChar({ stats });
    this.render();
  },

  addLanguage() {
    const ch = this.getChar();
    if (!ch) return;
    const name = document.getElementById('newLangName').value.trim();
    if (!name) return;
    const langs = ch.languages || ['Common'];
    if (langs.includes(name)) { this.toast('Language already known'); return; }
    langs.push(name);
    this.updateChar({ languages: langs });
    this.render();
  },

  removeLanguage(i) {
    const ch = this.getChar();
    if (!ch) return;
    const langs = ch.languages || ['Common'];
    langs.splice(i, 1);
    this.updateChar({ languages: langs });
    this.render();
  },

  removeSpell(i) {
    const ch = this.getChar();
    if (!ch) return;
    const spells = ch.spells || [];
    spells.splice(i, 1);
    this.updateChar({ spells });
    this.render();
  },

  deleteCharacterFromSheet() {
    const ch = this.getChar();
    if (!ch) return;
    if (!confirm(`Delete ${ch.name}? This cannot be undone.`)) return;
    this.state.characters = this.state.characters.filter(c => c.id !== ch.id);
    this.save();
    this.toast('Character deleted');
    this.navigate('characters');
  },

  // --- Spell Progression Data ---
  // Maps class → { baseSchools, tierLevels: {tier: level}, subclassSchools: {subclass: [schools]} }
  SPELL_PROGRESSION: {
    'Mage': {
      baseSchools: ['fire', 'ice', 'lightning'],
      tierLevels: {0:1, 1:2, 2:4, 3:6, 4:8, 5:10, 6:12, 7:14, 8:16, 9:18},
      subclassSchools: { 'Invoker of Chaos': ['wind'], 'Invoker of Control': ['necrotic'] }
    },
    'Oathsworn': {
      baseSchools: ['radiant'],
      tierLevels: {0:2, 1:2, 2:4, 3:6, 4:8, 5:10, 6:13, 7:17},
      subclassSchools: {}
    },
    'Shadowmancer': {
      baseSchools: ['necrotic'],
      tierLevels: {0:1, 1:2, 2:5, 3:7, 4:10, 5:13, 6:16, 7:19},
      subclassSchools: { 'Pact of the Red Dragon': ['fire'], 'Pact of the Abyssal Depths': ['ice'] }
    },
    'Shepherd': {
      baseSchools: ['radiant', 'necrotic'],
      tierLevels: {0:1, 1:2, 2:4, 3:6, 4:8, 5:10, 6:12, 7:14, 8:16, 9:18},
      subclassSchools: {}
    },
    'Songweaver': {
      baseSchools: ['wind'],
      tierLevels: {0:1, 1:2, 2:4, 3:6, 4:8, 5:10, 6:12, 7:14, 8:16, 9:18},
      subclassSchools: {}
      // Note: Songweaver picks 1 additional school at creation — tracked in ch.songweaverSchool
    },
    'Stormshifter': {
      baseSchools: ['lightning', 'wind'],
      tierLevels: {0:1, 1:2, 2:4, 3:6, 4:8, 5:10, 6:12, 7:14, 8:16, 9:18},
      subclassSchools: {}
      // Circle of Sky & Storm picks Ice or Radiant at L3 — tracked in ch.stormshifterSchool
    },
    'Hexbinder': {
      baseSchools: ['necrotic'],
      tierLevels: {0:1, 1:2, 2:4, 3:6, 4:8, 5:10, 6:12, 7:14, 8:16, 9:18},
      subclassSchools: { 'Circle of Thorns': ['wind'], 'Circle of Shadows': ['ice'] }
    },
  },

  // Classify an ability as 'active', 'passive', or 'reference'.
  // - active    : combat actions / reactions the player invokes (e.g., Searing Light)
  // - passive   : always-on effects or triggered bonuses (e.g., Merciful Light)
  // - reference : milestone / informational (unlocks shown elsewhere, cantrip access, stat increases)
  // If the ability has an explicit `type` field, that takes priority (manual override).
  classifyAbilityType(ability) {
    if (!ability) return 'passive';
    if (ability.type && ['active','passive','reference'].includes(ability.type)) return ability.type;
    const name = (ability.name || '').trim();
    const desc = (ability.description || '').trim();

    // --- Reference detection ---
    // Pure milestone / informational features
    const refNameRx = /^(Tier \d+ Spells?|Key Stat Increase|Secondary Stat Increase|Upgraded Cantrips|More Mana|Mana Increase|Mana and Unlock|Mana & Unlock|Master of Twilight)(\s*\(\d+\))?$/i;
    if (refNameRx.test(name)) return 'reference';
    // Feature that just grants access to spells/cantrips or unlocks tiers
    if (/^you know (radiant|necrotic|fire|ice|lightning|wind|all) (and )?(radiant|necrotic|fire|ice|lightning|wind|) ?(cantrips|spells|utility)/i.test(desc)) return 'reference';
    if (/^you (unlock|gain access to|may now cast) /i.test(desc)) return 'reference';
    // Ancestry-style "just a name" features with no real mechanic get passive by default,
    // but Devoted Protector (background) is a reference once wounds are shown elsewhere.
    if (/survive \+\d+ max\s*wounds?/i.test(desc)) return 'reference';

    // --- Active detection ---
    // Starts with "Action:" / "Reaction:" (possibly after a usage-limit parenthetical)
    if (/^(?:\([^)]+\)\s*)?(action|reaction)\s*:/i.test(desc)) return 'active';
    // Usage limit prefix indicates active: "(WIL times/Safe Rest)", "(3/Safe Rest)", "(1/round)"
    if (/^\(\s*(\d+|[A-Z]{3})(\s+times?)?\s*\/\s*(safe rest|short rest|round|turn|encounter)/i.test(desc)) return 'active';
    // Contains "Action:" or "Reaction:" later in description (often means it grants an action)
    if (/\b(action|reaction)\s*:/i.test(desc)) return 'active';
    // "As an Action, ..." / "As a Reaction, ..." / "As a bonus action, ..."
    if (/\bas (an action|a reaction|a bonus action)\b/i.test(desc)) return 'active';
    // "Spend/Take/Use an action to ..." / "Spend/Use a reaction to ..."
    if (/\b(spend|take|use) (an action|a reaction|a bonus action)\b/i.test(desc)) return 'active';

    // --- Passive by default (catch-all for triggered effects, auras, bonuses) ---
    return 'passive';
  },

  // Return array of ability objects whose description references `spellName` as a proper noun.
  // Used to surface passive spell-modifiers as sub-notes under the affected spell card.
  // Skips single-word spell names (too ambiguous — e.g., "Heal" overlaps with the verb "heal").
  // Matches case-sensitively so common verbs don't false-positive.
  getAbilitiesModifyingSpell(spellName, abilities) {
    if (!spellName || !Array.isArray(abilities)) return [];
    // Single-word spell names are too ambiguous; skip them.
    if (spellName.trim().split(/\s+/).length < 2) return [];
    const rx = new RegExp(`\\b${spellName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\b`); // case-sensitive
    return abilities.filter(a => {
      if (!a || !a.description) return false;
      if (a.name === spellName) return false; // skip self
      return rx.test(a.description);
    });
  },

  // Compute bonus max Wounds granted by character's abilities.
  // Scans ability descriptions for patterns like "+3 max Wounds" or
  // "survive +N max Wounds" and sums them up. Background mechanics are
  // copied into abilities on creation so we only scan abilities to avoid
  // double-counting.
  // Enrich an inventory item name by matching against EQUIPMENT presets.
  // Returns an item object with category + stats (weapon damage, armor formula, shield bonus).
  // Falls back to { name, slots: 1, category: 'other' } if no match found.
  enrichInventoryItem(name, eq) {
    const normalize = s => String(s).toLowerCase().replace(/^\d+\s+/, '').replace(/\s*\([^)]*\)\s*$/, '').trim();
    const singular = s => s.endsWith('s') && !s.endsWith('ss') ? s.slice(0, -1) : s;
    const target = normalize(name);
    const targetSing = singular(target);
    const matches = presetName => {
      const p = normalize(presetName);
      return p === target || p === targetSing || singular(p) === target || singular(p) === targetSing;
    };
    // Weapons
    const allWeapons = [...(eq.weapons?.melee || []), ...(eq.weapons?.ranged || [])];
    for (const w of allWeapons) {
      if (matches(w.name)) {
        return { name, slots: 1, category: 'weapon', damage: w.damage, damageType: w.damageType, properties: [...(w.properties || [])] };
      }
    }
    // Armor
    const allArmor = [...(eq.armor?.cloth || []), ...(eq.armor?.leather || []), ...(eq.armor?.mail || []), ...(eq.armor?.plate || [])];
    for (const a of allArmor) {
      if (matches(a.name)) {
        return { name, slots: 1, category: 'armor', formula: { ...a.formula } };
      }
    }
    // Shields
    for (const s of (eq.shields || [])) {
      if (matches(s.name)) {
        return { name, slots: 1, category: 'shield', shieldArmor: s.shieldArmor };
      }
    }
    // Fallback — generic item
    return { name, slots: 1, category: 'other' };
  },

  // --- Armor auto-calculation ---
  // Returns { total, breakdown, isAuto } for the character's current armor
  // Follows Nimble §22: unarmored = DEX; equipped armor uses its formula; shield armor adds;
  // class features may modify (e.g., Zephyr Iron Defense: unarmored = STR+DEX, doubled at L13)
  // If no categorized armor/shield is equipped AND character has no class-specific armor feature,
  // falls back to the manual ch.armor value (legacy/manual).
  calculateArmor(ch) {
    if (!ch) return { total: 0, breakdown: [], isAuto: false };
    const stats = ch.stats || {};
    const dex = stats.DEX || 0;
    const str = stats.STR || 0;
    const inv = ch.inventory || [];
    const equippedArmor = inv.find(it => it.equipped && it.category === 'armor');
    const equippedShield = inv.find(it => it.equipped && it.category === 'shield');
    const zephyrIronDef = ch.className === 'Zephyr' && (ch.abilities || []).some(a => a.name === 'Iron Defense');
    const hasAutoCalc = !!equippedArmor || !!equippedShield || zephyrIronDef;

    // Legacy fallback: if no categorized gear & no class feature, use the manual ch.armor
    if (!hasAutoCalc) {
      const manual = ch.armor ?? 0;
      return { total: manual, breakdown: [`Manual: ${manual}`], isAuto: false };
    }

    const breakdown = [];
    let total = 0;
    const isUnarmored = !equippedArmor;

    if (equippedArmor && equippedArmor.formula) {
      const f = equippedArmor.formula;
      const base = f.base || 0;
      let statBonus = 0;
      if (f.statMod === 'DEX') statBonus = dex;
      else if (f.statMod === 'STR') statBonus = str;
      if (f.statMax !== undefined && f.statMax !== null) statBonus = Math.min(statBonus, f.statMax);
      const armorVal = base + statBonus;
      total += armorVal;
      const formulaStr = f.statMod
        ? `${base}+${f.statMod}` + (f.statMax !== undefined ? ` (max ${f.statMax})` : '')
        : `${base}`;
      breakdown.push(`${equippedArmor.name}: ${formulaStr} = ${armorVal}`);
    } else if (isUnarmored) {
      // Unarmored: default = DEX
      total += dex;
      breakdown.push(`Unarmored: DEX = ${dex}`);
    }

    // Zephyr's Iron Defense: while unarmored, armor = STR + DEX (L1), doubled at L13
    if (isUnarmored && zephyrIronDef) {
      total = str + dex;
      breakdown.pop();
      breakdown.push(`Iron Defense (unarmored): STR+DEX = ${total}`);
      const ironDefense2 = (ch.abilities || []).some(a => a.name === 'Iron Defense (2)');
      if (ironDefense2) {
        total = total * 2;
        breakdown.push(`Iron Defense (2): doubled = ${total}`);
      }
    }

    // Shield armor
    if (equippedShield && equippedShield.shieldArmor) {
      total += equippedShield.shieldArmor;
      breakdown.push(`${equippedShield.name}: +${equippedShield.shieldArmor}`);
    }

    // Manual armor modifier (e.g., Fearless -1 background, or manual edits via +/-)
    const mod = ch.armorMod || 0;
    if (mod) {
      total += mod;
      breakdown.push(`Modifier: ${mod >= 0 ? '+' : ''}${mod}`);
    }

    return { total, breakdown, isAuto: true };
  },

  // --- Attacks: equipped weapons + unarmed strike ---
  // Returns an array of attack objects { name, damageDisplay, damageType, properties, notes }
  getCharacterAttacks(ch) {
    if (!ch) return [];
    const stats = ch.stats || {};
    const attacks = [];
    const inv = ch.inventory || [];
    const equippedWeapons = inv.filter(it => it.equipped && it.category === 'weapon');

    equippedWeapons.forEach(w => {
      // Parse damage like "1d6+STR" or "2d4+DEX"
      const rawDamage = w.damage || '';
      let display = rawDamage;
      const m = rawDamage.match(/^([^+]+)\+(STR|DEX|INT|WIL)$/i);
      if (m) {
        const dice = m[1];
        const stat = m[2].toUpperCase();
        const statVal = stats[stat] || 0;
        const sign = statVal >= 0 ? '+' : '';
        display = `${dice}${sign}${statVal} (${stat})`;
      }
      attacks.push({
        name: w.name,
        damageDisplay: display,
        damageType: w.damageType || '',
        properties: w.properties || [],
        notes: w.notes || ''
      });
    });

    // Unarmed Strike — always available. Default: 1d4+STR. Zephyr's Swift Fists: 1d4+STR, no Rushed penalty.
    const strVal = stats.STR || 0;
    const strSign = strVal >= 0 ? '+' : '';
    const swiftFists = (ch.abilities || []).some(a => a.name === 'Swift Fists');
    attacks.push({
      name: 'Unarmed Strike',
      damageDisplay: `1d4${strSign}${strVal} (STR)`,
      damageType: 'Bludgeoning',
      properties: swiftFists ? ['Swift Fists: no Rushed Attack disadvantage'] : [],
      notes: 'Attack with your bare hands or feet.'
    });

    return attacks;
  },

  getBonusWounds(ch) {
    if (!ch) return 0;
    let bonus = 0;
    // Matches "+N max wounds", "additional N max wounds", "-N max wounds"
    const re = /([+-]|additional\s+)(\d+)\s+max(?:imum)?\s+wounds?/gi;
    const seen = new Set();
    (ch.abilities || []).forEach(a => {
      if (!a || !a.description) return;
      // Dedupe by ability name in case the same ability got added twice
      if (seen.has(a.name)) return;
      seen.add(a.name);
      let m;
      re.lastIndex = 0;
      while ((m = re.exec(a.description)) !== null) {
        const sign = m[1] === '-' ? -1 : 1;
        bonus += sign * (parseInt(m[2]) || 0);
      }
    });
    return bonus;
  },

  // Get all spell schools a character currently has access to
  getCharacterSchools(ch) {
    const prog = this.SPELL_PROGRESSION[ch.className];
    if (!prog) return [];
    const schools = [...prog.baseSchools];
    // Subclass schools
    if (ch.subclass && prog.subclassSchools[ch.subclass]) {
      prog.subclassSchools[ch.subclass].forEach(s => { if (!schools.includes(s)) schools.push(s); });
    }
    // Songweaver extra school
    if (ch.songweaverSchool && !schools.includes(ch.songweaverSchool)) schools.push(ch.songweaverSchool);
    // Stormshifter Sky & Storm extra school
    if (ch.stormshifterSchool && !schools.includes(ch.stormshifterSchool)) schools.push(ch.stormshifterSchool);
    return schools;
  },

  // Get max spell tier a character can cast at their current level
  getMaxSpellTier(ch) {
    const prog = this.SPELL_PROGRESSION[ch.className];
    if (!prog) return -1;
    let maxTier = -1;
    for (const [tier, lvl] of Object.entries(prog.tierLevels)) {
      if ((ch.level || 1) >= lvl) maxTier = Math.max(maxTier, parseInt(tier));
    }
    return maxTier;
  },

  // Auto-load spells for a character based on their class, subclass, level
  // Look up a character's current subclass data (from SUBCLASSES.classKey OR SUBCLASSES.storyBased)
  getSubclassData(ch) {
    if (!ch || !ch.subclass) return null;
    const data = this.getData();
    const classKey = (ch.className || '').toLowerCase().replace(/^the\s+/, '');
    const pool = [
      ...((data.subclasses || {})[classKey] || []),
      ...((data.subclasses || {}).storyBased || [])
    ];
    return pool.find(s => s.name === ch.subclass && (!s.className || s.className === ch.className)) || null;
  },

  autoLoadSpells(ch) {
    const schools = this.getCharacterSchools(ch);
    const maxTier = this.getMaxSpellTier(ch);
    if (maxTier < 0 || schools.length === 0) return ch.spells || [];

    const data = this.getData();
    const spellData = data.spells || {};
    const spells = [...(ch.spells || [])];

    schools.forEach(school => {
      const schoolData = spellData[school];
      if (!schoolData) return;
      // Add cantrips (tier 0)
      if (maxTier >= 0 && schoolData.cantrips) {
        schoolData.cantrips.forEach(sp => {
          if (!spells.find(s => s.name === sp.name)) {
            spells.push({ name: sp.name, tier: 0, school, actions: sp.actions, range: sp.range || sp.reach, damage: sp.damage || 'None', description: sp.description || '' });
          }
        });
      }
      // Add tiered spells
      if (schoolData.spells) {
        schoolData.spells.forEach(sp => {
          if (sp.tier <= maxTier && !spells.find(s => s.name === sp.name)) {
            spells.push({ name: sp.name, tier: sp.tier, school, actions: sp.actions, range: sp.range || sp.reach, damage: sp.damage || 'None', description: sp.description || '' });
          }
        });
      }
    });

    // Also add class-specific spells (Shadowmancer Shadow Blast, etc.) — applying subclass blocks/grants
    // blocksClassSpecific can be an array of spell names (e.g., Reaver blocks only ['Shadow Blast'])
    //   or `true` for backward-compat (blocks all class-specific spells)
    // requiresSubclass on a spell: only include when character has that subclass (e.g., Bonescythe → Reaver)
    const subclassData = this.getSubclassData(ch);
    const blocks = subclassData?.blocksClassSpecific;
    const isBlocked = (spellName) => {
      if (!blocks) return false;
      if (blocks === true) return true;                    // legacy: block all
      if (Array.isArray(blocks)) return blocks.includes(spellName);
      return false;
    };
    if (spellData.classSpecific?.spells) {
      spellData.classSpecific.spells.forEach(sp => {
        if (sp.class !== ch.className) return;
        if (isBlocked(sp.name)) return;
        // If spell requires a specific subclass, only add if character has it
        if (sp.requiresSubclass && ch.subclass !== sp.requiresSubclass) return;
        if (spells.find(s => s.name === sp.name)) return;
        const prog = this.SPELL_PROGRESSION[ch.className];
        if (prog) {
          const spTier = sp.tier || 0;
          if (spTier <= maxTier) {
            spells.push({ name: sp.name, tier: sp.tier, school: 'classSpecific', actions: sp.actions, range: sp.range || sp.reach, damage: sp.damage || 'None', description: sp.description || '' });
          }
        }
      });
    }

    // Also add hexbinder spells
    if (ch.className === 'Hexbinder' && spellData.hexbinder?.spells) {
      spellData.hexbinder.spells.forEach(sp => {
        if ((sp.tier || 0) <= maxTier && !spells.find(s => s.name === sp.name)) {
          spells.push({ name: sp.name, tier: sp.tier, school: 'hexbinder', actions: sp.actions, range: sp.range || sp.reach, damage: sp.damage || 'None', description: sp.description || '' });
        }
      });
    }

    return spells;
  },

  // --- Level Up System ---
  levelUpState: null,

  // Maps feature name patterns to class data array properties for ability choices
  CHOICE_ARRAYS: {
    'Savage Arsenal': 'savageArsenal',
    'Underhanded Ability': 'underhandedAbilities',
    "Commander's Orders": 'commandersOrders',
    'Fit for Any Battlefield': 'combatTactics',
    'Weapon Mastery': 'weaponMastery',
    'Thrill of the Hunt': 'thrillOfTheHuntAbilities',
    'Spellshaper': 'spellshaperAbilities',
    'Sacred Decree': 'sacredDecrees',
    'Sacred Grace': 'sacredGraces',
    'Master of Radiance': 'sacredDecrees',
    'Lyrical Weaponry': 'lyricalWeaponry',
    'A "People" Person': 'aPeoplePersonFriends',
    'Chimeric Boon': 'chimericBoons',
    'Martial Master': 'martialArts',
    'Gadgeteer': 'gadgets',
    'A Gift from the Master': 'greaterInvocations',
    'Lesser Invocation': 'lesserInvocations',
    'Affliction': 'afflictions',
    'Mystic Mark': 'mysticMarks',
  },

  getChoiceArrayKey(featureName) {
    const baseName = featureName.replace(/\s*\(\d+\)\s*$/, '');
    for (const [pattern, arrayProp] of Object.entries(this.CHOICE_ARRAYS)) {
      if (baseName === pattern) return arrayProp;
    }
    return null;
  },

  categorizeFeature(f, i, ch) {
    if (f.name === 'Subclass') return { type: 'subclass', feature: f, index: i };
    if (f.name === 'Subclass Feature') return { type: 'subclassFeature', feature: f, index: i };
    if (f.name.includes('Stat Increase')) {
      const match = f.description.match(/\+1\s+(?:to\s+)?(\w+)\s+or\s+(\w+)/i);
      return { type: 'statIncrease', feature: f, index: i, options: match ? [match[1], match[2]] : [] };
    }
    // Multi-stat increase: "+1 to any N of your stats" (e.g., Twilight Sage L20: +1 to any 2 stats)
    const multiStat = f.description.match(/\+1\s+to\s+any\s+(\d+)\s+of\s+your\s+stats/i);
    if (multiStat) {
      return { type: 'statIncreaseMulti', feature: f, index: i, numPicks: parseInt(multiStat[1]) };
    }
    // Epic Boon: "Choose an Epic Boon" — player picks their own (from GM's Guide, not in our data)
    if (/^epic boon$/i.test(f.name) || /choose an epic boon/i.test(f.description)) {
      return { type: 'epicBoon', feature: f, index: i };
    }
    // Utility spell choices
    if (/utility spell/i.test(f.description)) {
      const schoolNames = ['fire','ice','lightning','wind','radiant','necrotic'];
      const namedSchools = schoolNames.filter(s => new RegExp(`\\b${s}\\b`, 'i').test(f.description));
      const isAll = /know all/i.test(f.description);
      // Matches "each spell school you know" OR "the spell schools you know" (dynamic set based on character's schools)
      const fromEach = /(?:each spell school|the spell schools)\s+you know/i.test(f.description);
      // Mage pattern: "Learn the Utility Spells from [1|a|a 2nd|a 3rd|another] spell school you know"
      const pickASchool = /(?:learn|choose)\s+(?:the\s+)?utility spells?\s+from\s+(?:\d+|a|one|another|an additional)\s+(?:\d+(?:st|nd|rd|th)\s+)?spell school\s+you know/i.test(f.description);
      // Resolve dynamic schools from character's accessible schools (Wind + Songweaver's extra, etc.)
      const charSchools = (ch && this.getCharacterSchools) ? this.getCharacterSchools(ch) : [];

      // Mage "pick a school, learn all utility spells from it"
      if (pickASchool) {
        const mNum = f.description.match(/from\s+(\d+)\s+spell school/i);
        const numSchools = mNum ? parseInt(mNum[1]) : 1;
        return { type: 'utilityAllPickSchool', feature: f, index: i, numSchools };
      }
      // "You know all X Utility Spells" — explicit schools
      if (isAll && namedSchools.length > 0) {
        return { type: 'utilityAll', feature: f, index: i, schools: namedSchools };
      }
      // "You know all Utility Spells from the spell schools you know" — dynamic (Songweaver Windbag 3)
      if (isAll && fromEach && charSchools.length > 0) {
        return { type: 'utilityAll', feature: f, index: i, schools: charSchools };
      }
      // "Choose/Learn a Utility Spell from each spell school you know" — dynamic schools (Songweaver Windbag, Stormshifter Stormcaller)
      if (fromEach && /choose|learn/i.test(f.description) && charSchools.length > 0) {
        const mCount = f.description.match(/(?:choose|learn)\s+(?:a\s+)?(\d+|\w+)(?:st|nd|rd|th)?\s+utility spell/i);
        // Default to 1 new spell per school per feature instance
        return { type: 'utilitySpellChoice', feature: f, index: i, schools: charSchools, numPerSchool: 1 };
      }
      // Named schools with choose/learn (Oathsworn Master of Radiance, Shadowmancer Shadowmastery, Shepherd Master of Twilight)
      if (/choose|learn/i.test(f.description) && namedSchools.length > 0) {
        const mCount = f.description.match(/choose\s+(\d+)\s+\w+\s+and/i);
        const numPerSchool = mCount ? parseInt(mCount[1]) : 1;
        return { type: 'utilitySpellChoice', feature: f, index: i, schools: namedSchools, numPerSchool };
      }
    }
    const arrayProp = this.getChoiceArrayKey(f.name);
    if (arrayProp && /choose|learn/i.test(f.description)) {
      const m = f.description.match(/(?:Choose|Learn)\s+(\d+)(?!st|nd|rd|th)\s/i);
      const numChoices = m ? parseInt(m[1]) : 1;
      return { type: 'abilityChoice', feature: f, index: i, arrayProp, numChoices };
    }
    return { type: 'auto', feature: f, index: i };
  },

  levelUp() {
    const ch = this.getChar();
    if (!ch) return;
    const data = this.getData();
    const classData = (data.classes || []).find(c => c.name === ch.className);
    const newLevel = (ch.level || 1) + 1;
    const dieSize = parseInt((ch.hitDice || 'd8').replace('d', ''));
    const roll1 = Math.floor(Math.random() * dieSize) + 1;
    const roll2 = Math.floor(Math.random() * dieSize) + 1;
    const newFeatures = classData?.levels?.[newLevel] || [];
    // Pass a projected character (at new level) so dynamic school resolution is correct
    const projectedChar = { ...ch, level: newLevel };
    const categorized = newFeatures.map((f, i) => this.categorizeFeature(f, i, projectedChar));

    // Get subclass options for this class
    const subclasses = data.subclasses || {};
    const classKey = ch.className.toLowerCase().replace(/^the\s+/, '');
    const subclassOptions = subclasses[classKey] || [];

    this.levelUpState = {
      newLevel, dieSize, roll1, roll2,
      hpGain: Math.max(roll1, roll2),
      manualHP: false, manualHPValue: '',
      skillPoint: null, swapFrom: null, swapTo: null,
      newFeatures, classData, categorized,
      subclassOptions,
      subclassChoice: null,
      statChoices: {},
      abilityChoices: {},
      utilityChoices: {},   // { [featureIndex]: { [school]: [spellName, ...] } }
      utilitySchoolPicks: {}, // { [featureIndex]: ['fire', ...] } for Mage Elemental Mastery-style picks
      statMultiChoices: {}, // { [featureIndex]: ['STR', 'WIL'] } for Twilight Sage-style multi picks
      epicBoonChoices: {},  // { [featureIndex]: { name, description } }
      fiendishBoonStat: null,
      stormshifterSchool: null, // Circle of Sky & Storm: 'ice' | 'radiant'
    };
    this.renderLevelUpModal();
  },

  renderLevelUpModal() {
    const ch = this.getChar();
    const st = this.levelUpState;
    if (!ch || !st) return;
    const data = this.getData();
    const skills = data.skills || [];
    const stats = ch.stats || {};
    const charSkills = ch.skillBonuses || {};

    let html = `<h3>Level Up to ${st.newLevel}</h3>`;

    // --- HP Roll ---
    html += `<div style="margin-bottom:16px">
      <div style="font-weight:bold;color:var(--burgundy);margin-bottom:6px">HP Increase (${ch.hitDice} with advantage)
        <button class="btn btn-small btn-secondary" style="font-size:0.6rem;padding:1px 6px;min-height:0;margin-left:8px;vertical-align:middle"
          onclick="app.toggleManualHP()">${st.manualHP ? '🎲 Digital' : '✋ Manual'}</button>
      </div>`;
    if (st.manualHP) {
      html += `<div style="display:flex;align-items:center;gap:8px;justify-content:center">
        <span style="font-size:0.8rem">Roll 1:</span>
        <input type="number" min="1" max="${st.dieSize}" value="${st.manualHPValue.split(',')[0] || ''}"
          style="width:50px;padding:4px;border:1px solid var(--leather);border-radius:4px;text-align:center;font-size:1rem"
          onchange="app.setManualHP(0, this.value)">
        <span style="font-size:0.8rem">Roll 2:</span>
        <input type="number" min="1" max="${st.dieSize}" value="${st.manualHPValue.split(',')[1] || ''}"
          style="width:50px;padding:4px;border:1px solid var(--leather);border-radius:4px;text-align:center;font-size:1rem"
          onchange="app.setManualHP(1, this.value)">
      </div>
      <div style="text-align:center;margin-top:6px;font-size:0.85rem;color:var(--ink-light)">+${st.hpGain} HP${st.hpGain > 0 ? ' (taking the higher roll)' : ' — enter your dice rolls'}</div>`;
    } else {
      html += `<div style="display:flex;align-items:center;gap:12px;justify-content:center">
        <span style="padding:6px 14px;border-radius:8px;font-size:1.1rem;font-weight:bold;${st.roll1 >= st.roll2 ? 'background:var(--gold);color:#fff' : 'background:#ddd;color:#999;text-decoration:line-through'}">${st.roll1}</span>
        <span style="padding:6px 14px;border-radius:8px;font-size:1.1rem;font-weight:bold;${st.roll2 >= st.roll1 ? 'background:var(--gold);color:#fff' : 'background:#ddd;color:#999;text-decoration:line-through'}">${st.roll2}</span>
      </div>
      <div style="text-align:center;margin-top:6px;font-size:0.85rem;color:var(--ink-light)">+${st.hpGain} HP (took the higher roll)</div>
      <div style="text-align:center;margin-top:2px"><button class="btn btn-small btn-secondary" style="font-size:0.7rem" onclick="app.rerollLevelUpHP()">Re-roll</button></div>`;
    }
    html += `</div>`;

    // --- More Endurance ---
    html += `<div style="margin-bottom:16px">
      <div style="font-weight:bold;color:var(--burgundy);margin-bottom:4px">More Endurance</div>
      <div style="font-size:0.8rem;color:var(--ink-light)">Hit Dice max increases to <strong>${st.newLevel}</strong> (equal to your level).</div>
    </div>`;

    // --- Skill Point (+1) ---
    html += `<div style="margin-bottom:16px">
      <div style="font-weight:bold;color:var(--burgundy);margin-bottom:6px">Gain 1 Skill Point</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px">`;
    skills.forEach(sk => {
      const bonus = charSkills[sk.name] || 0;
      const total = (stats[sk.stat] || 0) + bonus;
      const selected = st.skillPoint === sk.name;
      const extraFromSwap = (st.swapTo === sk.name ? 1 : 0) - (st.swapFrom === sk.name ? 1 : 0);
      const display = total + (selected ? 1 : 0) + extraFromSwap;
      const atMax = bonus + (selected ? 1 : 0) + extraFromSwap >= 12;
      html += `<button class="btn btn-small ${selected ? 'btn-primary' : 'btn-secondary'}"
        style="font-size:0.65rem;padding:3px 6px;min-height:0;${atMax && !selected ? 'opacity:0.4' : ''}"
        onclick="app.setLevelUpSkill('${sk.name}')" ${atMax && !selected ? 'disabled' : ''}>
        ${sk.name} (${display >= 0 ? '+' : ''}${display})
      </button>`;
    });
    html += `</div></div>`;

    // --- Optional Skill Swap ---
    html += `<div style="margin-bottom:16px">
      <div style="font-weight:bold;color:var(--burgundy);margin-bottom:4px">Optional: Move 1 Skill Point</div>
      <div style="font-size:0.75rem;color:var(--ink-light);margin-bottom:6px">Move -1 from one skill to +1 in another (no negatives allowed)</div>`;
    html += `<div style="margin-bottom:4px;font-size:0.75rem;font-weight:bold">Remove from:</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">
      <button class="btn btn-small ${!st.swapFrom ? 'btn-primary' : 'btn-secondary'}"
        style="font-size:0.65rem;padding:3px 6px;min-height:0"
        onclick="app.setLevelUpSwapFrom(null)">None</button>`;
    skills.forEach(sk => {
      const bonus = charSkills[sk.name] || 0;
      const addedPoint = st.skillPoint === sk.name ? 1 : 0;
      const canRemove = bonus + addedPoint > 0;
      const selected = st.swapFrom === sk.name;
      if (canRemove || selected) {
        html += `<button class="btn btn-small ${selected ? 'btn-primary' : 'btn-secondary'}"
          style="font-size:0.65rem;padding:3px 6px;min-height:0"
          onclick="app.setLevelUpSwapFrom('${sk.name}')">${sk.name}</button>`;
      }
    });
    html += `</div>`;
    if (st.swapFrom) {
      html += `<div style="margin-bottom:4px;font-size:0.75rem;font-weight:bold">Add to:</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">`;
      skills.forEach(sk => {
        if (sk.name === st.swapFrom) return;
        const bonus = charSkills[sk.name] || 0;
        const addedPoint = st.skillPoint === sk.name ? 1 : 0;
        const swapExtra = st.swapTo === sk.name ? 1 : 0;
        const atMax = bonus + addedPoint + swapExtra >= 12;
        const selected = st.swapTo === sk.name;
        html += `<button class="btn btn-small ${selected ? 'btn-primary' : 'btn-secondary'}"
          style="font-size:0.65rem;padding:3px 6px;min-height:0;${atMax && !selected ? 'opacity:0.4' : ''}"
          onclick="app.setLevelUpSwapTo('${sk.name}')" ${atMax && !selected ? 'disabled' : ''}>${sk.name}</button>`;
      });
      html += `</div>`;
    }
    html += `</div>`;

    // --- Subclass Selection (Level 3) ---
    st.categorized.filter(c => c.type === 'subclass').forEach(cat => {
      html += `<div style="margin-bottom:16px">
        <div style="font-weight:bold;color:var(--burgundy);margin-bottom:6px;font-size:0.95rem">Choose Your Subclass</div>
        <div style="font-size:0.75rem;color:var(--ink-light);margin-bottom:8px">${this.esc(cat.feature.description)}</div>`;
      st.subclassOptions.forEach((sub, si) => {
        const selected = st.subclassChoice === sub.name;
        const features3 = sub.features?.[3] || sub.features?.[st.newLevel] || [];
        html += `<div onclick="app.setLevelUpSubclass(${si})"
          style="background:${selected ? 'var(--gold)' : 'var(--parchment-dark)'};
          color:${selected ? '#fff' : 'var(--ink)'};
          padding:8px 12px;border-radius:8px;margin-bottom:6px;cursor:pointer;
          border:2px solid ${selected ? 'var(--burgundy)' : 'transparent'}">
          <div style="font-weight:bold;font-size:0.85rem">${this.esc(sub.name)}</div>`;
        features3.forEach(f3 => {
          html += `<div style="font-size:0.7rem;margin-top:2px;opacity:0.85"><strong>${this.esc(f3.name)}:</strong> ${this.esc(f3.description)}</div>`;
        });
        html += `</div>`;
      });
      html += `</div>`;

      // Stormshifter: Circle of Sky & Storm picks Ice or Radiant (Deepening Study)
      if (st.subclassChoice === 'Circle of Sky & Storm') {
        const opts = [
          { key: 'ice', label: '❄ Ice' },
          { key: 'radiant', label: '☀ Radiant' }
        ];
        html += `<div style="margin-bottom:16px;padding:10px;background:var(--parchment-dark);border-radius:8px">
          <div style="font-weight:bold;color:var(--burgundy);margin-bottom:6px;font-size:0.85rem">Deepening Study</div>
          <div style="font-size:0.7rem;color:var(--ink-light);margin-bottom:6px">Choose the Ice or Radiant school to learn.</div>
          <div style="display:flex;gap:8px;justify-content:center">`;
        opts.forEach(o => {
          const sel = st.stormshifterSchool === o.key;
          html += `<button class="btn ${sel ? 'btn-primary' : 'btn-secondary'}" style="min-width:100px"
            onclick="app.setLevelUpStormshifterSchool('${o.key}')">${o.label}</button>`;
        });
        html += `</div></div>`;
      }
    });

    // --- Stat Increases ---
    st.categorized.filter(c => c.type === 'statIncrease').forEach(cat => {
      const chosen = st.statChoices[cat.index];
      html += `<div style="margin-bottom:16px">
        <div style="font-weight:bold;color:var(--burgundy);margin-bottom:6px">${this.esc(cat.feature.name)}</div>
        <div style="display:flex;gap:8px;justify-content:center">`;
      cat.options.forEach(stat => {
        const selected = chosen === stat;
        const currentVal = stats[stat] || 0;
        html += `<button class="btn ${selected ? 'btn-primary' : 'btn-secondary'}"
          style="min-width:80px"
          onclick="app.setLevelUpStat(${cat.index}, '${stat}')">
          ${stat} (${currentVal >= 0 ? '+' : ''}${currentVal} → ${currentVal >= 0 ? '+' : ''}${currentVal + 1})
        </button>`;
      });
      html += `</div></div>`;
    });

    // --- Multi Stat Increase (e.g., Twilight Sage: +1 to any 2 stats) ---
    st.categorized.filter(c => c.type === 'statIncreaseMulti').forEach(cat => {
      const chosen = st.statMultiChoices[cat.index] || [];
      const remaining = cat.numPicks - chosen.length;
      html += `<div style="margin-bottom:16px">
        <div style="font-weight:bold;color:var(--burgundy);margin-bottom:4px">${this.esc(cat.feature.name)}</div>
        <div style="font-size:0.75rem;color:var(--ink-light);margin-bottom:6px">${this.esc(cat.feature.description || '')}</div>
        <div style="font-size:0.7rem;color:var(--ink-light);margin-bottom:6px">Pick ${cat.numPicks}${remaining > 0 && remaining < cat.numPicks ? ` (${remaining} left)` : ''}</div>
        <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap">`;
      ['STR','DEX','INT','WIL'].forEach(stat => {
        const isPicked = chosen.includes(stat);
        const atMax = chosen.length >= cat.numPicks && !isPicked;
        const currentVal = stats[stat] || 0;
        const newVal = isPicked ? currentVal + 1 : currentVal;
        const disabledStyle = atMax ? 'opacity:0.5;pointer-events:none;' : '';
        html += `<button class="btn ${isPicked ? 'btn-primary' : 'btn-secondary'}"
          style="min-width:80px;${disabledStyle}"
          onclick="app.toggleLevelUpStatMulti(${cat.index}, '${stat}')">
          ${stat} (${currentVal >= 0 ? '+' : ''}${currentVal}${isPicked ? ' → ' + (newVal >= 0 ? '+' : '') + newVal : ''})
        </button>`;
      });
      html += `</div></div>`;
    });

    // --- Epic Boon (player-written, GM-approved) ---
    st.categorized.filter(c => c.type === 'epicBoon').forEach(cat => {
      const current = st.epicBoonChoices[cat.index] || { name: '', description: '' };
      html += `<div style="margin-bottom:16px;padding:10px;background:var(--parchment);border:2px solid var(--gold);border-radius:6px">
        <div style="font-weight:bold;color:var(--burgundy);margin-bottom:4px">&#127775; ${this.esc(cat.feature.name)}</div>
        <div style="font-size:0.7rem;color:var(--ink-light);margin-bottom:8px">Epic Boons are chosen from the GM's Guide (pg. 23). Ask your GM for the list, then write the boon name and description below.</div>
        <input type="text" placeholder="Boon name (e.g., Boon of Fate)"
          value="${this.esc(current.name)}"
          style="width:100%;padding:6px 8px;border:1px solid var(--parchment-edge);border-radius:4px;margin-bottom:6px;font-size:0.85rem;font-family:inherit"
          oninput="app.setEpicBoon(${cat.index}, 'name', this.value)">
        <textarea placeholder="Boon description (copy from GM's Guide or describe it)"
          style="width:100%;padding:6px 8px;border:1px solid var(--parchment-edge);border-radius:4px;font-size:0.8rem;font-family:inherit;min-height:60px;resize:vertical"
          oninput="app.setEpicBoon(${cat.index}, 'description', this.value)">${this.esc(current.description)}</textarea>
      </div>`;
    });

    // --- Ability Choices (pick from class arrays) ---
    st.categorized.filter(c => c.type === 'abilityChoice').forEach(cat => {
      const alreadyChosen = (ch.chosenAbilities || {})[cat.arrayProp] || [];
      const newlyChosen = st.abilityChoices[cat.index] || [];
      const availableAbilities = st.classData?.[cat.arrayProp] || [];
      const remaining = cat.numChoices - newlyChosen.length;

      html += `<div style="margin-bottom:16px">
        <div style="font-weight:bold;color:var(--burgundy);margin-bottom:4px">${this.esc(cat.feature.name)}</div>
        <div style="font-size:0.75rem;color:var(--ink-light);margin-bottom:6px">Pick ${cat.numChoices}${remaining > 0 && remaining < cat.numChoices ? ` (${remaining} remaining)` : ''}</div>
        <div style="display:flex;flex-direction:column;gap:4px">`;
      availableAbilities.forEach((ab, ai) => {
        const isPrev = alreadyChosen.includes(ab.name);
        const isNew = newlyChosen.includes(ab.name);
        const atMax = newlyChosen.length >= cat.numChoices && !isNew;
        const clickable = !isPrev && !atMax;
        html += `<div onclick="${clickable ? `app.toggleLevelUpAbility(${cat.index},${ai})` : ''}"
          style="background:${isNew ? 'var(--gold)' : isPrev ? '#ddd' : 'var(--parchment-dark)'};
          color:${isNew ? '#fff' : isPrev ? '#999' : 'var(--ink)'};
          padding:6px 8px;border-radius:6px;cursor:${clickable ? 'pointer' : 'default'};
          opacity:${isPrev ? '0.5' : atMax ? '0.6' : '1'};
          border:2px solid ${isNew ? 'var(--burgundy)' : 'transparent'}">
          <div style="font-weight:bold;font-size:0.75rem">${this.esc(ab.name)}${isPrev ? ' (already chosen)' : ''}</div>
          <div style="font-size:0.65rem;color:${isNew ? '#ffe' : 'var(--ink-light)'}">${this.esc(ab.description)}</div>
        </div>`;
      });
      // Fiendish Boon sub-picker: choose DEX or INT
      if (newlyChosen.includes('Fiendish Boon')) {
        const fbStat = st.fiendishBoonStat || null;
        html += `<div style="margin-top:8px;padding:8px;background:var(--parchment);border:2px solid var(--gold);border-radius:6px">
          <div style="font-weight:bold;font-size:0.8rem;color:var(--burgundy);margin-bottom:4px">Fiendish Boon: Choose Stat to Increase</div>
          <div style="font-size:0.7rem;color:var(--ink-light);margin-bottom:6px">+1 to DEX or INT. You lose 1 maximum Hit Die.</div>
          <div style="display:flex;gap:8px;justify-content:center">
            <button class="btn ${fbStat === 'DEX' ? 'btn-primary' : 'btn-secondary'}" style="min-width:80px"
              onclick="app.levelUpState.fiendishBoonStat=app.levelUpState.fiendishBoonStat==='DEX'?null:'DEX';app.renderLevelUpModal()">
              DEX (${(stats.DEX||0)>=0?'+':''}${stats.DEX||0} → ${(stats.DEX||0)>=0?'+':''}${(stats.DEX||0)+1})
            </button>
            <button class="btn ${fbStat === 'INT' ? 'btn-primary' : 'btn-secondary'}" style="min-width:80px"
              onclick="app.levelUpState.fiendishBoonStat=app.levelUpState.fiendishBoonStat==='INT'?null:'INT';app.renderLevelUpModal()">
              INT (${(stats.INT||0)>=0?'+':''}${stats.INT||0} → ${(stats.INT||0)>=0?'+':''}${(stats.INT||0)+1})
            </button>
          </div>
        </div>`;
      }

      html += `</div></div>`;
    });

    // --- Utility Spell Choices (e.g., Shepherd Master of Twilight) ---
    const utilityPool = (data.spells && data.spells.utility) || {};
    const schoolIcons = { fire: '&#128293;', ice: '&#10052;', lightning: '&#9889;', wind: '&#127744;', radiant: '&#9728;', necrotic: '&#9760;' };
    st.categorized.filter(c => c.type === 'utilitySpellChoice').forEach(cat => {
      const current = st.utilityChoices[cat.index] || {};
      html += `<div style="margin-bottom:16px">
        <div style="font-weight:bold;color:var(--burgundy);margin-bottom:4px">${this.esc(cat.feature.name)}</div>
        <div style="font-size:0.75rem;color:var(--ink-light);margin-bottom:6px">${this.esc(cat.feature.description || '')}</div>`;
      cat.schools.forEach(school => {
        const spells = utilityPool[school] || [];
        const chosenForSchool = current[school] || [];
        const alreadyKnown = (ch.spells || []).filter(s => s.isUtility && s.school === school).map(s => s.name);
        const remaining = cat.numPerSchool - chosenForSchool.length;
        const icon = schoolIcons[school] || '&#10024;';
        html += `<div style="margin-top:8px;padding:6px;background:var(--parchment);border:1px solid var(--parchment-edge);border-radius:6px">
          <div style="font-weight:bold;font-size:0.8rem;text-transform:capitalize;margin-bottom:4px">${icon} ${school} — Pick ${cat.numPerSchool}${remaining > 0 && remaining < cat.numPerSchool ? ` (${remaining} left)` : ''}</div>`;
        if (spells.length === 0) {
          html += `<div style="font-size:0.7rem;color:var(--ink-light)">No utility spells defined for ${school}.</div>`;
        }
        spells.forEach(sp => {
          const isPrev = alreadyKnown.includes(sp.name);
          const isNew = chosenForSchool.includes(sp.name);
          const atMax = chosenForSchool.length >= cat.numPerSchool && !isNew;
          const clickable = !isPrev && !atMax;
          const safeName = sp.name.replace(/'/g, "\\'");
          html += `<div onclick="${clickable ? `app.toggleUtilitySpell(${cat.index},'${school}','${safeName}')` : ''}"
            style="background:${isNew ? 'var(--gold)' : isPrev ? '#ddd' : 'var(--parchment-dark)'};
            color:${isNew ? '#fff' : isPrev ? '#999' : 'var(--ink)'};
            padding:6px 8px;border-radius:6px;cursor:${clickable ? 'pointer' : 'default'};
            opacity:${isPrev ? '0.5' : atMax ? '0.6' : '1'};margin-bottom:4px;
            border:2px solid ${isNew ? 'var(--burgundy)' : 'transparent'}">
            <div style="font-weight:bold;font-size:0.75rem">${this.esc(sp.name)}${isPrev ? ' (already known)' : ''}</div>
            <div style="font-size:0.65rem;color:${isNew ? '#ffe' : 'var(--ink-light)'}">${this.esc(sp.description || '')}</div>
          </div>`;
        });
        html += `</div>`;
      });
      html += `</div>`;
    });

    // --- Utility Spell Grants (You know all X Utility Spells) ---
    st.categorized.filter(c => c.type === 'utilityAll').forEach(cat => {
      html += `<div style="margin-bottom:12px;padding:8px;background:var(--parchment);border:2px solid var(--gold);border-radius:6px">
        <div style="font-weight:bold;color:var(--burgundy);margin-bottom:4px">${this.esc(cat.feature.name)}</div>
        <div style="font-size:0.75rem;color:var(--ink-light);margin-bottom:6px">${this.esc(cat.feature.description || '')}</div>
        <div style="font-size:0.7rem;color:var(--ink-light)">✨ All ${cat.schools.join(' and ')} Utility Spells will be added to your spell list.</div>
      </div>`;
    });

    // --- Utility: Pick a school, learn all its utility spells (Mage Elemental Mastery) ---
    st.categorized.filter(c => c.type === 'utilityAllPickSchool').forEach(cat => {
      const chosen = st.utilitySchoolPicks[cat.index] || [];
      const numSchools = cat.numSchools || 1;
      // Only offer schools the character actually has access to (won't include already-picked ones from previous Mastery features)
      const charSchools = this.getCharacterSchools(ch);
      // Exclude schools already learned via prior utilityAllPickSchool features (other instances at lower levels)
      const priorLearned = new Set();
      st.categorized.filter(c => c.type === 'utilityAllPickSchool' && c.index < cat.index).forEach(prior => {
        (st.utilitySchoolPicks[prior.index] || []).forEach(s => priorLearned.add(s));
      });
      // Also exclude schools where the character already knows all utility spells
      (ch.spells || []).filter(s => s.isUtility).forEach(s => {
        const utilsInSchool = ((data.spells && data.spells.utility) || {})[s.school] || [];
        const knownInSchool = (ch.spells || []).filter(sp => sp.isUtility && sp.school === s.school);
        if (utilsInSchool.length > 0 && knownInSchool.length >= utilsInSchool.length) priorLearned.add(s.school);
      });
      html += `<div style="margin-bottom:16px;padding:10px;background:var(--parchment-dark);border-radius:8px">
        <div style="font-weight:bold;color:var(--burgundy);margin-bottom:4px">${this.esc(cat.feature.name)}</div>
        <div style="font-size:0.75rem;color:var(--ink-light);margin-bottom:6px">${this.esc(cat.feature.description || '')}</div>
        <div style="font-size:0.7rem;color:var(--ink-light);margin-bottom:6px">Choose ${numSchools} spell school${numSchools > 1 ? 's' : ''} — you'll learn all Utility Spells from ${numSchools > 1 ? 'each' : 'it'}.</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">`;
      charSchools.forEach(school => {
        const isChosen = chosen.includes(school);
        const alreadyKnown = priorLearned.has(school);
        const icon = schoolIcons[school] || '&#10024;';
        const disabled = alreadyKnown && !isChosen;
        html += `<button class="btn btn-small ${isChosen ? 'btn-gold' : 'btn-secondary'}"
          ${disabled ? 'disabled style="opacity:0.4"' : ''}
          onclick="app.toggleUtilitySchoolPick(${cat.index}, '${school}', ${numSchools})">
          ${icon} ${school.charAt(0).toUpperCase() + school.slice(1)}${alreadyKnown ? ' (already)' : ''}
        </button>`;
      });
      html += `</div></div>`;
    });

    // --- Auto Features (just displayed, auto-added) ---
    const autoCats = st.categorized.filter(c => c.type === 'auto');
    if (autoCats.length > 0) {
      html += `<div style="margin-bottom:12px">
        <div style="font-weight:bold;color:var(--burgundy);margin-bottom:6px">New Class Features</div>`;
      autoCats.forEach(cat => {
        html += `<div style="background:var(--parchment-dark);padding:6px 8px;border-radius:6px;margin-bottom:4px">
          <div style="font-weight:bold;font-size:0.8rem">${this.esc(cat.feature.name)}</div>
          <div style="font-size:0.7rem;color:var(--ink-light)">${this.esc(cat.feature.description || '')}</div>
        </div>`;
      });
      html += `</div>`;
    }

    // --- Resolved Subclass Features (levels 7/11/15) ---
    const subFeatureCats = st.categorized.filter(c => c.type === 'subclassFeature');
    if (subFeatureCats.length > 0 && ch.subclass) {
      const subData = st.subclassOptions.find(s => s.name === ch.subclass);
      if (subData) {
        const subFeatures = subData.features?.[st.newLevel] || [];
        if (subFeatures.length > 0) {
          html += `<div style="margin-bottom:12px">
            <div style="font-weight:bold;color:var(--burgundy);margin-bottom:6px">Subclass: ${this.esc(ch.subclass)}</div>`;
          subFeatures.forEach(f => {
            html += `<div style="background:var(--parchment-dark);padding:6px 8px;border-radius:6px;margin-bottom:4px">
              <div style="font-weight:bold;font-size:0.8rem">${this.esc(f.name)}</div>
              <div style="font-size:0.7rem;color:var(--ink-light)">${this.esc(f.description || '')}</div>
            </div>`;
          });
          html += `</div>`;
        }
      }
    } else if (subFeatureCats.length > 0 && !ch.subclass) {
      html += `<div style="margin-bottom:12px;padding:8px;background:#ffe0e0;border-radius:6px;font-size:0.8rem;color:var(--burgundy)">
        Subclass feature available but no subclass chosen. You may need to set your subclass first.
      </div>`;
    }

    // --- New Spells Preview ---
    const subForSpells = st.subclassChoice || ch.subclass || null;
    const stormshifterSchoolForSpells = st.stormshifterSchool || ch.stormshifterSchool || null;
    const tempCharForSpells = { ...ch, level: st.newLevel, subclass: subForSpells, stormshifterSchool: stormshifterSchoolForSpells };
    const newSpells = this.autoLoadSpells(tempCharForSpells);
    const addedSpells = newSpells.filter(ns => !(ch.spells || []).find(s => s.name === ns.name));
    if (addedSpells.length > 0) {
      html += `<div style="margin-bottom:12px">
        <div style="font-weight:bold;color:var(--burgundy);margin-bottom:6px">✨ New Spells Unlocked</div>`;
      addedSpells.forEach(sp => {
        const tierLabel = sp.tier === 0 ? 'Cantrip' : 'Tier ' + sp.tier;
        const schoolLabel = (sp.school || '').charAt(0).toUpperCase() + (sp.school || '').slice(1);
        html += `<div style="background:var(--parchment-dark);padding:4px 8px;border-radius:6px;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center">
          <span style="font-weight:bold;font-size:0.75rem">${this.esc(sp.name)}</span>
          <span style="font-size:0.6rem;color:var(--ink-light)">${schoolLabel} · ${tierLabel}</span>
        </div>`;
      });
      html += `</div>`;
    }

    // --- Confirm ---
    let canConfirm = st.skillPoint !== null && (!st.swapFrom || st.swapTo) && st.hpGain > 0;
    // Check if Fiendish Boon is selected but no stat chosen
    const hasFiendishBoon = Object.values(st.abilityChoices).some(arr => arr.includes('Fiendish Boon'));
    // Validate utility spell choices (all schools must have numPerSchool picks)
    const utilityComplete = st.categorized.filter(c => c.type === 'utilitySpellChoice').every(cat => {
      const cur = st.utilityChoices[cat.index] || {};
      return cat.schools.every(s => (cur[s] || []).length === cat.numPerSchool);
    });
    if (hasFiendishBoon && !st.fiendishBoonStat) canConfirm = false;
    if (!utilityComplete) canConfirm = false;
    // Stormshifter Sky & Storm requires picking Ice or Radiant
    if (st.subclassChoice === 'Circle of Sky & Storm' && !st.stormshifterSchool) canConfirm = false;
    // utilityAllPickSchool: must pick N schools
    const schoolPickComplete = st.categorized.filter(c => c.type === 'utilityAllPickSchool').every(cat => {
      return (st.utilitySchoolPicks[cat.index] || []).length >= (cat.numSchools || 1);
    });
    if (!schoolPickComplete) canConfirm = false;
    st.categorized.forEach(cat => {
      if (cat.type === 'subclass' && !st.subclassChoice) canConfirm = false;
      if (cat.type === 'statIncrease' && !st.statChoices[cat.index]) canConfirm = false;
      if (cat.type === 'statIncreaseMulti' && (st.statMultiChoices[cat.index] || []).length < cat.numPicks) canConfirm = false;
      if (cat.type === 'epicBoon' && !(st.epicBoonChoices[cat.index]?.name || '').trim()) canConfirm = false;
      if (cat.type === 'abilityChoice' && (st.abilityChoices[cat.index] || []).length < cat.numChoices) canConfirm = false;
    });

    html += `<div class="modal-buttons">
      <button class="btn btn-secondary" onclick="app.closeModal(); app.levelUpState=null;">Cancel</button>
      <button class="btn btn-primary" style="flex:1" onclick="app.confirmLevelUp()" ${canConfirm ? '' : 'disabled'}>
        Confirm Level ${st.newLevel}
      </button>
    </div>`;

    this.showModal(html);
  },

  rerollLevelUpHP() {
    const st = this.levelUpState;
    if (!st) return;
    st.roll1 = Math.floor(Math.random() * st.dieSize) + 1;
    st.roll2 = Math.floor(Math.random() * st.dieSize) + 1;
    st.hpGain = Math.max(st.roll1, st.roll2);
    const droppedIndex = st.roll1 <= st.roll2 ? 0 : 1;
    this.animateDice([st.roll1, st.roll2], st.dieSize, {
      label: `HP Roll (2d${st.dieSize} with advantage)`,
      droppedIndex,
      subtitle: `+${st.hpGain} HP`,
      onDone: () => this.renderLevelUpModal(),
    });
  },

  toggleManualHP() {
    const st = this.levelUpState;
    if (!st) return;
    st.manualHP = !st.manualHP;
    if (st.manualHP) {
      st.manualHPValue = '';
      st.hpGain = 0;
    } else {
      st.hpGain = Math.max(st.roll1, st.roll2);
    }
    this.renderLevelUpModal();
  },

  setManualHP(index, value) {
    const st = this.levelUpState;
    if (!st) return;
    const vals = (st.manualHPValue || ',').split(',');
    const v = Math.max(1, Math.min(st.dieSize, parseInt(value) || 0));
    vals[index] = v || '';
    st.manualHPValue = vals.join(',');
    const r1 = parseInt(vals[0]) || 0;
    const r2 = parseInt(vals[1]) || 0;
    st.hpGain = Math.max(r1, r2);
    this.renderLevelUpModal();
  },

  setLevelUpSkill(name) {
    const st = this.levelUpState;
    if (!st) return;
    st.skillPoint = st.skillPoint === name ? null : name;
    if (st.swapFrom) {
      const ch = this.getChar();
      const bonus = (ch.skillBonuses || {})[st.swapFrom] || 0;
      const addedPoint = st.skillPoint === st.swapFrom ? 1 : 0;
      if (bonus + addedPoint <= 0) { st.swapFrom = null; st.swapTo = null; }
    }
    this.renderLevelUpModal();
  },

  setLevelUpSwapFrom(name) {
    const st = this.levelUpState;
    if (!st) return;
    st.swapFrom = name;
    st.swapTo = null;
    this.renderLevelUpModal();
  },

  setLevelUpSwapTo(name) {
    const st = this.levelUpState;
    if (!st) return;
    st.swapTo = st.swapTo === name ? null : name;
    this.renderLevelUpModal();
  },

  setLevelUpSubclass(index) {
    const st = this.levelUpState;
    if (!st) return;
    const sub = st.subclassOptions[index];
    if (sub) st.subclassChoice = st.subclassChoice === sub.name ? null : sub.name;
    // Reset Stormshifter school if subclass changed away from Sky & Storm
    if (st.subclassChoice !== 'Circle of Sky & Storm') st.stormshifterSchool = null;
    this.renderLevelUpModal();
  },

  setLevelUpStormshifterSchool(school) {
    const st = this.levelUpState;
    if (!st) return;
    st.stormshifterSchool = st.stormshifterSchool === school ? null : school;
    this.renderLevelUpModal();
  },

  setLevelUpStat(featureIndex, stat) {
    const st = this.levelUpState;
    if (!st) return;
    st.statChoices[featureIndex] = st.statChoices[featureIndex] === stat ? null : stat;
    this.renderLevelUpModal();
  },

  toggleLevelUpStatMulti(featureIndex, stat) {
    const st = this.levelUpState;
    if (!st) return;
    const cat = st.categorized.find(c => c.index === featureIndex);
    if (!cat) return;
    const chosen = st.statMultiChoices[featureIndex] || [];
    const idx = chosen.indexOf(stat);
    if (idx >= 0) {
      chosen.splice(idx, 1);
    } else if (chosen.length < (cat.numPicks || 1)) {
      chosen.push(stat);
    }
    st.statMultiChoices[featureIndex] = chosen;
    this.renderLevelUpModal();
  },

  setEpicBoon(featureIndex, field, value) {
    const st = this.levelUpState;
    if (!st) return;
    if (!st.epicBoonChoices[featureIndex]) st.epicBoonChoices[featureIndex] = { name: '', description: '' };
    st.epicBoonChoices[featureIndex][field] = value;
    // Don't re-render the whole modal on keystroke — would lose focus
  },

  toggleLevelUpAbility(featureIndex, abilityIndex) {
    const st = this.levelUpState;
    if (!st) return;
    const cat = st.categorized.find(c => c.index === featureIndex);
    if (!cat) return;
    const abilities = st.classData?.[cat.arrayProp] || [];
    const ability = abilities[abilityIndex];
    if (!ability) return;
    const chosen = st.abilityChoices[featureIndex] || [];
    const idx = chosen.indexOf(ability.name);
    if (idx >= 0) {
      chosen.splice(idx, 1);
    } else if (chosen.length < cat.numChoices) {
      chosen.push(ability.name);
    }
    st.abilityChoices[featureIndex] = chosen;
    this.renderLevelUpModal();
  },

  toggleUtilitySpell(featureIndex, school, name) {
    const st = this.levelUpState;
    if (!st) return;
    const cat = st.categorized.find(c => c.index === featureIndex);
    if (!cat) return;
    if (!st.utilityChoices[featureIndex]) st.utilityChoices[featureIndex] = {};
    if (!st.utilityChoices[featureIndex][school]) st.utilityChoices[featureIndex][school] = [];
    const arr = st.utilityChoices[featureIndex][school];
    const idx = arr.indexOf(name);
    if (idx >= 0) {
      arr.splice(idx, 1);
    } else if (arr.length < (cat.numPerSchool || 1)) {
      arr.push(name);
    }
    this.renderLevelUpModal();
  },

  // Mage Elemental Mastery-style: pick a school (and learn all utility spells from it).
  toggleUtilitySchoolPick(featureIndex, school, numSchools) {
    const st = this.levelUpState;
    if (!st) return;
    if (!st.utilitySchoolPicks[featureIndex]) st.utilitySchoolPicks[featureIndex] = [];
    const arr = st.utilitySchoolPicks[featureIndex];
    const idx = arr.indexOf(school);
    if (idx >= 0) {
      arr.splice(idx, 1);
    } else if (arr.length < (numSchools || 1)) {
      arr.push(school);
    }
    this.renderLevelUpModal();
  },

  confirmLevelUp() {
    const ch = this.getChar();
    const st = this.levelUpState;
    if (!ch || !st) return;
    const data = this.getData();

    // Apply HP
    const newMaxHp = (ch.maxHp || 10) + st.hpGain;

    // Apply skill changes
    const skillBonuses = { ...(ch.skillBonuses || {}) };
    if (st.skillPoint) skillBonuses[st.skillPoint] = (skillBonuses[st.skillPoint] || 0) + 1;
    if (st.swapFrom && st.swapTo) {
      skillBonuses[st.swapFrom] = (skillBonuses[st.swapFrom] || 0) - 1;
      skillBonuses[st.swapTo] = (skillBonuses[st.swapTo] || 0) + 1;
    }

    // Apply stat increases (single-stat picks)
    const newStats = { ...(ch.stats || {}) };
    Object.values(st.statChoices).forEach(stat => {
      if (stat) newStats[stat] = (newStats[stat] || 0) + 1;
    });
    // Apply multi-stat picks (e.g., Twilight Sage: +1 to any 2 stats)
    Object.values(st.statMultiChoices).forEach(stats => {
      (stats || []).forEach(s => { newStats[s] = (newStats[s] || 0) + 1; });
    });

    // Apply Fiendish Boon: +1 to chosen stat, -1 max hit dice
    let fiendishBoonStat = ch.fiendishBoonStat || null;
    let hitDiceMaxMod = ch.hitDiceMaxMod || 0;
    const hasFB = Object.values(st.abilityChoices).some(arr => arr.includes('Fiendish Boon'));
    if (hasFB && st.fiendishBoonStat) {
      newStats[st.fiendishBoonStat] = (newStats[st.fiendishBoonStat] || 0) + 1;
      fiendishBoonStat = st.fiendishBoonStat;
      hitDiceMaxMod = (hitDiceMaxMod || 0) - 1;
    }

    // Save subclass choice
    let subclass = ch.subclass || null;
    if (st.subclassChoice) subclass = st.subclassChoice;

    // Build abilities list
    const abilities = [...(ch.abilities || [])];
    const chosenAbilities = { ...(ch.chosenAbilities || {}) };

    // Add auto features
    st.categorized.filter(c => c.type === 'auto').forEach(cat => {
      if (!abilities.find(a => a.name === cat.feature.name)) {
        abilities.push({ name: cat.feature.name, description: cat.feature.description || '' });
      }
    });

    // Add multi-stat-pick features (e.g., Twilight Sage) — keep the mechanic text, strip the stat instruction
    st.categorized.filter(c => c.type === 'statIncreaseMulti').forEach(cat => {
      if (abilities.find(a => a.name === cat.feature.name)) return;
      // Strip "+1 to any N of your stats." prefix from the description to leave just the mechanic
      const stripped = (cat.feature.description || '')
        .replace(/^\+1\s+to\s+any\s+\d+\s+of\s+your\s+stats\.\s*/i, '').trim();
      if (stripped) {
        abilities.push({ name: cat.feature.name, description: stripped });
      }
    });

    // Add Epic Boon as an ability with the player-provided name and description
    st.categorized.filter(c => c.type === 'epicBoon').forEach(cat => {
      const boon = st.epicBoonChoices[cat.index];
      if (boon && boon.name) {
        const name = boon.name.trim();
        const desc = (boon.description || '').trim() || 'Epic Boon chosen from the GM\'s Guide.';
        if (!abilities.find(a => a.name === name)) {
          abilities.push({ name: name, description: desc });
        }
      }
    });

    // Add subclass level 3 features
    if (st.subclassChoice) {
      const subData = st.subclassOptions.find(s => s.name === st.subclassChoice);
      if (subData) {
        const subFeats = subData.features?.[3] || subData.features?.[st.newLevel] || [];
        subFeats.forEach(f => {
          if (!abilities.find(a => a.name === f.name)) {
            abilities.push({ name: f.name, description: f.description || '' });
          }
        });
      }
    }

    // Add resolved subclass features (levels 7/11/15)
    if (ch.subclass || st.subclassChoice) {
      const scName = st.subclassChoice || ch.subclass;
      const subData = st.subclassOptions.find(s => s.name === scName);
      if (subData) {
        const subFeats = subData.features?.[st.newLevel] || [];
        subFeats.forEach(f => {
          if (!abilities.find(a => a.name === f.name)) {
            abilities.push({ name: f.name, description: f.description || '' });
          }
        });
      }
    }

    // Add chosen abilities from arrays (+ parent feature mechanic if present)
    st.categorized.filter(c => c.type === 'abilityChoice').forEach(cat => {
      // Check if the feature has mechanic text beyond just "Choose/Learn X..."
      const baseName = cat.feature.name.replace(/\s*\(\d+\)\s*$/, '');
      if (!abilities.find(a => a.name === baseName) && cat.feature.description) {
        const stripped = cat.feature.description
          .replace(/^(?:Choose|Learn)\s+(?:a\s+)?(?:\d+(?:st|nd|rd|th)?\s+)?[^.]+\.\s*/i, '').trim();
        if (stripped) {
          abilities.push({ name: baseName, description: stripped });
        }
      }
      const chosen = st.abilityChoices[cat.index] || [];
      const arr = st.classData?.[cat.arrayProp] || [];
      if (!chosenAbilities[cat.arrayProp]) chosenAbilities[cat.arrayProp] = [];
      chosen.forEach(name => {
        const ab = arr.find(a => a.name === name);
        if (ab && !abilities.find(a => a.name === ab.name)) {
          abilities.push({ name: ab.name, description: ab.description || '' });
        }
        if (!chosenAbilities[cat.arrayProp].includes(name)) {
          chosenAbilities[cat.arrayProp].push(name);
        }
      });
    });

    // Recalculate max mana (search class data for mana formula)
    let newMaxMana = ch.maxMana || 0;
    if (st.classData?.levels) {
      let manaFormula = null;
      for (const feats of Object.values(st.classData.levels)) {
        for (const f of feats) {
          const d = (f.description || '').toLowerCase();
          if (d.includes('mana pool') || d.includes('mana maximum')) {
            if (d.includes('int x 3')) manaFormula = 'int3';
            else if (d.includes('wil x 3')) manaFormula = 'wil3';
            else if (d.includes('wil + lvl') || d.includes('wil +')) manaFormula = 'wil1';
            break;
          }
        }
        if (manaFormula) break;
      }
      if (manaFormula === 'int3') newMaxMana = (newStats.INT || 0) * 3 + st.newLevel;
      else if (manaFormula === 'wil3') newMaxMana = (newStats.WIL || 0) * 3 + st.newLevel;
      else if (manaFormula === 'wil1') newMaxMana = (newStats.WIL || 0) + st.newLevel;
      if (newMaxMana < 0) newMaxMana = 0;
    }

    // Auto-load spells based on class, subclass, new level, and any Stormshifter extra school
    const finalStormshifterSchool = st.stormshifterSchool || ch.stormshifterSchool || null;
    const tempChar = { ...ch, level: st.newLevel, subclass: subclass, stats: newStats, stormshifterSchool: finalStormshifterSchool };
    const spells = this.autoLoadSpells(tempChar);

    // Add chosen utility spells (from utilitySpellChoice features)
    const utilityPool = (data.spells && data.spells.utility) || {};
    st.categorized.filter(c => c.type === 'utilitySpellChoice').forEach(cat => {
      const picks = st.utilityChoices[cat.index] || {};
      Object.entries(picks).forEach(([school, names]) => {
        const schoolSpells = utilityPool[school] || [];
        names.forEach(name => {
          const sp = schoolSpells.find(s => s.name === name);
          if (sp && !spells.find(s => s.name === name)) {
            spells.push({
              name: sp.name, tier: 0, school,
              actions: sp.actions || 0,
              range: sp.range || sp.reach || '',
              damage: sp.damage || 'None',
              description: sp.description || '',
              isUtility: true
            });
          }
        });
      });
      // Also add the parent feature to abilities if it has mechanic text beyond "Choose..."
      if (!abilities.find(a => a.name === cat.feature.name) && cat.feature.description) {
        abilities.push({ name: cat.feature.name, description: cat.feature.description });
      }
    });

    // Add ALL utility spells from specified schools (utilityAll features, e.g., "You know all Necrotic/Radiant Utility Spells")
    st.categorized.filter(c => c.type === 'utilityAll').forEach(cat => {
      cat.schools.forEach(school => {
        const schoolSpells = utilityPool[school] || [];
        schoolSpells.forEach(sp => {
          if (!spells.find(s => s.name === sp.name)) {
            spells.push({
              name: sp.name, tier: 0, school,
              actions: sp.actions || 0,
              range: sp.range || sp.reach || '',
              damage: sp.damage || 'None',
              description: sp.description || '',
              isUtility: true
            });
          }
        });
      });
      if (!abilities.find(a => a.name === cat.feature.name)) {
        abilities.push({ name: cat.feature.name, description: cat.feature.description || '' });
      }
    });

    // Add ALL utility spells from schools the player picked (utilityAllPickSchool, e.g., Mage Elemental Mastery)
    st.categorized.filter(c => c.type === 'utilityAllPickSchool').forEach(cat => {
      const picks = st.utilitySchoolPicks[cat.index] || [];
      picks.forEach(school => {
        const schoolSpells = utilityPool[school] || [];
        schoolSpells.forEach(sp => {
          if (!spells.find(s => s.name === sp.name)) {
            spells.push({
              name: sp.name, tier: 0, school,
              actions: sp.actions || 0,
              range: sp.range || sp.reach || '',
              damage: sp.damage || 'None',
              description: sp.description || '',
              isUtility: true
            });
          }
        });
      });
      if (!abilities.find(a => a.name === cat.feature.name)) {
        abilities.push({ name: cat.feature.name, description: cat.feature.description || '' });
      }
    });

    this.updateChar({
      level: st.newLevel,
      maxHp: newMaxHp, hp: newMaxHp,
      maxMana: newMaxMana, mana: newMaxMana,
      stats: newStats,
      skillBonuses,
      abilities,
      spells,
      subclass,
      chosenAbilities,
      fiendishBoonStat,
      hitDiceMaxMod,
      stormshifterSchool: finalStormshifterSchool
    });

    this.levelUpState = null;
    this.closeModal();
    this.toast(`Leveled up to ${st.newLevel}! +${st.hpGain} HP`);
    this.render();
  },

  // Generic retrain modal — works for any class that defines classData.retrainFeature
  // and classData.retrainArrays (e.g., Shadowmancer's Supplicate, Shepherd's Serve).
  // === Subclass Swap System ===
  // RAW: story-based subclasses (Reaver/Oathbreaker/Spellblade/Beastmaster) can replace your existing
  // subclass at pivotal story moments. Standard subclass choice at L3 is otherwise permanent.
  // This modal only allows crossing the standard ↔ story-based boundary:
  //   - Standard subclass → pick from applicable story-based options (the normal case)
  //   - Story-based subclass → revert to any standard option for the class (for narrative reversal)
  // It never shows standard↔standard swaps (e.g., Red Dragon → Abyssal), matching RAW intent.
  // Preserves level, HP, stats, skills. Only subclass-granted abilities + spell schools change.
  _getSubclassSwapOptions(ch) {
    const data = this.getData();
    if (!ch || !ch.subclass) return { options: [], currentIsStory: false };
    const classKey = (ch.className || '').toLowerCase().replace(/^the\s+/, '');
    const standards = ((data.subclasses || {})[classKey] || []).filter(s => (!s.className || s.className === ch.className));
    const storyBased = ((data.subclasses || {}).storyBased || []).filter(s => s.className === ch.className);
    const currentIsStory = storyBased.some(s => s.name === ch.subclass);
    // If currently in a standard subclass → offer story-based options
    // If currently in a story-based subclass → offer standard options (reversal path)
    const sourcePool = currentIsStory ? standards : storyBased;
    const options = sourcePool
      .filter(s => s.name !== ch.subclass)
      .map(s => ({ ...s, isStory: currentIsStory ? false : true }));
    return { options, currentIsStory };
  },

  // True if this character currently has any valid swap target (drives the button visibility)
  hasSubclassSwapOption(ch) {
    return this._getSubclassSwapOptions(ch).options.length > 0;
  },

  changeSubclassModal() {
    const ch = this.getChar();
    if (!ch) return;
    if (!ch.subclass) {
      this.toast('No subclass yet — unlocks at level 3.');
      return;
    }
    const { options, currentIsStory } = this._getSubclassSwapOptions(ch);
    if (options.length === 0) {
      this.toast('No story-based subclass transition available for this class.');
      return;
    }

    this._subclassSwapState = {
      step: 'choose',          // 'choose' | 'confirm'
      allOptions: options,
      currentIsStory,
      selectedIndex: null,
      diff: null,
    };
    this.renderSubclassSwapModal();
  },

  // Compute abilities and spell schools that change when swapping from oldName → newSub
  _computeSubclassDiff(ch, oldSubName, newSub) {
    const data = this.getData();
    const classKey = (ch.className || '').toLowerCase().replace(/^the\s+/, '');
    const allSubs = [
      ...((data.subclasses || {})[classKey] || []),
      ...((data.subclasses || {}).storyBased || [])
    ];
    const oldSub = allSubs.find(s => s.name === oldSubName);
    const collectFeatureNames = (sub) => {
      if (!sub) return [];
      const names = [];
      (sub.features?.base || []).forEach(f => names.push(f.name));
      [3, 7, 11, 15].forEach(lvl => {
        if ((ch.level || 1) >= lvl) {
          (sub.features?.[lvl] || []).forEach(f => names.push(f.name));
        }
      });
      return names;
    };
    const collectFeatures = (sub) => {
      if (!sub) return [];
      const list = [];
      (sub.features?.base || []).forEach(f => list.push({ ...f, level: 'base' }));
      [3, 7, 11, 15].forEach(lvl => {
        if ((ch.level || 1) >= lvl) {
          (sub.features?.[lvl] || []).forEach(f => list.push({ ...f, level: lvl }));
        }
      });
      return list;
    };
    const abilitiesToRemove = collectFeatureNames(oldSub);
    const abilitiesToAdd = collectFeatures(newSub);

    // Also remove base class abilities the new subclass explicitly strips (e.g., Reaver removes Pilfered Power)
    const newRemovesClass = (newSub?.removesClassAbilities) || [];
    newRemovesClass.forEach(abName => { if (!abilitiesToRemove.includes(abName)) abilitiesToRemove.push(abName); });

    // When swapping AWAY from a subclass that removed class abilities, restore them from the base class levels
    const oldRemovesClass = (oldSub?.removesClassAbilities) || [];
    const stillStripped = oldRemovesClass.filter(n => !newRemovesClass.includes(n));
    if (stillStripped.length > 0) {
      const classData = (data.classes || []).find(c => c.name === ch.className);
      if (classData?.levels) {
        const lvl = ch.level || 1;
        stillStripped.forEach(abName => {
          // Find the most recent definition of this ability at or below the character's level
          let restored = null;
          for (let L = lvl; L >= 1 && !restored; L--) {
            const feat = (classData.levels[L] || []).find(f => f.name === abName);
            if (feat) restored = feat;
          }
          if (restored && !abilitiesToAdd.find(f => f.name === abName)) {
            abilitiesToAdd.push({ name: restored.name, description: restored.description || '', level: 'restored' });
          }
        });
      }
    }

    // Spell school changes via SPELL_PROGRESSION.subclassSchools
    const prog = this.SPELL_PROGRESSION?.[ch.className];
    const oldSchools = (prog?.subclassSchools?.[oldSubName]) || [];
    const newSchools = (newSub && prog?.subclassSchools?.[newSub.name]) || [];
    const lostSchools = oldSchools.filter(s => !newSchools.includes(s));
    const gainedSchools = newSchools.filter(s => !oldSchools.includes(s));

    // Class-specific spell block/grant diff (e.g., Reaver loses Shadow Blast, gains Bonescythe)
    const normalizeBlocks = b => Array.isArray(b) ? b.slice() : (b === true ? 'all' : []);
    const oldBlocks = normalizeBlocks(oldSub?.blocksClassSpecific);
    const newBlocks = normalizeBlocks(newSub?.blocksClassSpecific);
    const oldGrants = (oldSub?.grantsClassSpecific) || [];
    const newGrants = (newSub?.grantsClassSpecific) || [];
    // Spells newly blocked (lost when switching to newSub)
    let classSpecificLost = [];
    let classSpecificGained = [];
    if (newBlocks === 'all' && oldBlocks !== 'all') {
      classSpecificLost = ['(all class-specific spells)'];
    } else if (Array.isArray(newBlocks)) {
      classSpecificLost = newBlocks.filter(s => !(Array.isArray(oldBlocks) && oldBlocks.includes(s)));
    }
    if (oldBlocks === 'all' && newBlocks !== 'all') {
      classSpecificGained.push('(class-specific spells restored)');
    } else if (Array.isArray(oldBlocks)) {
      classSpecificGained = classSpecificGained.concat(oldBlocks.filter(s => !(Array.isArray(newBlocks) && newBlocks.includes(s))));
    }
    // Subclass-granted cantrips (e.g., Reaver's Bonescythe)
    classSpecificLost = classSpecificLost.concat(oldGrants.filter(s => !newGrants.includes(s)));
    classSpecificGained = classSpecificGained.concat(newGrants.filter(s => !oldGrants.includes(s)));

    // Legacy flag: true if any all-spells block changed
    let classSpecificChange = null;
    if (oldBlocks !== 'all' && newBlocks === 'all') classSpecificChange = 'lose';
    else if (oldBlocks === 'all' && newBlocks !== 'all') classSpecificChange = 'regain';

    return { abilitiesToRemove, abilitiesToAdd, lostSchools, gainedSchools, classSpecificChange, classSpecificLost, classSpecificGained, newSub };
  },

  renderSubclassSwapModal() {
    const ch = this.getChar();
    const st = this._subclassSwapState;
    if (!ch || !st) return;

    if (st.step === 'choose') {
      const title = st.currentIsStory ? 'Revert Subclass' : 'Story Transition';
      const subtitle = st.currentIsStory
        ? `A story event reconciles your character with their original path. You may return to a standard subclass. Preserves level, HP, stats, and skills — only subclass features change.`
        : `Nimble allows story-based subclass transitions at pivotal moments (e.g., losing your patron, breaking your oath). Requires GM approval. Preserves level, HP, stats, and skills — only subclass features change.`;
      let html = `<h3>&#128260; ${title}</h3>
        <div style="font-size:0.75rem;color:var(--ink-light);margin-bottom:8px">
          Current: <strong style="color:var(--burgundy)">${this.esc(ch.subclass)}</strong>${st.currentIsStory ? ' <span style="background:var(--gold);color:white;font-size:0.55rem;padding:1px 5px;border-radius:3px;margin-left:4px">STORY-BASED</span>' : ''}
        </div>
        <div style="font-size:0.7rem;color:var(--ink-light);margin-bottom:12px;font-style:italic">${subtitle}</div>
        <div style="font-weight:bold;color:var(--burgundy);margin-bottom:6px;font-size:0.85rem">${st.currentIsStory ? 'Return to:' : 'Transition to:'}</div>`;

      st.allOptions.forEach((sub, i) => {
        const desc = sub.description || '';
        html += `<div onclick="app.selectSubclassForSwap(${i})"
          style="padding:10px;background:var(--parchment);border:1px solid var(--parchment-edge);border-radius:6px;margin-bottom:6px;cursor:pointer">
          <div style="font-weight:bold;color:var(--burgundy);font-size:0.85rem">
            ${this.esc(sub.name)}
