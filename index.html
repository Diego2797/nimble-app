          abilities.push({ name: ab.name, description: ab.description || '' });
        }
        if (!chosenAbilities[cat.arrayProp].includes(name)) {
          chosenAbilities[cat.arrayProp].push(name);
        }
      });
    });

    // Recalculate max mana (search class data for mana formula)
    let newMaxMana = ch.maxMana || 0;
    if (st.classData?.levels) {
      let manaFormula = null;
      for (const feats of Object.values(st.classData.levels)) {
        for (const f of feats) {
          const d = (f.description || '').toLowerCase();
          if (d.includes('mana pool') || d.includes('mana maximum')) {
            if (d.includes('int x 3')) manaFormula = 'int3';
            else if (d.includes('wil x 3')) manaFormula = 'wil3';
            else if (d.includes('wil + lvl') || d.includes('wil +')) manaFormula = 'wil1';
            break;
          }
        }
        if (manaFormula) break;
      }
      if (manaFormula === 'int3') newMaxMana = (newStats.INT || 0) * 3 + st.newLevel;
      else if (manaFormula === 'wil3') newMaxMana = (newStats.WIL || 0) * 3 + st.newLevel;
      else if (manaFormula === 'wil1') newMaxMana = (newStats.WIL || 0) + st.newLevel;
      if (newMaxMana < 0) newMaxMana = 0;
    }

    // Auto-load spells based on class, subclass, new level, and any Stormshifter extra school
    const finalStormshifterSchool = st.stormshifterSchool || ch.stormshifterSchool || null;
    const tempChar = { ...ch, level: st.newLevel, subclass: subclass, stats: newStats, stormshifterSchool: finalStormshifterSchool };
    const spells = this.autoLoadSpells(tempChar);

    // Add chosen utility spells (from utilitySpellChoice features)
    const utilityPool = (data.spells && data.spells.utility) || {};
    st.categorized.filter(c => c.type === 'utilitySpellChoice').forEach(cat => {
      const picks = st.utilityChoices[cat.index] || {};
      Object.entries(picks).forEach(([school, names]) => {
        const schoolSpells = utilityPool[school] || [];
        names.forEach(name => {
          const sp = schoolSpells.find(s => s.name === name);
          if (sp && !spells.find(s => s.name === name)) {
            spells.push({
              name: sp.name, tier: 0, school,
              actions: sp.actions || 0,
              range: sp.range || sp.reach || '',
              damage: sp.damage || 'None',
              description: sp.description || '',
              isUtility: true
            });
          }
        });
      });
      // Also add the parent feature to abilities if it has mechanic text beyond "Choose..."
      if (!abilities.find(a => a.name === cat.feature.name) && cat.feature.description) {
        abilities.push({ name: cat.feature.name, description: cat.feature.description });
      }
    });

    // Add ALL utility spells from specified schools (utilityAll features, e.g., "You know all Necrotic/Radiant Utility Spells")
    st.categorized.filter(c => c.type === 'utilityAll').forEach(cat => {
      cat.schools.forEach(school => {
        const schoolSpells = utilityPool[school] || [];
        schoolSpells.forEach(sp => {
          if (!spells.find(s => s.name === sp.name)) {
            spells.push({
              name: sp.name, tier: 0, school,
              actions: sp.actions || 0,
              range: sp.range || sp.reach || '',
              damage: sp.damage || 'None',
              description: sp.description || '',
              isUtility: true
            });
          }
        });
      });
      if (!abilities.find(a => a.name === cat.feature.name)) {
        abilities.push({ name: cat.feature.name, description: cat.feature.description || '' });
      }
    });

    // Add ALL utility spells from schools the player picked (utilityAllPickSchool, e.g., Mage Elemental Mastery)
    st.categorized.filter(c => c.type === 'utilityAllPickSchool').forEach(cat => {
      const picks = st.utilitySchoolPicks[cat.index] || [];
      picks.forEach(school => {
        const schoolSpells = utilityPool[school] || [];
        schoolSpells.forEach(sp => {
          if (!spells.find(s => s.name === sp.name)) {
            spells.push({
              name: sp.name, tier: 0, school,
              actions: sp.actions || 0,
              range: sp.range || sp.reach || '',
              damage: sp.damage || 'None',
              description: sp.description || '',
              isUtility: true
            });
          }
        });
      });
      if (!abilities.find(a => a.name === cat.feature.name)) {
        abilities.push({ name: cat.feature.name, description: cat.feature.description || '' });
      }
    });

    this.updateChar({
      level: st.newLevel,
      maxHp: newMaxHp, hp: newMaxHp,
      maxMana: newMaxMana, mana: newMaxMana,
      stats: newStats,
      skillBonuses,
      abilities,
      spells,
      subclass,
      chosenAbilities,
      fiendishBoonStat,
      hitDiceMaxMod,
      stormshifterSchool: finalStormshifterSchool
    });

    this.levelUpState = null;
    this.closeModal();
    this.toast(`Leveled up to ${st.newLevel}! +${st.hpGain} HP`);
    this.render();
  },

  // Generic retrain modal — works for any class that defines classData.retrainFeature
  // and classData.retrainArrays (e.g., Shadowmancer's Supplicate, Shepherd's Serve).
  // === Subclass Swap System ===
  // RAW: story-based subclasses (Reaver/Oathbreaker/Spellblade/Beastmaster) can replace your existing
  // subclass at pivotal story moments. Standard subclass choice at L3 is otherwise permanent.
  // This modal only allows crossing the standard ↔ story-based boundary:
  //   - Standard subclass → pick from applicable story-based options (the normal case)
  //   - Story-based subclass → revert to any standard option for the class (for narrative reversal)
  // It never shows standard↔standard swaps (e.g., Red Dragon → Abyssal), matching RAW intent.
  // Preserves level, HP, stats, skills. Only subclass-granted abilities + spell schools change.
  _getSubclassSwapOptions(ch) {
    const data = this.getData();
    if (!ch || !ch.subclass) return { options: [], currentIsStory: false };
    const classKey = (ch.className || '').toLowerCase().replace(/^the\s+/, '');
    const standards = ((data.subclasses || {})[classKey] || []).filter(s => (!s.className || s.className === ch.className));
    const storyBased = ((data.subclasses || {}).storyBased || []).filter(s => s.className === ch.className);
    const currentIsStory = storyBased.some(s => s.name === ch.subclass);
    // If currently in a standard subclass → offer story-based options
    // If currently in a story-based subclass → offer standard options (reversal path)
    const sourcePool = currentIsStory ? standards : storyBased;
    const options = sourcePool
      .filter(s => s.name !== ch.subclass)
      .map(s => ({ ...s, isStory: currentIsStory ? false : true }));
    return { options, currentIsStory };
  },

  // True if this character currently has any valid swap target (drives the button visibility)
  hasSubclassSwapOption(ch) {
    return this._getSubclassSwapOptions(ch).options.length > 0;
  },

  changeSubclassModal() {
    const ch = this.getChar();
    if (!ch) return;
    if (!ch.subclass) {
      this.toast('No subclass yet — unlocks at level 3.');
      return;
    }
    const { options, currentIsStory } = this._getSubclassSwapOptions(ch);
    if (options.length === 0) {
      this.toast('No story-based subclass transition available for this class.');
      return;
    }

    this._subclassSwapState = {
      step: 'choose',          // 'choose' | 'confirm'
      allOptions: options,
      currentIsStory,
      selectedIndex: null,
      diff: null,
    };
    this.renderSubclassSwapModal();
  },

  // Compute abilities and spell schools that change when swapping from oldName → newSub
  _computeSubclassDiff(ch, oldSubName, newSub) {
    const data = this.getData();
    const classKey = (ch.className || '').toLowerCase().replace(/^the\s+/, '');
    const allSubs = [
      ...((data.subclasses || {})[classKey] || []),
      ...((data.subclasses || {}).storyBased || [])
    ];
    const oldSub = allSubs.find(s => s.name === oldSubName);
    const collectFeatureNames = (sub) => {
      if (!sub) return [];
      const names = [];
      (sub.features?.base || []).forEach(f => names.push(f.name));
      [3, 7, 11, 15].forEach(lvl => {
        if ((ch.level || 1) >= lvl) {
          (sub.features?.[lvl] || []).forEach(f => names.push(f.name));
        }
      });
      return names;
    };
    const collectFeatures = (sub) => {
      if (!sub) return [];
      const list = [];
      (sub.features?.base || []).forEach(f => list.push({ ...f, level: 'base' }));
      [3, 7, 11, 15].forEach(lvl => {
        if ((ch.level || 1) >= lvl) {
          (sub.features?.[lvl] || []).forEach(f => list.push({ ...f, level: lvl }));
        }
      });
      return list;
    };
    const abilitiesToRemove = collectFeatureNames(oldSub);
    const abilitiesToAdd = collectFeatures(newSub);

    // Also remove base class abilities the new subclass explicitly strips (e.g., Reaver removes Pilfered Power)
    const newRemovesClass = (newSub?.removesClassAbilities) || [];
    newRemovesClass.forEach(abName => { if (!abilitiesToRemove.includes(abName)) abilitiesToRemove.push(abName); });

    // When swapping AWAY from a subclass that removed class abilities, restore them from the base class levels
    const oldRemovesClass = (oldSub?.removesClassAbilities) || [];
    const stillStripped = oldRemovesClass.filter(n => !newRemovesClass.includes(n));
    if (stillStripped.length > 0) {
      const classData = (data.classes || []).find(c => c.name === ch.className);
      if (classData?.levels) {
        const lvl = ch.level || 1;
        stillStripped.forEach(abName => {
          // Find the most recent definition of this ability at or below the character's level
          let restored = null;
          for (let L = lvl; L >= 1 && !restored; L--) {
            const feat = (classData.levels[L] || []).find(f => f.name === abName);
            if (feat) restored = feat;
          }
          if (restored && !abilitiesToAdd.find(f => f.name === abName)) {
            abilitiesToAdd.push({ name: restored.name, description: restored.description || '', level: 'restored' });
          }
        });
      }
    }

    // Spell school changes via SPELL_PROGRESSION.subclassSchools
    const prog = this.SPELL_PROGRESSION?.[ch.className];
    const oldSchools = (prog?.subclassSchools?.[oldSubName]) || [];
    const newSchools = (newSub && prog?.subclassSchools?.[newSub.name]) || [];
    const lostSchools = oldSchools.filter(s => !newSchools.includes(s));
    const gainedSchools = newSchools.filter(s => !oldSchools.includes(s));

    // Class-specific spell block/grant diff (e.g., Reaver loses Shadow Blast, gains Bonescythe)
    const normalizeBlocks = b => Array.isArray(b) ? b.slice() : (b === true ? 'all' : []);
    const oldBlocks = normalizeBlocks(oldSub?.blocksClassSpecific);
    const newBlocks = normalizeBlocks(newSub?.blocksClassSpecific);
    const oldGrants = (oldSub?.grantsClassSpecific) || [];
    const newGrants = (newSub?.grantsClassSpecific) || [];
    // Spells newly blocked (lost when switching to newSub)
    let classSpecificLost = [];
    let classSpecificGained = [];
    if (newBlocks === 'all' && oldBlocks !== 'all') {
      classSpecificLost = ['(all class-specific spells)'];
    } else if (Array.isArray(newBlocks)) {
      classSpecificLost = newBlocks.filter(s => !(Array.isArray(oldBlocks) && oldBlocks.includes(s)));
    }
    if (oldBlocks === 'all' && newBlocks !== 'all') {
      classSpecificGained.push('(class-specific spells restored)');
    } else if (Array.isArray(oldBlocks)) {
      classSpecificGained = classSpecificGained.concat(oldBlocks.filter(s => !(Array.isArray(newBlocks) && newBlocks.includes(s))));
    }
    // Subclass-granted cantrips (e.g., Reaver's Bonescythe)
    classSpecificLost = classSpecificLost.concat(oldGrants.filter(s => !newGrants.includes(s)));
    classSpecificGained = classSpecificGained.concat(newGrants.filter(s => !oldGrants.includes(s)));

    // Legacy flag: true if any all-spells block changed
    let classSpecificChange = null;
    if (oldBlocks !== 'all' && newBlocks === 'all') classSpecificChange = 'lose';
    else if (oldBlocks === 'all' && newBlocks !== 'all') classSpecificChange = 'regain';

    return { abilitiesToRemove, abilitiesToAdd, lostSchools, gainedSchools, classSpecificChange, classSpecificLost, classSpecificGained, newSub };
  },

  renderSubclassSwapModal() {
    const ch = this.getChar();
    const st = this._subclassSwapState;
    if (!ch || !st) return;

    if (st.step === 'choose') {
      const title = st.currentIsStory ? 'Revert Subclass' : 'Story Transition';
      const subtitle = st.currentIsStory
        ? `A story event reconciles your character with their original path. You may return to a standard subclass. Preserves level, HP, stats, and skills — only subclass features change.`
        : `Nimble allows story-based subclass transitions at pivotal moments (e.g., losing your patron, breaking your oath). Requires GM approval. Preserves level, HP, stats, and skills — only subclass features change.`;
      let html = `<h3>&#128260; ${title}</h3>
        <div style="font-size:0.75rem;color:var(--ink-light);margin-bottom:8px">
          Current: <strong style="color:var(--burgundy)">${this.esc(ch.subclass)}</strong>${st.currentIsStory ? ' <span style="background:var(--gold);color:white;font-size:0.55rem;padding:1px 5px;border-radius:3px;margin-left:4px">STORY-BASED</span>' : ''}
        </div>
        <div style="font-size:0.7rem;color:var(--ink-light);margin-bottom:12px;font-style:italic">${subtitle}</div>
        <div style="font-weight:bold;color:var(--burgundy);margin-bottom:6px;font-size:0.85rem">${st.currentIsStory ? 'Return to:' : 'Transition to:'}</div>`;

      st.allOptions.forEach((sub, i) => {
        const desc = sub.description || '';
        html += `<div onclick="app.selectSubclassForSwap(${i})"
          style="padding:10px;background:var(--parchment);border:1px solid var(--parchment-edge);border-radius:6px;margin-bottom:6px;cursor:pointer">
          <div style="font-weight:bold;color:var(--burgundy);font-size:0.85rem">
            ${this.esc(sub.name)}
            ${sub.isStory ? '<span style="background:var(--gold);color:white;font-size:0.6rem;padding:2px 6px;border-radius:4px;margin-left:6px;vertical-align:middle;font-weight:normal">STORY-BASED</span>' : ''}
          </div>
          ${desc ? `<div style="font-size:0.7rem;color:var(--ink-light);margin-top:4px;font-style:italic">${this.esc(desc)}</div>` : ''}
        </div>`;
      });

      html += `<div class="modal-buttons">
        <button class="btn btn-secondary" style="width:100%" onclick="app.closeModal();app._subclassSwapState=null">Cancel</button>
      </div>`;
      this.showModal(html);
      return;
    }

    // --- Confirm step ---
    const newSub = st.allOptions[st.selectedIndex];
    const diff = st.diff;
    let html = `<h3>&#128260; Switch to: ${this.esc(newSub.name)}</h3>`;

    if (newSub.description) {
      html += `<div style="font-size:0.75rem;color:var(--ink-light);margin-bottom:12px;padding:8px;background:var(--parchment);border-radius:4px;font-style:italic">${this.esc(newSub.description)}</div>`;
    }

    // Abilities removed
    if (diff.abilitiesToRemove.length > 0) {
      html += `<div style="margin-bottom:10px;padding:8px;background:#ffebee;border-left:3px solid var(--burgundy);border-radius:4px">
        <div style="font-weight:bold;color:var(--burgundy);font-size:0.8rem;margin-bottom:4px">&#8854; Removed (${diff.abilitiesToRemove.length})</div>
        <ul style="margin:0;padding-left:20px;font-size:0.75rem;color:var(--ink)">
          ${diff.abilitiesToRemove.map(n => `<li>${this.esc(n)}</li>`).join('')}
        </ul>
      </div>`;
    }

    // Abilities added
    if (diff.abilitiesToAdd.length > 0) {
      html += `<div style="margin-bottom:10px;padding:8px;background:#e8f5e9;border-left:3px solid #2a7a2a;border-radius:4px">
        <div style="font-weight:bold;color:#2a7a2a;font-size:0.8rem;margin-bottom:4px">&#8853; Gained (${diff.abilitiesToAdd.length})</div>
        <ul style="margin:0;padding-left:20px;font-size:0.75rem;color:var(--ink)">
          ${diff.abilitiesToAdd.map(f => `<li><strong>${this.esc(f.name)}</strong>${f.level !== 'base' ? ` <span style="color:var(--ink-light);font-size:0.7rem">(L${f.level})</span>` : ''}</li>`).join('')}
        </ul>
      </div>`;
    }

    // Spell changes
    const csLost = diff.classSpecificLost || [];
    const csGained = diff.classSpecificGained || [];
    const hasSpellChanges = diff.lostSchools.length > 0 || diff.gainedSchools.length > 0 || csLost.length > 0 || csGained.length > 0;
    if (hasSpellChanges) {
      html += `<div style="margin-bottom:10px;padding:8px;background:var(--parchment-dark);border-radius:4px;font-size:0.75rem">
        <div style="font-weight:bold;color:var(--burgundy);margin-bottom:4px">&#10024; Spells affected</div>`;
      if (diff.lostSchools.length > 0) {
        html += `<div style="color:var(--burgundy)">&#8854; Lost schools: <strong>${diff.lostSchools.join(', ')}</strong> (spells from these schools will be removed, except utility/homebrew spells)</div>`;
      }
      if (diff.gainedSchools.length > 0) {
        html += `<div style="color:#2a7a2a">&#8853; New schools: <strong>${diff.gainedSchools.join(', ')}</strong> (cantrips + max-tier spells will auto-load)</div>`;
      }
      if (csLost.length > 0) {
        html += `<div style="color:var(--burgundy);margin-top:4px">&#8854; Class-specific spells removed: <strong>${csLost.map(s => this.esc(s)).join(', ')}</strong></div>`;
      }
      if (csGained.length > 0) {
        html += `<div style="color:#2a7a2a;margin-top:4px">&#8853; Class-specific spells gained: <strong>${csGained.map(s => this.esc(s)).join(', ')}</strong></div>`;
      }
      html += `</div>`;
    }

    html += `<div class="modal-buttons">
      <button class="btn btn-secondary" onclick="app.backToSubclassSwapList()">&larr; Back</button>
      <button class="btn btn-primary" style="flex:1" onclick="app.confirmSubclassSwap()">Confirm Change</button>
    </div>`;
    this.showModal(html);
  },

  selectSubclassForSwap(index) {
    const st = this._subclassSwapState;
    if (!st) return;
    const selected = st.allOptions[index];
    if (!selected) return;
    st.selectedIndex = index;
    st.diff = this._computeSubclassDiff(this.getChar(), this.getChar().subclass, selected);
    st.step = 'confirm';
    this.renderSubclassSwapModal();
  },

  backToSubclassSwapList() {
    const st = this._subclassSwapState;
    if (!st) return;
    st.step = 'choose';
    st.selectedIndex = null;
    st.diff = null;
    this.renderSubclassSwapModal();
  },

  confirmSubclassSwap() {
    const ch = this.getChar();
    const st = this._subclassSwapState;
    if (!ch || !st || st.selectedIndex === null) return;
    const newSub = st.allOptions[st.selectedIndex];
    const diff = st.diff;

    // 1. Remove abilities granted by old subclass
    let abilities = (ch.abilities || []).filter(a => !diff.abilitiesToRemove.includes(a.name));

    // 2. Add abilities from new subclass
    diff.abilitiesToAdd.forEach(f => {
      if (!abilities.find(a => a.name === f.name)) {
        abilities.push({ name: f.name, description: f.description || '' });
      }
    });

    // 3. Update spells — remove from lost schools + class-specific spells blocked by new subclass, then auto-load new
    const newBlocks = newSub.blocksClassSpecific;
    const newGrants = newSub.grantsClassSpecific || [];
    const oldGrants = (this.getSubclassData({ className: ch.className, subclass: ch.subclass })?.grantsClassSpecific) || [];
    // Spells granted by old subclass but not the new one → remove
    const lostGrants = oldGrants.filter(s => !newGrants.includes(s));
    let spells = (ch.spells || []).filter(sp => {
      if (sp.isUtility) return true;              // keep utility (often user-chosen)
      if (!sp.school) return true;                // keep custom/homebrew (no school)
      if (diff.lostSchools.includes(sp.school)) return false;  // drop lost school
      if (sp.school === 'classSpecific') {
        // Blocked? remove
        if (newBlocks === true) return false;
        if (Array.isArray(newBlocks) && newBlocks.includes(sp.name)) return false;
        // Subclass-granted cantrip no longer granted?
        if (lostGrants.includes(sp.name)) return false;
      }
      return true;
    });

    // Build updated character (with new subclass) and re-run autoLoadSpells to fill new schools
    const tempChar = { ...ch, subclass: newSub.name, spells };
    spells = this.autoLoadSpells(tempChar);

    this.updateChar({
      subclass: newSub.name,
      abilities,
      spells
    });

    this._subclassSwapState = null;
    this.closeModal();
    this.toast(`Subclass changed to ${newSub.name}`);
    this.render();
  },

  retrainModal() {
    const ch = this.getChar();
    if (!ch) return;
    const data = this.getData();
    const classData = (data.classes || []).find(c => c.name === ch.className);
    if (!classData?.retrainFeature) { this.toast('This class cannot retrain.'); return; }

    const retrainArrays = classData.retrainArrays || [];
    const groups = retrainArrays.map(key => ({
      key,                                        // e.g., "lesserInvocations"
      label: this._retrainArrayLabel(key),        // human-readable label
      pool: classData[key] || [],                 // all available options
      chosen: [...((ch.chosenAbilities || {})[key] || [])],
      original: [...((ch.chosenAbilities || {})[key] || [])]
    }));

    this._retrainState = {
      classData,
      retrainFeature: classData.retrainFeature,
      groups,
      swapGroupKey: null,
      swapIndex: null,
      fiendishBoonStat: null,
    };
    this.renderRetrainModal();
  },

  _retrainArrayLabel(key) {
    const map = {
      lesserInvocations: 'Lesser Invocations',
      greaterInvocations: 'Greater Invocations',
      sacredGraces: 'Sacred Graces',
      sacredDecrees: 'Sacred Decrees',
      thrillOfTheHuntAbilities: 'Thrill of the Hunt Abilities',
      savageArsenal: 'Savage Arsenal',
      underhandedAbilities: 'Underhanded Abilities',
      combatTactics: 'Combat Tactics',
      commandersOrders: "Commander's Orders",
      fightingStyles: 'Fighting Styles',
      weaponMastery: 'Weapon Mastery',
      spellshaperAbilities: 'Spellshaper Abilities',
      lyricalWeaponry: 'Lyrical Weaponry',
      chimericBoons: 'Chimeric Boons',
      martialArts: 'Martial Arts',
      afflictions: 'Afflictions',
      mysticMarks: 'Mystic Marks',
    };
    return map[key] || key.charAt(0).toUpperCase() + key.slice(1);
  },

  renderRetrainModal() {
    const ch = this.getChar();
    const st = this._retrainState;
    if (!ch || !st) return;

    const feat = st.retrainFeature;
    const icon = feat.icon || '⟳';
    let html = `<h3>${icon} ${this.esc(feat.name)}</h3>
      <div style="font-size:0.75rem;color:var(--ink-light);margin-bottom:12px;font-style:italic">${this.esc(feat.description)}</div>
      <div style="font-size:0.8rem;color:var(--ink-light);margin-bottom:12px">Tap an option to replace it with another from the list.</div>`;

    // Render each retrainable group
    st.groups.forEach(group => {
      if (group.chosen.length === 0) return;
      html += `<div style="font-weight:bold;color:var(--burgundy);margin-bottom:6px;font-size:0.9rem">${this.esc(group.label)}</div>`;
      group.chosen.forEach((name, idx) => {
        const isSwapping = st.swapGroupKey === group.key && st.swapIndex === idx;
        const ab = group.pool.find(a => a.name === name);
        const origName = group.original[idx];
        const wasChanged = name !== origName;
        const safeKey = group.key.replace(/'/g, "\\'");
        html += `<div onclick="app.retrainStartSwap('${safeKey}', ${idx})"
          style="background:${isSwapping ? 'var(--gold)' : wasChanged ? '#e8f5e9' : 'var(--parchment)'};
          color:${isSwapping ? '#fff' : 'var(--ink)'};
          padding:8px 10px;border-radius:6px;margin-bottom:4px;cursor:pointer;
          border:2px solid ${isSwapping ? 'var(--burgundy)' : wasChanged ? '#4caf50' : 'transparent'}">
          <div style="font-weight:bold;font-size:0.8rem">${this.esc(name)}${wasChanged ? ' (new)' : ''}${name === 'Fiendish Boon' ? ' ⚠️' : ''}</div>
          ${ab ? '<div style="font-size:0.65rem;color:' + (isSwapping ? '#ffe' : 'var(--ink-light)') + '">' + this.esc(ab.description) + '</div>' : ''}
        </div>`;
      });

      // Show swap options when this group is selected
      if (st.swapGroupKey === group.key && st.swapIndex !== null) {
        html += `<div style="margin:8px 0;padding:8px;background:var(--parchment-dark);border-radius:6px">
          <div style="font-weight:bold;font-size:0.8rem;margin-bottom:6px;color:var(--burgundy)">Replace with:</div>`;
        group.pool.forEach(ab => {
          if (group.chosen.includes(ab.name)) return;
          const safeName = ab.name.replace(/'/g, "\\'");
          html += `<div onclick="app.retrainSwap('${safeName.replace(/"/g, '&quot;')}')"
            style="background:var(--parchment);padding:6px 8px;border-radius:6px;margin-bottom:3px;cursor:pointer;border:1px solid var(--parchment-edge)">
            <div style="font-weight:bold;font-size:0.75rem">${this.esc(ab.name)}</div>
            <div style="font-size:0.6rem;color:var(--ink-light)">${this.esc(ab.description)}</div>
          </div>`;
        });
        html += `<button class="btn btn-small btn-secondary" style="margin-top:4px;font-size:0.7rem" onclick="app.retrainCancelSwap()">Cancel</button>
        </div>`;
      }
    });

    // Shadowmancer-specific: handle Fiendish Boon stat (only Shadowmancer has this ability)
    const greaterGroup = st.groups.find(g => g.key === 'greaterInvocations');
    let needsFBStat = false;
    if (greaterGroup) {
      const hadFB = greaterGroup.original.includes('Fiendish Boon');
      const hasFB = greaterGroup.chosen.includes('Fiendish Boon');
      if (hadFB && !hasFB) {
        html += `<div style="margin:8px 0;padding:8px;background:#fff3e0;border:1px solid #ff9800;border-radius:6px;font-size:0.75rem">
          <strong>⚠️ Removing Fiendish Boon</strong> will undo +1 ${ch.fiendishBoonStat || 'stat'} and restore 1 maximum Hit Die.
        </div>`;
      } else if (!hadFB && hasFB) {
        html += `<div style="margin:8px 0;padding:8px;background:var(--parchment);border:2px solid var(--gold);border-radius:6px">
          <div style="font-weight:bold;font-size:0.8rem;color:var(--burgundy);margin-bottom:4px">Fiendish Boon: Choose Stat</div>
          <div style="display:flex;gap:8px;justify-content:center">
            <button class="btn ${st.fiendishBoonStat === 'DEX' ? 'btn-primary' : 'btn-secondary'}" style="min-width:80px"
              onclick="app._retrainState.fiendishBoonStat='DEX';app.renderRetrainModal()">DEX</button>
            <button class="btn ${st.fiendishBoonStat === 'INT' ? 'btn-primary' : 'btn-secondary'}" style="min-width:80px"
              onclick="app._retrainState.fiendishBoonStat='INT';app.renderRetrainModal()">INT</button>
          </div>
        </div>`;
        if (!st.fiendishBoonStat) needsFBStat = true;
      }
    }

    const hasChanges = st.groups.some(g => JSON.stringify(g.chosen) !== JSON.stringify(g.original));
    html += `<div class="modal-buttons">
      <button class="btn btn-secondary" onclick="app.closeModal();app._retrainState=null">Cancel</button>
      <button class="btn btn-primary" style="flex:1" onclick="app.confirmRetrain()" ${hasChanges && !needsFBStat ? '' : 'disabled'}>
        Confirm Changes
      </button>
    </div>`;
    this.showModal(html);
  },

  retrainStartSwap(groupKey, index) {
    const st = this._retrainState;
    if (!st) return;
    if (st.swapGroupKey === groupKey && st.swapIndex === index) {
      st.swapGroupKey = null; st.swapIndex = null;
    } else {
      st.swapGroupKey = groupKey; st.swapIndex = index;
    }
    this.renderRetrainModal();
  },

  retrainCancelSwap() {
    const st = this._retrainState;
    if (!st) return;
    st.swapGroupKey = null; st.swapIndex = null;
    this.renderRetrainModal();
  },

  retrainSwap(newName) {
    const st = this._retrainState;
    if (!st || !st.swapGroupKey || st.swapIndex === null) return;
    const group = st.groups.find(g => g.key === st.swapGroupKey);
    if (!group) return;
    group.chosen[st.swapIndex] = newName;
    st.swapGroupKey = null; st.swapIndex = null;
    this.renderRetrainModal();
  },

  confirmRetrain() {
    const ch = this.getChar();
    const st = this._retrainState;
    if (!ch || !st) return;

    const abilities = [...(ch.abilities || [])];
    const chosenAbilities = { ...(ch.chosenAbilities || {}) };
    const stats = { ...(ch.stats || {}) };
    let hitDiceMaxMod = ch.hitDiceMaxMod || 0;
    let fiendishBoonStat = ch.fiendishBoonStat || null;

    // Process all retrainable groups
    st.groups.forEach(group => {
      group.chosen.forEach((name, idx) => {
        if (name !== group.original[idx]) {
          // Remove old ability from list
          const oldIdx = abilities.findIndex(a => a.name === group.original[idx]);
          if (oldIdx >= 0) abilities.splice(oldIdx, 1);
          // Add new ability
          const ab = group.pool.find(a => a.name === name);
          if (ab && !abilities.find(a => a.name === name)) {
            abilities.push({ name: ab.name, description: ab.description || '' });
          }
        }
      });
      chosenAbilities[group.key] = [...group.chosen];
    });

    // Shadowmancer-specific: handle Fiendish Boon stat addition/removal
    const greaterGroup = st.groups.find(g => g.key === 'greaterInvocations');
    if (greaterGroup) {
      const hadFB = greaterGroup.original.includes('Fiendish Boon');
      const hasFB = greaterGroup.chosen.includes('Fiendish Boon');
      if (hadFB && !hasFB && fiendishBoonStat) {
        stats[fiendishBoonStat] = (stats[fiendishBoonStat] || 0) - 1;
        hitDiceMaxMod += 1;
        fiendishBoonStat = null;
      }
      if (!hadFB && hasFB && st.fiendishBoonStat) {
        stats[st.fiendishBoonStat] = (stats[st.fiendishBoonStat] || 0) + 1;
        hitDiceMaxMod -= 1;
        fiendishBoonStat = st.fiendishBoonStat;
      }
    }

    this.updateChar({ abilities, chosenAbilities, stats, hitDiceMaxMod, fiendishBoonStat });
    this._retrainState = null;
    this.closeModal();
    this.toast(`Options updated via ${st.retrainFeature.name}`);
    this.render();
  },

  setWounds(n) {
    const ch = this.getChar();
    if (!ch) return;
    this.updateChar({ wounds: ch.wounds === n ? n - 1 : n });
    this.render();
  },

  addItem() {
    // Legacy quick-add (still used if addItemModal is bypassed)
    const ch = this.getChar();
    if (!ch) return;
    const name = document.getElementById('newItemName')?.value.trim();
    const slots = parseInt(document.getElementById('newItemSlots')?.value) || 1;
    if (!name) return;
    const inv = ch.inventory || [];
    inv.push({ name, slots, category: 'other' });
    this.updateChar({ inventory: inv });
    this.render();
  },

  removeItem(i) {
    const ch = this.getChar();
    if (!ch) return;
    const inv = ch.inventory || [];
    inv.splice(i, 1);
    this.updateChar({ inventory: inv });
    this.render();
  },

  toggleEquipped(i) {
    const ch = this.getChar();
    if (!ch) return;
    const inv = [...(ch.inventory || [])];
    const item = inv[i];
    if (!item) return;
    const cat = item.category;
    const willEquip = !item.equipped;
    // Only one armor and one shield at a time (weapons: multiple allowed for dual wielding)
    if (willEquip && (cat === 'armor' || cat === 'shield')) {
      inv.forEach((it, idx) => { if (idx !== i && it.category === cat) it.equipped = false; });
    }
    inv[i] = { ...item, equipped: willEquip };
    this.updateChar({ inventory: inv });
    this.render();
  },

  // Add-item modal with category picker and category-specific fields
  addItemModal(editIdx) {
    const ch = this.getChar();
    if (!ch) return;
    const editing = typeof editIdx === 'number';
    const existing = editing ? (ch.inventory || [])[editIdx] || {} : {};
    this._itemDraft = {
      editIdx: editing ? editIdx : null,
      name: existing.name || '',
      slots: existing.slots ?? 1,
      category: existing.category || 'other',
      // weapon
      damage: existing.damage || '',
      damageType: existing.damageType || '',
      properties: (existing.properties || []).join(', '),
      // armor
      formulaBase: existing.formula?.base ?? '',
      formulaStat: existing.formula?.statMod || '',
      formulaMax: existing.formula?.statMax ?? '',
      // shield
      shieldArmor: existing.shieldArmor ?? '',
      // common
      notes: existing.notes || '',
    };
    this.renderAddItemModal();
  },

  renderAddItemModal() {
    const d = this._itemDraft || {};
    const data = this.getData();
    const eq = data.equipment || {};

    // Build preset lists indexed by category, so option values can be simple indices.
    this._itemPresets = {
      weapon: [
        ...(eq.weapons?.melee || []).map(it => ({ ...it, _group: 'Melee' })),
        ...(eq.weapons?.ranged || []).map(it => ({ ...it, _group: 'Ranged' }))
      ],
      armor: [
        ...(eq.armor?.cloth || []).map(it => ({ ...it, _group: 'Cloth' })),
        ...(eq.armor?.leather || []).map(it => ({ ...it, _group: 'Leather' })),
        ...(eq.armor?.mail || []).map(it => ({ ...it, _group: 'Mail' })),
        ...(eq.armor?.plate || []).map(it => ({ ...it, _group: 'Plate' }))
      ],
      shield: (eq.shields || []).slice()
    };

    const buildGroupedOptions = (list) => {
      const groups = {};
      list.forEach((it, idx) => {
        const g = it._group || '';
        if (!groups[g]) groups[g] = [];
        groups[g].push({ idx, name: it.name });
      });
      return Object.entries(groups).map(([g, items]) => {
        const opts = items.map(i => `<option value="${i.idx}">${this.esc(i.name)}</option>`).join('');
        return g ? `<optgroup label="${this.esc(g)}">${opts}</optgroup>` : opts;
      }).join('');
    };

    let html = `<h3>${d.editIdx !== null ? 'Edit Item' : 'Add Item'}</h3>`;
    html += `<div style="margin-bottom:10px">
      <label style="font-size:0.75rem;font-weight:bold;display:block;margin-bottom:4px">Category</label>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${['weapon', 'armor', 'shield', 'other'].map(c => `<button class="btn btn-small ${d.category === c ? 'btn-gold' : 'btn-secondary'}" onclick="app._itemDraft.category='${c}';app.renderAddItemModal()">${c.charAt(0).toUpperCase() + c.slice(1)}</button>`).join('')}
      </div>
    </div>`;

    // Preset picker for known items
    if (d.category === 'weapon' || d.category === 'armor' || d.category === 'shield') {
      const label = d.category === 'weapon' ? 'weapon' : d.category === 'armor' ? 'armor' : 'shield';
      const options = buildGroupedOptions(this._itemPresets[d.category]);
      html += `<div style="margin-bottom:8px">
        <label style="font-size:0.75rem;font-weight:bold;display:block;margin-bottom:4px">Preset (optional)</label>
        <select onchange="app._applyItemPreset(this.value);app.renderAddItemModal()" style="width:100%;padding:6px">
          <option value="">— Custom ${label} —</option>
          ${options}
        </select>
      </div>`;
    }

    // Common fields
    html += `<div style="margin-bottom:8px">
      <label style="font-size:0.75rem;font-weight:bold;display:block;margin-bottom:4px">Name</label>
      <input type="text" value="${this.esc(d.name)}" oninput="app._itemDraft.name=this.value" style="width:100%;padding:6px" />
    </div>
    <div style="margin-bottom:8px">
      <label style="font-size:0.75rem;font-weight:bold;display:block;margin-bottom:4px">Slots</label>
      <input type="number" min="0" value="${d.slots}" oninput="app._itemDraft.slots=parseInt(this.value)||0" style="width:80px;padding:6px" />
    </div>`;

    // Category-specific fields
    if (d.category === 'weapon') {
      html += `<div style="margin-bottom:8px">
        <label style="font-size:0.75rem;font-weight:bold;display:block;margin-bottom:4px">Damage (e.g. 1d6+STR)</label>
        <input type="text" value="${this.esc(d.damage)}" oninput="app._itemDraft.damage=this.value" placeholder="1d6+STR" style="width:100%;padding:6px" />
      </div>
      <div style="margin-bottom:8px">
        <label style="font-size:0.75rem;font-weight:bold;display:block;margin-bottom:4px">Damage Type</label>
        <input type="text" value="${this.esc(d.damageType)}" oninput="app._itemDraft.damageType=this.value" placeholder="Slashing / Piercing / Bludgeoning" style="width:100%;padding:6px" />
      </div>
      <div style="margin-bottom:8px">
        <label style="font-size:0.75rem;font-weight:bold;display:block;margin-bottom:4px">Properties (comma-separated)</label>
        <input type="text" value="${this.esc(d.properties)}" oninput="app._itemDraft.properties=this.value" placeholder="Light, Thrown 4, Vicious" style="width:100%;padding:6px" />
      </div>`;
    } else if (d.category === 'armor') {
      html += `<div style="margin-bottom:8px">
        <label style="font-size:0.75rem;font-weight:bold;display:block;margin-bottom:4px">Base Armor</label>
        <input type="number" value="${d.formulaBase}" oninput="app._itemDraft.formulaBase=this.value" placeholder="2" style="width:80px;padding:6px" />
      </div>
      <div style="margin-bottom:8px">
        <label style="font-size:0.75rem;font-weight:bold;display:block;margin-bottom:4px">+ Stat (optional)</label>
        <select onchange="app._itemDraft.formulaStat=this.value" style="width:120px;padding:6px">
          <option value=""${d.formulaStat === '' ? ' selected' : ''}>— none —</option>
          <option value="DEX"${d.formulaStat === 'DEX' ? ' selected' : ''}>DEX</option>
          <option value="STR"${d.formulaStat === 'STR' ? ' selected' : ''}>STR</option>
        </select>
      </div>
      <div style="margin-bottom:8px">
        <label style="font-size:0.75rem;font-weight:bold;display:block;margin-bottom:4px">Stat Max Cap (optional)</label>
        <input type="number" value="${d.formulaMax}" oninput="app._itemDraft.formulaMax=this.value" placeholder="e.g. 2 for mail" style="width:80px;padding:6px" />
      </div>`;
    } else if (d.category === 'shield') {
      html += `<div style="margin-bottom:8px">
        <label style="font-size:0.75rem;font-weight:bold;display:block;margin-bottom:4px">Shield Armor Bonus</label>
        <input type="number" value="${d.shieldArmor}" oninput="app._itemDraft.shieldArmor=parseInt(this.value)||0" placeholder="2" style="width:80px;padding:6px" />
      </div>`;
    }

    html += `<div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-secondary" onclick="app.closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="app._saveItemFromDraft()">${d.editIdx !== null ? 'Save' : 'Add'}</button>
    </div>`;

    this.showModal(html);
  },

  _applyItemPreset(idxStr) {
    if (idxStr === '' || idxStr === null || idxStr === undefined) return;
    const d = this._itemDraft;
    if (!d) return;
    const presets = (this._itemPresets || {})[d.category] || [];
    const idx = parseInt(idxStr, 10);
    if (isNaN(idx) || !presets[idx]) return;
    const obj = presets[idx];
    d.name = obj.name || '';
    if (d.category === 'weapon') {
      d.damage = obj.damage || '';
      d.damageType = obj.damageType || '';
      d.properties = (obj.properties || []).join(', ');
    } else if (d.category === 'armor') {
      d.formulaBase = obj.formula?.base ?? '';
      d.formulaStat = obj.formula?.statMod || '';
      d.formulaMax = obj.formula?.statMax ?? '';
    } else if (d.category === 'shield') {
      d.shieldArmor = obj.shieldArmor ?? '';
    }
  },

  _saveItemFromDraft() {
    const ch = this.getChar();
    if (!ch) return;
    const d = this._itemDraft;
    if (!d.name.trim()) { this.toast('Enter an item name'); return; }
    const item = { name: d.name.trim(), slots: d.slots || 0, category: d.category };
    if (d.category === 'weapon') {
      item.damage = d.damage.trim();
      item.damageType = d.damageType.trim();
      item.properties = d.properties.split(',').map(p => p.trim()).filter(Boolean);
    } else if (d.category === 'armor') {
      const f = { base: parseInt(d.formulaBase) || 0 };
      if (d.formulaStat) f.statMod = d.formulaStat;
      if (d.formulaMax !== '' && d.formulaMax !== null) f.statMax = parseInt(d.formulaMax);
      item.formula = f;
    } else if (d.category === 'shield') {
      item.shieldArmor = parseInt(d.shieldArmor) || 0;
    }
    const inv = [...(ch.inventory || [])];
    if (d.editIdx !== null) {
      // preserve equipped state on edit
      item.equipped = inv[d.editIdx]?.equipped || false;
      inv[d.editIdx] = item;
    } else {
      inv.push(item);
    }
    this.updateChar({ inventory: inv });
    this.closeModal();
    this.render();
  },

  saveNotes(text) {
    this.updateChar({ notes: text });
  },

  rollSkill(name, bonus) {
    const roll = Math.floor(Math.random() * 20) + 1;
    const crit = roll === 20 ? ' CRITICAL!' : roll === 1 ? ' FUMBLE!' : '';
    this.animateDice([roll], 20, {
      label: `${name} Check`,
      bonus,
      subtitle: crit || undefined,
    });
  },

  toggleCollapsible(el) {
    el.classList.toggle('open');
    const body = el.nextElementSibling;
    body.classList.toggle('open');
  },

  toggleEditMode() {
    this.state.editMode = !this.state.editMode;
    this.render();
  },

  uploadImage() {
    const inp = document.getElementById('imageUpload');
    inp.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        // Resize to reduce storage
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const size = 200;
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext('2d');
          const min = Math.min(img.width, img.height);
          const sx = (img.width - min) / 2;
          const sy = (img.height - min) / 2;
          ctx.drawImage(img, sx, sy, min, min, 0, 0, size, size);
          const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
          app.updateChar({ image: dataUrl });
          app.render();
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
      inp.value = '';
    };
    inp.click();
  },

  // Modals
  showModal(content) {
    let overlay = document.getElementById('modalOverlay');
    if (overlay) {
      // Update existing modal content
      overlay.querySelector('.modal').innerHTML = content;
      return;
    }
    overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'modalOverlay';
    overlay.innerHTML = `<div class="card modal">${content}</div>`;
    overlay.addEventListener('click', (e) => { if (e.target === overlay) app.closeModal(); });
    // Prevent background scroll on iOS when touching outside the modal
    overlay.addEventListener('touchmove', (e) => {
      if (e.target === overlay) e.preventDefault();
    }, { passive: false });
    document.body.appendChild(overlay);
    document.body.style.overflow = 'hidden';
  },

  closeModal() {
    const m = document.getElementById('modalOverlay');
    if (m) m.remove();
    document.body.style.overflow = '';
    // Clear any flags that track an open modal so live re-renders don't reopen it
    this._remoteViewerOpen = false;
    this._remotePlayerSelectedPid = null;
  },

  addAbilityModal() {
    this.showModal(`
      <h3>Add Ability</h3>
      <input class="creation-input" id="abilityName" placeholder="Ability name">
      <textarea class="notes-area" id="abilityDesc" placeholder="Description" style="min-height:80px"></textarea>
      <div class="modal-buttons">
        <button class="btn btn-secondary" onclick="app.closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="app.saveAbility()">Save</button>
      </div>
    `);
  },

  saveAbility() {
    const name = document.getElementById('abilityName').value.trim();
    const desc = document.getElementById('abilityDesc').value.trim();
    if (!name) return;
    const ch = this.getChar();
    const abilities = ch.abilities || [];
    abilities.push({ name, description: desc });
    this.updateChar({ abilities });
    this.closeModal();
    this.render();
  },

  // Class-to-school mapping for spell warnings
  CLASS_SCHOOLS: {
    'Mage': { schools: ['fire', 'ice', 'lightning'], label: 'Fire, Ice, Lightning' },
    'Oathsworn': { schools: ['radiant'], label: 'Radiant' },
    'Shepherd': { schools: ['radiant', 'necrotic'], label: 'Radiant, Necrotic' },
    'Songweaver': { schools: ['wind', 'fire', 'ice', 'lightning', 'radiant', 'necrotic'], label: 'Wind + 1 chosen school' },
    'Stormshifter': { schools: ['lightning', 'wind'], label: 'Lightning, Wind' },
    'Shadowmancer': { schools: ['necrotic', 'classSpecific'], label: 'Necrotic / Class-Specific' },
    'Hexbinder': { schools: ['necrotic', 'hexbinder'], label: 'Necrotic + Hexbinder' },
  },

  getSpellList() {
    const data = this.getData();
    const spellData = data.spells || {};
    const all = [];
    // School spells (cantrips + regular)
    ['fire', 'ice', 'lightning', 'wind', 'radiant', 'necrotic'].forEach(school => {
      const s = spellData[school];
      if (!s) return;
      (s.cantrips || []).forEach(sp => all.push({ ...sp, school, category: 'spell' }));
      (s.spells || []).forEach(sp => all.push({ ...sp, school, category: 'spell' }));
    });
    // Class-specific
    if (spellData.classSpecific?.spells) {
      spellData.classSpecific.spells.forEach(sp => all.push({ ...sp, school: 'classSpecific', category: 'spell' }));
    }
    // Hexbinder
    if (spellData.hexbinder?.spells) {
      spellData.hexbinder.spells.forEach(sp => all.push({ ...sp, school: 'hexbinder', category: 'spell' }));
    }
    // Utility
    if (spellData.utility) {
      Object.entries(spellData.utility).forEach(([school, spells]) => {
        if (Array.isArray(spells)) {
          spells.forEach(sp => all.push({ ...sp, school, category: 'utility', tier: 0 }));
        }
      });
    }
    return all;
  },

  spellPickerState: { tab: 'spell', school: 'all', tier: 'all', search: '' },

  addSpellModal() {
    this.spellPickerState = { tab: 'spell', school: 'all', tier: 'all', search: '' };
    this.renderSpellPicker();
  },

  renderSpellPicker() {
    const ch = this.getChar();
    if (!ch) return;
    const st = this.spellPickerState;
    const classSchools = this.CLASS_SCHOOLS[ch.className];
    const allSpells = this.getSpellList();
    const knownNames = (ch.spells || []).map(s => s.name);

    // Filter
    let filtered = allSpells.filter(sp => sp.category === st.tab || (st.tab === 'spell' && sp.category === 'spell'));
    if (st.tab === 'utility') filtered = allSpells.filter(sp => sp.category === 'utility');
    if (st.school !== 'all') filtered = filtered.filter(sp => sp.school === st.school);
    if (st.tier !== 'all') filtered = filtered.filter(sp => sp.tier === parseInt(st.tier));
    if (st.search) {
      const q = st.search.toLowerCase();
      filtered = filtered.filter(sp => sp.name.toLowerCase().includes(q) || (sp.description || '').toLowerCase().includes(q));
    }

    // Sort by tier then name
    filtered.sort((a, b) => (a.tier || 0) - (b.tier || 0) || a.name.localeCompare(b.name));

    const tierLabels = { 0: 'Cantrip', 1: 'Tier 1', 2: 'Tier 2', 3: 'Tier 3', 4: 'Tier 4', 5: 'Tier 5', 6: 'Tier 6' };
    const schoolLabels = { fire: 'Fire', ice: 'Ice', lightning: 'Lightning', wind: 'Wind', radiant: 'Radiant', necrotic: 'Necrotic', classSpecific: 'Class-Specific', hexbinder: 'Hexbinder' };

    let html = '<h3>Add Spell</h3>';

    // Tabs
    html += '<div style="display:flex;gap:4px;margin-bottom:10px">';
    ['spell', 'utility', 'homebrew'].forEach(tab => {
      const label = tab === 'spell' ? 'Spells' : tab === 'utility' ? 'Utility' : 'Homebrew';
      const active = st.tab === tab ? 'btn-primary' : 'btn-secondary';
      html += `<button class="btn btn-small ${active}" style="flex:1;font-size:0.75rem" onclick="app.spellPickerState.tab='${tab}'; app.renderSpellPicker()">${label}</button>`;
    });
    html += '</div>';

    if (st.tab === 'homebrew') {
      // Homebrew manual entry
      html += `
        <input class="creation-input" id="spellName" placeholder="Spell name">
        <select class="creation-input" id="spellTier">
          <option value="0">Cantrip</option><option value="1">Tier 1</option><option value="2">Tier 2</option>
          <option value="3">Tier 3</option><option value="4">Tier 4</option><option value="5">Tier 5</option>
        </select>
        <input class="creation-input" id="spellActions" placeholder="Actions (e.g. 2)">
        <input class="creation-input" id="spellRange" placeholder="Range (e.g. 60ft)">
        <input class="creation-input" id="spellDamage" placeholder="Damage (e.g. 2d6 fire)">
        <textarea class="notes-area" id="spellDesc" placeholder="Description" style="min-height:60px"></textarea>
        <div class="modal-buttons">
          <button class="btn btn-secondary" onclick="app.closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="app.saveHomebrewSpell()">Save</button>
        </div>`;
      this.showModal(html);
      return;
    }

    // Search
    html += `<input class="creation-input" placeholder="Search spells..." value="${this.esc(st.search)}" oninput="app.spellPickerState.search=this.value; app.renderSpellPicker()" style="margin-bottom:8px">`;

    // Filters
    html += '<div style="display:flex;gap:4px;margin-bottom:10px">';
    // School filter
    html += '<select class="creation-input" style="flex:1;font-size:0.75rem;padding:4px" onchange="app.spellPickerState.school=this.value; app.renderSpellPicker()">';
    html += `<option value="all" ${st.school === 'all' ? 'selected' : ''}>All Schools</option>`;
    const schoolKeys = st.tab === 'utility' ? ['fire', 'ice', 'lightning', 'wind', 'radiant', 'necrotic'] : ['fire', 'ice', 'lightning', 'wind', 'radiant', 'necrotic', 'classSpecific', 'hexbinder'];
    schoolKeys.forEach(k => {
      html += `<option value="${k}" ${st.school === k ? 'selected' : ''}>${schoolLabels[k] || k}</option>`;
    });
    html += '</select>';
    // Tier filter
    html += '<select class="creation-input" style="flex:1;font-size:0.75rem;padding:4px" onchange="app.spellPickerState.tier=this.value; app.renderSpellPicker()">';
    html += `<option value="all" ${st.tier === 'all' ? 'selected' : ''}>All Tiers</option>`;
    for (let t = 0; t <= 6; t++) {
      html += `<option value="${t}" ${st.tier === String(t) ? 'selected' : ''}>${tierLabels[t]}</option>`;
    }
    html += '</select>';
    html += '</div>';

    // Class access info
    if (classSchools) {
      html += `<div style="font-size:0.7rem;color:var(--ink-light);margin-bottom:8px;padding:4px 6px;background:rgba(0,0,0,0.03);border-radius:4px">${this.esc(ch.className)} schools: <strong>${classSchools.label}</strong></div>`;
    }

    // Spell list
    if (filtered.length === 0) {
      html += '<p style="text-align:center;color:var(--ink-light);font-size:0.8rem;padding:20px 0">No spells match your filters.</p>';
    } else {
      html += '<div style="max-height:45vh;overflow-y:auto">';
      filtered.forEach(sp => {
        const known = knownNames.includes(sp.name);
        const schoolMatch = !classSchools || classSchools.schools.includes(sp.school);
        const classMatch = !sp.class || sp.class === ch.className;
        const showSchoolWarning = !schoolMatch;
        const showClassWarning = sp.class && sp.class !== ch.className;

        html += `<div style="padding:8px;margin-bottom:6px;border-radius:6px;border:1px solid var(--parchment-edge);background:${known ? 'rgba(0,0,0,0.05)' : 'var(--parchment)'};cursor:${known ? 'default' : 'pointer'};opacity:${known ? '0.6' : '1'}" ${known ? '' : `onclick="app.addSpellFromPicker(${JSON.stringify(sp).replace(/"/g, '&quot;')})"` }>`;

        html += `<div style="display:flex;justify-content:space-between;align-items:center">`;
        html += `<strong style="font-size:0.85rem">${this.esc(sp.name)}</strong>`;
        html += `<span style="font-size:0.65rem;color:var(--ink-light)">${tierLabels[sp.tier] || ''} &middot; ${schoolLabels[sp.school] || sp.school}</span>`;
        html += '</div>';

        html += `<div style="font-size:0.7rem;color:var(--ink-light);margin-top:2px">${sp.actions ? sp.actions + ' action' + (sp.actions > 1 ? 's' : '') : ''} ${sp.range ? '&middot; ' + sp.range : ''} ${sp.damage && sp.damage !== 'None' ? '&middot; ' + sp.damage : ''}</div>`;

        html += `<div style="font-size:0.7rem;margin-top:4px;color:var(--ink)">${this.esc((sp.description || '').substring(0, 120))}${(sp.description || '').length > 120 ? '...' : ''}</div>`;

        if (known) {
          html += `<div style="font-size:0.65rem;color:var(--gold);margin-top:4px;font-style:italic">&#10003; Already known</div>`;
        }
        if (showSchoolWarning && !known) {
          html += `<div style="font-size:0.65rem;color:var(--burgundy);margin-top:4px">&#9888; Outside ${this.esc(ch.className)}'s normal schools</div>`;
        }
        if (showClassWarning && !known) {
          html += `<div style="font-size:0.65rem;color:var(--burgundy);margin-top:2px">&#9888; ${this.esc(sp.class)}-specific spell</div>`;
        }

        html += '</div>';
      });
      html += '</div>';
    }

    html += `<div class="modal-buttons"><button class="btn btn-secondary" style="flex:1" onclick="app.closeModal()">Cancel</button></div>`;

    this.showModal(html);
  },

  addSpellFromPicker(sp) {
    const ch = this.getChar();
    if (!ch) return;
    const spells = ch.spells || [];
    if (spells.find(s => s.name === sp.name)) { this.toast('Spell already known'); return; }
    spells.push({
      name: sp.name,
      tier: sp.tier,
      actions: sp.actions,
      range: sp.range,
      damage: sp.damage || 'None',
      description: sp.description || '',
      school: sp.school,
      isUtility: sp.category === 'utility'
    });
    this.updateChar({ spells });
    this.closeModal();
    this.toast(`Learned ${sp.name}!`);
    this.render();
  },

  saveHomebrewSpell() {
    const name = document.getElementById('spellName').value.trim();
    if (!name) return;
    const ch = this.getChar();
    const spells = ch.spells || [];
    spells.push({
      name,
      tier: parseInt(document.getElementById('spellTier').value),
      actions: document.getElementById('spellActions').value.trim(),
      range: document.getElementById('spellRange').value.trim(),
      damage: document.getElementById('spellDamage').value.trim(),
      description: document.getElementById('spellDesc').value.trim(),
    });
    this.updateChar({ spells });
    this.closeModal();
    this.render();
  },

  addHomebrewModal(editIndex) {
    const ch = this.getChar();
    const existing = editIndex !== undefined ? (ch.homebrew || [])[editIndex] : null;
    this.showModal(`
      <h3>${existing ? 'Edit' : 'Add'} Homebrew Item</h3>
      <input class="creation-input" id="hbName" placeholder="Item name" value="${this.esc(existing?.name || '')}">
      <textarea class="notes-area" id="hbDesc" placeholder="Description" style="min-height:60px">${this.esc(existing?.description || '')}</textarea>
      <input class="creation-input" id="hbEffect" placeholder="Mechanical effect" value="${this.esc(existing?.effect || '')}">
      <div class="modal-buttons">
        <button class="btn btn-secondary" onclick="app.closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="app.saveHomebrew(${editIndex !== undefined ? editIndex : -1})">Save</button>
      </div>
    `);
  },

  editHomebrew(i) { this.addHomebrewModal(i); },

  saveHomebrew(idx) {
    const name = document.getElementById('hbName').value.trim();
    if (!name) return;
    const ch = this.getChar();
    const hb = ch.homebrew || [];
    const item = {
      name,
      description: document.getElementById('hbDesc').value.trim(),
      effect: document.getElementById('hbEffect').value.trim(),
    };
    if (idx >= 0) hb[idx] = item;
    else hb.push(item);
    this.updateChar({ homebrew: hb });
    this.closeModal();
    this.render();
  },

  removeHomebrew(i) {
    const ch = this.getChar();
    const hb = ch.homebrew || [];
    hb.splice(i, 1);
    this.updateChar({ homebrew: hb });
    this.render();
  },

  // ===== COMBAT TRACKER =====
  renderCombat() {
    const ch = this.getChar();
    const combat = this.state.combat;
    const data = this.getData();
    const conditions = data.conditions || [];
    const reactions = data.reactions || [];
    const combatActions = data.combatActions || [];

    let html = '<div class="combat-view view-padding-bottom">';

    if (!ch) {
      html += '<div class="empty-state"><p>Select a character first to use the combat tracker.</p><button class="btn btn-primary" onclick="app.navigate(\'characters\')">Go to Characters</button></div></div>';
      return html;
    }

    html += `<div style="text-align:center;margin-bottom:8px;font-family:Georgia,serif;color:var(--burgundy)">${this.esc(ch.name)}</div>`;

    // Action tokens (first round may lock some based on initiative roll)
    const locked = combat.inFirstRound ? (combat.firstRoundLockedActions || 0) : 0;
    html += '<div class="section-title">&#9876; Actions';
    if (locked > 0) {
      html += ` <span style="font-size:0.7rem;color:var(--ink-light);font-weight:normal">(round 1: ${3 - locked} available)</span>`;
    }
    html += '</div>';
    html += '<div class="action-tokens">';
    for (let i = 0; i < 3; i++) {
      // Lock from the right: if locked=1, index 2 is locked; if locked=2, indices 1 and 2 are locked
      const isLocked = i >= 3 - locked;
      const spent = combat.actions[i] ? 'spent' : '';
      const lockedClass = isLocked ? 'locked' : '';
      const labelText = isLocked ? 'LOCKED' : (combat.actions[i] ? 'SPENT' : 'ACTION<br>' + (i + 1));
      html += `<div class="action-token ${spent} ${lockedClass}" onclick="app.toggleAction(${i})">${labelText}</div>`;
    }
    html += '</div>';

    // Reactions
    html += '<div class="section-title">&#9889; Reactions</div>';
    html += '<div class="reaction-list">';
    reactions.forEach(r => {
      const used = combat.reactions[r.name] ? 'used' : '';
      html += `
        <div class="reaction-item ${used}" onclick="app.toggleReaction('${r.name}')">
          <div>
            <strong>${r.name}</strong>
            <div class="cost">${r.cost}</div>
          </div>
          <span>${combat.reactions[r.name] ? '&#10003; Used' : 'Ready'}</span>
        </div>`;
    });
    html += '</div>';

    // Combat buttons
    html += '<div class="combat-buttons">';
    html += `<button class="btn btn-primary" style="flex:1" onclick="app.endTurn()">End Turn</button>`;
    html += `<button class="btn btn-secondary" style="flex:1" onclick="app.newRound()">New Round</button>`;
    html += '</div>';

    // Initiative roller
    html += '<div class="section-title">&#127922; Initiative</div>';
    html += `<div style="text-align:center"><button class="btn btn-gold" onclick="app.rollInitiative()">Roll Initiative</button></div>`;
    if (combat.lastInitiative !== null) {
      const val = combat.lastInitiative;
      let startActions = 1;
      if (val >= 20) startActions = 3;
      else if (val >= 10) startActions = 2;
      html += `
        <div class="initiative-result card">
          <div class="roll-value">${val}</div>
          <div class="actions-text">Starting actions: ${startActions}</div>
        </div>`;
    }

    // Character Vitals
    html += '<div class="section-title">&#10084; Vitals</div>';
    const cStats = ch.stats || {};
    const cHp = ch.hp ?? ch.maxHp ?? 10;
    const cMaxHp = ch.maxHp ?? 10;
    html += `
      <div style="display:flex;gap:8px;justify-content:center;margin-bottom:8px;flex-wrap:wrap">
        <div style="text-align:center;padding:4px 10px;background:var(--parchment);border:1px solid var(--parchment-edge);border-radius:6px" title="${this.esc(this.calculateArmor(ch).breakdown.join(' · '))}">
          <div style="font-size:0.6rem;color:var(--ink-light)">Armor</div>
          <div style="font-size:1rem;font-weight:bold;color:var(--gold)">${this.calculateArmor(ch).total}</div>
        </div>
        <div style="text-align:center;padding:4px 10px;background:var(--parchment);border:1px solid var(--parchment-edge);border-radius:6px">
          <div style="font-size:0.6rem;color:var(--ink-light)">Speed</div>
          <div style="font-size:1rem;font-weight:bold;color:var(--gold)">${ch.speed ?? 6}</div>
        </div>
      </div>
      <div class="tracker-row" style="justify-content:center">
        <span class="tracker-label">HP</span>
        <span class="tracker-value tappable" onclick="app.showAdjust('combatHp')">${cHp} / ${cMaxHp}</span>
      </div>
      <div class="tracker-row adjust-row" id="adjust-combatHp" style="display:none;justify-content:center">
        <input type="number" id="adj-combatHp-val" placeholder="0" inputmode="numeric" min="0" onkeydown="if(event.key==='Enter')app.applyAdjust('combatHp',1)">
        <button class="adj-minus" onclick="app.applyAdjust('combatHp',-1)">&minus;</button>
        <button class="adj-plus" onclick="app.applyAdjust('combatHp',1)">&plus;</button>
        <button class="adj-cancel" onclick="app.hideAdjust('combatHp')">&#10005;</button>
      </div>
      <div class="tracker-row" style="justify-content:center">
        <span class="tracker-label">Temp HP</span>
        <span class="tracker-value tappable" onclick="app.showAdjust('combatTempHp')">${ch.tempHp || 0}</span>
      </div>
      <div class="tracker-row adjust-row" id="adjust-combatTempHp" style="display:none;justify-content:center">
        <input type="number" id="adj-combatTempHp-val" placeholder="0" inputmode="numeric" min="0" onkeydown="if(event.key==='Enter')app.applyAdjust('combatTempHp',1)">
        <button class="adj-minus" onclick="app.applyAdjust('combatTempHp',-1)">&minus;</button>
        <button class="adj-plus" onclick="app.applyAdjust('combatTempHp',1)">&plus;</button>
        <button class="adj-cancel" onclick="app.hideAdjust('combatTempHp')">&#10005;</button>
      </div>
      ${ch.maxMana > 0 ? `
        <div class="tracker-row" style="justify-content:center">
          <span class="tracker-label">&#128293; Mana</span>
          <span class="tracker-value tappable" onclick="app.showAdjust('combatMana')">${ch.mana ?? 0} / ${ch.maxMana}</span>
        </div>
        <div class="tracker-row adjust-row" id="adjust-combatMana" style="display:none;justify-content:center">
          <input type="number" id="adj-combatMana-val" placeholder="0" inputmode="numeric" min="0" onkeydown="if(event.key==='Enter')app.applyAdjust('combatMana',1)">
          <button class="adj-minus" onclick="app.applyAdjust('combatMana',-1)">&minus;</button>
          <button class="adj-plus" onclick="app.applyAdjust('combatMana',1)">&plus;</button>
          <button class="adj-cancel" onclick="app.hideAdjust('combatMana')">&#10005;</button>
        </div>
      ` : ''}
      <div class="tracker-row" style="justify-content:center"><span class="tracker-label">Wounds${this.getBonusWounds(ch) > 0 ? ` <span style='font-size:0.65rem;color:var(--gold)'>+${this.getBonusWounds(ch)}</span>` : ''}</span><div class="wounds-row">`;
    const cWounds = ch.wounds || 0;
    const cBonus = this.getBonusWounds(ch);
    const cTotal = 6 + cBonus;
    for (let i = 1; i <= cTotal; i++) {
      const isBonus = i > 6;
      const filled = i <= cWounds ? 'filled' : '';
      const death = i === cTotal ? 'death' : '';
      const bonus = isBonus ? 'bonus' : '';
      const icon = (i === cTotal) ? (i <= cWounds ? '&#128128;' : '&#9760;') : (i <= cWounds ? '&#10006;' : '');
      html += `<div class="wound-circle ${filled} ${death} ${bonus}" onclick="app.setWounds(${i});app.render()">${icon}</div>`;
    }
    html += '</div></div>';

    // --- Active Abilities (quick access) ---
    const chSpells = ch.spells || [];
    const chSpellNames = new Set(chSpells.map(s => s.name));
    const combatAbilities = (ch.abilities || []).filter(a =>
      !chSpellNames.has(a.name) && this.classifyAbilityType(a) === 'active'
    );
    if (combatAbilities.length > 0) {
      html += '<div class="section-title">&#9876; Active Abilities</div>';
      combatAbilities.forEach((a, i) => {
        html += `<div class="combat-ability-card" onclick="this.classList.toggle('open')">
          <div class="combat-ability-header">
            <span class="combat-ability-name">${this.esc(a.name)}</span>
          </div>
          <div class="combat-ability-desc">${this.esc(a.description || '')}</div>
        </div>`;
      });
    }

    // --- Spells (quick access, grouped by tier) ---
    if (chSpells.length > 0) {
      html += '<div class="section-title">&#10024; Spells</div>';
      const tierLabels = { 0: 'Cantrip', 1: 'T1', 2: 'T2', 3: 'T3', 4: 'T4', 5: 'T5', 6: 'T6', 7: 'T7', 8: 'T8', 9: 'T9' };
      const byTier = {};
      chSpells.forEach(sp => {
        const t = sp.tier ?? 0;
        if (!byTier[t]) byTier[t] = [];
        byTier[t].push(sp);
      });
      const tierKeys = Object.keys(byTier).sort((a, b) => a - b);
      tierKeys.forEach(t => {
        byTier[t].forEach(sp => {
          const manaCost = t > 0 ? `${t} mana` : '0';
          const meta = [
            tierLabels[t] || ('T' + t),
            sp.actions ? `${sp.actions}a` : null,
            sp.range || null,
            sp.damage && sp.damage !== 'None' ? sp.damage : null,
            t > 0 ? manaCost : null
          ].filter(Boolean).join(' · ');
          html += `<div class="combat-spell-card" onclick="this.classList.toggle('open')">
            <div class="combat-spell-header">
              <span class="combat-spell-name">${this.esc(sp.name)}</span>
              <span class="combat-spell-meta">${meta}</span>
            </div>
            <div class="combat-spell-desc">${this.esc(sp.description || '')}</div>
          </div>`;
        });
      });
    }

    // --- Relevant Passives (passive abilities active in combat) ---
    const combatPassives = (ch.abilities || []).filter(a =>
      !chSpellNames.has(a.name) && this.classifyAbilityType(a) === 'passive'
    );
    if (combatPassives.length > 0) {
      html += '<div class="section-title">&#128274; Passive Effects</div>';
      combatPassives.forEach(a => {
        html += `<div class="combat-ability-card" onclick="this.classList.toggle('open')">
          <div class="combat-ability-header">
            <span class="combat-ability-name">${this.esc(a.name)}</span>
          </div>
          <div class="combat-ability-desc">${this.esc(a.description || '')}</div>
        </div>`;
      });
    }

    // --- Attacks (equipped weapons + unarmed) ---
    const attacks = this.getCharacterAttacks(ch);
    if (attacks.length > 0) {
      html += '<div class="section-title">&#127993; Attacks</div>';
      attacks.forEach(atk => {
        html += `<div class="combat-ability-card" onclick="this.classList.toggle('open')">
          <div class="combat-ability-header">
            <span class="combat-ability-name">${this.esc(atk.name)}</span>
            <span class="combat-ability-meta" style="font-size:0.7rem;color:var(--gold);margin-left:auto">${this.esc(atk.damageDisplay)}</span>
          </div>
          <div class="combat-ability-desc">
            <div><strong>Damage:</strong> ${this.esc(atk.damageDisplay)} ${atk.damageType ? '· ' + this.esc(atk.damageType) : ''}</div>
            ${atk.properties && atk.properties.length ? '<div><strong>Properties:</strong> ' + atk.properties.map(p => this.esc(p)).join(', ') + '</div>' : ''}
            ${atk.notes ? '<div style="margin-top:4px;font-style:italic">' + this.esc(atk.notes) + '</div>' : ''}
          </div>
        </div>`;
      });
    }

    // --- Heroic Actions reference (collapsible) ---
    if (combatActions.length > 0) {
      html += `<div class="section-title collapsible-header" onclick="app.toggleCollapsible(this)" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between">
        <span>&#9876; Heroic Actions</span>
        <span class="collapsible-arrow">&#9660;</span>
      </div>
      <div class="collapsible-body">`;
      combatActions.forEach(a => {
        html += `<div style="padding:8px 10px;margin-bottom:4px;background:var(--parchment);border:1px solid var(--parchment-edge);border-radius:6px">
          <div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px">
            <strong style="color:var(--burgundy)">${this.esc(a.name)}</strong>
            <span style="font-size:0.7rem;color:var(--ink-light)">${this.esc(a.cost)}</span>
          </div>
          <div style="font-size:0.75rem;color:var(--ink);margin-top:2px">${this.esc(a.description)}</div>
        </div>`;
      });
      html += `</div>`;
    }

    // Conditions
    html += '<div class="section-title">&#9888; Conditions</div>';
    html += '<div class="conditions-grid">';
    conditions.forEach(c => {
      const active = combat.conditions[c.name] ? 'active' : '';
      html += `<div class="condition-tag ${active}" onclick="app.toggleCondition('${c.name}')" title="${this.esc(c.description)}">${c.name}</div>`;
    });
    html += '</div>';

    // Active condition descriptions
    const activeConditions = conditions.filter(c => combat.conditions[c.name]);
    if (activeConditions.length > 0) {
      html += `<div class="active-conditions">`;
      activeConditions.forEach(c => {
        html += `<div class="active-condition-item">
          <div class="active-condition-name">${this.esc(c.name)}</div>
          <div class="active-condition-desc">${this.esc(c.description || '')}</div>
        </div>`;
      });
      html += `</div>`;
    }

    html += '</div>';
    return html;
  },

  toggleAction(i) {
    const combat = this.state.combat;
    const locked = combat.inFirstRound ? (combat.firstRoundLockedActions || 0) : 0;
    // Lock from the right: actions with index >= (3 - locked) are locked
    if (i >= 3 - locked) {
      this.toast('Locked this round (initiative)');
      return;
    }
    combat.actions[i] = !combat.actions[i];
    this.render();
  },

  toggleReaction(name) {
    const combat = this.state.combat;
    const nowActive = !combat.reactions[name];
    combat.reactions[name] = nowActive;
    // Per Nimble §14: each reaction costs 1 action. When you toggle a reaction ON, spend 1 action.
    // When you toggle a reaction OFF, refund 1 action (user changed their mind).
    const locked = combat.inFirstRound ? (combat.firstRoundLockedActions || 0) : 0;
    const maxUsable = 3 - locked;
    if (nowActive) {
      // Find rightmost non-locked unspent action and spend it
      for (let i = maxUsable - 1; i >= 0; i--) {
        if (!combat.actions[i]) { combat.actions[i] = true; break; }
      }
    } else {
      // Find leftmost spent non-locked action and free it
      for (let i = 0; i < maxUsable; i++) {
        if (combat.actions[i]) { combat.actions[i] = false; break; }
      }
    }
    this.render();
  },

  toggleCondition(name) {
    this.state.combat.conditions[name] = !this.state.combat.conditions[name];
    this.render();
  },

  endTurn() {
    this.state.combat.actions = [false, false, false];
    this.state.combat.reactions = {};
    this.render();
    this.toast('Turn ended - actions reset');
  },

  newRound() {
    this.state.combat.actions = [false, false, false];
    this.state.combat.reactions = {};
    this.state.combat.inFirstRound = false;       // Round 1 locks only apply to round 1
    this.state.combat.firstRoundLockedActions = 0;
    this.render();
    this.toast('New round');
  },

  rollInitiative() {
    const ch = this.getChar();
    const bonus = ch ? (ch.initiative ?? ch.stats?.DEX ?? 0) : 0;
    const roll = Math.floor(Math.random() * 20) + 1;
    const total = roll + bonus;
    this.state.combat.lastInitiative = total;
    // Starting actions: 3 if 20+, 2 if 10-19, 1 if <10
    // Locked = 3 - starting actions
    const startActions = total >= 20 ? 3 : total >= 10 ? 2 : 1;
    this.state.combat.firstRoundLockedActions = 3 - startActions;
    this.state.combat.inFirstRound = true;
    this.state.combat.actions = [false, false, false];
    this.state.combat.reactions = {};
    this.animateDice([roll], 20, {
      label: 'Initiative',
      bonus,
      onDone: () => this.render(),
    });
  },

  // ===== DICE ROLLER =====
  renderDice() {
    const ds = this.state.dice;
    const diceTypes = [4, 6, 8, 10, 12, 20, 100];

    let html = '<div class="dice-view view-padding-bottom">';

    // Dice display (with per-die shape)
    html += `<div class="dice-display shape-d${ds.selectedDie}" id="diceDisplay"><span class="dice-display-label">d${ds.selectedDie}</span></div>`;

    // Dice selector
    html += '<div class="dice-selector">';
    diceTypes.forEach(d => {
      const sel = d === ds.selectedDie ? 'selected' : '';
      html += `<button class="dice-btn ${sel}" onclick="app.selectDie(${d})">d${d}</button>`;
    });
    html += '</div>';

    // Options: number of dice + adv/dis counters
    html += '<div class="dice-options">';
    html += `
      <div class="dice-option-group">
        <div class="dice-option-label">Dice</div>
        <div class="num-dice">
          <button class="tracker-btn minus" style="width:32px;height:32px" onclick="app.setNumDice(-1)">-</button>
          <span>${ds.numDice}</span>
          <button class="tracker-btn plus" style="width:32px;height:32px" onclick="app.setNumDice(1)">+</button>
        </div>
      </div>`;
    html += `
      <div class="dice-option-group">
        <div class="dice-option-label" style="color:#2a7a2a">ADV</div>
        <div class="num-dice">
          <button class="tracker-btn minus" style="width:32px;height:32px" onclick="app.setAdvCount('advantages', -1)">-</button>
          <span style="color:#2a7a2a">${ds.advantages}</span>
          <button class="tracker-btn plus" style="width:32px;height:32px" onclick="app.setAdvCount('advantages', 1)">+</button>
        </div>
      </div>`;
    html += `
      <div class="dice-option-group">
        <div class="dice-option-label" style="color:var(--burgundy)">DIS</div>
        <div class="num-dice">
          <button class="tracker-btn minus" style="width:32px;height:32px" onclick="app.setAdvCount('disadvantages', -1)">-</button>
          <span style="color:var(--burgundy)">${ds.disadvantages}</span>
          <button class="tracker-btn plus" style="width:32px;height:32px" onclick="app.setAdvCount('disadvantages', 1)">+</button>
        </div>
      </div>`;
    html += '</div>';

    // Net summary
    const net = ds.advantages - ds.disadvantages;
    const netLabel = net > 0 ? `${net} Net ADV` : net < 0 ? `${Math.abs(net)} Net DIS` : 'Normal';
    const totalToRoll = ds.numDice + Math.abs(net);
    const dropWord = net > 0 ? 'drop lowest' : net < 0 ? 'drop highest' : '';
    let preview = `Roll ${totalToRoll}d${ds.selectedDie}`;
    if (net !== 0) preview += `, ${dropWord} ${Math.abs(net)} → keep ${ds.numDice}`;
    html += `<div style="text-align:center;margin:6px 0;font-size:0.8rem;color:var(--ink-light)">
      <span style="color:${net > 0 ? '#2a7a2a' : net < 0 ? 'var(--burgundy)' : 'var(--ink-light)'};font-weight:bold">${netLabel}</span>
      <span style="margin:0 6px">·</span>${preview}
    </div>`;

    // Roll button
    html += `<button class="btn btn-primary btn-block" style="margin:12px 0;font-size:1.1rem" onclick="app.rollDice()">Roll ${ds.numDice}d${ds.selectedDie}${net !== 0 ? ' (' + (net > 0 ? '+' : '') + net + ')' : ''}</button>`;

    // History
    html += '<div class="roll-history">';
    html += '<div class="section-title">Roll History</div>';
    if (ds.history.length === 0) {
      html += '<p style="font-size:0.8rem;color:var(--ink-light);text-align:center;padding:12px">No rolls yet</p>';
    }
    ds.history.forEach(h => {
      html += `
        <div class="roll-history-item">
          <span class="roll-dice-type">${h.label}</span>
          <span class="roll-total">${h.total}</span>
          <br><span class="roll-results">[${h.results.join(', ')}]${h.dropped ? ' dropped: ' + h.dropped : ''}</span>
        </div>`;
    });
    html += '</div></div>';
    return html;
  },

  selectDie(d) {
    this.state.dice.selectedDie = d;
    this.render();
  },

  setNumDice(delta) {
    let n = this.state.dice.numDice + delta;
    n = Math.max(1, Math.min(10, n));
    this.state.dice.numDice = n;
    this.render();
  },

  setAdvCount(which, delta) {
    const ds = this.state.dice;
    ds[which] = Math.max(0, Math.min(10, (ds[which] || 0) + delta));
    this.render();
  },

  // Dice animation engine
  // rolls: array of final values, dieSize: max die face, opts: { label, dropped, droppedIndex, bonus, subtitle, onDone }
  animateDice(rolls, dieSize, opts = {}) {
    // Remove any existing animation
    const existing = document.querySelector('.dice-anim-overlay');
    if (existing) existing.remove();

    const overlay = document.createElement('div');
    overlay.className = 'dice-anim-overlay';
    overlay.onclick = () => {}; // prevent clicks through

    const label = opts.label || `${rolls.length}d${dieSize}`;
    const labelEl = document.createElement('div');
    labelEl.className = 'dice-anim-label';
    labelEl.textContent = label;
    overlay.appendChild(labelEl);

    const tray = document.createElement('div');
    tray.className = 'dice-anim-tray';
    overlay.appendChild(tray);

    const totalEl = document.createElement('div');
    totalEl.className = 'dice-anim-total';
    overlay.appendChild(totalEl);

    if (opts.subtitle) {
      const sub = document.createElement('div');
      sub.className = 'dice-anim-subtitle';
      sub.textContent = opts.subtitle;
      overlay.appendChild(sub);
    }

    // Create die elements with per-shape polygon
    const dieEls = [];
    const dieNumEls = [];
    rolls.forEach((_, i) => {
      const die = document.createElement('div');
      die.className = `dice-anim-die shape-d${dieSize}`;
      const numEl = document.createElement('span');
      numEl.className = 'dice-num';
      numEl.textContent = '?';
      die.appendChild(numEl);
      tray.appendChild(die);
      dieEls.push(die);
      dieNumEls.push(numEl);
    });

    document.body.appendChild(overlay);

    // Phase 1: Tumble with random numbers (600ms)
    const tumbleInterval = setInterval(() => {
      dieEls.forEach((d, idx) => {
        if (!d.classList.contains('settled')) {
          dieNumEls[idx].textContent = Math.floor(Math.random() * dieSize) + 1;
        }
      });
    }, 60);

    // Phase 2: Settle dice one by one
    const settleDelay = Math.min(200, 600 / rolls.length);
    setTimeout(() => {
      clearInterval(tumbleInterval);
      rolls.forEach((val, i) => {
        setTimeout(() => {
          const d = dieEls[i];
          dieNumEls[i].textContent = val;
          d.classList.add('settled');
