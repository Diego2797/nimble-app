<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Leather-dark rounded background -->
  <rect width="512" height="512" rx="96" fill="#3d2b1f"/>

  <!-- Subtle parchment inner glow (radial) -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#5c3d2e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3d2b1f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="20" y="20" width="472" height="472" rx="80" fill="url(#glow)"/>

  <!-- Outer gold ring -->
  <rect x="24" y="24" width="464" height="464" rx="76" fill="none" stroke="#c9a84c" stroke-width="4" opacity="0.5"/>

  <!-- Heater shield (burgundy) -->
  <path d="M 256 70
           L 96 118
           L 96 272
           Q 96 396 256 458
           Q 416 396 416 272
           L 416 118
           Z"
        fill="#8b1a1a" stroke="#c9a84c" stroke-width="10" stroke-linejoin="round"/>

  <!-- Inner bordered field -->
  <path d="M 256 108
           L 138 144
           L 138 270
           Q 138 378 256 428
           Q 374 378 374 270
           L 374 144
           Z"
        fill="#3d2b1f" stroke="#c9a84c" stroke-width="4" stroke-linejoin="round"/>

  <!-- Big "N" in gold, Georgia serif -->
  <text x="256" y="348"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="280"
        font-weight="bold"
        text-anchor="middle"
        fill="#c9a84c">N</text>
</svg>
